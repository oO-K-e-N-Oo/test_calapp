/* ════ CALENDAR RENDERING｜カレンダー描画 ════
   責務: カレンダーグリッドの DOM 生成・セルサイズ計算・ミニプレビュー描画
   依存: APP STATE（S.year / S.month）、STORAGE（cellData）
════════════════════════════════════════════ */

// 日付エリアの固定サイズ
const DATE_H  = 20;  // 縦長: 上部日付エリア高さ(px)
const DATE_W  = 56;  // 横長: 左側日付エリア幅(px)

function isLandscapeCalendar() {
  if (IS_PHONE) return false; // 携帯電話は縦長固定
  if (window.visualViewport) {
    return window.visualViewport.width > window.visualViewport.height;
  }
  return window.innerWidth > window.innerHeight;
}

/** カレンダーグリッドを再描画 */
/* ════ SPAN EVENTS｜期間イベント ════
   責務: 期間枠のデータ CRUD・SVG 描画・タブ配置・リサイズ・D&D・コンテキストメニュー
   注意: SpanMode 定数は SPAN MODE セクションで定義（このセクションより後方）
         関数内参照のため実行時には問題なし
   共通化: checkSpanDragMonthTransition(mv, ctx) で新規D&DとリサイズD&Dの月遷移ロジックを一本化
           ctx.onKeyConfirmed(dir, newDateKeys) → false を返すとキャンセル
   依存: APP STATE（SpanMode）、CALENDAR RENDERING（getCellRect）、STORAGE
════════════════════════════════════════════ */
// ── SpanMode ユーティリティ ──────────────────────────────────
/** ビューポート座標から有効な日付セルキーを返す（blank・inactive除外） */
function getCellKeyAt(cx, cy) {
  // #cal-grid のみを対象にする（navigateMonth中のoldCloneを除外するため）
  const grid = $id('cal-grid');
  if (!grid) return null;
  // まず日付セルで探す
  const dateCells = grid.querySelectorAll('.cal-cell:not(.inactive):not(.is-blank)');
  for (const cell of dateCells) {
    const r = cell.getBoundingClientRect();
    if (cx >= r.left && cx <= r.right && cy >= r.top && cy <= r.bottom) {
      const mc = cell.querySelector('canvas[data-key]');
      if (mc) return mc.dataset.key;
    }
  }
  // blank セル上の場合は最近傍の日付キーを返す
  const blankCells = grid.querySelectorAll('.cal-cell.is-blank');
  for (const cell of blankCells) {
    const r = cell.getBoundingClientRect();
    if (cx >= r.left && cx <= r.right && cy >= r.top && cy <= r.bottom) {
      const allKeys = getVisibleKeys();
      if (allKeys.length === 0) return null;
      // blank が前にあれば月初、後ろにあれば月末
      const gridRect = grid.getBoundingClientRect();
      return cy < gridRect.top + gridRect.height / 2
        ? allKeys[0]
        : allKeys[allKeys.length - 1];
    }
  }
  return null;
}
/** シードベース疑似乱数（同じシードなら常に同じ値列） */
function seededRand(seed) {
  let s = seed;
  return () => {
    s = (s * 1664525 + 1013904223) & 0xffffffff;
    return (s >>> 0) / 0xffffffff;
  };
}

/** 手書き風ライン：始点→終点を分割してゆらぎを加えたpathコマンド文字列を返す */
function wobblyLine(x1, y1, x2, y2, rand, amp = 2.5) {
  const dx = x2 - x1, dy = y2 - y1;
  const len = Math.sqrt(dx*dx + dy*dy);
  if (len < 1) return ` L${x2.toFixed(1)},${y2.toFixed(1)}`;
  const segs = Math.max(2, Math.round(len / 30));
  let d = '';
  for (let i = 0; i < segs; i++) {
    const t0 = i / segs, t1 = (i + 1) / segs;
    const mx = x1 + dx * ((t0 + t1) / 2);
    const my = y1 + dy * ((t0 + t1) / 2);
    const nx = -dy / len, ny = dx / len;
    const offset = (rand() - 0.5) * amp * 2;
    const cx = mx + nx * offset;
    const cy = my + ny * offset;
    const ex = x1 + dx * t1;
    const ey = y1 + dy * t1;
    d += ` Q${cx.toFixed(1)},${cy.toFixed(1)} ${ex.toFixed(1)},${ey.toFixed(1)}`;
  }
  return d;
}

function getSpanEvents() { return getActiveCalendar().spanEvents || []; }
function setSpanEvents(arr) { getActiveCalendar().spanEvents = arr; }

/** 'YYYY-MM-DD' → Date */
function keyToDate(k) { const [y,m,d] = k.split('-').map(Number); return new Date(y, m-1, d); }
/** Date → 'YYYY-MM-DD' */
function dateToKey(d) { return cellKey(d.getFullYear(), d.getMonth()+1, d.getDate()); }

/** カレンダーグリッド上でキーに対応するセルのBoundingRectを返す */
function getCellRect(key) {
  // #cal-grid のみを対象にする（navigateMonth中のoldCloneを除外するため）
  const grid = $id('cal-grid');
  if (!grid) return null;
  const mc = grid.querySelector(`.cal-cell .cell-preview canvas[data-key="${key}"]`);
  if (!mc) return null;
  const cell = mc.closest('.cal-cell');
  if (!cell) return null;
  const area = $id('cal-grid-area');
  const ar = area.getBoundingClientRect();
  const cr = cell.getBoundingClientRect();
  return {
    left:   cr.left - ar.left,
    top:    cr.top  - ar.top,
    right:  cr.right  - ar.left,
    bottom: cr.bottom - ar.top,
    width:  cr.width,
    height: cr.height,
  };
}

/** 現在表示中の月のセルキー一覧（表示順）を返す */
function getVisibleKeys() {
  // #cal-grid のみを対象にする（navigateMonth中のoldCloneを除外するため）
  const grid = $id('cal-grid');
  if (!grid) return [];
  const cells = grid.querySelectorAll('.cal-cell:not(.inactive):not(.is-blank) .cell-preview canvas[data-key]');
  return Array.from(cells).map(c => c.dataset.key).filter(Boolean);
}

/** startKey〜endKey の間のキーを表示中セルから取得 */
function getKeysBetween(startKey, endKey) {
  const all  = getVisibleKeys();
  const si   = all.indexOf(startKey);
  const ei   = all.indexOf(endKey);
  if (si < 0 || ei < 0) return [];
  const [a, b] = si <= ei ? [si, ei] : [ei, si];
  return all.slice(a, b + 1);
}
/**
 * 期間枠D&D共通：月遷移トリガー判定
 *
 * 新規D&DとリサイズD&Dで共用する月遷移チェック関数。
 * ゾーン判定・armedフラグ制御・navigateMonth呼び出し・完了通知を一本化。
 *
 * @param {PointerEvent} mv         - pointermove イベント
 * @param {Object}       ctx        - D&D固有の状態を持つコンテキストオブジェクト
 *   ctx.transitioning  {boolean}  - 月遷移中フラグ（参照で渡す → ctx経由で更新）
 *   ctx.triggerArmed   {boolean}  - 次の遷移を許可するフラグ
 *   ctx.onKeyConfirmed {Function} - (dir, newDateKeys) → void  キー確定コールバック
 * @returns {boolean} 月遷移を発火したら true
 */
function checkSpanDragMonthTransition(mv, ctx) {
  // #cal-grid のみを対象（navigateMonth中の cal-grid-old を除外）
  const grid = $id('cal-grid');
  if (!grid) return false;
  const allCells = grid.querySelectorAll('.cal-cell');
  if (allCells.length === 0) return false;

  const firstCell   = allCells[0];
  const lastCell    = allCells[allCells.length - 1];
  const firstR      = firstCell.getBoundingClientRect();
  const lastR       = lastCell.getBoundingClientRect();
  const topLeftMid  = firstR.left + firstR.width / 2;
  const botRightMid = lastR.left  + lastR.width  / 2;

  const inPrevZone = mv.clientX < topLeftMid  && mv.clientY < firstR.bottom;
  const inNextZone = mv.clientX > botRightMid && mv.clientY > lastR.top;
  const inAnyZone  = inPrevZone || inNextZone;

  if (!inAnyZone) { ctx.triggerArmed = true; return false; }
  if (!ctx.triggerArmed) return false;

  const dir = inNextZone ? 'next' : 'prev';
  ctx.triggerArmed  = false;
  ctx.transitioning = true;

  // 遷移先月のキー一覧を DOM 非依存で事前確定
  const nextY = dir === 'next' ? (S.month === 11 ? S.year + 1 : S.year) : (S.month === 0 ? S.year - 1 : S.year);
  const nextM = dir === 'next' ? (S.month === 11 ? 0 : S.month + 1) : (S.month === 0 ? 11 : S.month - 1);
  const newDateKeys = buildCellDescsFor(nextY, nextM)
    .filter(d => d.type === 'date')
    .map(d => d.key);

  // 差分：呼び出し元がキーを確定する（currentKey or resizeKey）
  // false を返した場合は月遷移をキャンセル（最短1日制限など）
  if (ctx.onKeyConfirmed(dir, newDateKeys) === false) {
    ctx.triggerArmed  = false; // 一度ゾーン外に出るまで再発火しない
    ctx.transitioning = false;
    return false;
  }

  // タブをクリア
  const tabLayerEl = $id('span-tab-layer');
  if (tabLayerEl) tabLayerEl.querySelectorAll('.span-tab').forEach(t => t.remove());

  // スライドアニメーション付き月遷移（skipSpanHide=true でD&D中も期間枠維持）
  navigateMonth(dir, true);

  // アニメーション完了後に transitioning を解除
  const onDone = () => {
    window.removeEventListener('calapp-month-navigated', onDone);
    clearInterval(waitTimer);
    ctx.transitioning = false;
  };
  window.addEventListener('calapp-month-navigated', onDone, { once: true });
  const waitTimer = setInterval(() => {
    if (!_monthNavigating) { clearInterval(waitTimer); ctx.transitioning = false; }
  }, 50);
  setTimeout(() => {
    clearInterval(waitTimer);
    window.removeEventListener('calapp-month-navigated', onDone);
    ctx.transitioning = false;
  }, 600);

  return true;
}

/** 枠とタブを全描画 */
function renderSpanOverlay() {
  const svg      = $id('span-overlay');
  const tabLayer = $id('span-tab-layer');
  if (!svg || !tabLayer) return;

  svg.innerHTML = '';
  tabLayer.querySelectorAll('.span-tab').forEach(t => t.remove());

  // 非表示状態の場合はDOMをクリアして終了（opacity/pointer-eventsはtoggleSpanVisibleが管理）
  if (!S.spanVisible) return;

  const area = $id('cal-grid-area');
  if (!area) return;
  const aw = area.clientWidth, ah = area.clientHeight;
  const BLEED = 4;
  svg.setAttribute('viewBox', `${-BLEED} ${-BLEED} ${aw + BLEED*2} ${ah + BLEED*2}`);
  svg.style.width  = (aw + BLEED*2) + 'px';
  svg.style.height = (ah + BLEED*2) + 'px';
  svg.style.left   = (-BLEED) + 'px';
  svg.style.top    = (-BLEED) + 'px';

  // グリッドコンテキストを1回だけ計算して全スパンで共有
  const gridCtx = _buildGridCtx();

  const events = getSpanEvents();
  events.forEach(ev => {
    if (SpanMode.resizing && SpanMode.selectedSpanId === ev.id && SpanMode.resizeKey) {
      // リサイズ中の選択スパン：isPreview=false でタブ・ボタンも描画する
      const previewEv = Object.assign({}, ev);
      if (SpanMode.resizeEnd === 'start') previewEv.startKey = SpanMode.resizeKey;
      else                                previewEv.endKey   = SpanMode.resizeKey;
      renderOneSpan(svg, tabLayer, previewEv, false, false, gridCtx);
    } else {
      // リサイズ中も他スパンのタブを描画する（タブは常にクリア→再生成方式のため）
      renderOneSpan(svg, tabLayer, ev, false, false, gridCtx);
    }
  });

  if (SpanMode.active && SpanMode.dragging && SpanMode.startKey && SpanMode.currentKey) {
    // startKey と currentKey を日付順に正規化してプレビュー表示
    const previewStart = SpanMode.startKey <= SpanMode.currentKey
      ? SpanMode.startKey : SpanMode.currentKey;
    const previewEnd   = SpanMode.startKey <= SpanMode.currentKey
      ? SpanMode.currentKey : SpanMode.startKey;
    renderOneSpan(svg, tabLayer, {
      id: '__preview__',
      startKey: previewStart,
      endKey:   previewEnd,
      color:    SpanMode.color,
      name:     '',
      tabOffset: 0,
    }, true, false, gridCtx);
  }

  // addResizeButtons は renderOneSpan(isSelected=true) 内で呼ばれるため不要

  // 期間枠バーを更新し、選択状態に応じてopacityを連動
  renderSpanBar();
  setSpanOpacity(null, SpanMode.selectedSpanId || null);

  // 全タブ描画完了後：初回訪問タブを含む場合は全タブ一括重なり回避
  const firstVisitTabs = tabLayer.querySelectorAll('.span-tab[data-first-visit]');
  if (firstVisitTabs.length > 0) {
    const areaRect = $id('cal-grid-area').getBoundingClientRect();
    const toRel = r => ({
      left:   r.left   - areaRect.left,
      right:  r.right  - areaRect.left,
      top:    r.top    - areaRect.top,
      bottom: r.bottom - areaRect.top,
    });
    const allTabs = Array.from(tabLayer.querySelectorAll('.span-tab'));
    const eventsForSave = getSpanEvents();
    let needsSave = false;

    // 初回訪問タブのみ、全タブを相手に重なり回避する
    firstVisitTabs.forEach(tab => {
      const x1       = parseFloat(tab.dataset.x1);
      const tabMaxPx = parseFloat(tab.dataset.tabMaxPx);
      const spanId   = tab.dataset.spanIdRef;
      let myRel  = toRel(tab.getBoundingClientRect());
      let curLeft = parseFloat(tab.style.left);

      allTabs.forEach(other => {
        if (other === tab) return;
        const or = toRel(other.getBoundingClientRect());
        const overlapX = myRel.left < or.right  && myRel.right  > or.left;
        const overlapY = myRel.top  < or.bottom && myRel.bottom > or.top;
        if (!(overlapX && overlapY)) return;
        const gapRight = or.right  - myRel.left;
        const gapLeft  = myRel.right - or.left;
        let newLeft;
        if (gapRight <= gapLeft) {
          newLeft = curLeft + gapRight + 4;
        } else {
          newLeft = curLeft - gapLeft  - 4;
        }
        newLeft = Math.max(x1, Math.min(x1 + tabMaxPx, newLeft));
        curLeft = newLeft;
        tab.style.left = newLeft + 'px';
        const tw = myRel.right - myRel.left;
        myRel.left  = newLeft;
        myRel.right = newLeft + tw;
      });

      // 調整後の offset を spanEvents に書き戻す
      const monthKey = `${S.year}-${String(S.month + 1).padStart(2,'0')}`;
      const evObj = eventsForSave.find(e => e.id === spanId);
      if (evObj) {
        if (!evObj.tabOffsets) evObj.tabOffsets = {};
        evObj.tabOffsets[monthKey] = curLeft - x1;
        evObj.tabOffset = curLeft - x1; // 後方互換
        needsSave = true;
      }
      delete tab.dataset.firstVisit;
    });

    if (needsSave) {
      setSpanEvents(eventsForSave);
      saveToStorage();
    }
  }
}

/** 期間枠ドットと期間オブジェクトの不透明/半透明を連動して制御
 *  activeColor: 不透明にする色（null = 全て半透明に戻す）
 *  selectedId:  期間設定モード時の選択中ID（null以外の場合は選択状態を優先）
 */
/** 対象色以外のセルを黒で塗りつぶす（null で解除） */
function setSpanCellBlackout(activeColor) {
  const container = $id('span-cell-blackout');
  if (!container) return;
  container.innerHTML = '';
  if (!activeColor) return;

  const events = getSpanEvents();
  // 対象色の期間枠が占めるセルキーを収集
  const activeCellKeys = new Set();
  events.forEach(ev => {
    if (ev.color !== activeColor) return;
    getKeysBetween(ev.startKey, ev.endKey).forEach(k => activeCellKeys.add(k));
  });

  const area = $id('cal-grid-area');
  const ar = area.getBoundingClientRect();

  // 通常セル（キーあり）
  const allKeys = getVisibleKeys();
  allKeys.forEach(key => {
    if (activeCellKeys.has(key)) return;
    const r = getCellRect(key);
    if (!r) return;
    const el = document.createElement('div');
    el.style.cssText = `position:absolute;left:${r.left}px;top:${r.top}px;width:${r.width}px;height:${r.height}px;background:#000;`;
    container.appendChild(el);
  });

  // blankセル（メモ用・日付なし）も黒塗り
  document.querySelectorAll('.cal-cell.is-blank').forEach(cell => {
    const cr = cell.getBoundingClientRect();
    const el = document.createElement('div');
    el.style.cssText = `position:absolute;left:${cr.left - ar.left}px;top:${cr.top - ar.top}px;width:${cr.width}px;height:${cr.height}px;background:#000;`;
    container.appendChild(el);
  });
}

function setSpanOpacity(activeColor, selectedId = null, hideOthers = false) {
  const svg      = $id('span-overlay');
  const tabLayer = $id('span-tab-layer');
  const bar      = $id('cal-span-bar');
  const events   = getSpanEvents();
  const inactiveOpacity = hideOthers ? '0' : '0.45';

  // 期間枠（span-rect）のopacity
  if (svg) {
    svg.querySelectorAll('.span-rect').forEach(path => {
      const spanId = path.dataset.spanId;
      const ev = events.find(e => e.id === spanId);
      if (!ev) return;
      let opaque = false;
      if (selectedId !== null) {
        opaque = (ev.id === selectedId);
      } else if (activeColor !== null) {
        opaque = (ev.color === activeColor);
      }
      path.style.opacity = opaque ? '1' : inactiveOpacity;
    });
  }

  // タブのopacity
  if (tabLayer) {
    tabLayer.querySelectorAll('.span-tab').forEach(tab => {
      const spanId = tab.dataset.spanId;
      const ev = events.find(e => e.id === spanId);
      if (!ev) return;
      let opaque = false;
      if (selectedId !== null) {
        opaque = (ev.id === selectedId);
      } else if (activeColor !== null) {
        opaque = (ev.color === activeColor);
      }
      tab.style.opacity = opaque ? '1' : inactiveOpacity;
    });
  }

  // ドットのopacity
  if (bar) {
    bar.querySelectorAll('.span-bar-dot').forEach(dot => {
      const dotColor = dot.dataset.color;
      let opaque = false;
      if (selectedId !== null) {
        const selEv = events.find(e => e.id === selectedId);
        opaque = selEv ? (dotColor === selEv.color) : false;
      } else if (activeColor !== null) {
        opaque = (dotColor === activeColor);
      }
      dot.style.opacity = opaque ? '1' : inactiveOpacity;
      // アクティブな期間オブジェクトに対応するドットは押下時と同じサイズに
      dot.style.transform = opaque ? 'scale(1.25)' : '';
    });
  }
}

/** 期間枠バーを描画 */
function renderSpanBar() {
  const bar = $id('cal-span-bar');
  if (!bar) return;
  // ドット要素のみ削除（cal-nav-rightは保持）
  bar.querySelectorAll('.span-bar-dot').forEach(d => d.remove());

  const events = getSpanEvents();

  // 日付文字列比較で表示月と重なる期間枠を抽出
  const firstOfMonth = `${S.year}-${String(S.month + 1).padStart(2,'0')}-01`;
  const lastDay = new Date(S.year, S.month + 1, 0).getDate();
  const lastOfMonth = `${S.year}-${String(S.month + 1).padStart(2,'0')}-${String(lastDay).padStart(2,'0')}`;
  const visibleEvents = events.filter(ev => {
    return ev.startKey <= lastOfMonth && ev.endKey >= firstOfMonth;
  });

  // ▲ボタンの表示/非表示：表示月に期間オブジェクトが存在する場合のみ表示
  const toggleBtn = $id('btn-span-toggle');
  if (toggleBtn) toggleBtn.style.visibility = visibleEvents.length > 0 ? 'visible' : 'hidden';

  if (visibleEvents.length === 0) return;

  if (visibleEvents.length === 0) return;

  // 同色はまとめて1つのドット
  const uniqueColors = [...new Set(visibleEvents.map(ev => ev.color))];

  uniqueColors.forEach(color => {
    const dot = document.createElement('div');
    dot.className = 'span-bar-dot';
    dot.style.background = color;
    dot.style.backgroundClip = 'content-box'; // paddingを透明に（サイズはCSS変数で管理）
    dot.dataset.color = color;

    // ポインターダウン中：同色を全て不透明に（ドット・期間枠・タブ連動）
    // 押下中のみ全不透明、離したら元の選択状態に戻る（selectedSpanId は変えない）
    dot.addEventListener('pointerdown', e => {
      e.stopPropagation();
      // カレンダーモード・期間設定モード共通の挙動：同色を全て不透明に
      setSpanOpacity(color, null, true);
      // 期間設定モード中はアクティブオブジェクトの◀▶ボタンを非表示に
      if (SpanMode.active) {
        $id('span-overlay').querySelectorAll('.span-resize-btn').forEach(btn => {
          btn.style.display = 'none';
        });
      }
      const onUp = () => {
        // ◀▶ボタンを再表示
        $id('span-overlay').querySelectorAll('.span-resize-btn').forEach(btn => {
          btn.style.display = '';
        });
        if (SpanMode.active) {
          setSpanOpacity(null, SpanMode.selectedSpanId);
        } else {
          setSpanOpacity(null, null);
        }
        document.removeEventListener('pointerup', onUp);
      };
      document.addEventListener('pointerup', onUp, { once: true });
    });

    bar.appendChild(dot);
  });
}

/** グリッドコンテキストを構築（全可視キーのインデックスマップ） */
function _buildGridCtx() {
  const grid = $id('cal-grid');
  // allGrid: blank含む全セル（列位置・隣接判定用）
  const allGrid = grid
    ? Array.from(grid.querySelectorAll('.cal-cell:not(.inactive) .cell-preview canvas[data-key]'))
        .map(c => c.dataset.key).filter(Boolean)
    : [];
  const keyIdx = {};
  allGrid.forEach((k, i) => { keyIdx[k] = i; });
  // allVisible は date セルのみ（期間枠の範囲計算用）
  const allVisible = getVisibleKeys();
  return { allVisible, allGrid, keyIdx, colCount: 7 };
}

/** 1イベント分の枠＋タブを描画 */
function renderOneSpan(svg, tabLayer, ev, isPreview = false, skipTab = false, gridCtx = null) {
  // ─────────────────────────────────────────
  // renderOneSpan: 1つの期間枠を描画する
  //
  // 処理の流れ:
  //   [1] 表示月クランプ  → 月またがり時に表示範囲を絞り込む
  //   [2] 行グループ化    → キーを曜日ベースで行ごとに分ける
  //   [3] 外枠SVGパス生成 → セル単位の隣接判定で描く辺を決定
  //   [4] リサイズボタン  → 選択中かつ月端のスパンに◀▶を付与
  //   [5] 期間タブ描画    → 1行目に予定名ラベルを配置
  // ─────────────────────────────────────────

  // ── [1] 表示月クランプ ────────────────────
  // 月またがり期間枠：表示月に合わせて始点/終点をクランプ
  const visibleKeys = getVisibleKeys();
  let effectiveStartKey = ev.startKey;
  let effectiveEndKey   = ev.endKey;
  if (visibleKeys.length > 0) {
    const firstVisible = visibleKeys[0];
    const lastVisible  = visibleKeys[visibleKeys.length - 1];
    if (ev.startKey < firstVisible) effectiveStartKey = firstVisible;
    if (ev.endKey   > lastVisible)  effectiveEndKey   = lastVisible;
    if (effectiveStartKey > effectiveEndKey) return; // 表示月に含まれない
  }
  const evForRender = (effectiveStartKey !== ev.startKey || effectiveEndKey !== ev.endKey)
    ? Object.assign({}, ev, { startKey: effectiveStartKey, endKey: effectiveEndKey })
    : ev;

  const keys = getKeysBetween(evForRender.startKey, evForRender.endKey);
  if (keys.length === 0) return;
  // シードベース疑似乱数（同じev.idなら常に同じゆらぎ）


  // ── [2] 行グループ化（Y座標で改行を検出）──────────
  // キーを行ごとにグループ化
  const rows = [];
  let curRow = [keys[0]];
  for (let i = 1; i < keys.length; i++) {
    const prevRect = getCellRect(keys[i-1]);
    const currRect = getCellRect(keys[i]);
    if (!prevRect || !currRect) {
      curRow.push(keys[i]);
      continue;
    }
    if (currRect.top > prevRect.top + prevRect.height / 2) {
      rows.push(curRow);
      curRow = [keys[i]];
    } else {
      curRow.push(keys[i]);
    }
  }
  rows.push(curRow);

  const PAD   = 3.75; // ストローク中心をセル境界から内側に（stroke-width:7.5の半分ちょうど）
  const R     = 8;
  const color = ev.color;
  let tabDrawn = false;

  // gridCtx が渡されない場合（直接呼び出し）は自前で構築
  if (!gridCtx) gridCtx = _buildGridCtx();
  const { allVisible, keyIdx, colCount } = gridCtx;

  // 2行で上下に重なるセルがないか判定
  const { allGrid } = gridCtx;
  const getCol = k => (keyIdx[k] !== undefined) ? keyIdx[k] % colCount : -1;
  let twoRowNoOverlap = false;
  if (rows.length === 2) {
    const row0Cols = new Set(rows[0].map(getCol));
    const row1Cols = new Set(rows[1].map(getCol));
    twoRowNoOverlap = ![...row0Cols].some(c => row1Cols.has(c));
  }

  // ── [3] 行ごとに外枠SVGパスを生成 ────────────────
  rows.forEach((rowKeys, rowIdx) => {
    const first = getCellRect(rowKeys[0]);
    const last  = getCellRect(rowKeys[rowKeys.length - 1]);
    if (!first || !last) return;

    const x1 = first.left  + PAD;
    const y1 = first.top   + PAD;
    const x2 = last.right  - PAD;
    const y2 = last.bottom - PAD;
    const w  = x2 - x1, h = y2 - y1;
    const isFirst = rowIdx === 0;
    const isLast  = rowIdx === rows.length - 1;

    // ── セル単位の外枠判定 ──────────────────────────
    const keySet = new Set(keys);

    const getNeighbor = (k, dir) => {
      const i = keyIdx[k];
      if (i === undefined) return null;
      if (dir === 'left')  return (i % colCount === 0) ? null : allGrid[i - 1];
      if (dir === 'right') return (i % colCount === colCount - 1) ? null : allGrid[i + 1];
      if (dir === 'up')    return (i < colCount) ? null : allGrid[i - colCount];
      if (dir === 'down')  return (i + colCount >= allGrid.length) ? null : allGrid[i + colCount];
      return null;
    };
    const isEdge = (k, dir) => {
      const nb = getNeighbor(k, dir);
      const baseEdge = !nb || !keySet.has(nb);
      if (!baseEdge) return false; // 隣接セルが期間内 → 辺不要（共通ルール）

      // 2行・重なりなしの特殊ルール
      if (twoRowNoOverlap) {
        if (rowIdx === 0 && dir === 'right' ) return false; // 1行目：右端辺は不要
        if (rowIdx === 1 && dir === 'left'  ) return false; // 2行目：左端辺は不要
      }
      return true;
    };
    const isCalEdge = (k, dir) => {
      const i = keyIdx[k];
      if (i === undefined) return false;
      if (dir === 'left')  return i % colCount === 0;
      if (dir === 'right') return i % colCount === colCount - 1;
      if (dir === 'up')    return i < colCount;
      if (dir === 'down')  return i + colCount >= allGrid.length;
      return false;
    };

    // この行のセルに対して必要な辺の線分リストを生成
    // 線分: { x1, y1, x2, y2 }（左→右 or 上→下 の向きで統一）
    const segs = [];
    rowKeys.forEach(k => {
      const r = getCellRect(k);
      if (!r) return;
      const cx1 = r.left  + PAD;  // 垂直線のX（水平線の端点）
      const cy1 = r.top   + PAD;  // 水平線のY（垂直線の端点）
      const cx2 = r.right  - PAD; // 垂直線のX（水平線の端点）
      const cy2 = r.bottom - PAD; // 水平線のY（垂直線の端点）
      // 境界座標（linecap:buttで角をぴったり合わせるため）
      const bx1 = r.left;
      const by1 = r.top;
      const bx2 = r.right;
      const by2 = r.bottom;

      // 上辺：Y=cy1、X範囲はbx1〜bx2（垂直線のX境界まで届く）
      if (isEdge(k, 'up'))    segs.push({ x1: bx1, y1: cy1, x2: bx2, y2: cy1, side: 'top' });
      // 下辺
      if (isEdge(k, 'down'))  segs.push({ x1: bx1, y1: cy2, x2: bx2, y2: cy2, side: 'bottom' });
      // 左辺：X=cx1、Y範囲はby1〜by2（水平線のY境界まで届く）
      if (isEdge(k, 'left'))  segs.push({ x1: cx1, y1: by1, x2: cx1, y2: by2, side: 'left' });
      // 右辺
      if (isEdge(k, 'right')) segs.push({ x1: cx2, y1: by1, x2: cx2, y2: by2, side: 'right' });
    });

    if (segs.length === 0) return;

    // 連続する水平線分をマージ（同じ y1=y2、かつ x2 が次の x1 と一致）
    const hSegs = segs.filter(s => s.y1 === s.y2).sort((a, b) => a.y1 - b.y1 || a.x1 - b.x1);
    const vSegs = segs.filter(s => s.x1 === s.x2).sort((a, b) => a.x1 - b.x1 || a.y1 - b.y1);
    const mergeSegs = (arr, isH) => {
      const merged = [];
      arr.forEach(s => {
        const last = merged[merged.length - 1];
        const sameAxis = isH ? (last && last.y1 === s.y1) : (last && last.x1 === s.x1);
        const adjacent = last && (isH ? Math.abs(last.x2 - s.x1) < 3 : Math.abs(last.y2 - s.y1) < 3);
        if (sameAxis && adjacent) {
          last.x2 = isH ? s.x2 : last.x2;
          last.y2 = isH ? last.y2 : s.y2;
        } else {
          merged.push({ ...s });
        }
      });
      return merged;
    };
    const mergedSegs = [...mergeSegs(hSegs, true), ...mergeSegs(vSegs, false)];

    // 線分をそのままパス化（座標がセル境界でぴったり交差するのでlinecap:buttでOK）
    let d = '';
    mergedSegs.forEach(s => {
      d += ` M${s.x1.toFixed(1)},${s.y1.toFixed(1)} L${s.x2.toFixed(1)},${s.y2.toFixed(1)}`;
    });

    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    path.setAttribute('d', d.trim());
    path.setAttribute('class', 'span-rect');
    path.setAttribute('stroke', color);
    // アクティブ判定で opacity を設定
    if (isPreview) {
      path.style.opacity = '1';
    } else {
      const isActive = (ev.id === SpanMode.selectedSpanId);
      path.style.opacity = isActive ? '1' : '0.45';
      path.style.pointerEvents = SpanMode.active ? 'all' : 'none';
      path.style.cursor = SpanMode.active ? 'pointer' : 'default';
      path.setAttribute('data-span-id', ev.id);
      path.addEventListener('contextmenu', e => {
        e.preventDefault();
        e.stopPropagation();
        if (!SpanMode.active) return;
        SpanMode.selectedSpanId = ev.id;
        syncSpanPaletteToObj(ev);
        renderSpanOverlay();
        addResizeButtons(ev);
        openSpanTabCtx(e.clientX, e.clientY, ev.id);
      });
    }
    svg.appendChild(path);

    // 選択中：開始・終了の丸ボタン（◀▶）を最初・最後の行に描画
    // ── [4] リサイズボタン（選択中かつ月端のみ）────────
    const isSelected = !isPreview && SpanMode.selectedSpanId === ev.id;
    if (isSelected) {
      const BTN_R = 14;
      // 月またがり考慮：startKeyの月が現在月なら▶表示、endKeyの月が現在月なら◀表示
      const _sd = new Date(ev.startKey), _ed = new Date(ev.endKey);
      const _startInThisMonth = (_sd.getFullYear() === S.year && _sd.getMonth() === S.month);
      const _endInThisMonth   = (_ed.getFullYear() === S.year && _ed.getMonth() === S.month);
      // 開始ボタン（◀）：最初の行の左端中央
      if (isFirst && _startInThisMonth) {
        const bx = x1, by = (y1 + y2) / 2;
        const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
        g.setAttribute('class', 'span-resize-btn');
        g.setAttribute('data-span-id', ev.id);
        g.setAttribute('data-resize-end', 'start');
        const c = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        c.setAttribute('cx', bx); c.setAttribute('cy', by); c.setAttribute('r', BTN_R);
        c.setAttribute('fill', color); c.setAttribute('opacity', '0.9');
        const t = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        t.setAttribute('x', bx); t.setAttribute('y', by);
        t.setAttribute('text-anchor', 'middle'); t.setAttribute('dominant-baseline', 'central');
        t.setAttribute('fill', '#fff'); t.setAttribute('font-size', '13');
        t.setAttribute('pointer-events', 'none');
        t.textContent = '◀';
        g.appendChild(c); g.appendChild(t);
        startResizeDrag(g, ev, 'start');
        svg.appendChild(g);
      }
      // 終了ボタン（▶）：最後の行の右端中央
      if (isLast && _endInThisMonth) {
        const bx = x2, by = (y1 + y2) / 2;
        const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
        g.setAttribute('class', 'span-resize-btn');
        g.setAttribute('data-span-id', ev.id);
        g.setAttribute('data-resize-end', 'end');
        const c = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        c.setAttribute('cx', bx); c.setAttribute('cy', by); c.setAttribute('r', BTN_R);
        c.setAttribute('fill', color); c.setAttribute('opacity', '0.9');
        const t = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        t.setAttribute('x', bx); t.setAttribute('y', by);
        t.setAttribute('text-anchor', 'middle'); t.setAttribute('dominant-baseline', 'central');
        t.setAttribute('fill', '#fff'); t.setAttribute('font-size', '13');
        t.setAttribute('pointer-events', 'none');
        t.textContent = '▶';
        g.appendChild(c); g.appendChild(t);
        startResizeDrag(g, ev, 'end');
        svg.appendChild(g);
      }
    }

    // ── [5] 期間タブ描画（1行目のみ）────────────────
    if (isFirst && !isPreview && !skipTab && !tabDrawn) {
      tabDrawn = true;
      const tab = document.createElement('div');
      tab.className = 'span-tab';
      tab.dataset.spanId = ev.id;
      // 月またがり時のタブテキスト（← / →）
      const startDate = new Date(ev.startKey);
      const endDate   = new Date(ev.endKey);
      const hasLeft  = (startDate.getFullYear() < S.year) ||
                       (startDate.getFullYear() === S.year && startDate.getMonth() < S.month);
      const hasRight = (endDate.getFullYear() > S.year) ||
                       (endDate.getFullYear() === S.year && endDate.getMonth() > S.month);
      const prefix = hasLeft  ? '← ' : '';
      const suffix = hasRight ? ' →' : '';
      tab.textContent = prefix + ev.name + suffix;
      tab.style.background = color;
      tab.style.pointerEvents = SpanMode.active ? 'auto' : 'none';
      const isActive = (ev.id === SpanMode.selectedSpanId);
      tab.style.opacity = isActive ? '1' : '0.45';
      tab.style.top    = (y1 - 26) + 'px';
      tab.style.minWidth = '40px';
      tab.style.left   = x1 + 'px'; // 仮配置（tabWidth取得のため先にappend）
      tabLayer.appendChild(tab);

      // tabOffset はフレーム左端からのピクセルオフセット（絶対px）
      // tabOffsets: 月ごとのoffset管理 { 'YYYY-MM': px }
      // 旧形式（0〜1の比率）との互換：tabOffset <= 1 かつ w > 1 なら比率として解釈
      const tabWidth   = tab.offsetWidth;
      const tabMaxPx   = Math.max(0, w - tabWidth);
      let tabLeft;
      const monthKey   = `${S.year}-${String(S.month + 1).padStart(2,'0')}`;
      const isFirstVisit = !(ev.tabOffsets && ev.tabOffsets[monthKey] != null);
      const rawOffset  = isFirstVisit
                           ? (ev.tabOffset || 0)
                           : ev.tabOffsets[monthKey];
      if (isFirstVisit && rawOffset > 0 && rawOffset <= 1 && w > 100) {
        // 旧形式（0〜1の比率）→ピクセル変換（rawOffset=0 は新規作成時の初期値なので変換しない）
        tabLeft = x1 + rawOffset * tabMaxPx;
      } else {
        // px形式 or 新規（offset=0）：クランプしてそのまま使う
        tabLeft = x1 + Math.max(0, Math.min(tabMaxPx, rawOffset));
      }
      tab.style.left = tabLeft + 'px';

      // 初回訪問フラグをタブDOMに付与（renderSpanOverlay末尾で一括重なり回避に使う）
      // ※ tabOffsets[monthKey] が未設定の月はすべて対象（offset=0 含む）
      if (isFirstVisit && !isPreview) {
        tab.dataset.firstVisit = '1';
        tab.dataset.x1 = String(x1);
        tab.dataset.tabMaxPx = String(tabMaxPx);
        tab.dataset.spanIdRef = ev.id;
      }

      // タブ右クリックでコンテクストメニュー
      tab.addEventListener('contextmenu', e => {
        e.preventDefault();
        e.stopPropagation();
        if (!SpanMode.active) return;
        openSpanTabCtx(e.clientX, e.clientY, ev.id);
      });

      // タブD&D（左右のみ）
      tab.addEventListener('pointerdown', e => {
        e.stopPropagation();
        SpanMode.selectedSpanId = ev.id;
        syncSpanPaletteToObj(ev);
        renderSpanOverlay(); // 即不透明化（タブが再生成される）
        addResizeButtons(ev);

        // renderSpanOverlay後の最新タブ要素を取得
        const liveTab = $id('span-tab-layer').querySelector(`[data-span-id="${ev.id}"]`);
        if (!liveTab) return;

        // 長押しでコンテクストメニュー表示
        let moved = false;
        const downX = e.clientX, downY = e.clientY;
        const lpTimer = setTimeout(() => {
          if (moved) return;
          document.removeEventListener('pointerup', onLpUp);
          openSpanTabCtx(e.clientX, e.clientY, ev.id);
        }, LONG_PRESS_MS);
        const onLpUp = () => {
          clearTimeout(lpTimer);
          document.removeEventListener('pointerup', onLpUp);
          document.removeEventListener('pointermove', onLpMove);
        };
        const onLpMove = mv => {
          if (Math.hypot(mv.clientX - downX, mv.clientY - downY) > 6) {
            moved = true;
            clearTimeout(lpTimer);
            document.removeEventListener('pointerup', onLpUp);
            document.removeEventListener('pointermove', onLpMove);
          }
        };
        document.addEventListener('pointerup',   onLpUp,   { once: false });
        document.addEventListener('pointermove', onLpMove);

        const startX       = e.clientX;
        const startTabLeft = parseFloat(liveTab.style.left); // 最新タブの現在位置
        const onMove = mv => {
          const dx      = mv.clientX - startX;
          const newLeft = Math.max(x1, Math.min(x1 + tabMaxPx, startTabLeft + dx));
          setTabOffset(ev, newLeft - x1);
          liveTab.style.left = newLeft + 'px';
        };
        const onUp = () => {
          document.removeEventListener('pointermove', onMove);
          document.removeEventListener('pointerup',   onUp);

          // 他タブとの重なり解消
          const tabLayer = $id('span-tab-layer');
          const myRect   = liveTab.getBoundingClientRect();
          const myLeft   = myRect.left;
          const myRight  = myRect.right;
          const myTop    = myRect.top;
          const myBottom = myRect.bottom;

          let resolved = false;
          tabLayer.querySelectorAll('.span-tab').forEach(other => {
            if (other === liveTab) return;
            const or = other.getBoundingClientRect();
            // X軸とY軸の両方で重なっている場合のみ回避（同じ行のタブのみ）
            const overlapX = myLeft < or.right && myRight > or.left;
            const overlapY = myTop  < or.bottom && myBottom > or.top;
            if (!(overlapX && overlapY)) return;

            const gapRight = or.right  - myLeft;
            const gapLeft  = myRight   - or.left;
            let newLeft;
            if (gapRight <= gapLeft) {
              newLeft = parseFloat(liveTab.style.left) + gapRight + 4;
            } else {
              newLeft = parseFloat(liveTab.style.left) - gapLeft - 4;
            }
            newLeft = Math.max(x1, Math.min(x1 + tabMaxPx, newLeft));
            setTabOffset(ev, newLeft - x1);
            liveTab.style.left = newLeft + 'px';
            resolved = true;
          });

          saveToStorage();
          renderSpanOverlay();
          window._hideObjPreview && _hideObjPreview();
        };
        document.addEventListener('pointermove', onMove);
        document.addEventListener('pointerup',   onUp, { once: true });
      });
    }
  });

  // ── [6] 行間繋ぎ目の縦線 ────────────────────────
  for (let i = 0; i < rows.length - 1; i++) {
    const curLast   = getCellRect(rows[i][rows[i].length - 1]);
    const nextFirst = getCellRect(rows[i + 1][0]);
    if (!curLast || !nextFirst) continue;

    // 同じ列にある場合（重なりあり）は繋ぎ目不要
    if (getCol(rows[i][rows[i].length - 1]) === getCol(rows[i + 1][0])) continue;

    const isActive = isPreview || ev.id === SpanMode.selectedSpanId;

    // 1行目末尾：右辺（PAD内側）をセル下端まで延ばす
    const x1c = curLast.right - PAD;
    const connTop    = curLast.bottom - PAD;
    const connBottom = nextFirst.top  + PAD;

    // 2行目先頭：左辺（PAD内側）をセル上端から延ばす
    const x2c = nextFirst.left + PAD;

    [x1c, x2c].forEach(x => {
      const conn = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      conn.setAttribute('d', `M${x.toFixed(1)},${connTop.toFixed(1)} L${x.toFixed(1)},${connBottom.toFixed(1)}`);
      conn.setAttribute('class', 'span-rect');
      conn.setAttribute('stroke', color);
      conn.style.opacity = isActive ? '1' : '0.45';
      conn.style.pointerEvents = 'none';
      svg.appendChild(conn);
    });
  }
}

/** タブを再生成せず伸縮ボタンだけSVGに追加する */
/** リサイズ中のタブ追従ヘルパー（end側） */
function _followTabForEndResize(ev, currentEndKey) {
  const tabEl = $id('span-tab-layer').querySelector(`[data-span-id="${ev.id}"]`);
  if (!tabEl) return;

  const endRect   = getCellRect(currentEndKey);
  const startRect = getCellRect(ev.startKey);
  if (!endRect || !startRect) return;

  // タブはstartKeyの行に属する → startRectとendRectが同じ行かで判定
  const startRowTop    = startRect.top;
  const startRowBottom = startRect.bottom;
  const sameRow = endRect.top < startRowBottom && endRect.bottom > startRowTop;

  if (sameRow) {
    const PAD     = 3.75;
    const tabLeft = parseFloat(tabEl.style.left);
    const tabW    = tabEl.offsetWidth;

    // ▶ボタンがタブ左辺より左 → タブを終点セル右端にクランプ（視覚追従のみ・tabOffsetはonUpで確定）
    if (endRect.right < tabLeft) {
      const newLeft = Math.max(startRect.left + PAD,
                               endRect.right - PAD - tabW);
      tabEl.style.left = newLeft + 'px';
      // ev.tabOffsetはonUpで確定するため、ここでは更新しない
    }
  }

  // Y座標は常にstartKeyの行に追従（renderOneSpanと同じ PAD=3.75 を使用）
  tabEl.style.top = (startRect.top + 3.75 - 26) + 'px';
}

/** リサイズ中のタブ追従ヘルパー（start側） */
function _followTabForStartResize(ev, currentStartKey) {
  const tabEl = $id('span-tab-layer').querySelector(`[data-span-id="${ev.id}"]`);
  if (!tabEl) return;
  const startRect = getCellRect(currentStartKey);
  if (!startRect) return;
  const PAD = 3.75;
  tabEl.style.left = (startRect.left + PAD) + 'px';
  tabEl.style.top  = (startRect.top  + PAD - 26) + 'px';
  resetTabOffset(ev);
}

/** 期間タブのコンテクストメニューを開く */
function openSpanTabCtx(clientX, clientY, spanId) {
  SpanMode.ctxSpanId = spanId;
  const m  = $id('ctx-span-tab');
  const mw = 200, mh = 100;
  m.style.left = Math.min(clientX, window.innerWidth  - mw - 8) + 'px';
  m.style.top  = Math.min(clientY, window.innerHeight - mh - 8) + 'px';
  m.classList.add('open');
}

/** 期間タブコンテクストメニュー操作 */


function addResizeButtons(ev) {
  const svg = $id('span-overlay');
  if (!svg) return;
  // 既存の伸縮ボタンを削除
  svg.querySelectorAll('.span-resize-btn').forEach(el => el.remove());

  const keys = getKeysBetween(ev.startKey, ev.endKey);
  if (keys.length === 0) return;

  // 行グループ化（renderOneSpanと同じロジック）
  const rows = [];
  let curRow = [keys[0]];
  for (let i = 1; i < keys.length; i++) {
    const prevRect = getCellRect(keys[i-1]);
    const currRect = getCellRect(keys[i]);
    if (!prevRect || !currRect) { curRow.push(keys[i]); continue; }
    if (currRect.top > prevRect.top + prevRect.height / 2) {
      rows.push(curRow); curRow = [keys[i]];
    } else { curRow.push(keys[i]); }
  }
  rows.push(curRow);

  const PAD = 3.75, BTN_R = 14;
  const color = ev.color;

  rows.forEach((rowKeys, rowIdx) => {
    const first = getCellRect(rowKeys[0]);
    const last  = getCellRect(rowKeys[rowKeys.length - 1]);
    if (!first || !last) return;
    const x1 = first.left + PAD, y1 = first.top + PAD;
    const x2 = last.right - PAD, y2 = last.bottom - PAD;
    const isFirst = rowIdx === 0;
    const isLast  = rowIdx === rows.length - 1;

    const makeBtn = (bx, by, label, which) => {
      const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
      g.setAttribute('class', 'span-resize-btn');
      g.setAttribute('data-span-id', ev.id);
      g.setAttribute('data-resize-end', which);
      const c = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      c.setAttribute('cx', bx); c.setAttribute('cy', by); c.setAttribute('r', BTN_R);
      c.setAttribute('fill', color); c.setAttribute('opacity', '0.9');
      const t = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      t.setAttribute('x', bx); t.setAttribute('y', by);
      t.setAttribute('text-anchor', 'middle'); t.setAttribute('dominant-baseline', 'central');
      t.setAttribute('fill', '#fff'); t.setAttribute('font-size', '13');
      t.setAttribute('pointer-events', 'none');
      t.textContent = label;
      g.appendChild(c); g.appendChild(t);
      startResizeDrag(g, ev, which);
      svg.appendChild(g);
    };

    // 月またがり考慮：startKeyとendKeyの月を現在表示月と比較
    const curYM       = S.year * 12 + S.month;
    const startDate   = new Date(ev.startKey);
    const endDate     = new Date(ev.endKey);
    const startYM     = startDate.getFullYear() * 12 + startDate.getMonth();
    const endYM       = endDate.getFullYear()   * 12 + endDate.getMonth();
    const startInThisMonth = (startYM === curYM);
    const endInThisMonth   = (endYM   === curYM);
    if (isFirst && startInThisMonth) makeBtn(x1, (y1 + y2) / 2, '◀', 'start');
    if (isLast  && endInThisMonth)   makeBtn(x2, (y1 + y2) / 2, '▶', 'end');
  });
}

/** リサイズボタンのドラッグ処理を登録 */
function startResizeDrag(el, ev, which) {
  el.style.pointerEvents = 'all';
  el.addEventListener('pointerdown', e => {
    // capture より先に resizing フラグをセットし、他ハンドラの誤発火を防ぐ
    SpanMode.resizing  = true;
    SpanMode.resizeEnd = which;
    SpanMode.resizeKey = which === 'start' ? ev.startKey : ev.endKey;
    e.stopImmediatePropagation();
    e.preventDefault();
    if (!SpanMode.active) { SpanMode.resizing = false; return; }

    const area = $id('cal-grid-area');

    let shrunkEndKey   = null;
    let shrunkStart    = false;
    let shrunkStartKey = null;
    let tabLocked      = false; // 始点がタブより右になった後、タブを始点に固定追従

    // 月またぎリサイズ用：元の始点/終点を保持
    const origStartKey = ev.startKey;
    const origEndKey   = ev.endKey;

    // ── 月遷移チェック：checkSpanDragMonthTransition の薄いラッパー ──
    // リサイズD&D固有の差分：which/origStartKey/origEndKey に基づいて resizeKey を確定
    const resizeCtx = {
      transitioning: false,
      triggerArmed:  true,
      onKeyConfirmed: (dir, newDateKeys) => {
        const nextY = dir === 'next' ? (S.month === 11 ? S.year + 1 : S.year) : (S.month === 0 ? S.year - 1 : S.year);
        const nextM = dir === 'next' ? (S.month === 11 ? 0 : S.month + 1) : (S.month === 0 ? 11 : S.month - 1);
        if (which === 'end') {
          const isOrig = nextY === new Date(origEndKey).getFullYear() && nextM === new Date(origEndKey).getMonth();
          const candidateKey = isOrig ? origEndKey : newDateKeys[newDateKeys.length - 1];
          // ▶ が ◀ を追い越す場合は遷移しない（最短1日を維持）
          if (candidateKey <= ev.startKey) return false;
          SpanMode.resizeKey = candidateKey;
        } else {
          const isOrig = nextY === new Date(origStartKey).getFullYear() && nextM === new Date(origStartKey).getMonth();
          const candidateKey = isOrig ? origStartKey : newDateKeys[0];
          // ◀ が ▶ を追い越す場合は遷移しない（最短1日を維持）
          if (candidateKey >= ev.endKey) return false;
          SpanMode.resizeKey = candidateKey;
        }
      },
    };
    // transitioning / triggerArmed は resizeCtx 経由で読み書きする
    function checkMonthTransition(mv) {
      // 共通関数に委譲（リサイズD&Dは方向制限なし・両方向に月遷移可能）
      return checkSpanDragMonthTransition(mv, resizeCtx);
    }

    const onMove = mv => {
      if (resizeCtx.transitioning) return;
      if (checkMonthTransition(mv)) return;
      const allKeys = getVisibleKeys();

      if (which === 'end') {
        // カーソルがいる行の日曜セルを取得
        let sundayRect = null, sundayCellKey = null;
        ($id('cal-grid') || document).querySelectorAll(".cal-cell:not(.inactive):not(.is-blank)").forEach(cell => {
          if (sundayCellKey) return;
          const mc = cell.querySelector('canvas[data-key]');
          if (!mc || new Date(mc.dataset.key).getDay() !== 0) return;
          const r = cell.getBoundingClientRect();
          if (mv.clientY >= r.top && mv.clientY <= r.bottom) {
            sundayRect = r; sundayCellKey = mc.dataset.key;
          }
        });

        if (sundayRect) {
          const inLeft50 = mv.clientX <= (sundayRect.left + sundayRect.right) / 2;
          if (inLeft50) {
            // 日曜左50%：その行を丸ごと消して前行末に短縮
            const rowSundayIdx = allKeys.indexOf(sundayCellKey);
            const startIdx     = allKeys.indexOf(ev.startKey);
            const newEndKey    = rowSundayIdx <= startIdx
              ? ev.startKey
              : (allKeys[rowSundayIdx - 1] || ev.startKey);
            shrunkEndKey = newEndKey;
            if (SpanMode.resizeKey !== newEndKey) {
              SpanMode.resizeKey = newEndKey;
              const startRect = getCellRect(ev.startKey);
              const tabEl = $id('span-tab-layer').querySelector(`[data-span-id="${ev.id}"]`);
              if (tabEl && startRect) tabEl.style.left = (startRect.left + 3.75) + 'px';
              if (newEndKey === ev.startKey) resetTabOffset(ev); // 最短1日になった場合リセット
              renderSpanOverlay();
            }
            return;
          }
        }

        // 日曜左50%の外
        if (shrunkEndKey) {
          // shrunkEndKeyセルの右端を越えたら延長再開
          const shrunkRect = getCellRect(shrunkEndKey);
          if (!shrunkRect || mv.clientX <= shrunkRect.right) return; // まだ越えていない
          shrunkEndKey = null;
        }


        // 日付無しセル上（最終行のみ） → 月最終日で固定
        // ※ 最初の行のブランクセルは start 側で処理するため、y座標でグリッド下半分に限定
        const blankCells_end = ($id('cal-grid') || document).querySelectorAll('.cal-cell.is-blank');
        const gridEl_e = $id('cal-grid');
        const gridMidY_e = gridEl_e ? gridEl_e.getBoundingClientRect().top + gridEl_e.getBoundingClientRect().height / 2 : 0;
        let inBlankEnd = false;
        for (const cell of blankCells_end) {
          const r = cell.getBoundingClientRect();
          if (r.top < gridMidY_e) continue; // 最初の行のブランクセルは除外
          if (mv.clientX >= r.left && mv.clientX <= r.right &&
              mv.clientY >= r.top  && mv.clientY <= r.bottom) {
            inBlankEnd = true;
            const lastKey = allKeys[allKeys.length - 1];
            if (SpanMode.resizeKey !== lastKey) {
              SpanMode.resizeKey = lastKey;
              renderSpanOverlay();
              _followTabForEndResize(ev, lastKey);
            }
            return;
          }
        }

        // 通常リサイズ
        const k = getCellKeyAt(mv.clientX, mv.clientY);
        if (!k || k === SpanMode.resizeKey) return;
        let startIdx = allKeys.indexOf(ev.startKey);
        // 別月の場合 ev.startKey が allKeys に存在しない → 月初から移動可能にする
        if (startIdx < 0) startIdx = 0;
        const newIdx   = allKeys.indexOf(k);
        if (newIdx < 0 || newIdx < startIdx) return;
        SpanMode.resizeKey = k;
        renderSpanOverlay();
        // 最短（1日）の場合はタブを左端に移動してtabOffsetをリセット
        if (k === ev.startKey) {
          const tabEl2 = $id('span-tab-layer').querySelector(`[data-span-id="${ev.id}"]`);
          const startRect2 = getCellRect(ev.startKey);
          if (tabEl2 && startRect2) {
            tabEl2.style.left = (startRect2.left + 3.75) + 'px';
          }
          resetTabOffset(ev); // 以降のonUpでsavedOffset=0として確定される
        } else {
          // タブ追従（終点が同じ行かつタブより左側なら追従）
          _followTabForEndResize(ev, k);
        }
        return;
      }

      // start リサイズ（土曜右50%で行ごと短縮）
      // カーソルがいる行の土曜セルを取得
      let saturdayRect = null, saturdayCellKey = null;
      ($id('cal-grid') || document).querySelectorAll(".cal-cell:not(.inactive):not(.is-blank)").forEach(cell => {
        if (saturdayCellKey) return;
        const mc = cell.querySelector('canvas[data-key]');
        if (!mc || new Date(mc.dataset.key).getDay() !== 6) return;
        const r = cell.getBoundingClientRect();
        if (mv.clientY >= r.top && mv.clientY <= r.bottom) {
          saturdayRect = r; saturdayCellKey = mc.dataset.key;
        }
      });

      if (saturdayRect) {
        const inRight50 = mv.clientX >= (saturdayRect.left + saturdayRect.right) / 2;
        if (inRight50) {
          // 土曜右50%：その行を丸ごと消して次行頭に短縮
          const rowSatIdx = allKeys.indexOf(saturdayCellKey);
          const endIdx    = allKeys.indexOf(ev.endKey);
          const newStartKey = rowSatIdx >= endIdx
            ? ev.endKey
            : (allKeys[rowSatIdx + 1] || ev.endKey); // 次行の日曜
          shrunkStart    = true;
          shrunkStartKey = newStartKey;
          if (SpanMode.resizeKey !== newStartKey) {
            SpanMode.resizeKey = newStartKey;
            renderSpanOverlay();
            _followTabForStartResize(ev, newStartKey);
          }
          return;
        }
      }

      // 土曜右50%の外
      if (shrunkStart && shrunkStartKey) {
        // shrunkStartKeyセルの左端を越えたら延長再開
        const shrunkRect = getCellRect(shrunkStartKey);
        if (!shrunkRect || mv.clientX >= shrunkRect.left) return; // まだ越えていない
        shrunkStart = false; shrunkStartKey = null;
      }


      // 日付無しセル上（最初の行のみ） → 月初日で固定
      // ※ 最終行のブランクセルは end 側で処理するため、y座標でグリッド上半分に限定
      const blankCells_start = ($id('cal-grid') || document).querySelectorAll('.cal-cell.is-blank');
      const gridEl_s = $id('cal-grid');
      const gridMidY = gridEl_s ? gridEl_s.getBoundingClientRect().top + gridEl_s.getBoundingClientRect().height / 2 : Infinity;
      for (const cell of blankCells_start) {
        const r = cell.getBoundingClientRect();
        if (r.top > gridMidY) continue; // 最終行のブランクセルは除外
        if (mv.clientX >= r.left && mv.clientX <= r.right &&
            mv.clientY >= r.top  && mv.clientY <= r.bottom) {
          const firstKey = allKeys[0];
          if (SpanMode.resizeKey !== firstKey) {
            SpanMode.resizeKey = firstKey;
            renderSpanOverlay();
            _followTabForStartResize(ev, firstKey);
          }
          return;
        }
      }

      // 通常リサイズ
      const k = getCellKeyAt(mv.clientX, mv.clientY);
      if (!k || k === SpanMode.resizeKey) return;
      let otherIdx = allKeys.indexOf(ev.endKey);
      // 別月の場合 ev.endKey が allKeys に存在しない → 月末まで移動可能にする
      if (otherIdx < 0) otherIdx = allKeys.length - 1;
      const newIdx   = allKeys.indexOf(k);
      if (newIdx < 0 || newIdx > otherIdx) return;
      SpanMode.resizeKey = k;
      renderSpanOverlay();
      // タブY座標を常に新startKeyの行に追従
      const tabElS = $id('span-tab-layer').querySelector(`[data-span-id="${ev.id}"]`);
      const newStartRect = getCellRect(k);
      if (tabElS && newStartRect) {
        tabElS.style.top = (newStartRect.top + 3.75 - 26) + 'px';
      }
      // タブX追従（始点がタブより右側になったらロック→以降は始点左端に固定）
      if (!tabLocked) {
        if (tabElS && newStartRect) {
          const tabRect = tabElS.getBoundingClientRect();
          if (newStartRect.left > tabRect.left) tabLocked = true;
        }
      }
      if (tabLocked) _followTabForStartResize(ev, k);
    };

    const onUp = () => {
      document.removeEventListener('pointermove', onMove);
      if (!SpanMode.resizing) return;
      SpanMode.resizing = false;

      const finalKey = SpanMode.resizeKey;
      if (finalKey) {
        if (which === 'start') ev.startKey = finalKey;
        else                   ev.endKey   = finalKey;

        // タブを1行目の範囲内にクランプ
        const PAD = 3.75;
        const newKeys = getKeysBetween(ev.startKey, ev.endKey);
        if (newKeys.length > 0) {
          const firstRect = getCellRect(newKeys[0]);
          if (firstRect) {
            const newX1 = firstRect.left + PAD;
            // 1行目の右端：startKeyと同じ行にある最後のキー（行変わりで止める）
            let firstRowLastKey = newKeys[0];
            for (const k of newKeys) {
              const r = getCellRect(k);
              if (!r) break;
              // startKeyの行より下に行ったら止める
              if (r.top > firstRect.bottom) break;
              firstRowLastKey = k;
            }
            const firstRowLastRect = getCellRect(firstRowLastKey);
            const newX2 = firstRowLastRect ? firstRowLastRect.right - PAD : newX1;
            const tabEl = $id('span-tab-layer').querySelector(`[data-span-id="${ev.id}"]`);
            const tabW  = tabEl ? tabEl.offsetWidth : 40;
            const newTabMaxPx = Math.max(0, (newX2 - newX1) - tabW);
            // start側リサイズはstartKeyが移動するためtabOffsetをリセット
            // end側リサイズはタブ位置を維持しつつ新しい範囲内にクランプ
            let absTabLeft;
            if (which === 'start') {
              absTabLeft = newX1; // startKeyの左端にリセット
            } else {
              // end側：最短1日の場合は左端にリセット、それ以外はD&D前のtabOffsetをベースにクランプ
              if (ev.startKey === ev.endKey) {
                absTabLeft = newX1;
              } else {
                const mk = currentMonthKey();
                const savedOffset = (ev.tabOffsets && ev.tabOffsets[mk] != null) ? ev.tabOffsets[mk] : (typeof ev.tabOffset === 'number' ? ev.tabOffset : 0);
                absTabLeft = Math.max(newX1, Math.min(newX1 + newTabMaxPx, newX1 + savedOffset));
              }
            }
            setTabOffset(ev, absTabLeft - newX1);
            if (tabEl) tabEl.style.left = absTabLeft + 'px';

            // 他タブとの重なり回避
            // renderSpanOverlay後の最新タブ要素で判定するため一旦再描画
            SpanMode.resizing = false;
            renderSpanOverlay();
            const freshTabEl = $id('span-tab-layer').querySelector(`[data-span-id="${ev.id}"]`);
            if (freshTabEl) {
              // 全座標をcal-grid-area相対に統一して重なり判定
              const areaRect = $id('cal-grid-area').getBoundingClientRect();
              const toRel = r => ({
                left:   r.left   - areaRect.left,
                right:  r.right  - areaRect.left,
                top:    r.top    - areaRect.top,
                bottom: r.bottom - areaRect.top,
              });
              const tabLayer = $id('span-tab-layer');
              const myRel    = toRel(freshTabEl.getBoundingClientRect());
              let curLeft    = parseFloat(freshTabEl.style.left);
              tabLayer.querySelectorAll('.span-tab').forEach(other => {
                if (other === freshTabEl) return;
                const or = toRel(other.getBoundingClientRect());
                const overlapX = myRel.left < or.right  && myRel.right  > or.left;
                const overlapY = myRel.top  < or.bottom && myRel.bottom > or.top;
                if (!(overlapX && overlapY)) return;
                const gapRight = or.right  - myRel.left;
                const gapLeft  = myRel.right - or.left;
                let newLeft = curLeft;
                if (gapRight <= gapLeft) {
                  newLeft = curLeft + gapRight + 4;
                } else {
                  newLeft = curLeft - gapLeft  - 4;
                }
                newLeft = Math.max(newX1, Math.min(newX1 + newTabMaxPx, newLeft));
                setTabOffset(ev, newLeft - newX1);
                freshTabEl.style.left  = newLeft + 'px';
                const tabW             = myRel.right - myRel.left;
                myRel.left             = newLeft;
                myRel.right            = newLeft + tabW;
                curLeft                = newLeft;
              });
            }
          }
        }

        saveToStorage();
      }
      SpanMode.resizeKey = null;
      // resizing終了後にrenderSpanOverlayを呼んでタブを再表示
      renderSpanOverlay();
    };

    document.addEventListener('pointermove', onMove);
    document.addEventListener('pointerup', onUp, { once: true });
  });
}

function renderCalendar() {
  const l = L();
  $id('hdr-month').textContent = l.months[S.month];
  $id('hdr-year').textContent  = l.yearFmt(S.year);

  const headers = l.weekSun;
  const isLand = isLandscapeCalendar();

  renderWeekdayHeader(headers);

  const descs   = buildCellDescs();
  const numRows = descs.length / 7;

  renderCalendarDOM(descs, headers, isLand);
  requestAnimationFrame(() => requestAnimationFrame(() => {
    applyCellSizes(numRows, isLand);
    // applyCellSizes後に getBoundingClientRect を読んで forced reflow を確定させる
    // これにより renderSpanOverlay内のgetCellRectが正しい座標を返す
    const firstCell = $id('cal-grid')?.querySelector('.cal-cell');
    if (firstCell) firstCell.getBoundingClientRect();
    renderSpanOverlay();
  }));
  updateTodayBtns();
}

// Today ボタンの表示/非表示を更新
function updateTodayBtns() {
  const isThisMonth = (S.year === today.getFullYear() && S.month === today.getMonth());
  const calBtn = $id('btn-today-cal');
  if (calBtn) calBtn.style.display = isThisMonth ? 'none' : '';

  const todayKey = cellKey(today.getFullYear(), today.getMonth() + 1, today.getDate());
  const isToday  = (S.currentKey === todayKey);
  const dayBtn  = $id('btn-today-day');
  if (dayBtn)  dayBtn.style.display  = isToday ? 'none' : '';
  const dayBtnL = $id('btn-today-day-l');
  if (dayBtnL) dayBtnL.style.display = isToday ? 'none' : '';
}

// ── 曜日ヘッダーを描画 ──
function renderWeekdayHeader(headers) {
  const wdEl = $id('cal-wd');
  wdEl.innerHTML = '';
  headers.forEach((d, i) => {
    const el = document.createElement('div');
    el.className = 'wd';
    if (i === 0) el.classList.add('sun');
    if (i === 6) el.classList.add('sat');
    el.textContent = d;
    wdEl.appendChild(el);
  });
}

// ── セル記述子の配列を生成 ──
function buildCellDescs() {
  return buildCellDescsFor(S.year, S.month);
}

function buildCellDescsFor(year, month) {
  const holidays = getHolidays(year);
  const first    = new Date(year, month, 1);
  const last     = new Date(year, month + 1, 0);
  const descs    = [];

  // 1日前の空白セル
  const preCount = colOf(first.getDay());
  for (let i = 0; i < preCount; i++) {
    descs.push({
      type: 'blank',
      key: `${year}-${String(month + 1).padStart(2,'0')}-pre-${i}`,
    });
  }

  // 当月の日付セル
  for (let d = 1; d <= last.getDate(); d++) {
    const dt  = new Date(year, month, d);
    const key = cellKey(year, month + 1, d);
    descs.push({
      type: 'date', d, dow: dt.getDay(), key,
      isToday: dt.toDateString() === today.toDateString(),
      holName: holidays[fmtDate(dt)] || null,
    });
  }

  // 最終日後の空白セル
  const postCount = (7 - (descs.length % 7)) % 7;
  for (let i = 0; i < postCount; i++) {
    descs.push({
      type: 'blank',
      key: `${year}-${String(month + 1).padStart(2,'0')}-post-${i}`,
    });
  }

  return descs;
}

// ── セルDOMを構築してイベントを登録 ──
function renderCalendarDOM(descs, headers, isLand) {
  const grid = $id('cal-grid');
  grid.innerHTML = '';

  descs.forEach((desc, idx) => {
    const el = document.createElement('div');
    el.className = 'cal-cell';
    if (isLand) el.classList.add('landscape-cell');

    if (desc.type === 'inactive') {
      el.classList.add('inactive');
      grid.appendChild(el);
      return;
    }

    // blank: 前月・翌月のセル（書き込み可能、inactive-bg色）
    if (desc.type === 'blank') {
      el.classList.add('is-blank');
      const top = document.createElement('div');
      top.className = 'cell-top';
      el.appendChild(top);
      const prev = document.createElement('div');
      prev.className = 'cell-preview';
      const mc = document.createElement('canvas');
      mc.dataset.key = desc.key;
      prev.appendChild(mc);
      el.appendChild(prev);
      el.addEventListener('pointerdown', e => onCellPointerDown(e, el, desc));
      el.addEventListener('contextmenu', e => { e.preventDefault(); if (!Cal.dragGhost && (getCellObjs(desc.key).length > 0 || S.clipboard)) openCellCtx(e, desc.key); });
      grid.appendChild(el);
      return;
    }

    if (desc.isToday) el.classList.add('today');
    const hd = headers[idx % 7];
    if (desc.type !== 'memo') {
      if      (hd === '日') el.classList.add('is-sun');
      else if (hd === '土') el.classList.add('is-sat');
      else if (desc.holName) el.classList.add('is-hol');
    }

    el.appendChild(buildCellTop(desc));

    const prev = document.createElement('div');
    prev.className = 'cell-preview';
    const mc = document.createElement('canvas');
    mc.dataset.key = desc.key;
    prev.appendChild(mc);
    el.appendChild(prev);

    el.addEventListener('pointerdown', e => onCellPointerDown(e, el, desc));
    el.addEventListener('contextmenu', e => {
      e.preventDefault();
      if (SpanMode.active) return;
      if (Cal.dragGhost) return;
      const mc = el.querySelector('canvas');
      if (mc) {
        const r  = mc.getBoundingClientRect();
        const sc = Math.min(mc.width / CANVAS_SRC, mc.height / CANVAS_SRC);
        const lx = (e.clientX - r.left) / r.width  * (mc.width  / sc);
        const ly = (e.clientY - r.top)  / r.height * (mc.height / sc);
        const objs = getCellObjs(desc.key);
        const hit  = findMiniHitObj(objs, lx, ly, desc.key);
        if (hit) { openObjCtx(e.clientX, e.clientY, desc.key, hit.id); return; }
      }
      // 空セルはクリップボードがある場合のみメニュー表示
      if (getCellObjs(desc.key).length === 0 && !S.clipboard) return;
      openCellCtx(e, desc.key);
    });
    grid.appendChild(el);
  });

  // 最終行のセルのborder-bottomを--borderに統一（シャドウと馴染ませる）
  const cells = grid.children;
  const total = cells.length;
  for (let i = Math.max(0, total - 7); i < total; i++) {
    cells[i].classList.add('last-row');
  }
}

// ── セルの日付エリアを生成 ──
function buildCellTop(desc) {
  const top = document.createElement('div');
  top.className = 'cell-top';
  const num = document.createElement('div');
  num.className = 'cell-num';
  num.textContent = desc.type === 'date' ? desc.d : desc.label;
  top.appendChild(num);
  // 繰り返し予定テキスト表示
  if (desc.type === 'date' && desc.key) {
    const mmdd = desc.key.slice(5);
    const re = S.repeatEvents[mmdd];
    if (re) {
      const rt = document.createElement('div');
      rt.className = 'cell-repeat-name';
      rt.textContent = re.name;
      top.appendChild(rt);
    }
  }
  // 祝日名テキストは非表示（文字色のみで表現）
  return top;
}

// ── セルのポインターイベントハンドラ ──
function onCellPointerDown(e, el, desc) {
  if (e.button > 0) return;
  // 期間設定モード中はセルのポインターイベントを無視（SpanModeのD&Dハンドラに委ねる）
  if (SpanMode.active) return;
  // ピンチ拡大中はオブジェクト操作を無効化
  if (window.visualViewport && window.visualViewport.scale > 1.01) return;
  if ($id('ctx-obj').classList.contains('open') ||
      $id('ctx-cell').classList.contains('open')) return;

  const mc = el.querySelector('canvas');
  if (!mc) return;

  const r    = mc.getBoundingClientRect();
  const sc   = Math.min(mc.width / CANVAS_SRC, mc.height / CANVAS_SRC);
  const lx   = (e.clientX - r.left) / r.width  * (mc.width  / sc);
  const ly   = (e.clientY - r.top)  / r.height * (mc.height / sc);
  const objs = getCellObjs(desc.key);

  // ダブルタップでクリップビューワー起動（最優先）
  const now = Date.now();
  if (now - (onCellPointerDown._lastTap||0) < TAP_INTERVAL) {
    const hitClip = objs.slice().reverse().find(o => o.type==='clip' && miniHitObj(o, lx, ly));
    if (hitClip) {
      onCellPointerDown._lastTap = 0;
      openClipViewer(hitClip.clipId, hitClip.displayName);
      return;
    }
  }
  onCellPointerDown._lastTap = now;

  // ① 選択済み×ボタン
  if (miniHandleDeleteBtn(e, r, sc, desc.key, objs)) return;

  // ② オブジェクトヒット → 選択・ドラッグ・長押し
  const hitObj = findMiniHitObj(objs, lx, ly, desc.key);
  if (hitObj) { handleObjHit(e, desc.key, hitObj, mc); return; }

  // ③ 空白タップ → ヘッダーか描画領域かで処理を分岐
  Cal.selObjId = null; Cal.selCellKey = null;
  renderMiniCanvases();
  if (e.target.closest('.cell-top')) {
    handleCellHeaderTap(e, desc);
  } else {
    handleEmptyCellTap(e, desc);
  }
}

// 選択済みオブジェクトの×ボタンヒットテスト・削除（フェードアウトあり）
function miniHandleDeleteBtn(e, r, sc, key, objs) {
  if (Cal.selCellKey !== key || !Cal.selObjId) return false;
  const selObj = objs.find(o => o.id === Cal.selObjId);
  if (!selObj) return false;
  if (!miniHitDeleteBtn(selObj, sc, e.clientX - r.left, e.clientY - r.top)) return false;
  const objId = Cal.selObjId;
  calPushUndo({type:'cal-delete', key, obj: clone(selObj)});
  Cal.selObjId = null; Cal.selCellKey = null;
  miniDeleteWithFade(key, objId);
  return true;
}

// ミニキャンバス上のオブジェクトをフェードアウトして削除
/** カレンダー画面のオブジェクトをフェードアウト後に削除 */
function miniDeleteWithFade(key, objId) {
  const DURATION = 200;
  const start = performance.now();
  Cal._fadeOut = { key, id: objId, start };
  const animate = () => {
    const elapsed = performance.now() - start;
    if (!Cal._fadeOut || Cal._fadeOut.id !== objId) return;
    if (elapsed >= DURATION) {
      Cal._fadeOut = null;
      const objs = getCellObjs(key);
      setCellObjs(key, objs.filter(o => o.id !== objId));
      saveToStorage();
      renderMiniCanvases();
    } else {
      renderMiniCanvases();
      requestAnimationFrame(animate);
    }
  };
  requestAnimationFrame(animate);
}

// ヒットするオブジェクトを返す（選択済み優先、なければ最前面）
function findMiniHitObj(objs, lx, ly, key) {
  if (Cal.selCellKey === key && Cal.selObjId) {
    const selObj = objs.find(o => o.id === Cal.selObjId);
    if (selObj && miniHitObj(selObj, lx, ly)) return selObj;
  }
  for (let i = objs.length - 1; i >= 0; i--) {
    if (miniHitObj(objs[i], lx, ly)) return objs[i];
  }
  return null;
}

// オブジェクトヒット時：即選択 → ドラッグ or 長押しメニュー待機
function handleObjHit(e, key, obj, mc) {
  Cal.selCellKey = key;
  Cal.selObjId   = obj.id;
  renderMiniCanvases();

  let upBeforeTimer = false; // タイマー発火前に指が離れたか

  const onTryDrag = mv => {
    if (Math.hypot(mv.clientX - e.clientX, mv.clientY - e.clientY) > 6) {
      clearTimeout(longPressTimer);
      document.removeEventListener('pointermove', onTryDrag);
      document.removeEventListener('pointerup',   onUp);
      document.removeEventListener('touchend',    onTouchUp, true);
      startCalDrag(e, key, obj);
    }
  };

  const doUp = () => {
    clearTimeout(longPressTimer);
    document.removeEventListener('pointermove', onTryDrag);
    document.removeEventListener('pointerup',   onUp);
    document.removeEventListener('touchend',    onTouchUp, true);
    upBeforeTimer = true;
    // 短タップ → 次フレームでプレビュー表示（pointerdownによる即消しを回避）
    requestAnimationFrame(() => {
      window._showObjPreview && _showObjPreview(obj, e.clientX, e.clientY, mc);
    });
  };

  const onUp     = () => doUp();
  const onTouchUp = () => doUp();

  // 長押し確定
  const longPressTimer = setTimeout(() => {
    document.removeEventListener('pointermove', onTryDrag);
    document.removeEventListener('pointerup',   onUp);
    document.removeEventListener('touchend',    onTouchUp, true);
    window._hideObjPreview && _hideObjPreview();

    if (upBeforeTimer) {
      // 既に指が離れていた → 即メニュー
      openObjCtx(e.clientX, e.clientY, key, obj.id);
    } else {
      // まだ指が触れている → ゴースト表示、移動なし＋500ms後にメニュー
      startCalDrag(e, key, obj,
        () => openObjCtx(e.clientX, e.clientY, key, obj.id)
      );
    }
  }, LONG_PRESS_MS);

  document.addEventListener('pointermove', onTryDrag);
  document.addEventListener('pointerup',   onUp);
  document.addEventListener('touchend',    onTouchUp, { capture: true, passive: true });
}

// 描画領域（オブジェクトなし）タップ：短タップ→遷移、長押し→クリップボードありのみメニュー
function handleEmptyCellTap(e, desc) {
  let longPressed   = false;
  let upBeforeTimer = false;

  const cleanup = () => {
    document.removeEventListener('pointermove', onMoveCancel);
    document.removeEventListener('pointerup',   onUp);
    document.removeEventListener('touchend',    onTouchUp, true);
  };

  const onMoveCancel = mv => {
    if (Math.hypot(mv.clientX - e.clientX, mv.clientY - e.clientY) > 8) {
      clearTimeout(longPressTimer); cleanup();
    }
  };

  const onUp = up => {
    clearTimeout(longPressTimer); cleanup();
    if (longPressed) { upBeforeTimer = true; return; }
    if (Math.hypot(up.clientX - e.clientX, up.clientY - e.clientY) < 5) {
      openDayCell(desc.key, desc.type === 'date' ? desc.d : desc.label);
    }
  };

  const onTouchUp = () => {
    if (longPressed) { upBeforeTimer = true; return; }
    clearTimeout(longPressTimer); cleanup();
  };

  const longPressTimer = setTimeout(() => {
    longPressed = true; cleanup();
    if (!S.clipboard?.type) return; // クリップボードなし → 何もしない
    const showMenu      = () => openCellCtx({ clientX: e.clientX, clientY: e.clientY }, desc.key);
    const showMenuLong  = () => openCellCtx({ clientX: e.clientX, clientY: e.clientY }, desc.key);
    if (upBeforeTimer) { showMenu(); return; }
    // オブジェクトがあればD&D→500ms後にメニュー、なければ直接メニュー
    const hasObjs = getCellObjs(desc.key).length > 0;
    if (hasObjs) {
      startCellDrag(e, desc.key, showMenuLong, () => {});
    } else {
      showMenu();
    }
  }, LONG_PRESS_MS);

  document.addEventListener('pointermove', onMoveCancel);
  document.addEventListener('pointerup',   onUp);
  document.addEventListener('touchend',    onTouchUp, { capture: true, passive: true });
}

// 日付セルヘッダータップ：6px移動で即D&D、長押し500ms→ゴースト→指離しでメニュー、短タップ→日付詳細画面遷移
function handleCellHeaderTap(e, desc) {
  let longPressed   = false;
  let upBeforeTimer = false;

  const onTryDrag = mv => {
    if (Math.hypot(mv.clientX - e.clientX, mv.clientY - e.clientY) > 6) {
      clearTimeout(longPressTimer);
      document.removeEventListener('pointermove', onTryDrag);
      document.removeEventListener('pointerup',   onUp);
      document.removeEventListener('touchend',    onTouchUp, true);
      startCellDrag(e, desc.key, () => {}, () => {});
    }
  };

  const onUp = () => {
    clearTimeout(longPressTimer);
    document.removeEventListener('pointermove', onTryDrag);
    document.removeEventListener('pointerup',   onUp);
    document.removeEventListener('touchend',    onTouchUp, true);
    if (longPressed) { upBeforeTimer = true; }
    // 短タップ → 日付詳細画面へ遷移
    if (!longPressed && desc.type === 'date') {
      openDayCell(desc.key, desc.d);
    }
  };

  const onTouchUp = () => {
    if (longPressed) { upBeforeTimer = true; return; }
    clearTimeout(longPressTimer);
    document.removeEventListener('pointermove', onTryDrag);
    document.removeEventListener('pointerup',   onUp);
    document.removeEventListener('touchend',    onTouchUp, true);
  };

  const longPressTimer = setTimeout(() => {
    longPressed = true;
    document.removeEventListener('pointermove', onTryDrag);
    document.removeEventListener('pointerup',   onUp);
    document.removeEventListener('touchend',    onTouchUp, true);

    const showMenu     = () => openCellCtx({ clientX: e.clientX, clientY: e.clientY }, desc.key);
    const showMenuLong = () => openCellCtx({ clientX: e.clientX, clientY: e.clientY }, desc.key);
    const hasObjs  = getCellObjs(desc.key).length > 0;
    const hasRepeat = desc.key && !!S.repeatEvents[desc.key.slice(5)];

    if (upBeforeTimer) {
      // オブジェクトあり、クリップボードあり、または繰り返し予定関連ならメニュー表示
      if (hasObjs || S.clipboard?.type || desc.type === 'date') showMenu();
      return;
    }
    if (hasObjs) {
      // オブジェクトあり → D&D → 500ms後にメニュー
      startCellDrag(e, desc.key, showMenuLong, () => {});
    } else if (S.clipboard?.type || desc.type === 'date') {
      // オブジェクトなし＋クリップボードあり or 日付セル → 直接メニュー
      showMenu();
    }
  }, LONG_PRESS_MS);

  document.addEventListener('pointermove', onTryDrag);
  document.addEventListener('pointerup',   onUp);
  document.addEventListener('touchend',    onTouchUp, { capture: true, passive: true });
}


function applyCellSizes(numRows, isLand) {
  const area = $id('cal-grid-area');
  const grid = $id('cal-grid');
  const wd   = $id('cal-wd');
  const wrap = $id('cal-wd-grid-wrap');
  const areaW  = area.clientWidth;
  // グリッドが使える高さ: window.innerHeight からヘッダー・曜日バーを引く
  // window.innerHeight はアニメーション中でも安定した値を返す
  const screen  = $id('cal-screen');
  const header  = screen ? screen.querySelector('.cal-header') : null;
  const headerH = header ? header.getBoundingClientRect().height : 0;
  const wdH     = wd ? wd.getBoundingClientRect().height : 0;
  const areaH   = window.innerHeight - headerH - wdH;
  if (!areaW || !areaH) { setTimeout(renderMiniCanvases, 50); return; }

  if (!isLand) {
    /* ── 縦長モード ──
       セル幅 = areaW / 7
       描画エリア = 正方形(セル幅×セル幅)
       セル高さ = DATE_H + セル幅
    */
    const cellW = Math.floor(areaW / 7);
    const squareSz = cellW;
    const cellH = DATE_H + squareSz;
    const totalW = cellW * 7;

    // グリッド設定: 列幅均等、行高さ固定
    grid.style.gridTemplateColumns = `repeat(7, ${cellW}px)`;
    grid.style.gridTemplateRows    = `repeat(${numRows}, ${cellH}px)`;
    grid.style.width  = `${totalW}px`;
    grid.style.height = `${cellH*numRows}px`;

    // 曜日ヘッダーとwrapをグリッドと同幅に同期
    wd.style.width = `${totalW}px`;
    wd.style.gridTemplateColumns = `repeat(7, ${cellW}px)`;
    if (wrap) wrap.style.width = `${totalW}px`;

    // 各セル
    grid.querySelectorAll('.cal-cell').forEach(el=>{
      el.style.width  = `${cellW}px`;
      el.style.height = `${cellH}px`;
      const preview = el.querySelector('.cell-preview');
      if (preview){
        preview.style.width  = `${squareSz}px`;
        preview.style.height = `${squareSz}px`;
      }
      const top = el.querySelector('.cell-top');
      if (top) top.style.height = `${DATE_H}px`;
    });

  } else {
    /* ── 横長モード ──
       セル高さは常に6行固定で計算（月によってサイズが変わらないよう）
       5行月は下に余白が空く（上揃え固定）
       cellH = areaH / 6
       squareSz = cellH（プレビューキャンバスはセル高さと同じ）
       cellW = DATE_W + squareSz
    */
    // cellH = areaH/6 固定（6行常に同じサイズ）
    // cellW = areaW/7 固定（横幅をぴったり使う）
    // squareSz = cellW - DATE_W（プレビュー幅）
    const cellH    = Math.floor(areaH / 6);
    const cellW    = Math.floor(areaW / 7);
    const squareSz = Math.max(cellW - DATE_W, 1);
    const totalW   = cellW * 7;

    grid.style.gridTemplateColumns = `repeat(7, ${cellW}px)`;
    grid.style.gridTemplateRows    = `repeat(${numRows}, ${cellH}px)`;
    grid.style.width  = `${totalW}px`;
    grid.style.height = `${cellH * numRows}px`; // 実際の行数分（5行月は下に余白が空く）

    // 曜日ヘッダーとwrapをグリッドと同幅に同期
    wd.style.width = `${totalW}px`;
    wd.style.gridTemplateColumns = `repeat(7, ${cellW}px)`;
    if (wrap) wrap.style.width = `${totalW}px`;

    grid.querySelectorAll('.cal-cell').forEach(el=>{
      el.style.width  = `${cellW}px`;
      el.style.height = `${cellH}px`;
      const preview = el.querySelector('.cell-preview');
      if (preview){
        preview.style.width  = `${squareSz}px`;
        preview.style.height = `${cellH}px`;
      }
      const top = el.querySelector('.cell-top');
      if (top){
        top.style.width  = `${DATE_W}px`;
        top.style.height = `${cellH}px`;
      }
    });
  }

  setTimeout(renderMiniCanvases, 20);
}
