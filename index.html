// 現在セルを保存して次の操作に備えるユーティリティ
function saveCurrentCell() {
  finalizePenObjs(); finalizeText();
  if (S.currentKey) {
    getActiveCalendar().cellData[S.currentKey] = clone(Draw.objects);
    saveToStorage();
  }
}

// 当月のセル記述子を使って前後のkeyを取得（blankはスキップして隣の有効セルへ）
function getAdjacentCellKey(currentKey, dir) {
  const descs = buildCellDescs(); // 現在のS.year/S.monthで生成
  const cells = descs.filter(d => d.type === 'date' || d.type === 'blank');
  const idx = cells.findIndex(d => d.key === currentKey);
  if (idx < 0) return null;
  const next = idx + dir;

  // 当月の範囲内
  if (next >= 0 && next < cells.length) {
    return { key: cells[next].key, yearDelta: 0, monthDelta: 0 };
  }

  // 月またぎ：前月末 or 翌月頭に移動
  if (dir < 0) {
    // 前月の最終dateセルを取得
    let y = S.year, m = S.month - 1;
    if (m < 0) { m = 11; y--; }
    const prevDescs = buildCellDescsFor(y, m);
    const prevCells = prevDescs.filter(d => d.type === 'date' || d.type === 'blank');
    if (prevCells.length === 0) return null;
    const lastCell = prevCells[prevCells.length - 1];
    return { key: lastCell.key, year: y, month: m };
  } else {
    // 翌月の最初のdateセルを取得
    let y = S.year, m = S.month + 1;
    if (m > 11) { m = 0; y++; }
    const nextDescs = buildCellDescsFor(y, m);
    const nextCells = nextDescs.filter(d => d.type === 'date' || d.type === 'blank');
    if (nextCells.length === 0) return null;
    const firstCell = nextCells[0];
    return { key: firstCell.key, year: y, month: m };
  }
}

function navigateDayCell(dir) {
  saveCurrentCell();

  const nextKey = getAdjacentCellKey(S.currentKey, dir);
  if (!nextKey) return;

  if (nextKey.year !== undefined) {
    S.year  = nextKey.year;
    S.month = nextKey.month;
  }

  const descs = buildCellDescs();
  const desc  = descs.find(d => d.key === nextKey.key);
  const label = desc && desc.type === 'date' ? desc.d : undefined;
  const inClass = dir > 0 ? 'draw-slide-in-right' : 'draw-slide-in-left';

  const isLand = document.getElementById('day-sidebar-land').offsetParent !== null;
  const slideTargets = isLand
    ? [
        document.querySelector('.land-date-area'),
        document.querySelector('.land-ur-area'),
        document.getElementById('draw-wrap'),
      ]
    : [
        document.querySelector('.tb-row1'),
        document.getElementById('draw-wrap'),
      ];

  // チラつき防止: 内容更新前に非表示
  const targets = slideTargets.filter(Boolean);
  targets.forEach(el => { el.style.visibility = 'hidden'; });

  openDayCell(nextKey.key, label, true);

  requestAnimationFrame(() => requestAnimationFrame(() => {
    targets.forEach(el => { el.style.visibility = ''; });

    // 横長: スライド中の空白を背景色パネルで埋める
    const bgPanels = [];
    if (isLand) {
      targets.forEach(el => {
        if (el.id === 'draw-wrap') return;
        const panel = document.createElement('div');
        panel.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;background:var(--surface);pointer-events:none;z-index:-1;';
        el.style.position = 'relative';
        el.appendChild(panel);
        bgPanels.push({ el, panel });
      });
    }

    targets.forEach(el => {
      el.classList.add(inClass);
      el.addEventListener('animationend', () => {
        el.classList.remove(inClass);
        bgPanels.forEach(({ el: pEl, panel }) => { if (pEl === el) panel.remove(); });
      }, { once: true });
    });
  }));
}

// topbar（縦長）＋ sidebar（横長）＋ draw-wrap余白 フリック検出
;(function() {
  function attachFlick(el, skipIfCanvas = false) {
    let sx = 0, sy = 0, st = 0, skip = false;
    el.addEventListener('touchstart', e => {
      if (e.touches.length !== 1) return;
      // キャンバス上のタッチはスキップ
      skip = skipIfCanvas && e.target === document.getElementById('draw-canvas');
      if (skip) return;
      sx = e.touches[0].clientX;
      sy = e.touches[0].clientY;
      st = Date.now();
    }, { passive: true });
    el.addEventListener('touchend', e => {
      if (skip || e.changedTouches.length !== 1) return;
      const dx = e.changedTouches[0].clientX - sx;
      const dy = e.changedTouches[0].clientY - sy;
      const dt = Math.max(1, Date.now() - st);
      if (Math.abs(dy) > Math.abs(dx)) return;
      if (Math.abs(dx) < 30 || Math.abs(dx) / dt < 0.2) return;
      navigateDayCell(dx < 0 ? 1 : -1);
    }, { passive: true });
  }
  attachFlick(document.getElementById('day-topbar'));
  attachFlick(document.getElementById('day-sidebar-land'));
  attachFlick(document.getElementById('draw-wrap'), true); // キャンバス上はスキップ
})();

// パレットのスウォッチHTMLを生成するヘルパー
function buildSwatchesHTML(id, dataAttr, currentColor) {
  const items = PALETTE.map(c => {
    const on = c.hex === currentColor ? ' on' : '';
    return `<div class="swatch${on}" ${dataAttr}="${c.hex}" style="background:${c.hex}" title="${c.label}"></div>`;
  }).join('');
  return `<div class="swatches" id="${id}">${items}</div>`;
}

function buildOptsHTML(tool) {
  if (tool === 'pen') {
    return `
      <div class="opt-block">
        ${buildSwatchesHTML('po-colors', 'data-color', S.penColor)}
      </div>
      <div class="opt-block">
        <div class="sz-row">
          <button class="sz-btn${S.penSize===3?' on':''}" data-size="3">
            <span class="dot" style="width:8px;height:8px"></span>
          </button>
          <button class="sz-btn${S.penSize===8?' on':''}" data-size="8">
            <span class="dot" style="width:16px;height:16px"></span>
          </button>
        </div>
      </div>`;
  }
  if (tool === 'marker') {
    return `
      <div class="opt-block">
        ${buildSwatchesHTML('mo-colors', 'data-mcolor', S.markerColor)}
      </div>`;
  }
  if (tool === 'eraser') {
    return `
      <div class="opt-block">
        <div class="sz-row">
          <button class="sz-btn${S.eraserSize===12?' on':''}" data-esize="12">
            <span class="dot" style="width:11px;height:11px;background:#aaa"></span>
          </button>
          <button class="sz-btn${S.eraserSize===28?' on':''}" data-esize="28">
            <span class="dot" style="width:20px;height:20px;background:#aaa"></span>
          </button>
        </div>
      </div>`;
  }
  if (tool === 'text') {
    return `
      <div class="opt-block">
        ${buildSwatchesHTML('to-colors', 'data-tcolor', S.textColor)}
      </div>
      <div class="opt-block">
        <div class="sz-row">
          <button class="sz-btn${!S.textBold?' on':''}" data-tbold="false">
            <span class="sz-lbl" style="font-weight:400;">A</span>
          </button>
          <button class="sz-btn${S.textBold?' on':''}" data-tbold="true">
            <span class="sz-lbl" style="font-weight:700;">A</span>
          </button>
        </div>
      </div>`;
  }
  const l2 = L();
  const msg = tool === 'sticker'
    ? (Draw.pendingStickerId ? l2.stickerHint : '')
    : tool === 'select' ? l2.selectHint : '';
  return msg ? `<span style="font-size:12px;color:var(--ink-faint);">${msg}</span>` : '';
}

// 選択状態を更新するヘルパー
function syncActive(container, attr, currentVal) {
  container.querySelectorAll(`[${attr}]`).forEach(el => {
    el.classList.toggle('on', el.dataset[attr.replace('data-','')] == currentVal);
  });
}

function bindOpts(container) {
  container.querySelectorAll('[data-color]').forEach(el => {
    el.addEventListener('click', () => {
      S.penColor = el.dataset.color;
      syncActive(container, 'data-color', S.penColor);
    });
  });
  container.querySelectorAll('[data-size]').forEach(el => {
    el.addEventListener('click', () => {
      S.penSize = +el.dataset.size;
      syncActive(container, 'data-size', S.penSize);
    });
  });
  container.querySelectorAll('[data-mcolor]').forEach(el => {
    el.addEventListener('click', () => {
      S.markerColor = el.dataset.mcolor;
      syncActive(container, 'data-mcolor', S.markerColor);
    });
  });
  container.querySelectorAll('[data-msize]').forEach(el => {
    el.addEventListener('click', () => {
      S.markerSize = +el.dataset.msize;
      syncActive(container, 'data-msize', S.markerSize);
    });
  });
  container.querySelectorAll('[data-esize]').forEach(el => {
    el.addEventListener('click', () => {
      S.eraserSize = +el.dataset.esize;
      syncActive(container, 'data-esize', S.eraserSize);
      if (S.tool === 'eraser') setEraserCursor();
    });
  });
  container.querySelectorAll('[data-tcolor]').forEach(el => {
    el.addEventListener('click', () => {
      S.textColor = el.dataset.tcolor;
      syncActive(container, 'data-tcolor', S.textColor);
    });
  });
  container.querySelectorAll('[data-tbold]').forEach(el => {
    el.addEventListener('click', () => {
      S.textBold = el.dataset.tbold === 'true';
      syncActive(container, 'data-tbold', String(S.textBold));
    });
  });

}

function renderOpts() {
  const html = buildOptsHTML(S.tool);

  // 縦長: Row3 — 子要素を全削除してから書き込む
  const p = document.getElementById('tb-opts-portrait');
  p.dataset.tool = S.tool; // デバッグ用
  while (p.firstChild) p.removeChild(p.firstChild);
  p.innerHTML = html;
  bindOpts(p);

  // 横長: サイドパネル — 子要素を全削除してから書き込む
  const l = document.getElementById('land-opts');
  while (l.firstChild) l.removeChild(l.firstChild);
  l.innerHTML = html;
  bindOpts(l);
}

function switchTool(tool) {
  if (S.tool==='text'&&tool!=='text') finalizeText();
  S.tool=tool; Draw.selId=null;

  // portrait tool btns
  document.querySelectorAll('.tool-btn').forEach(b=>b.classList.toggle('active',b.dataset.tool===tool));
  // landscape tool btns
  document.querySelectorAll('.land-tool-btn').forEach(b=>b.classList.toggle('active',b.dataset.tool===tool));

  // スタンプツール選択 → ドロップダウンを開く
  if (tool==='sticker') {
    Draw.pendingStickerId = null;
    setTimeout(openStickerDropdown, 0);
  } else {
    closeStickerDropdown();
  }

  // クリップツール選択 → ファイル選択ダイアログを開く
  if (tool==='clip') {
    Draw.pendingClipId = null;
    setTimeout(() => document.getElementById('clip-file-input').click(), 0);
  } else {
    Draw.pendingClipId = null;
  }

  applyCanvasCursor(tool);
  renderOpts();
  redraw();
}

/* ── カスタムカーソル ──
   消しゴムは「消せる範囲」を示す円をカーソルとして表示する。
   CANVAS_SRC(600)の論理サイズ → 実際の画面ピクセルに換算して円のサイズを決める。
*/
function applyCanvasCursor(tool) {
  if (tool === 'eraser') {
    setEraserCursor();
  } else {
    window._hideEraserCursor && window._hideEraserCursor();
    if (tool === 'select') {
      cvs.style.cursor = 'default';
    } else if (tool === 'sticker') {
      cvs.style.cursor = Draw.pendingStickerId ? 'copy' : 'default';
    } else {
      cvs.style.cursor = 'crosshair';
    }
  }
}

/* ── 消しゴムカーソル（DOM要素追従方式・Safari対応） ── */
(function() {
  let eraserEl = null;

  function getOrCreateEraserEl() {
    if (!eraserEl) {
      eraserEl = document.createElement('div');
      eraserEl.id = '_eraser-cursor';
      eraserEl.style.cssText = `
        position: fixed; pointer-events: none; z-index: 9998;
        border-radius: 50%;
        border: 1.5px solid rgba(0,0,0,0.6);
        box-shadow: 0 0 0 1px rgba(255,255,255,0.8);
        transform: translate(-50%, -50%);
        display: none;
      `;
      document.body.appendChild(eraserEl);
    }
    return eraserEl;
  }

  window._showEraserCursor = function(size) {
    const el = getOrCreateEraserEl();
    el.style.width  = size + 'px';
    el.style.height = size + 'px';
    el.style.display = 'block';
    cvs.style.cursor = 'none';
  };

  window._hideEraserCursor = function() {
    if (eraserEl) eraserEl.style.display = 'none';
    cvs.style.cursor = 'crosshair';
  };

  window._moveEraserCursor = function(x, y) {
    if (eraserEl && eraserEl.style.display !== 'none') {
      eraserEl.style.left = x + 'px';
      eraserEl.style.top  = y + 'px';

  };
})();

/* ════ CALENDAR RENDERING ════ */

// 日付エリアの固定サイズ
const DATE_H  = 20;  // 縦長: 上部日付エリア高さ(px)
const DATE_W  = 56;  // 横長: 左側日付エリア幅(px)

function isLandscapeCalendar() {
  if (IS_PHONE) return false; // 携帯電話は縦長固定
  if (window.visualViewport) {
    return window.visualViewport.width > window.visualViewport.height;
  }
  return window.innerWidth > window.innerHeight;
}

function renderCalendar() {
  const l = L();
  document.getElementById('hdr-month').textContent = l.months[S.month];
  document.getElementById('hdr-year').textContent  = l.yearFmt(S.year);

  const headers = S.weekStart === 0 ? l.weekSun : l.weekMon;
  const isLand = isLandscapeCalendar();

  renderWeekdayHeader(headers);

  const descs   = buildCellDescs();
  const numRows = descs.length / 7;

  renderCalendarDOM(descs, headers, isLand);
  requestAnimationFrame(() => applyCellSizes(numRows, isLand));
}

// ── 曜日ヘッダーを描画 ──
function renderWeekdayHeader(headers) {
  const wdEl = document.getElementById('cal-wd');
  wdEl.innerHTML = '';
  headers.forEach((d, i) => {
    const el = document.createElement('div');
    el.className = 'wd';
    if (S.weekStart === 0) {
      if (i === 0) el.classList.add('sun');
      if (i === 6) el.classList.add('sat');
    } else {
      if (i === 5) el.classList.add('sat');
      if (i === 6) el.classList.add('sun');
    }
    el.textContent = d;
    wdEl.appendChild(el);
  });
}

// ── セル記述子の配列を生成 ──
function buildCellDescs() {
  return buildCellDescsFor(S.year, S.month);
}

function buildCellDescsFor(year, month) {
  const holidays = getHolidays(year);
  const first    = new Date(year, month, 1);
  const last     = new Date(year, month + 1, 0);
  const descs    = [];

  // 1日前の空白セル
  const preCount = colOf(first.getDay());
  for (let i = 0; i < preCount; i++) {
    descs.push({
      type: 'blank',
      key: `${year}-${String(month + 1).padStart(2,'0')}-pre-${i}`,
    });
  }

  // 当月の日付セル
  for (let d = 1; d <= last.getDate(); d++) {
    const dt  = new Date(year, month, d);
    const key = cellKey(year, month + 1, d);
    descs.push({
      type: 'date', d, dow: dt.getDay(), key,
      isToday: dt.toDateString() === today.toDateString(),
      holName: holidays[fmtDate(dt)] || null,
    });
  }

  // 最終日後の空白セル
  const postCount = (7 - (descs.length % 7)) % 7;
  for (let i = 0; i < postCount; i++) {
    descs.push({
      type: 'blank',
      key: `${year}-${String(month + 1).padStart(2,'0')}-post-${i}`,
    });
  }

  return descs;
}

// ── セルDOMを構築してイベントを登録 ──
function renderCalendarDOM(descs, headers, isLand) {
  const grid = document.getElementById('cal-grid');
  grid.innerHTML = '';

  descs.forEach((desc, idx) => {
    const el = document.createElement('div');
    el.className = 'cal-cell';
    if (isLand) el.classList.add('landscape-cell');

    if (desc.type === 'inactive') {
      el.classList.add('inactive');
      grid.appendChild(el);
      return;
    }

    // blank: 前月・翌月のセル（書き込み可能、inactive-bg色）
    if (desc.type === 'blank') {
      el.classList.add('is-blank');
      const prev = document.createElement('div');
      prev.className = 'cell-preview';
      const mc = document.createElement('canvas');
      mc.dataset.key = desc.key;
      prev.appendChild(mc);
      el.appendChild(prev);
      el.addEventListener('pointerdown', e => onCellPointerDown(e, el, desc));
      el.addEventListener('contextmenu', e => { e.preventDefault(); if (!Cal.dragGhost && (getCellObjs(desc.key).length > 0 || S.clipboard)) openCellCtx(e, desc.key); });
      grid.appendChild(el);
      return;
    }

    if (desc.isToday) el.classList.add('today');
    const hd = headers[idx % 7];
    if (desc.type !== 'memo') {
      if      (hd === '日') el.classList.add('is-sun');
      else if (hd === '土') el.classList.add('is-sat');
      else if (desc.holName) el.classList.add('is-hol');
    }

    el.appendChild(buildCellTop(desc));

    const prev = document.createElement('div');
    prev.className = 'cell-preview';
    const mc = document.createElement('canvas');
    mc.dataset.key = desc.key;
    prev.appendChild(mc);
    el.appendChild(prev);

    el.addEventListener('pointerdown', e => onCellPointerDown(e, el, desc));
    el.addEventListener('contextmenu', e => {
      e.preventDefault();
      if (Cal.dragGhost) return;
      const mc = el.querySelector('canvas');
      if (mc) {
        const r  = mc.getBoundingClientRect();
        const sc = Math.min(mc.width / CANVAS_SRC, mc.height / CANVAS_SRC);
        const lx = (e.clientX - r.left) / r.width  * (mc.width  / sc);
        const ly = (e.clientY - r.top)  / r.height * (mc.height / sc);
        const objs = getCellObjs(desc.key);
        const hit  = findMiniHitObj(objs, lx, ly, desc.key);
        if (hit) { openObjCtx(e.clientX, e.clientY, desc.key, hit.id); return; }
      }
      // 空セルはクリップボードがある場合のみメニュー表示
      if (getCellObjs(desc.key).length === 0 && !S.clipboard) return;
      openCellCtx(e, desc.key);
    });
    grid.appendChild(el);
  });

  // 最終行のセルのborder-bottomを--borderに統一（シャドウと馴染ませる）
  const cells = grid.children;
  const total = cells.length;
  for (let i = Math.max(0, total - 7); i < total; i++) {
    cells[i].classList.add('last-row');
  }
}

// ── セルの日付エリアを生成 ──
function buildCellTop(desc) {
  const top = document.createElement('div');
  top.className = 'cell-top';
  const num = document.createElement('div');
  num.className = 'cell-num';
  num.textContent = desc.type === 'date' ? desc.d : desc.label;
  top.appendChild(num);
  if (desc.holName && S.lang !== 'en' && !IS_PHONE) {
    const hn = document.createElement('div');
    hn.className = 'cell-hol-name';
    hn.textContent = desc.holName;
    top.appendChild(hn);
  }
  return top;
}

// ── セルのポインターイベントハンドラ ──
function onCellPointerDown(e, el, desc) {
  if (e.button > 0) return;
  if (document.getElementById('ctx-obj').classList.contains('open') ||
      document.getElementById('ctx-cell').classList.contains('open')) return;

  const mc = el.querySelector('canvas');
  if (!mc) return;

  const r    = mc.getBoundingClientRect();
  const sc   = Math.min(mc.width / CANVAS_SRC, mc.height / CANVAS_SRC);
  const lx   = (e.clientX - r.left) / r.width  * (mc.width  / sc);
  const ly   = (e.clientY - r.top)  / r.height * (mc.height / sc);
  const objs = getCellObjs(desc.key);

  // ダブルタップでクリップビューワー起動（最優先）
  const now = Date.now();
  if (now - (onCellPointerDown._lastTap||0) < 350) {
    const hitClip = objs.slice().reverse().find(o => o.type==='clip' && miniHitObj(o, lx, ly));
    if (hitClip) {
      onCellPointerDown._lastTap = 0;
      openClipViewer(hitClip.clipId);
      return;
    }
  }
  onCellPointerDown._lastTap = now;

  // ① 選択済み×ボタン
  if (miniHandleDeleteBtn(e, r, sc, desc.key, objs)) return;

  // ② オブジェクトヒット → 選択・ドラッグ・長押し
  const hitObj = findMiniHitObj(objs, lx, ly, desc.key);
  if (hitObj) { handleObjHit(e, desc.key, hitObj); return; }

  // ③ 空白タップ → 選択解除しつつセル遷移/ドラッグ/メニュー
  Cal.selObjId = null; Cal.selCellKey = null;
  renderMiniCanvases();
  handleEmptyCellTap(e, desc);
}

// 選択済みオブジェクトの×ボタンヒットテスト・削除
function miniHandleDeleteBtn(e, r, sc, key, objs) {
  if (Cal.selCellKey !== key || !Cal.selObjId) return false;
  const selObj = objs.find(o => o.id === Cal.selObjId);
  if (!selObj) return false;
  if (!miniHitDeleteBtn(selObj, sc, e.clientX - r.left, e.clientY - r.top)) return false;
  setCellObjs(key, objs.filter(o => o.id !== Cal.selObjId));
  Cal.selObjId = null; Cal.selCellKey = null;
  renderMiniCanvases();
  return true;
}

// ヒットするオブジェクトを返す（選択済み優先、なければ最前面）
function findMiniHitObj(objs, lx, ly, key) {
  if (Cal.selCellKey === key && Cal.selObjId) {
    const selObj = objs.find(o => o.id === Cal.selObjId);
    if (selObj && miniHitObj(selObj, lx, ly)) return selObj;
  }
  for (let i = objs.length - 1; i >= 0; i--) {
    if (miniHitObj(objs[i], lx, ly)) return objs[i];
  }
  return null;
}

// オブジェクトヒット時：即選択 → ドラッグ or 長押しメニュー待機
function handleObjHit(e, key, obj) {
  Cal.selCellKey = key;
  Cal.selObjId   = obj.id;
  renderMiniCanvases();

  let upBeforeTimer = false; // タイマー発火前に指が離れたか

  const onTryDrag = mv => {
    if (Math.hypot(mv.clientX - e.clientX, mv.clientY - e.clientY) > 6) {
      clearTimeout(longPressTimer);
      document.removeEventListener('pointermove', onTryDrag);
      document.removeEventListener('pointerup',   onUp);
      document.removeEventListener('touchend',    onTouchUp, true);
      startCalDrag(e, key, obj);
    }
  };

  const doUp = () => {
    clearTimeout(longPressTimer);
    document.removeEventListener('pointermove', onTryDrag);
    document.removeEventListener('pointerup',   onUp);
    document.removeEventListener('touchend',    onTouchUp, true);
    upBeforeTimer = true;
  };

  const onUp     = () => doUp();
  const onTouchUp = () => doUp();

  // 長押し確定
  const longPressTimer = setTimeout(() => {
    document.removeEventListener('pointermove', onTryDrag);
    document.removeEventListener('pointerup',   onUp);
    document.removeEventListener('touchend',    onTouchUp, true);

    if (upBeforeTimer) {
      // 既に指が離れていた → 即メニュー
      openObjCtx(e.clientX, e.clientY, key, obj.id, false);
    } else {
      // まだ指が触れている → ゴースト表示、指離しでメニュー
      startCalDrag(e, key, obj,
        () => openObjCtx(e.clientX, e.clientY, key, obj.id, false)
      );
    }
  }, 500);

  document.addEventListener('pointermove', onTryDrag);
  document.addEventListener('pointerup',   onUp);
  document.addEventListener('touchend',    onTouchUp, { capture: true, passive: true });
}

// 空白タップ：短タップ→遷移、長押しドラッグ→セル移動、長押しリリース→メニュー
function handleEmptyCellTap(e, desc) {
  let longPressed    = false;
  let upBeforeTimer  = false;

  const onMoveCancel = mv => {
    if (Math.hypot(mv.clientX - e.clientX, mv.clientY - e.clientY) > 8) {
      clearTimeout(longPressTimer);
      document.removeEventListener('pointermove', onMoveCancel);
      document.removeEventListener('pointerup',   onUp);
      document.removeEventListener('touchend',    onTouchUp, true);
    }
  };

  const onUp = up => {
    clearTimeout(longPressTimer);
    document.removeEventListener('pointermove', onMoveCancel);
    document.removeEventListener('pointerup',   onUp);
    document.removeEventListener('touchend',    onTouchUp, true);
    if (longPressed) { upBeforeTimer = true; return; }
    if (Math.hypot(up.clientX - e.clientX, up.clientY - e.clientY) < 5) {
      openDayCell(desc.key, desc.type === 'date' ? desc.d : desc.label);
    }
  };

  const onTouchUp = () => {
    if (longPressed) { upBeforeTimer = true; return; }
    clearTimeout(longPressTimer);
    document.removeEventListener('pointermove', onMoveCancel);
    document.removeEventListener('pointerup',   onUp);
    document.removeEventListener('touchend',    onTouchUp, true);
  };

  const longPressTimer = setTimeout(() => {
    longPressed = true;
    document.removeEventListener('pointermove', onMoveCancel);
    document.removeEventListener('pointerup',   onUp);
    document.removeEventListener('touchend',    onTouchUp, true);

    if (upBeforeTimer) {
      // 既に指が離れていた → 即メニュー
      if (S.clipboard) openCellCtx({ clientX: e.clientX, clientY: e.clientY }, desc.key, false);
      return;
    }

    startCellDrag(e, desc.key,
      () => {
        if (S.clipboard) openCellCtx({ clientX: e.clientX, clientY: e.clientY }, desc.key, false);
      },
      () => {}
    );
  }, 500);

  document.addEventListener('pointermove', onMoveCancel);
  document.addEventListener('pointerup',   onUp);
  document.addEventListener('touchend',    onTouchUp, { capture: true, passive: true });
}


function applyCellSizes(numRows, isLand) {
  const area = document.getElementById('cal-grid-area');
  const grid = document.getElementById('cal-grid');
  const wd   = document.getElementById('cal-wd');
  const wrap = document.getElementById('cal-wd-grid-wrap');
  const areaW = area.clientWidth;
  const areaH = area.clientHeight;

  if (!areaW || !areaH) { setTimeout(renderMiniCanvases, 50); return; }

  if (!isLand) {
    /* ── 縦長モード ──
       セル幅 = areaW / 7
       描画エリア = 正方形(セル幅×セル幅)
       セル高さ = DATE_H + セル幅
    */
    const cellW = Math.floor(areaW / 7);
    const squareSz = cellW;
    const cellH = DATE_H + squareSz;
    const totalW = cellW * 7;

    // グリッド設定: 列幅均等、行高さ固定
    grid.style.gridTemplateColumns = `repeat(7, ${cellW}px)`;
    grid.style.gridTemplateRows    = `repeat(${numRows}, ${cellH}px)`;
    grid.style.width  = `${totalW}px`;
    grid.style.height = `${cellH*numRows}px`;

    // 曜日ヘッダーとwrapをグリッドと同幅に同期
    wd.style.width = `${totalW}px`;
    wd.style.gridTemplateColumns = `repeat(7, ${cellW}px)`;
    if (wrap) wrap.style.width = `${totalW}px`;

    // 各セル
    grid.querySelectorAll('.cal-cell').forEach(el=>{
      el.style.width  = `${cellW}px`;
      el.style.height = `${cellH}px`;
      const preview = el.querySelector('.cell-preview');
      if (preview){
        preview.style.width  = `${squareSz}px`;
        preview.style.height = `${squareSz}px`;
      }
      const top = el.querySelector('.cell-top');
      if (top) top.style.height = `${DATE_H}px`;
    });

  } else {
    /* ── 横長モード ──
       セル高さ = areaH / numRows、セル幅 = DATE_W + セル高さ
       ただし cellW*7 > areaW の場合は幅から逆算して収める
    */
    const cellHfromH = Math.floor(areaH / numRows);
    const cellWfromH = DATE_W + cellHfromH;

    // 幅が収まらない場合は幅から逆算
    const cellWfromW = Math.floor(areaW / 7);
    const cellHfromW = cellWfromW - DATE_W;

    // 両方収まる小さい方を採用
    const cellH = (cellWfromH * 7 <= areaW) ? cellHfromH : Math.max(cellHfromW, 1);
    const squareSz = cellH;
    const cellW = DATE_W + squareSz;
    const totalW = cellW * 7;

    grid.style.gridTemplateColumns = `repeat(7, ${cellW}px)`;
    grid.style.gridTemplateRows    = `repeat(${numRows}, ${cellH}px)`;
    grid.style.width  = `${totalW}px`;
    grid.style.height = `${cellH*numRows}px`;

    // 曜日ヘッダーとwrapをグリッドと同幅に同期
    wd.style.width = `${totalW}px`;
    wd.style.gridTemplateColumns = `repeat(7, ${cellW}px)`;
    if (wrap) wrap.style.width = `${totalW}px`;

    grid.querySelectorAll('.cal-cell').forEach(el=>{
      el.style.width  = `${cellW}px`;
      el.style.height = `${cellH}px`;
      const preview = el.querySelector('.cell-preview');
      if (preview){
        preview.style.width  = `${squareSz}px`;
        preview.style.height = `${squareSz}px`;
      }
      const top = el.querySelector('.cell-top');
      if (top){
        top.style.width  = `${DATE_W}px`;
        top.style.height = `${cellH}px`;
      }
    });
  }

  setTimeout(renderMiniCanvases, 20);
}

function colOf(dow){
  if(S.weekStart===0) return dow;
  return (dow+6)%7;
}

/* ════ MINI CANVAS PREVIEW ════ */

// カレンダー画面でのオブジェクト選択状態

// テキストオブジェクトの実際の描画幅・高さを計測（CANVAS_SRC論理座標）
const _measureCtx = document.createElement('canvas').getContext('2d');
function measureTextObj(obj) {
  const lines = (obj.text || '').split('\n');
  const fs    = obj.size || 16;
  _measureCtx.font = `${fs}px 'Noto Sans JP', sans-serif`;
  const w = Math.max(...lines.map(l => _measureCtx.measureText(l).width));
  const h = lines.length * fs * 1.35;
  return {w, h};
}

/**
 * ミニキャンバス上のオブジェクトの境界ボックスを返す（論理座標 CANVAS_SRC 空間）。
 * PAD は呼び出し側でなくここで一元管理する。
 * 戻り値: { x, y, w, h } — パディング込みの矩形
 * 取得不能な場合は null を返す。
 */
const MINI_PAD = 4; // バウンディングボックスのパディング（論理座標）

function getMiniObjBounds(obj) {
  if (obj.type === 'pen') {
    let x0=Infinity, y0=Infinity, x1=-Infinity, y1=-Infinity;
    obj.paths.forEach(p => p.points.forEach(pt => {
      x0=Math.min(x0,pt.x); y0=Math.min(y0,pt.y);
      x1=Math.max(x1,pt.x); y1=Math.max(y1,pt.y);
    }));
    if (!isFinite(x0)) return null;
    return { x: x0-MINI_PAD, y: y0-MINI_PAD, w: x1-x0+MINI_PAD*2, h: y1-y0+MINI_PAD*2 };
  }
  if (obj.type === 'text') {
    const { w, h } = measureTextObj(obj);
    return { x: obj.x-MINI_PAD, y: obj.y-MINI_PAD, w: w+MINI_PAD*2, h: h+MINI_PAD*2 };
  }
  if (obj.type === 'sticker') {
    const img = imgCache[obj.stickerId];
    const sz  = obj.size || 44;
    const { w, h } = img ? stickerDrawSize(img, sz) : { w: sz, h: sz };
    return { x: obj.x-w/2-MINI_PAD, y: obj.y-h/2-MINI_PAD, w: w+MINI_PAD*2, h: h+MINI_PAD*2 };
  }
  if (obj.type === 'clip') {
    const sz = obj.size || 60;
    const w  = sz;
    const h  = sz * 1.2;
    return { x: obj.x-w/2-MINI_PAD, y: obj.y-h/2-MINI_PAD, w: w+MINI_PAD*2, h: h+MINI_PAD*2 };
  }
  return null;
}

// ミニキャンバス上のオブジェクトヒットテスト（論理座標 CANVAS_SRC 空間）
function miniHitObj(obj, lx, ly) {
  const b = getMiniObjBounds(obj);
  if (!b) return false;
  // ヒット判定は PAD を少し広めに取る
  const extra = 2;
  return lx >= b.x-extra && lx <= b.x+b.w+extra &&
         ly >= b.y-extra && ly <= b.y+b.h+extra;
}

// ミニキャンバス上にバウンディングボックスと×ボタンを描画
function drawMiniBBox(c, obj, sc) {
  const b = getMiniObjBounds(obj);
  if (!b) return;

  // バウンディングボックス（スクリーン座標に変換）
  const bx=b.x*sc, by=b.y*sc, bw=b.w*sc, bh=b.h*sc;

  c.save();
  c.strokeStyle='#3a6fa8'; c.lineWidth=1.5; c.setLineDash([4,2]);
  c.strokeRect(bx, by, bw, bh);
  c.setLineDash([]);

  // ×ボタン（バウンディングボックスの右上）
  const btnX = bx+bw+4, btnY = by-4;
  c.fillStyle='#e03030';
  c.beginPath(); c.arc(btnX, btnY, 6, 0, Math.PI*2); c.fill();
  c.fillStyle='#fff'; c.font='bold 8px sans-serif';
  c.textAlign='center'; c.textBaseline='middle';
  c.fillText('×', btnX, btnY);
  c.restore();
}

// ×ボタンのヒットテスト（スクリーン座標）
function miniHitDeleteBtn(obj, sc, px, py) {
  const b = getMiniObjBounds(obj);
  if (!b) return false;
  const btnX = b.x*sc + b.w*sc + 4;
  const btnY = b.y*sc - 4;
  return Math.hypot(px-btnX, py-btnY) < 10;
}

/* ════ CALENDAR OBJECT DRAG ════ */

// ドラッグ中のゴースト要素（絶対位置でオブジェクト画像を追従させる）

function startCalDrag(e, srcKey, obj, onNoMove = null) {
  e.preventDefault();
  calDragInfo = {objId: obj.id, srcKey, origObj: clone(obj)};

  const miniMc = document.querySelector(`.cell-preview canvas[data-key="${srcKey}"]`);
  const miniRect = miniMc ? miniMc.getBoundingClientRect() : null;
  const ghostSize = miniRect ? Math.round(miniRect.width) : 80;
  const sc = ghostSize / CANVAS_SRC;

  const bounds = getMiniObjBounds(obj);
  const pad = 4;
  const bx = bounds ? bounds.x : 0;
  const by = bounds ? bounds.y : 0;
  const bw = bounds ? bounds.w : ghostSize;
  const bh = bounds ? bounds.h : ghostSize;

  const gw = Math.ceil((bw + pad*2) * sc);
  const gh = Math.ceil((bh + pad*2) * sc);

  const ghost = document.createElement('canvas');
  ghost.width  = gw;
  ghost.height = gh;
  ghost.style.cssText = `position:fixed;pointer-events:none;z-index:9999;
    width:${gw}px;height:${gh}px;
    opacity:0.75;transition:none;`;

  const gc = ghost.getContext('2d');
  gc.save();
  gc.translate((-bx + pad) * sc, (-by + pad) * sc);
  gc.scale(sc, sc);
  drawObjMini(gc, obj);
  gc.restore();

  const miniLeft = miniRect ? miniRect.left : 0;
  const miniTop  = miniRect ? miniRect.top  : 0;
  const plx = (e.clientX - miniLeft) / sc;
  const ply = (e.clientY - miniTop)  / sc;
  const offsetX = (plx - bx + pad) * sc;
  const offsetY = (ply - by + pad) * sc;

  const setPos = (cx, cy) => {
    ghost.style.left = (cx - offsetX) + 'px';
    ghost.style.top  = (cy - offsetY) + 'px';
  };
  setPos(e.clientX, e.clientY);
  document.body.appendChild(ghost);
  Cal.dragGhost = ghost;

  let dragging = false;
  let done     = false;

  const onTouchMove = ev => {
    if (!ev.touches[0]) return;
    const x = ev.touches[0].clientX, y = ev.touches[0].clientY;
    setPos(x, y);
    if (!dragging && Math.hypot(x - e.clientX, y - e.clientY) > 6) dragging = true;
  };

  const onMove = ev => {
    const x = ev.clientX, y = ev.clientY;
    setPos(x, y);
    if (!dragging && Math.hypot(x - e.clientX, y - e.clientY) > 6) dragging = true;
  };

  const cleanup = () => {
    document.removeEventListener('pointermove', onMove,      true);
    document.removeEventListener('pointerup',   onUp,        true);
    document.removeEventListener('touchmove',   onTouchMove, true);
    document.removeEventListener('touchend',    onTouchEnd,  true);
    if (Cal.dragGhost === ghost) { ghost.remove(); Cal.dragGhost = null; }
  };

  const onTouchEnd = ev => {
    if (done) return; done = true;
    const t = ev.changedTouches[0];
    cleanup();
    handleDrop(t.clientX, t.clientY);
  };

  const onUp = ev => {
    if (done) return; done = true;
    cleanup();
    handleDrop(ev.clientX, ev.clientY);
  };

  const handleDrop = (cx, cy) => {
    if (!dragging && onNoMove) { calDragInfo = null; onNoMove(); return; }
    if (!dragging)             { calDragInfo = null; return; }

    const dstCell = findCalCellAt(cx, cy);
    if (!dstCell) { calDragInfo = null; return; }

    const { key: dstKey, mc: dstMc } = dstCell;
    const srcObjs  = getCellObjs(calDragInfo.srcKey);
    const movingObj = srcObjs.find(o => o.id === calDragInfo.objId);
    if (!movingObj) { calDragInfo = null; return; }

    const r   = dstMc.getBoundingClientRect();
    const sc2 = Math.min(dstMc.width / CANVAS_SRC, dstMc.height / CANVAS_SRC);
    const nx  = (cx - r.left) / r.width  * (dstMc.width  / sc2);
    const ny  = (cy - r.top)  / r.height * (dstMc.height / sc2);

    if (dstKey === calDragInfo.srcKey) {
      const origObj = clone(movingObj);
      moveObjInCell(calDragInfo.srcKey, movingObj, nx, ny);
      calPushUndo({ type: 'cal-move', key: dstKey, objId: movingObj.id, from: origObj, to: clone(movingObj) });
    } else {
      const origObj = clone(movingObj);
      const newSrc  = srcObjs.filter(o => o.id !== movingObj.id);
      setCellObjs(calDragInfo.srcKey, newSrc);
      const newObj  = clone(movingObj);
      setObjPosition(newObj, nx, ny);
      const dstObjs = getCellObjs(dstKey);
      dstObjs.push(newObj);
      setCellObjs(dstKey, dstObjs);
      calPushUndo({ type: 'cal-cross-move', srcKey: calDragInfo.srcKey, dstKey, origObj, newObj: clone(newObj) });
      Cal.selCellKey = dstKey;
      Cal.selObjId   = newObj.id;
    }
    calDragInfo = null;
    renderMiniCanvases();
  };

  document.addEventListener('pointermove', onMove,      true);
  document.addEventListener('pointerup',   onUp,        true);
  document.addEventListener('touchmove',   onTouchMove, { capture: true, passive: true });
  document.addEventListener('touchend',    onTouchEnd,  { capture: true, passive: true });
}

// ドロップ先のセルとミニキャンバスを座標から探す
function findCalCellAt(cx, cy) {
  const cells = document.querySelectorAll('.cal-cell:not(.inactive)');
  for (const cell of cells) {
    const r = cell.getBoundingClientRect();
    if (cx >= r.left && cx <= r.right && cy >= r.top && cy <= r.bottom) {
      const mc = cell.querySelector('canvas[data-key]');
      if (mc) return { key: mc.dataset.key, mc };
    }
  }
  return null;
}

/**
 * セル全体のドラッグ&ドロップ
 * ゴースト表示後:
 *   - 指が動いたら → ドラッグ開始（メニュー非表示）
 *   - ゴースト表示中に指を離した（移動なし）→ コンテクストメニュー表示
 *   ※ オブジェクトなしのセルは何もしない
 */
function startCellDrag(e, srcKey, onNoMove, onDragStart) {
  const srcObjs = getCellObjs(srcKey);
  if (srcObjs.length === 0) return; // オブジェクトなし → 何もしない

  // ── ゴースト生成 ──
  const srcMc = document.querySelector(`.cell-preview canvas[data-key="${srcKey}"]`);
  const cssW  = srcMc ? srcMc.offsetWidth  || srcMc.clientWidth  || 60 : 60;
  const cssH  = srcMc ? srcMc.offsetHeight || srcMc.clientHeight || 60 : 60;

  const ghost = document.createElement('canvas');
  ghost.width  = cssW;
  ghost.height = cssH;
  ghost.style.cssText = `position:fixed;pointer-events:none;z-index:9999;
    width:${cssW}px;height:${cssH}px;
    opacity:0.85;transform:translate(-50%,-50%);transition:none;
    border-radius:4px;box-shadow:0 4px 16px rgba(0,0,0,.2);`;

  const gc = ghost.getContext('2d');
  gc.fillStyle = '#fff';
  gc.fillRect(0, 0, cssW, cssH);
  if (srcMc) gc.drawImage(srcMc, 0, 0, cssW, cssH);

  ghost.style.left = e.clientX + 'px';
  ghost.style.top  = e.clientY + 'px';
  document.body.appendChild(ghost);
  Cal.dragGhost = ghost;

  let dragging = false;
  let done     = false;

  const onTouchMove = ev => {
    if (!ev.touches[0]) return;
    const x = ev.touches[0].clientX, y = ev.touches[0].clientY;
    ghost.style.left = x + 'px';
    ghost.style.top  = y + 'px';
    if (!dragging && Math.hypot(x - e.clientX, y - e.clientY) > 6) {
      dragging = true; onDragStart();
    }
    document.querySelectorAll('.cal-cell.drag-over').forEach(c => c.classList.remove('drag-over'));
    if (dragging) {
      const dstCell = findCalCellAt(x, y);
      if (dstCell && dstCell.key !== srcKey) dstCell.mc.closest('.cal-cell')?.classList.add('drag-over');
    }
  };

  const onMove = ev => {
    const x = ev.clientX, y = ev.clientY;
    ghost.style.left = x + 'px';
    ghost.style.top  = y + 'px';
    if (!dragging && Math.hypot(x - e.clientX, y - e.clientY) > 6) {
      dragging = true; onDragStart();
    }
    document.querySelectorAll('.cal-cell.drag-over').forEach(c => c.classList.remove('drag-over'));
    if (dragging) {
      const dstCell = findCalCellAt(x, y);
      if (dstCell && dstCell.key !== srcKey) dstCell.mc.closest('.cal-cell')?.classList.add('drag-over');
    }
  };

  const cleanup = () => {
    document.removeEventListener('pointermove', onMove,      true);
    document.removeEventListener('pointerup',   onUp,        true);
    document.removeEventListener('touchmove',   onTouchMove, true);
    document.removeEventListener('touchend',    onTouchEnd,  true);
    document.querySelectorAll('.cal-cell.drag-over').forEach(c => c.classList.remove('drag-over'));
    if (Cal.dragGhost === ghost) { ghost.remove(); Cal.dragGhost = null; }
  };

  const onTouchEnd = ev => {
    if (done) return; done = true;
    const t = ev.changedTouches[0];
    cleanup();
    handleDrop(t.clientX, t.clientY);
  };

  const onUp = ev => {
    if (done) return; done = true;
    cleanup();
    handleDrop(ev.clientX, ev.clientY);
  };

  const handleDrop = (cx, cy) => {
    if (!dragging) { onNoMove(); return; }

    const dstCell = findCalCellAt(cx, cy);
    const dstKey  = dstCell?.key;
    if (!dstKey || dstKey === srcKey) { renderMiniCanvases(); return; }

    const dstObjsBefore = clone(getCellObjs(dstKey));
    setCellObjs(dstKey, clone(srcObjs));
    setCellObjs(srcKey, []);
    calPushUndo({ type: 'cal-cell-move', srcKey, dstKey, movedObjs: clone(srcObjs), dstObjsBefore });
    saveToStorage();
    Cal.selCellKey = null; Cal.selObjId = null;
    renderMiniCanvases();
  };

  document.addEventListener('pointermove', onMove,      true);
  document.addEventListener('pointerup',   onUp,        true);
  document.addEventListener('touchmove',   onTouchMove, { capture: true, passive: true });
  document.addEventListener('touchend',    onTouchEnd,  { capture: true, passive: true });
}

// オブジェクトの中心座標を更新
function setObjPosition(obj, nx, ny) {
  if (obj.type === 'pen') {
    let cx=0, cy=0, n=0;
    obj.paths.forEach(p=>p.points.forEach(pt=>{cx+=pt.x;cy+=pt.y;n++;}));
    if(n>0){cx/=n;cy/=n;}
    const dx=nx-cx, dy=ny-cy;
    obj.paths = obj.paths.map(p=>({...p, points:p.points.map(pt=>({x:pt.x+dx,y:pt.y+dy}))}));
  } else {
    obj.x = nx;
    obj.y = ny;
  }
}

// 同一セル内でオブジェクトを移動
function moveObjInCell(key, obj, nx, ny) {
  setObjPosition(obj, nx, ny);
  setCellObjs(key, getCellObjs(key));
}

function renderMiniCanvases(){
  let needsRetry = false;
  document.querySelectorAll('.cell-preview canvas').forEach(mc=>{
    const key=mc.dataset.key;
    const par=mc.parentElement;
    // clientWidthが0の場合はstyle.widthから取得（横長モード対応）
    let w=par.clientWidth, h=par.clientHeight;
    if(!w && par.style.width)  w  = parseInt(par.style.width);
    if(!h && par.style.height) h  = parseInt(par.style.height);
    if(!w||!h){ needsRetry = true; return; }
    mc.width=w; mc.height=h;
    const c2=mc.getContext('2d');
    const sc=Math.min(w/CANVAS_SRC,h/CANVAS_SRC);
    c2.save(); c2.scale(sc,sc);
    getCellObjs(key).forEach(o=>drawObjMini(c2,o));
    c2.restore();
    // 選択中オブジェクトのバウンディングボックスを描画
    if (Cal.selCellKey===key && Cal.selObjId) {
      const obj=getCellObjs(key).find(o=>o.id===Cal.selObjId);
      if (obj) drawMiniBBox(c2,obj,sc);
    }
  });
  if (needsRetry) setTimeout(renderMiniCanvases, 80);
}

function drawObjMini(c,obj){
  if (obj.type==='pen'){
    obj.paths.forEach(path=>{
      if(!path.points||path.points.length<2) return;
      c.save(); c.beginPath();
      c.strokeStyle=path.color; c.lineWidth=path.size;
      if (path.alpha != null) {
        c.globalAlpha = path.alpha;
        c.lineCap='square'; c.lineJoin='miter';
      } else {
        c.lineCap='round'; c.lineJoin='round';
      }
      c.moveTo(path.points[0].x,path.points[0].y);
      path.points.slice(1).forEach(pt=>c.lineTo(pt.x,pt.y));
      c.stroke(); c.restore();
    });
  } else if (obj.type==='text'){
    c.save();
    c.font=`${obj.size||16}px 'Noto Sans JP',sans-serif`;
    c.fillStyle=obj.color||'#1c1a18'; c.textBaseline='top';
    (obj.text||'').split('\n').forEach((l,i)=>c.fillText(l,obj.x,obj.y+i*(obj.size||16)*1.35));
    c.restore();
  } else if (obj.type==='sticker'){
    const img = imgCache[obj.stickerId];
    if (!img) return;
    const sz = obj.size || 44;
    const {w, h} = stickerDrawSize(img, sz);
    c.drawImage(img, obj.x - w/2, obj.y - h/2, w, h);
  } else if (obj.type==='clip'){
    const sz  = obj.size || 60;
    const w   = sz;
    const h   = sz * 1.2;
    const rx  = sz * 0.12;
    const x0  = obj.x - w/2;
    const y0  = obj.y - h/2;
    const isPdf = obj.fileType === 'application/pdf';
    c.save();
    // シャドウ
    c.shadowColor   = 'rgba(0,0,0,0.45)';
    c.shadowBlur    = sz * 0.4;
    c.shadowOffsetX = sz * 0.06;
    c.shadowOffsetY = sz * 0.10;
    // カード背景
    c.fillStyle = '#fff'; c.strokeStyle = '#3a6fa8'; c.lineWidth = 1.5;
    c.beginPath();
    c.moveTo(x0+rx,y0); c.lineTo(x0+w-rx,y0); c.quadraticCurveTo(x0+w,y0,x0+w,y0+rx);
    c.lineTo(x0+w,y0+h-rx); c.quadraticCurveTo(x0+w,y0+h,x0+w-rx,y0+h);
    c.lineTo(x0+rx,y0+h); c.quadraticCurveTo(x0,y0+h,x0,y0+h-rx);
    c.lineTo(x0,y0+rx); c.quadraticCurveTo(x0,y0,x0+rx,y0);
    c.closePath(); c.fill();
    c.shadowColor = 'transparent';
    c.stroke();
    // ヘッダー帯
    c.fillStyle = isPdf ? '#e03030' : '#3a6fa8';
    c.beginPath();
    c.moveTo(x0+rx,y0); c.lineTo(x0+w-rx,y0); c.quadraticCurveTo(x0+w,y0,x0+w,y0+rx);
    c.lineTo(x0+w,y0+h*0.32); c.lineTo(x0,y0+h*0.32); c.lineTo(x0,y0+rx);
    c.quadraticCurveTo(x0,y0,x0+rx,y0); c.closePath(); c.fill();
    // ラベル
    c.fillStyle='#fff'; c.font=`bold ${sz*0.22}px sans-serif`;
    c.textAlign='center'; c.textBaseline='middle';
    c.fillText(isPdf?'PDF':'IMG', obj.x, y0+h*0.16);
    // 横線
    c.strokeStyle='rgba(58,107,168,.3)'; c.lineWidth=1;
    [0.48,0.62,0.76].forEach(yr=>{
      c.beginPath(); c.moveTo(x0+w*0.15,y0+h*yr); c.lineTo(x0+w*0.85,y0+h*yr); c.stroke();
    });
    c.restore();
  }
}

/* ════ CELL CONTEXT MENU ════ */

/**
 * 長押し発火後にポインターを追跡して、離した位置のメニュー項目を実行する。
 * 指を離してから普通にクリックする従来操作も引き続き動作する。
 */
function attachLongPressMenuTracking(menuEl, initialX, initialY) {
  let hoveredItem = null;

  function itemAtPoint(x, y) {
    const items = menuEl.querySelectorAll('.ctx-item');
    for (const item of items) {
      const r = item.getBoundingClientRect();
      if (x >= r.left && x <= r.right && y >= r.top && y <= r.bottom) return item;
    }
    return null;
  }

  // 初期位置でのヒット確認
  if (initialX !== undefined && initialY !== undefined) {
    requestAnimationFrame(() => {
      const item = itemAtPoint(initialX, initialY);
      if (item) {
        hoveredItem = item;
        hoveredItem.classList.add('ctx-hover');
      }
    });
  }

  const onMove = e => {
    const item = itemAtPoint(e.clientX, e.clientY);
    if (item !== hoveredItem) {
      if (hoveredItem) hoveredItem.classList.remove('ctx-hover');
      hoveredItem = item || null;
      if (hoveredItem) hoveredItem.classList.add('ctx-hover');
    }
  };

  const onUp = e => {
    document.removeEventListener('pointermove', onMove, true);
    document.removeEventListener('pointerup',   onUp,   true);

    const item = hoveredItem || itemAtPoint(e.clientX, e.clientY);

    if (!item) {
      const r = menuEl.getBoundingClientRect();
      const inMenu = e.clientX >= r.left && e.clientX <= r.right &&
                     e.clientY >= r.top  && e.clientY <= r.bottom;
      if (!inMenu) closeContextMenus();
      return;
    }

    item.classList.remove('ctx-hover');
    item.click();
  };

  document.addEventListener('pointermove', onMove, true);
  document.addEventListener('pointerup',   onUp,   true);
}

function openCellCtx(e, key, longPress = false) {
  Cal.ctxCellKey = key;
  const m       = document.getElementById('ctx-cell');
  const isEmpty = getCellObjs(key).length === 0;

  m.style.left = e.clientX + 'px';
  m.style.top  = e.clientY + 'px';

  // 空セルはコピー・カット・削除を非表示
  document.getElementById('cctx-copy').style.display        = isEmpty ? 'none' : '';
  document.getElementById('cctx-cut').style.display         = isEmpty ? 'none' : '';
  document.getElementById('cctx-delete').style.display      = isEmpty ? 'none' : '';
  document.getElementById('ctx-cell').querySelector('.ctx-sep').style.display = isEmpty ? 'none' : '';
  // 貼り付け：クリップボードの種類に応じて表示
  document.getElementById('cctx-paste-cell').style.display  = (S.clipboard?.type === 'cell') ? '' : 'none';
  document.getElementById('cctx-paste-obj').style.display   = (S.clipboard?.type === 'obj')  ? '' : 'none';

  m.classList.add('open');
  if (longPress) attachLongPressMenuTracking(m, e.clientX, e.clientY);
}

function closeContextMenus(){
  document.getElementById('ctx-cell').classList.remove('open');
  document.getElementById('ctx-obj').classList.remove('open');
  document.getElementById('ctx-day-obj').classList.remove('open');
  document.getElementById('ctx-day-paste').classList.remove('open');
}
// メニュー外の pointerdown で閉じる
// グローバルなポインター状態追跡（isPointerStillDown用）
document.addEventListener('pointerdown',  () => { window._activePointer = true;  window._activeTouch = true;  }, true);
document.addEventListener('pointerup',    () => { window._activePointer = false; window._activeTouch = false; }, true);
document.addEventListener('pointercancel',() => { window._activePointer = false; window._activeTouch = false; }, true);
document.addEventListener('touchstart',   () => { window._activeTouch = true;  }, { capture: true, passive: true });
document.addEventListener('touchend',     () => { window._activeTouch = false; }, { capture: true, passive: true });
document.addEventListener('touchcancel',  () => { window._activeTouch = false; }, { capture: true, passive: true });

document.addEventListener('pointerdown', e => {
  if (!e.target.closest('.ctx-menu')) closeContextMenus();
});

// カレンダー画面セルメニュー操作
function execCalCellAction(action) {
  const key = Cal.ctxCellKey;
  if (!key) { closeContextMenus(); return; }

  if (action === 'copy') {
    S.clipboard = {type:'cell', data: clone(getCellObjs(key))};
  } else if (action === 'cut') {
    const before = clone(getCellObjs(key));
    S.clipboard = {type:'cell', data: before};
    // Undo: カットした全オブジェクトを個別にcal-deleteとして登録
    before.forEach(obj => calPushUndo({type:'cal-delete', key, obj: clone(obj)}));
    setCellObjs(key, []); saveToStorage(); renderMiniCanvases();
  } else if (action === 'paste-cell' && S.clipboard?.type === 'cell') {
    const newObjs = clone(S.clipboard.data);
    newObjs.forEach(obj => calPushUndo({type:'cal-create', key, obj: clone(obj)}));
    setCellObjs(key, newObjs); saveToStorage(); renderMiniCanvases();
  } else if (action === 'paste-obj' && S.clipboard?.type === 'obj') {
    const newObj = clone(S.clipboard.data);
    newObj.id = uid();
    if (newObj.type !== 'pen') { newObj.x += 20; newObj.y += 20; }
    calPushUndo({type:'cal-create', key, obj: clone(newObj)});
    const objs = getCellObjs(key);
    objs.push(newObj);
    setCellObjs(key, objs); saveToStorage();
    Cal.selCellKey = key; Cal.selObjId = newObj.id;
    renderMiniCanvases();
  } else if (action === 'delete') {
    const before = clone(getCellObjs(key));
    before.forEach(obj => calPushUndo({type:'cal-delete', key, obj: clone(obj)}));
    setCellObjs(key, []); saveToStorage(); renderMiniCanvases();
  }
  closeContextMenus();
}

// メニュー項目クリック時にブリンクしてから実行
function blinkAndExec(itemId, fn) {
  const el = document.getElementById(itemId);
  el.addEventListener('click', () => {
    el.classList.add('ctx-blink');
    el.addEventListener('animationend', () => {
      el.classList.remove('ctx-blink');
      fn();
    }, { once: true });
  });
}

blinkAndExec('cctx-copy',       () => execCalCellAction('copy'));
blinkAndExec('cctx-cut',        () => execCalCellAction('cut'));
blinkAndExec('cctx-paste-cell', () => execCalCellAction('paste-cell'));
blinkAndExec('cctx-paste-obj',  () => execCalCellAction('paste-obj'));
blinkAndExec('cctx-delete',     () => execCalCellAction('delete'));
blinkAndExec('octx-copy',       () => execCalObjAction('copy'));
blinkAndExec('octx-cut',        () => execCalObjAction('cut'));
blinkAndExec('octx-paste-obj',  () => execCalObjAction('paste-obj'));
blinkAndExec('octx-paste-cell', () => execCalObjAction('paste-cell'));
blinkAndExec('octx-delete',     () => execCalObjAction('delete'));

function openObjCtx(clientX, clientY, key, objId, longPress = false) {
  Cal.ctxObjKey  = key;
  Cal.ctxObjId   = objId;
  Cal.selCellKey = key;
  Cal.selObjId   = objId;

// カレンダー画面オブジェクトメニュー操作
function execCalObjAction(action) {
  const key   = Cal.ctxObjKey;
  const objId = Cal.ctxObjId;

  if (action === 'copy' && key && objId) {
    const obj = getCellObjs(key).find(o => o.id === objId);
    if (obj) S.clipboard = {type:'obj', data: clone(obj)};
  } else if (action === 'cut' && key && objId) {
    const objs = getCellObjs(key);
    const obj  = objs.find(o => o.id === objId);
    if (obj) {
      S.clipboard = {type:'obj', data: clone(obj)};
      calPushUndo({type:'cal-delete', key, obj: clone(obj)});
      setCellObjs(key, objs.filter(o => o.id !== objId));
      saveToStorage();
      Cal.selObjId = null; Cal.selCellKey = null;
      renderMiniCanvases();
    }
  } else if (action === 'paste-obj' && key && S.clipboard?.type === 'obj') {
    const newObj = clone(S.clipboard.data);
    newObj.id = uid();
    if (newObj.type !== 'pen') { newObj.x += 20; newObj.y += 20; }
    calPushUndo({type:'cal-create', key, obj: clone(newObj)});
    const objs = getCellObjs(key);
    objs.push(newObj);
    setCellObjs(key, objs); saveToStorage();
    Cal.selCellKey = key; Cal.selObjId = newObj.id;
    renderMiniCanvases();
  } else if (action === 'paste-cell' && key && S.clipboard?.type === 'cell') {
    const newObjs = clone(S.clipboard.data);
    newObjs.forEach(obj => calPushUndo({type:'cal-create', key, obj: clone(obj)}));
    setCellObjs(key, newObjs); saveToStorage();
    Cal.selObjId = null; Cal.selCellKey = null;
    renderMiniCanvases();
  } else if (action === 'delete' && key && objId) {
    const obj = getCellObjs(key).find(o => o.id === objId);
    if (obj) calPushUndo({type:'cal-delete', key, obj: clone(obj)});
    setCellObjs(key, getCellObjs(key).filter(o => o.id !== objId));
    saveToStorage();
    Cal.selObjId = null; Cal.selCellKey = null;
    renderMiniCanvases();
  }
  closeContextMenus();
}

/* ════ YEAR-MONTH DRUM PICKER ════ */
;(function() {
  const ITEM_H = 36;
  const YEAR_RANGE = 20; // 前後20年
  let isOpen = false;

  const picker   = document.getElementById('ym-picker');
  const backdrop = document.getElementById('ym-backdrop');
  const yearDrum = document.getElementById('ym-year-drum');
  const monthDrum= document.getElementById('ym-month-drum');

  // ドラムを構築
  function buildDrum(el, items, selectedIdx) {
    el.innerHTML = '';
    items.forEach((text, i) => {
      const div = document.createElement('div');
      div.className = 'ym-drum-item' + (i === selectedIdx ? ' selected' : '');
      div.textContent = text;
      el.appendChild(div);
    });
    // 選択項目が中央に来るようスクロール（アニメーションなし）
    el.scrollTop = selectedIdx * ITEM_H;
  }

  // スクロール終了後に選択値を読み取る
  function getSelected(el) {
    return Math.round(el.scrollTop / ITEM_H);
  }

  // selected クラスを更新
  function updateSelected(el) {
    const idx = getSelected(el);
    Array.from(el.children).forEach((c, i) => {
      c.classList.toggle('selected', i === idx);
    });
    return idx;
  }

  // ピッカーを開く
  window.openYMPicker = function() {
    if (isOpen) return;
    isOpen = true;
    const l = L();

    // 年リスト
    const baseYear = today.getFullYear();
    const years = [];
    for (let y = baseYear - YEAR_RANGE; y <= baseYear + YEAR_RANGE; y++) years.push(l.yearFmt(y));
    const yearIdx = S.year - (baseYear - YEAR_RANGE);

    // 月リスト
    const months = l.monthsFull;

    buildDrum(yearDrum,  years,  yearIdx);
    buildDrum(monthDrum, months, S.month);

    // cal-titleの位置を取得してピッカーを上に配置
    const titleRect = document.getElementById('cal-title').getBoundingClientRect();
    const pickerH = 180;
    const pickerW = 220;
    const margin = 8;
    const top = titleRect.top - pickerH - margin;
    const left = Math.max(8, Math.min(
      titleRect.left + titleRect.width/2 - pickerW/2,
      window.innerWidth - pickerW - 8
    ));

    picker.style.top  = Math.max(8, top) + 'px';
    picker.style.left = left + 'px';

    backdrop.classList.add('open');
    picker.classList.add('open');
  };

  window.closeYMPicker = function() {
    if (!isOpen) return;
    isOpen = false;
    // 選択値を確定
    const baseYear = today.getFullYear();
    const newYear  = (baseYear - YEAR_RANGE) + getSelected(yearDrum);
    const newMonth = getSelected(monthDrum);
    if (newYear !== S.year || newMonth !== S.month) {
      S.year = newYear;
      S.month = newMonth;
      renderCalendar();
      const area = document.getElementById('cal-grid-area');
      area.style.transition = 'none';
      area.style.opacity = '0';
      requestAnimationFrame(() => requestAnimationFrame(() => {
        area.style.transition = 'opacity 0.6s ease';
        area.style.opacity = '1';
        area.addEventListener('transitionend', () => {
          area.style.transition = '';
          area.style.opacity = '';
        }, { once: true });
      }));
    }
    backdrop.classList.remove('open');
    picker.classList.remove('open');
  };

  // スクロール中にselectedを更新
  let yearTimer, monthTimer;
  yearDrum.addEventListener('scroll', () => {
    updateSelected(yearDrum);
    clearTimeout(yearTimer);
    yearTimer = setTimeout(() => {
      // スナップ後の値を確定
      yearDrum.scrollTop = getSelected(yearDrum) * ITEM_H;
      updateSelected(yearDrum);
    }, 150);
  });
  monthDrum.addEventListener('scroll', () => {
    updateSelected(monthDrum);
    clearTimeout(monthTimer);
    monthTimer = setTimeout(() => {
      monthDrum.scrollTop = getSelected(monthDrum) * ITEM_H;
      updateSelected(monthDrum);
    }, 150);
  });

  // 背景タップで閉じる
  backdrop.addEventListener('click', () => window.closeYMPicker());
})();

// cal-title: シングルタップ→ピッカー、ダブルタップ→当月移動
;(function() {
  let lastTap = 0;
  let tapTimer = null;
  document.getElementById('cal-title').addEventListener('click', () => {
    const now = Date.now();
    if (now - lastTap < 350) {
      // ダブルタップ
      clearTimeout(tapTimer);
      lastTap = 0;
      const t = today;
      if (S.year === t.getFullYear() && S.month === t.getMonth()) return;
      S.year = t.getFullYear();
      S.month = t.getMonth();
      renderCalendar();
      const area = document.getElementById('cal-grid-area');
      area.style.transition = 'none';
      area.style.opacity = '0';
      requestAnimationFrame(() => requestAnimationFrame(() => {
        area.style.transition = 'opacity 0.6s ease';
        area.style.opacity = '1';
        area.addEventListener('transitionend', () => {
          area.style.transition = '';
          area.style.opacity = '';
        }, { once: true });
      }));
      return;
    }
    lastTap = now;
    // シングルタップ：350ms待ってダブルタップでなければピッカーを開く
    tapTimer = setTimeout(() => { openYMPicker(); }, 350);
  });
})();

// タブ名ダブルクリックでインライン編集
// タブ長押しで名前編集
(function() {
  let longPressTimer = null;

  function startTabEdit(tab) {
    if (tab.querySelector('.cal-tab-input')) return;
    const cal = calendars.find(c => c.id === tab.dataset.calId);
    if (!cal) return;
    const currentName = cal.name;
    tab.textContent = '';

    const input = document.createElement('input');
    input.className = 'cal-tab-input';
    input.value = currentName;
    input.style.width = Math.max(currentName.length * 9, 60) + 'px';
    tab.appendChild(input);
    input.focus();
    input.select();

    const commit = () => {
      const newName = input.value.trim() || currentName;
      cal.name = newName;
      saveToStorage();
      renderTabs();
    };
    input.addEventListener('blur', commit, { once: true });
    input.addEventListener('keydown', ev => {
      if (ev.key === 'Enter')  { ev.preventDefault(); input.blur(); }
      if (ev.key === 'Escape') { input.value = currentName; input.blur(); }
      requestAnimationFrame(() => {
        input.style.width = Math.max(input.value.length * 9, 60) + 'px';
      });
    });
  }

  document.getElementById('cal-tabs').addEventListener('pointerdown', e => {
    const tab = e.target.closest('.cal-tab');
    if (!tab) return;
    longPressTimer = setTimeout(() => {
      longPressTimer = null;
      startTabEdit(tab);
    }, 500);
  });

  document.getElementById('cal-tabs').addEventListener('pointerup', () => {
    if (longPressTimer) { clearTimeout(longPressTimer); longPressTimer = null; }
  });

  document.getElementById('cal-tabs').addEventListener('pointermove', () => {
    if (longPressTimer) { clearTimeout(longPressTimer); longPressTimer = null; }
  });
})();

/* ════ CALENDAR NAV ════ */
// 月切り替えスライドアニメーション
// dir: 'next'(翌月・右から入場) or 'prev'(前月・左から入場)
function navigateMonth(dir) {
  if (dir === 'next') {
    if(++S.month>11){S.month=0;S.year++;}
  } else {
    if(--S.month<0){S.month=11;S.year--;}
  }
  clearCalUR();

  const area = document.getElementById('cal-grid-area');
  const oldGrid = document.getElementById('cal-grid');

  // 旧グリッドをクローンして絶対位置で重ねる
  const clone = oldGrid.cloneNode(true);
  clone.id = 'cal-grid-old';
  clone.style.cssText = `position:absolute;top:0;left:0;width:${oldGrid.offsetWidth}px;pointer-events:none;`;
  area.appendChild(clone);

  // アニメーション中はoverflow:visibleにして両グリッドを表示
  area.style.overflow = 'visible';

  // 新グリッドをレンダリング
  renderCalendar();

  // アニメーションクラスを付与
  const inClass  = dir === 'next' ? 'slide-in-right' : 'slide-in-left';
  const outClass = dir === 'next' ? 'slide-out-left' : 'slide-out-right';

  requestAnimationFrame(() => requestAnimationFrame(() => {
    clone.classList.add(outClass);
    const newGrid = document.getElementById('cal-grid');
    newGrid.classList.add(inClass);

    const cleanup = () => {
      clone.remove();
      newGrid.classList.remove(inClass);
      area.style.overflow = '';
    };
    newGrid.addEventListener('animationend', cleanup, { once: true });
    setTimeout(cleanup, 500); // フォールバック
  }));
}

// カレンダーグリッドのフリックで月切り替え（touch events使用）
(function() {
  let startX = 0, startY = 0, startT = 0;
  const area = document.getElementById('cal-grid-area');

  area.addEventListener('touchstart', e => {
    if (e.touches.length !== 1) return;
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
    startT = Date.now();
  }, { passive: true });

  area.addEventListener('touchend', e => {
    if (e.changedTouches.length !== 1) return;
    try { if (calDragInfo) return; } catch(err) {}

    const dx = e.changedTouches[0].clientX - startX;
    const dy = e.changedTouches[0].clientY - startY;
    const dt = Math.max(1, Date.now() - startT);

    if (Math.abs(dy) > Math.abs(dx)) return;
    if (Math.abs(dx) < 30) return;
    if (Math.abs(dx) / dt < 0.2) return;

    if (dx < 0) {
      navigateMonth('next');
    } else {
      navigateMonth('prev');
    }
  }, { passive: true });
})();

document.getElementById('btn-prev').addEventListener('click', e => {
  navigateMonth('prev');
  e.currentTarget.blur();
});
document.getElementById('btn-next').addEventListener('click', e => {
  navigateMonth('next');
  e.currentTarget.blur();
});

function showScreen(name){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));

  if(map[name]) document.getElementById(map[name]).classList.add('active');
  S.screen=name;
  const ver=document.getElementById('_ver');
  if(ver) ver.style.display = name==='calendar' ? '' : 'none';
}

function updateOrientation(){
  const ds=document.getElementById('day-screen');
  if (IS_PHONE) {
    ds.classList.remove('landscape');
    ds.classList.add('portrait');
    return;
  }
  let lnd;
  if (screen.orientation) {
    lnd = screen.orientation.type.startsWith('landscape');
  } else {
    lnd = screen.width > screen.height;
  }
  ds.classList.toggle('landscape',lnd);
  ds.classList.toggle('portrait',!lnd);
}
