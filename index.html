/* ════ MINI CANVAS PREVIEW｜ミニキャンバスプレビュー ════
   責務: カレンダー画面の各セルに書き込み内容をサムネイル表示
   依存: RENDER（drawObj 系）、APP STATE（cellData）
════════════════════════════════════════════ */

// カレンダー画面でのオブジェクト選択状態

// テキストオブジェクトの実際の描画幅・高さを計測（CANVAS_SRC論理座標）
const _measureCtx = document.createElement('canvas').getContext('2d');
function measureTextObj(obj) {
  const lines = (obj.text || '').split('\n');
  const fs    = obj.size || 16;
  _measureCtx.font = `${fs}px 'Noto Sans JP', sans-serif`;
  const w = Math.max(...lines.map(l => _measureCtx.measureText(l).width));
  const h = lines.length > 1
    ? (lines.length - 1) * fs * 1.35 + fs
    : fs;
  return {w, h};
}

/**
 * ミニキャンバス上のオブジェクトの境界ボックスを返す（論理座標 CANVAS_SRC 空間）。
 * PAD は呼び出し側でなくここで一元管理する。
 * 戻り値: { x, y, w, h } — パディング込みの矩形
 * 取得不能な場合は null を返す。
 */
const MINI_PAD = 4; // バウンディングボックスのパディング（論理座標）

function getMiniObjBounds(obj) {
  if (obj.type === 'pen') {
    let x0=Infinity, y0=Infinity, x1=-Infinity, y1=-Infinity;
    obj.paths.forEach(p => p.points.forEach(pt => {
      x0=Math.min(x0,pt.x); y0=Math.min(y0,pt.y);
      x1=Math.max(x1,pt.x); y1=Math.max(y1,pt.y);
    }));
    if (!isFinite(x0)) return null;
    return { x: x0-MINI_PAD, y: y0-MINI_PAD, w: x1-x0+MINI_PAD*2, h: y1-y0+MINI_PAD*2 };
  }
  if (obj.type === 'text') {
    const { w, h } = measureTextObj(obj);
    return { x: obj.x-MINI_PAD, y: obj.y-MINI_PAD, w: w+MINI_PAD*2, h: h+MINI_PAD*2 };
  }
  if (obj.type === 'sticker') {
    const img = imgCache[obj.stickerId];
    const sz  = obj.size || 44;
    const { w, h } = img ? stickerDrawSize(img, sz) : { w: sz, h: sz };
    return { x: obj.x-w/2-MINI_PAD, y: obj.y-h/2-MINI_PAD, w: w+MINI_PAD*2, h: h+MINI_PAD*2 };
  }
  if (obj.type === 'clip') {
    const sz = obj.size || 60;
    const w  = sz * 1.3;
    const h  = sz * 1.3;
    return { x: obj.x-w/2-MINI_PAD, y: obj.y-h/2-MINI_PAD, w: w+MINI_PAD*2, h: h+MINI_PAD*2 };
  }
  return null;
}

// ミニキャンバス上のオブジェクトヒットテスト（論理座標 CANVAS_SRC 空間）
function miniHitObj(obj, lx, ly) {
  const b = getMiniObjBounds(obj);
  if (!b) return false;
  // ヒット判定は PAD を少し広めに取る
  const extra = 2;
  return lx >= b.x-extra && lx <= b.x+b.w+extra &&
         ly >= b.y-extra && ly <= b.y+b.h+extra;
}

// ミニキャンバス上にバウンディングボックスと×ボタンを描画
function drawMiniBBox(c, obj, sc) {
  const b = getMiniObjBounds(obj);
  if (!b) return;

  // バウンディングボックス（スクリーン座標に変換）
  const bx=b.x*sc, by=b.y*sc, bw=b.w*sc, bh=b.h*sc;

  c.save();
  c.strokeStyle='#3a6fa8'; c.lineWidth=1.5; c.setLineDash([4,2]);
  c.beginPath(); c.roundRect(bx, by, bw, bh, 5); c.stroke();
  c.setLineDash([]);

  // ×ボタン（バウンディングボックスの左上）
  const btnX = bx-4, btnY = by-4;
  c.fillStyle='#e03030';
  c.beginPath(); c.arc(btnX, btnY, 6, 0, Math.PI*2); c.fill();
  c.fillStyle='#fff'; c.font='bold 8px sans-serif';
  c.textAlign='center'; c.textBaseline='middle';
  c.fillText('×', btnX, btnY);
  c.restore();
}

// ×ボタンのヒットテスト（スクリーン座標）
function miniHitDeleteBtn(obj, sc, px, py) {
  const b = getMiniObjBounds(obj);
  if (!b) return false;
  const btnX = b.x*sc - 4;
  const btnY = b.y*sc - 4;
  return Math.hypot(px-btnX, py-btnY) < 10;
}

/* ════ CALENDAR OBJECT DRAG｜カレンダー画面オブジェクトD&D ════
   責務: カレンダー画面でのオブジェクトのセル間 D&D
   依存: CALENDAR SCREEN UNDO/REDO、MINI CANVAS PREVIEW
════════════════════════════════════════════ */

/**
 * ドラッグリスナーの共通登録ヘルパー
 * onMove/onTouchMove: 座標更新
 * onDrop(cx, cy): 指を離した座標で呼ばれる
 * onCancel: 2本指タッチでキャンセル時
 */
function makeDragListeners(ghost, { onMove, onTouchMove, onDrop, onCancel }) {
  let done = false;

  const cleanup = () => {
    document.removeEventListener('pointermove',  _onMove,       true);
    document.removeEventListener('pointerup',    _onUp,         true);
    document.removeEventListener('touchmove',    _onTouchMove,  true);
    document.removeEventListener('touchend',     _onTouchEnd,   true);
    document.removeEventListener('touchstart',   _onTouchStart, true);
    clearDragGhost(ghost);
  };

  const _onTouchStart = ev => {
    if (ev.touches.length >= 2 && !done) { done = true; cleanup(); onCancel && onCancel(); }
  };
  const _onTouchEnd = ev => {
    if (done) return; done = true;
    const t = ev.changedTouches[0];
    cleanup(); onDrop(t.clientX, t.clientY);
  };
  const _onUp = ev => {
    if (done) return; done = true;
    cleanup(); onDrop(ev.clientX, ev.clientY);
  };
  const _onMove      = onMove;
  const _onTouchMove = onTouchMove;

  document.addEventListener('pointermove',  _onMove,       true);
  document.addEventListener('pointerup',    _onUp,         true);
  document.addEventListener('touchmove',    _onTouchMove,  { capture:true, passive:true });
  document.addEventListener('touchend',     _onTouchEnd,   { capture:true, passive:true });
  document.addEventListener('touchstart',   _onTouchStart, { capture:true, passive:true });
}

function startCalDrag(e, srcKey, obj, onNoMove = null) {
  e.preventDefault();
  calDragInfo = {objId: obj.id, srcKey, origObj: clone(obj)};

  const miniMc = document.querySelector(`.cell-preview canvas[data-key="${srcKey}"]`);
  const miniRect = miniMc ? miniMc.getBoundingClientRect() : null;
  const ghostSize = miniRect ? Math.round(miniRect.width) : 80;
  const sc = ghostSize / CANVAS_SRC;

  const bounds = getMiniObjBounds(obj);
  const pad = 4;
  const bx = bounds ? bounds.x : 0;
  const by = bounds ? bounds.y : 0;
  const bw = bounds ? bounds.w : ghostSize;
  const bh = bounds ? bounds.h : ghostSize;

  const gw = Math.ceil((bw + pad*2) * sc);
  const gh = Math.ceil((bh + pad*2) * sc);

  const ghost = document.createElement('canvas');
  ghost.width  = gw;
  ghost.height = gh;
  ghost.style.cssText = `position:fixed;pointer-events:none;z-index:9999;
    width:${gw}px;height:${gh}px;
    opacity:0.75;transition:none;`;

  const gc = ghost.getContext('2d');
  gc.save();
  gc.translate((-bx + pad) * sc, (-by + pad) * sc);
  gc.scale(sc, sc);
  drawObjMini(gc, obj);
  gc.restore();

  const miniLeft = miniRect ? miniRect.left : 0;
  const miniTop  = miniRect ? miniRect.top  : 0;
  const plx = (e.clientX - miniLeft) / sc;
  const ply = (e.clientY - miniTop)  / sc;
  const offsetX = (plx - bx + pad) * sc;
  const offsetY = (ply - by + pad) * sc;

  const setPos = (cx, cy) => {
    ghost.style.left = (cx - offsetX) + 'px';
    ghost.style.top  = (cy - offsetY) + 'px';
  };
  setPos(e.clientX, e.clientY);
  document.body.appendChild(ghost);
  Cal.dragGhost = ghost;

  let dragging = false;
  let noMoveTimer = null;

  // ゴースト表示から400ms後、移動していなければonNoMove実行
  if (onNoMove) {
    noMoveTimer = setTimeout(() => {
      if (!dragging) {
        clearCalDragInfo();
        clearDragGhost(ghost);
        onNoMove();
      }
    }, 500);
  }

  const onTouchMove = ev => {
    if (!ev.touches[0]) return;
    const x = ev.touches[0].clientX, y = ev.touches[0].clientY;
    setPos(x, y);
    if (!dragging && Math.hypot(x - e.clientX, y - e.clientY) > 6) {
      dragging = true;
      if (noMoveTimer) { clearTimeout(noMoveTimer); noMoveTimer = null; }
    }
  };
  const onMove = ev => {
    const x = ev.clientX, y = ev.clientY;
    setPos(x, y);
    if (!dragging && Math.hypot(x - e.clientX, y - e.clientY) > 6) {
      dragging = true;
      if (noMoveTimer) { clearTimeout(noMoveTimer); noMoveTimer = null; }
    }
  };

  makeDragListeners(ghost, {
    onMove, onTouchMove,
    onCancel: () => { if (noMoveTimer) clearTimeout(noMoveTimer); clearCalDragInfo(); },
    onDrop: (cx, cy) => {
      if (noMoveTimer) { clearTimeout(noMoveTimer); noMoveTimer = null; }
      if (!dragging && onNoMove) { clearCalDragInfo(); onNoMove(); return; }
      if (!dragging)             { clearCalDragInfo(); return; }

      const dstCell = findCalCellAt(cx, cy);
      if (!dstCell) { clearCalDragInfo(); return; }

      const { key: dstKey, mc: dstMc } = dstCell;
      const srcObjs   = getCellObjs(calDragInfo.srcKey);
      const movingObj = srcObjs.find(o => o.id === calDragInfo.objId);
      if (!movingObj) { calDragInfo = null; return; }

      const r   = dstMc.getBoundingClientRect();
      const sc2 = Math.min(dstMc.width / CANVAS_SRC, dstMc.height / CANVAS_SRC);
      const rawNx = (cx - r.left) / r.width  * (dstMc.width  / sc2);
      const rawNy = (cy - r.top)  / r.height * (dstMc.height / sc2);
      // D案：ヘッダー裏に隠れないようキャンバス論理座標内にクランプ
      const MARGIN = CANVAS_SRC * 0.05; // 端から最低5%のマージン
      const nx = Math.max(MARGIN, Math.min(CANVAS_SRC - MARGIN, rawNx));
      const ny = Math.max(MARGIN, Math.min(CANVAS_SRC - MARGIN, rawNy));

      if (dstKey === calDragInfo.srcKey) {
        const origObj = clone(movingObj);
        moveObjInCell(calDragInfo.srcKey, movingObj, nx, ny);
        calPushUndo({ type:'cal-move', key:dstKey, objId:movingObj.id, from:origObj, to:clone(movingObj) });
      } else {
        const origObj = clone(movingObj);
        const newSrc  = srcObjs.filter(o => o.id !== movingObj.id);
        setCellObjs(calDragInfo.srcKey, newSrc);
        const newObj  = clone(movingObj);
        setObjPosition(newObj, nx, ny);
        const dstObjs = getCellObjs(dstKey);
        dstObjs.push(newObj);
        setCellObjs(dstKey, dstObjs);
        calPushUndo({ type:'cal-cross-move', srcKey:calDragInfo.srcKey, dstKey, origObj, newObj:clone(newObj) });
        Cal.selCellKey = dstKey;
        Cal.selObjId   = newObj.id;
      }
      clearCalDragInfo();
      renderMiniCanvases();
    }
  });
}

// ドロップ先のセルとミニキャンバスを座標から探す
function findCalCellAt(cx, cy) {
  const cells = document.querySelectorAll('.cal-cell:not(.inactive)');
  for (const cell of cells) {
    const r = cell.getBoundingClientRect();
    if (cx >= r.left && cx <= r.right && cy >= r.top && cy <= r.bottom) {
      const mc = cell.querySelector('canvas[data-key]');
      if (mc) return { key: mc.dataset.key, mc };
    }
  }
  return null;
}

/**
 * セル全体のドラッグ&ドロップ
 * ゴースト表示後:
 *   - 指が動いたら → ドラッグ開始（メニュー非表示）
 *   - ゴースト表示中に指を離した（移動なし）→ コンテクストメニュー表示
 *   ※ オブジェクトなしのセルは何もしない
 */
function startCellDrag(e, srcKey, onNoMove, onDragStart) {
  const srcObjs = getCellObjs(srcKey);
  if (srcObjs.length === 0) return; // オブジェクトなし → 何もしない

  // ── ゴースト生成 ──
  const srcMc   = document.querySelector(`.cell-preview canvas[data-key="${srcKey}"]`);
  const srcCell = srcMc?.closest('.cal-cell');
  const cellTop = srcCell?.querySelector('.cell-top');
  const isLand  = srcCell?.classList.contains('landscape-cell');
  const hdrRect = cellTop ? cellTop.getBoundingClientRect() : null;
  const hdrW    = isLand  ? Math.round(hdrRect?.width  || 0) : 0;
  const hdrH    = !isLand ? Math.round(hdrRect?.height || 0) : 0;
  const mcW     = srcMc ? srcMc.offsetWidth  || srcMc.clientWidth  || 60 : 60;
  const mcH     = srcMc ? srcMc.offsetHeight || srcMc.clientHeight || 60 : 60;
  const cssW    = mcW + hdrW;
  const cssH    = mcH + hdrH;

  const ghost = document.createElement('canvas');
  ghost.width  = cssW;
  ghost.height = cssH;
  ghost.style.cssText = `position:fixed;pointer-events:none;z-index:9999;
    width:${cssW}px;height:${cssH}px;
    opacity:0.85;transform:translate(-50%,-50%);transition:none;
    border-radius:4px;box-shadow:0 4px 16px rgba(0,0,0,.2);`;

  const gc = ghost.getContext('2d');
  gc.fillStyle = '#fff';
  gc.fillRect(0, 0, cssW, cssH);

  // ヘッダー部分：グラデーション背景のみ（テキストなし）
  if (!isLand && hdrH > 0) {
    // 縦長：上部にヘッダー（上→下グラデーション）
    const grad = gc.createLinearGradient(0, 0, 0, hdrH);
    grad.addColorStop(0, 'rgba(44,42,38,.10)');
    grad.addColorStop(1, 'rgba(44,42,38,0)');
    gc.fillStyle = grad;
    gc.fillRect(0, 0, cssW, hdrH);
  } else if (isLand && hdrW > 0) {
    // 横長：左側にヘッダー（左→右グラデーション）
    const grad = gc.createLinearGradient(0, 0, hdrW, 0);
    grad.addColorStop(0, 'rgba(44,42,38,.10)');
    grad.addColorStop(1, 'rgba(44,42,38,0)');
    gc.fillStyle = grad;
    gc.fillRect(0, 0, hdrW, cssH);
  }

  // 描画エリア
  if (srcMc) {
    if (isLand) gc.drawImage(srcMc, hdrW, 0, mcW, mcH);
    else        gc.drawImage(srcMc, 0, hdrH, mcW, mcH);
  }

  ghost.style.left = e.clientX + 'px';
  ghost.style.top  = e.clientY + 'px';
  document.body.appendChild(ghost);
  Cal.dragGhost = ghost;

  let dragging = false;
  let noMoveTimer = null;

  // ゴースト表示から400ms後、移動していなければonNoMove実行
  noMoveTimer = setTimeout(() => {
    if (!dragging) {
      document.querySelectorAll('.cal-cell.drag-over').forEach(c => c.classList.remove('drag-over'));
      clearDragGhost(ghost);
      onNoMove();
    }
  }, 500);

  const updateHighlight = (x, y) => {
    document.querySelectorAll('.cal-cell.drag-over').forEach(c => c.classList.remove('drag-over'));
    if (!dragging) return;
    const dstCell = findCalCellAt(x, y);
    if (dstCell && dstCell.key !== srcKey) dstCell.mc.closest('.cal-cell')?.classList.add('drag-over');
  };

  const onTouchMove = ev => {
    if (!ev.touches[0]) return;
    const x = ev.touches[0].clientX, y = ev.touches[0].clientY;
    ghost.style.left = x + 'px'; ghost.style.top = y + 'px';
    if (!dragging && Math.hypot(x - e.clientX, y - e.clientY) > 6) {
      dragging = true;
      if (noMoveTimer) { clearTimeout(noMoveTimer); noMoveTimer = null; }
      onDragStart();
    }
    updateHighlight(x, y);
  };
  const onMove = ev => {
    const x = ev.clientX, y = ev.clientY;
    ghost.style.left = x + 'px'; ghost.style.top = y + 'px';
    if (!dragging && Math.hypot(x - e.clientX, y - e.clientY) > 6) {
      dragging = true;
      if (noMoveTimer) { clearTimeout(noMoveTimer); noMoveTimer = null; }
      onDragStart();
    }
    updateHighlight(x, y);
  };

  makeDragListeners(ghost, {
    onMove, onTouchMove,
    onCancel: () => {
      if (noMoveTimer) clearTimeout(noMoveTimer);
      document.querySelectorAll('.cal-cell.drag-over').forEach(c => c.classList.remove('drag-over'));
    },
    onDrop: (cx, cy) => {
      if (noMoveTimer) { clearTimeout(noMoveTimer); noMoveTimer = null; }
      document.querySelectorAll('.cal-cell.drag-over').forEach(c => c.classList.remove('drag-over'));
      if (!dragging) { onNoMove(); return; }

      const dstCell = findCalCellAt(cx, cy);
      const dstKey  = dstCell?.key;
      if (!dstKey || dstKey === srcKey) { renderMiniCanvases(); return; }

      const dstObjsBefore = clone(getCellObjs(dstKey));
      setCellObjs(dstKey, clone(srcObjs));
      setCellObjs(srcKey, []);
      calPushUndo({ type:'cal-cell-move', srcKey, dstKey, movedObjs:clone(srcObjs), dstObjsBefore });
      saveToStorage();
      Cal.selCellKey = null; Cal.selObjId = null;
      renderMiniCanvases();
    }
  });
}

// オブジェクトの中心座標を更新
function setObjPosition(obj, nx, ny) {
  if (obj.type === 'pen') {
    let cx=0, cy=0, n=0;
    obj.paths.forEach(p=>p.points.forEach(pt=>{cx+=pt.x;cy+=pt.y;n++;}));
    if(n>0){cx/=n;cy/=n;}
    const dx=nx-cx, dy=ny-cy;
    obj.paths = obj.paths.map(p=>({...p, points:p.points.map(pt=>({x:pt.x+dx,y:pt.y+dy}))}));
  } else {
    obj.x = nx;
    obj.y = ny;
  }
}

// 同一セル内でオブジェクトを移動
function moveObjInCell(key, obj, nx, ny) {
  setObjPosition(obj, nx, ny);
  setCellObjs(key, getCellObjs(key));
}

/** カレンダー画面の全セルのミニキャンバスを再描画 */
function renderMiniCanvases(){
  let needsRetry = false;
  document.querySelectorAll('.cell-preview canvas').forEach(mc=>{
    const key=mc.dataset.key;
    const par=mc.parentElement;
    // clientWidthが0の場合はstyle.widthから取得（横長モード対応）
    let w=par.clientWidth, h=par.clientHeight;
    if(!w && par.style.width)  w  = parseInt(par.style.width);
    if(!h && par.style.height) h  = parseInt(par.style.height);
    if(!w||!h){ needsRetry = true; return; }
    mc.width=w; mc.height=h;
    const c2=mc.getContext('2d');
    const sc=Math.min(w/CANVAS_SRC,h/CANVAS_SRC);
    c2.save(); c2.scale(sc,sc);
    const now2 = performance.now();
    getCellObjs(key).forEach(o => {
      const isFading = Cal._fadeOut && Cal._fadeOut.id === o.id && Cal._fadeOut.key === key;
      if (isFading) {
        const alpha = Math.max(0, 1 - (now2 - Cal._fadeOut.start) / 200);
        c2.globalAlpha = alpha;
        drawObjMini(c2, o);
        c2.globalAlpha = 1;
      } else {
        drawObjMini(c2, o);
      }
    });
    c2.restore();
    // 選択中オブジェクトのバウンディングボックスを描画
    if (Cal.selCellKey===key && Cal.selObjId) {
      const obj=getCellObjs(key).find(o=>o.id===Cal.selObjId);
      if (obj) drawMiniBBox(c2,obj,sc);
    }
  });
  if (needsRetry) setTimeout(renderMiniCanvases, 80);
}

function drawObjMini(c,obj){
  if (obj.type==='pen'){
    obj.paths.forEach(path=>{
      if(!path.points||path.points.length<2) return;
      c.save(); c.beginPath();
      c.strokeStyle=path.color; c.lineWidth=path.size;
      if (path.alpha != null) {
        c.globalAlpha = path.alpha;
        c.lineCap='square'; c.lineJoin='miter';
      } else {
        c.lineCap='round'; c.lineJoin='round';
      }
      c.moveTo(path.points[0].x,path.points[0].y);
      path.points.slice(1).forEach(pt=>c.lineTo(pt.x,pt.y));
      c.stroke(); c.restore();
    });
  } else if (obj.type==='text'){
    c.save();
    c.font=`${obj.size||16}px 'Noto Sans JP',sans-serif`;
    c.fillStyle=obj.color||'#000000'; c.textBaseline='top';
    (obj.text||'').split('\n').forEach((l,i)=>c.fillText(l,obj.x,obj.y+i*(obj.size||16)*1.35));
    c.restore();
  } else if (obj.type==='sticker'){
    const img = imgCache[obj.stickerId];
    if (!img) return;
    const sz = obj.size || 44;
    const {w, h} = stickerDrawSize(img, sz);
    c.drawImage(img, obj.x - w/2, obj.y - h/2, w, h);
  } else if (obj.type==='clip'){
    const sz   = obj.size || 60;
    const w    = sz * 1.3;
    const h    = sz * 1.3;
    const fold = sz * 0.18;
    const rx   = sz * 0.08;
    const x0   = obj.x - w/2;
    const y0   = obj.y - h/2;
    c.save();
    c.shadowColor='rgba(0,0,0,0.25)'; c.shadowBlur=sz*0.25; c.shadowOffsetX=sz*0.04; c.shadowOffsetY=sz*0.07;
    c.fillStyle = '#fff9c4';
    c.beginPath();
    c.moveTo(x0+rx,y0); c.lineTo(x0+w-fold,y0);
    c.lineTo(x0+w,y0+fold); c.lineTo(x0+w,y0+h-rx);
    c.quadraticCurveTo(x0+w,y0+h,x0+w-rx,y0+h);
    c.lineTo(x0+rx,y0+h); c.quadraticCurveTo(x0,y0+h,x0,y0+h-rx);
    c.lineTo(x0,y0+rx); c.quadraticCurveTo(x0,y0,x0+rx,y0);
    c.closePath(); c.fill();
    c.shadowColor='transparent';
    c.strokeStyle='rgba(200,120,0,.9)'; c.lineWidth=Math.max(3, sz*0.06);
    c.beginPath();
    c.moveTo(x0+rx,y0); c.lineTo(x0+w-fold,y0);
    c.lineTo(x0+w,y0+fold); c.lineTo(x0+w,y0+h-rx);
    c.quadraticCurveTo(x0+w,y0+h,x0+w-rx,y0+h);
    c.lineTo(x0+rx,y0+h); c.quadraticCurveTo(x0,y0+h,x0,y0+h-rx);
    c.lineTo(x0,y0+rx); c.quadraticCurveTo(x0,y0,x0+rx,y0);
    c.closePath(); c.stroke();
    c.fillStyle = '#f9e44a';
    c.beginPath(); c.moveTo(x0+w-fold,y0); c.lineTo(x0+w,y0+fold); c.lineTo(x0+w-fold,y0+fold); c.closePath(); c.fill();
    c.fillStyle = '#5d4e00';
    drawClipLabel(c, obj.displayName || '', obj.x, obj.y, w, h, sz * 0.16);
    c.restore();
  }
}

/* ════ CELL CONTEXT MENU｜カレンダーセルコンテクストメニュー ════
   責務: カレンダーセル長押しで表示するコンテキストメニュー（貼り付けなど）

/**
 * 長押し発火後にポインターを追跡して、離した位置のメニュー項目を実行する。
 * 指を離してから普通にクリックする従来操作も引き続き動作する。
 */
/** 長押しメニューの指トラッキングを開始（離した位置の項目を実行） */
/** カレンダー画面のセルコンテクストメニューを表示 */
function openCellCtx(e, key) {
  Cal.ctxCellKey = key;
  const m       = $id('ctx-cell');
  const isEmpty = getCellObjs(key).length === 0;

  const mw = 200, mh = 200;
  m.style.left = Math.min(e.clientX, window.innerWidth  - mw - 8) + 'px';
  m.style.top  = Math.min(e.clientY, window.innerHeight - mh - 8) + 'px';

  // 空セルはコピー・カット・削除を非表示
  $id('cctx-copy').style.display        = isEmpty ? 'none' : '';
  $id('cctx-cut').style.display         = isEmpty ? 'none' : '';
  $id('cctx-delete').style.display      = isEmpty ? 'none' : '';
  $id('ctx-cell').querySelector('.ctx-sep').style.display = isEmpty ? 'none' : '';
  // 貼り付け：クリップボードの種類に応じて表示
  $id('cctx-paste-cell').style.display  = (S.clipboard?.type === 'cell') ? '' : 'none';
  $id('cctx-paste-obj').style.display   = (S.clipboard?.type === 'obj')  ? '' : 'none';

  // 繰り返し予定：日付セル（YYYY-MM-DD形式）のみ表示
  const isDateCell = /^\d{4}-\d{2}-\d{2}$/.test(key);
  const mmdd = key.slice(5); // YYYY-MM-DD → MM-DD
  const hasRepeat = isDateCell && !!S.repeatEvents[mmdd];
  $id('cctx-repeat-add').style.display = (isDateCell && !hasRepeat) ? '' : 'none';
  $id('cctx-repeat-del').style.display = hasRepeat ? '' : 'none';

  m.classList.add('open');
}

/** 全てのコンテクストメニューを閉じる */
function closeContextMenus(){
  $id('ctx-cell').classList.remove('open');
  $id('ctx-obj').classList.remove('open');
  $id('ctx-day-obj').classList.remove('open');
  $id('ctx-day-paste').classList.remove('open');
  $id('ctx-span-tab').classList.remove('open');
  $id('ctx-swatch-delete').classList.remove('open');
  window._hideClipTooltip && _hideClipTooltip();
}
// メニュー外の pointerdown で閉じる
document.addEventListener('pointerdown', e => {
  const spanTabMenu = $id('ctx-span-tab');
  if (spanTabMenu && spanTabMenu.classList.contains('open')) {
    if (!e.target.closest('.ctx-menu')) {
      e.stopImmediatePropagation(); // モード解除ハンドラへの伝播を止める
      closeContextMenus();
    }
    return;
  }
  if (!e.target.closest('.ctx-menu')) closeContextMenus();
}, { capture: true });

// カレンダー画面セルメニュー操作
function execCalCellAction(action) {
  const key = Cal.ctxCellKey;
  if (!key) { closeContextMenus(); return; }

  if (action === 'copy') {
    S.clipboard = {type:'cell', data: clone(getCellObjs(key))};
  } else if (action === 'cut') {
    const before = clone(getCellObjs(key));
    S.clipboard = {type:'cell', data: before};
    calPushUndo({type:'cal-cell-snapshot', key, before, after: []});
    commitCellObjs(key, []);
  } else if (action === 'paste-cell' && S.clipboard?.type === 'cell') {
    const before  = clone(getCellObjs(key));
    const newObjs = clone(S.clipboard.data);
    calPushUndo({type:'cal-cell-snapshot', key, before, after: clone(newObjs)});
    commitCellObjs(key, newObjs);
  } else if (action === 'paste-obj' && S.clipboard?.type === 'obj') {
    const before = clone(getCellObjs(key));
    const newObj = clone(S.clipboard.data);
    newObj.id = uid();
    if (newObj.type !== 'pen') { newObj.x += 20; newObj.y += 20; }
    const objs = getCellObjs(key);
    objs.push(newObj);
    calPushUndo({type:'cal-cell-snapshot', key, before, after: clone(objs)});
    commitCellObjs(key, objs, false);
    Cal.selCellKey = key; Cal.selObjId = newObj.id;
    renderMiniCanvases();
  } else if (action === 'delete') {
    const before = clone(getCellObjs(key));
    calPushUndo({type:'cal-cell-snapshot', key, before, after: []});
    commitCellObjs(key, []);
  }
}

// メニュー項目タップ → ブリンク → メニューを閉じる → 機能発動
function blinkAndExec(itemId, fn) {
  const el = $id(itemId);
  el.addEventListener('click', () => {
    el.classList.add('ctx-blink');
    el.addEventListener('animationend', () => {
      el.classList.remove('ctx-blink');
      closeContextMenus();
      fn();
    }, { once: true });
  });
}

  if (!spanId) return;

  setSpanEvents(events);
  saveToStorage();
  if (SpanMode.selectedSpanId === spanId) SpanMode.selectedSpanId = null;
  renderSpanOverlay();
});

/** カレンダー画面のオブジェクトコンテクストメニューを表示 */
function openObjCtx(clientX, clientY, key, objId) {
  Cal.ctxObjKey  = key;
  Cal.ctxObjId   = objId;
  Cal.selCellKey = key;
  Cal.selObjId   = objId;
  renderMiniCanvases();

  const m  = $id('ctx-obj');
  const mw = 220, mh = 200;
  m.style.left = Math.min(clientX, window.innerWidth  - mw - 8) + 'px';
  m.style.top  = Math.min(clientY, window.innerHeight - mh - 8) + 'px';
  const obj = getCellObjs(key).find(o => o.id === objId);
  $id('octx-preview').style.display     = (obj?.type === 'clip') ? '' : 'none';
  $id('octx-paste-obj').style.display  = (S.clipboard?.type==='obj')  ? '' : 'none';
  $id('octx-paste-cell').style.display = (S.clipboard?.type==='cell') ? '' : 'none';
  m.classList.add('open');

  // クリップオブジェクトの場合は吹き出し表示
  if (obj?.type === 'clip' && obj.displayName) {
    window._showClipTooltipForMenu && _showClipTooltipForMenu(obj, clientX, clientY, null);
  }
}

// カレンダー画面オブジェクトメニュー操作
function execCalObjAction(action) {
  const key   = Cal.ctxObjKey;
  const objId = Cal.ctxObjId;

  if (action === 'preview' && key && objId) {
    const obj = getCellObjs(key).find(o => o.id === objId);
    closeContextMenus();
    if (obj?.type === 'clip') openClipViewer(obj.clipId, obj.displayName);
    return;
  } else if (action === 'copy' && key && objId) {
    const obj = getCellObjs(key).find(o => o.id === objId);
    if (obj) S.clipboard = {type:'obj', data: clone(obj)};
  } else if (action === 'cut' && key && objId) {
    const objs = getCellObjs(key);
    const obj  = objs.find(o => o.id === objId);
    if (obj) {
      S.clipboard = {type:'obj', data: clone(obj)};
      calPushUndo({type:'cal-delete', key, obj: clone(obj)});
      setCellObjs(key, objs.filter(o => o.id !== objId));
      saveToStorage();
      Cal.selObjId = null; Cal.selCellKey = null;
      renderMiniCanvases();
    }
  } else if (action === 'paste-obj' && key && S.clipboard?.type === 'obj') {
    const newObj = clone(S.clipboard.data);
    newObj.id = uid();
    if (newObj.type !== 'pen') { newObj.x += 20; newObj.y += 20; }
    calPushUndo({type:'cal-create', key, obj: clone(newObj)});
    const objs = getCellObjs(key);
    objs.push(newObj);
    commitCellObjs(key, objs, false);
    Cal.selCellKey = key; Cal.selObjId = newObj.id;
    renderMiniCanvases();
  } else if (action === 'paste-cell' && key && S.clipboard?.type === 'cell') {
    const before  = clone(getCellObjs(key));
    const newObjs = clone(S.clipboard.data);
    calPushUndo({type:'cal-cell-snapshot', key, before, after: clone(newObjs)});
    commitCellObjs(key, newObjs, false);
    Cal.selObjId = null; Cal.selCellKey = null;
    renderMiniCanvases();
  } else if (action === 'delete' && key && objId) {
    const obj = getCellObjs(key).find(o => o.id === objId);
    if (obj) calPushUndo({type:'cal-delete', key, obj: clone(obj)});
    saveToStorage();
    Cal.selObjId = null; Cal.selCellKey = null;
    miniDeleteWithFade(key, objId);
  }
}

// 日付セル画面のオブジェクトメニュー操作を実行する共通関数
function execDayObjAction(action) {
  const objId = $id('ctx-day-obj')._targetObjId;
  const obj   = objId ? Draw.objects.find(o => o.id === objId) : null;

  if (action === 'edit' && obj) {
    closeContextMenus();
    if (obj.type === 'text') {
      showTextInput(obj.x, obj.y, obj);
    } else if (obj.type === 'clip') {
      const prev = clone(obj);
      showClipNameModal(name => {
        obj.displayName = name;
        pushUndo({type:'edit', objId: obj.id, from: prev, to: clone(obj)});
        flushAndRedraw();
      }, obj.displayName || '', () => { /* キャンセル：何もしない */ });
    }
    return;
  } else if (action === 'preview' && obj?.type === 'clip') {
    closeContextMenus();
    openClipViewer(obj.clipId, obj.displayName);
    return;
  } else if (action === 'cut' && obj) {
    S.clipboard = {type:'obj', data: clone(obj)};
    deleteObj(objId); Draw.selId = null;
  } else if (action === 'paste' && S.clipboard?.type === 'obj') {
    const newObj = clone(S.clipboard.data);
    newObj.id = uid();
    if (newObj.type !== 'pen') { newObj.x += 20; newObj.y += 20; }
    pushUndo({type:'create', obj: clone(newObj)});
    Draw.objects.push(newObj);
    Draw.selId = newObj.id;
    flushAndRedraw();
  } else if (action === 'delete' && objId) {
    deleteObj(objId); Draw.selId = null;
  }
}

/* ════ YEAR-MONTH DRUM PICKER｜年月ドラムピッカー ════
   責務: 年月をスクロールで選択するモーダル
   依存: APP STATE（S.year / S.month）、CALENDAR NAV（navigateMonth）
════════════════════════════════════════════ */
;(function() {
  const ITEM_H = 36;
  const YEAR_RANGE = 20; // 前後20年
  let isOpen = false;

  const picker   = $id('ym-picker');
  const backdrop = $id('ym-backdrop');
  const yearDrum = $id('ym-year-drum');
  const monthDrum= $id('ym-month-drum');

  // ドラムを構築
  function buildDrum(el, items, selectedIdx) {
    el.innerHTML = '';
    items.forEach((text, i) => {
      const div = document.createElement('div');
      div.className = 'ym-drum-item' + (i === selectedIdx ? ' selected' : '');
      div.textContent = text;
      el.appendChild(div);
    });
    // 選択項目が中央に来るようスクロール（アニメーションなし）
    el.scrollTop = selectedIdx * ITEM_H;
  }

  // スクロール終了後に選択値を読み取る
  function getSelected(el) {
    return Math.round(el.scrollTop / ITEM_H);
  }

  // selected クラスを更新
  function updateSelected(el) {
    const idx = getSelected(el);
    Array.from(el.children).forEach((c, i) => {
      c.classList.toggle('selected', i === idx);
    });
    return idx;
  }

  // ピッカーを開く
  window.openYMPicker = function() {
    if (isOpen) return;
    isOpen = true;
    const l = L();

    // 年リスト
    const baseYear = today.getFullYear();
    const years = [];
    for (let y = baseYear - YEAR_RANGE; y <= baseYear + YEAR_RANGE; y++) years.push(l.yearFmt(y));
    const yearIdx = S.year - (baseYear - YEAR_RANGE);

    // 月リスト
    const months = l.monthsFull;

    buildDrum(yearDrum,  years,  yearIdx);
    buildDrum(monthDrum, months, S.month);

    // cal-titleの位置を取得してピッカーを上に配置
    const titleRect = $id('cal-title').getBoundingClientRect();
    const pickerH = 180;
    const pickerW = 220;
    const margin = 8;
    const top = titleRect.top - pickerH - margin;
    const left = Math.max(8, Math.min(
      titleRect.left + titleRect.width/2 - pickerW/2,
      window.innerWidth - pickerW - 8
    ));

    picker.style.top  = Math.max(8, top) + 'px';
    picker.style.left = left + 'px';

    backdrop.classList.add('open');
    picker.classList.add('open');

    // display:none→block後にscrollTopがリセットされるため再設定
    requestAnimationFrame(() => {
      yearDrum.scrollTop  = yearIdx * ITEM_H;
      monthDrum.scrollTop = S.month * ITEM_H;
    });
  };

  window.closeYMPicker = function() {
    if (!isOpen) return;
    isOpen = false;
    // 選択値を確定
    const baseYear = today.getFullYear();
    const newYear  = (baseYear - YEAR_RANGE) + getSelected(yearDrum);
    const newMonth = getSelected(monthDrum);
    if (newYear !== S.year || newMonth !== S.month) {
      S.year = newYear;
      S.month = newMonth;
      renderCalendar();
      const area = $id('cal-grid-area');
      area.style.transition = 'none';
      area.style.opacity = '0';
      requestAnimationFrame(() => requestAnimationFrame(() => {
        area.style.transition = 'opacity 0.6s ease';
        area.style.opacity = '1';
        area.addEventListener('transitionend', () => {
          area.style.transition = '';
          area.style.opacity = '';
        }, { once: true });
      }));
    }
    backdrop.classList.remove('open');
    picker.classList.remove('open');
  };

  // スクロール中にselectedを更新
  let yearTimer, monthTimer;
  yearDrum.addEventListener('scroll', () => {
    updateSelected(yearDrum);
    clearTimeout(yearTimer);
    yearTimer = setTimeout(() => {
      // スナップ後の値を確定
      yearDrum.scrollTop = getSelected(yearDrum) * ITEM_H;
      updateSelected(yearDrum);
    }, 150);
  });
  monthDrum.addEventListener('scroll', () => {
    updateSelected(monthDrum);
    clearTimeout(monthTimer);
    monthTimer = setTimeout(() => {
      monthDrum.scrollTop = getSelected(monthDrum) * ITEM_H;
      updateSelected(monthDrum);
    }, 150);
  });

  // 背景タップで閉じる
  backdrop.addEventListener('click', () => window.closeYMPicker());
})();

// cal-title: シングルタップ→ピッカー、ダブルタップ→当月移動
;(function() {

    lastTap = now;
    // シングルタップ：350ms待ってダブルタップでなければピッカーを開く
    tapTimer = setTimeout(() => { openYMPicker(); }, TAP_INTERVAL);

/* ════ CALENDAR NAV｜カレンダーナビゲーション ════
   責務: 月遷移（navigateMonth）・カレンダータブ描画・フリック操作
   注意: navigateMonth 中は #cal-grid-old がDOMに残るため
         セル検索は必ず #cal-grid 配下のみを対象とする
   通知: navigateMonth の cleanup で calapp-month-navigated イベントを発行
         → D&D中の transitioning フラグはこのイベントで解除する
   依存: CALENDAR RENDERING、SPAN EVENTS（renderSpanOverlay）
════════════════════════════════════════════ */
// 月切り替えスライドアニメーション
// dir: 'next'(翌月・右から入場) or 'prev'(前月・左から入場)
let _monthNavigating = false; // 月遷移アニメーション中フラグ

// skipSpanHide=true: D&D中など期間枠を非表示にしない
function navigateMonth(dir, skipSpanHide = false) {
  // ─────────────────────────────────────────
  // navigateMonth: 月遷移スライドアニメーション
  //
  // 処理の流れ:
  //   [1] 期間選択状態の整理  → 遷移後の月に存在しないスパンを非アクティブ化
  //                             （リサイズD&D中は startKey/endKey が未確定のためスキップ）
  //   [2] S.year/S.month 更新 → 月をインクリメント/デクリメント
  //   [3] 旧グリッドをクローン → #cal-grid-old として DOM に追加
  //   [4] 新グリッドを生成    → renderCalendar() で #cal-grid を上書き
  //   [5] スライドアニメーション → rAF 2重でレイアウト確定後に開始
  //   [6] cleanup            → oldClone 除去・期間枠再描画・_monthNavigating=false
  //                             → calapp-month-navigated イベントを発行
  //                               D&D中の transitioning フラグはこのイベントで解除
  //
  // 注意: アニメーション中は #cal-grid-old が DOM に残る
  //       セル検索は必ず $id('cal-grid') 配下のみを対象とすること
  // ─────────────────────────────────────────
  if (_monthNavigating) return;
  _monthNavigating = true;

  // ── [1] 期間設定モード：遷移後の月に存在しないスパンを非アクティブ化 ──
  // 月またがり期間枠は選択状態を維持する
  // リサイズD&D中は startKey/endKey が未確定のため非アクティブ化しない
  if (SpanMode.active && SpanMode.selectedSpanId && !SpanMode.resizing) {
    const events = getSpanEvents();
    const ev = events.find(e => e.id === SpanMode.selectedSpanId);
    if (ev) {
      let ny = S.year, nm = S.month;
      if (dir === 'next') { nm++; if (nm > 11) { nm = 0; ny++; } }
      else                { nm--; if (nm < 0)  { nm = 11; ny--; } }
      const sd = new Date(ev.startKey + 'T00:00:00');
      const ed = new Date(ev.endKey   + 'T00:00:00');
      const spanInNewMonth =
        (sd.getFullYear() < ny || (sd.getFullYear() === ny && sd.getMonth() <= nm)) &&
        (ed.getFullYear() > ny || (ed.getFullYear() === ny && ed.getMonth() >= nm));
      if (!spanInNewMonth) {
        SpanMode.selectedSpanId = null;
      }
    }
  }

  // ── [2] S.year / S.month 更新 ──────────────────────
  if (dir === 'next') {
    if(++S.month>11){S.month=0;S.year++;}
  } else {
    if(--S.month<0){S.month=11;S.year--;}
  }
  clearCalUR();

  const area    = $id('cal-grid-area');
  const wrap    = $id('cal-wd-grid-wrap');
  const oldGrid = $id('cal-grid');

  // 期間枠を非表示（D&D中はスキップ）
  const spanOverlay  = $id('span-overlay');
  const spanTabLayer = $id('span-tab-layer');
  if (!skipSpanHide) {
    if (spanOverlay)  spanOverlay.style.display  = 'none';
    if (spanTabLayer) spanTabLayer.style.display = 'none';
  }

  // ── [3] 旧グリッドをクローンして絶対位置で重ねる ──
  const oldClone = oldGrid.cloneNode(true);
  oldClone.id = 'cal-grid-old';
  oldClone.style.cssText = `position:absolute;top:0;left:0;width:${oldGrid.offsetWidth}px;pointer-events:none;`;
  wrap.appendChild(oldClone);

  // アニメーション中は横はみ出しを防ぐ
  area.style.overflowX = 'hidden';

  // ── [4] 新グリッドをレンダリング ──────────────────
  renderCalendar();

  const inClass  = dir === 'next' ? 'slide-in-right' : 'slide-in-left';
  const outClass = dir === 'next' ? 'slide-out-left' : 'slide-out-right';

  // ── [5] スライドアニメーション開始（rAF 2重でレイアウト確定後） ──
  requestAnimationFrame(() => requestAnimationFrame(() => {
    oldClone.classList.add(outClass);
    const newGrid = $id('cal-grid');
    newGrid.classList.add(inClass);

    // ── [6] cleanup: oldClone 除去・期間枠再描画・_monthNavigating=false・イベント発行 ──
    const cleanup = () => {
      oldClone.remove();
      newGrid.classList.remove(inClass);
      area.style.overflowX = '';
      if (!skipSpanHide) {
        if (spanOverlay)  spanOverlay.style.display  = '';
        if (spanTabLayer) spanTabLayer.style.display = '';
      }
      renderSpanOverlay();
      _monthNavigating = false;
      // D&D中の月遷移フラグを解除（transitioning / newSpanTransitioning は
      // _monthNavigating ポーリングで解除されるが、cleanup が先に走る場合もあるため
      // ここでも明示的にイベントを発行して解除タイミングを保証する）
      window.dispatchEvent(new Event('calapp-month-navigated'));
    };
    newGrid.addEventListener('animationend', cleanup, { once: true });
    setTimeout(cleanup, 500);
  }));
}

// カレンダー画面のフリックで月切り替え（touch events使用）
(function() {
  let startX = 0, startY = 0, startT = 0;
  let hadMultiTouch = false;
  const area = $id('cal-screen');

  area.addEventListener('touchstart', e => {
    if (e.touches.length === 1) {
      // 1本指で開始 → フラグリセットして記録
      startX = e.touches[0].clientX;
      startY = e.touches[0].clientY;
      startT = Date.now();
      hadMultiTouch = false;
    } else {
      // 2本指以上になった → フラグを立てる
      hadMultiTouch = true;
    }
  }, { passive: true });

  area.addEventListener('touchend', e => {
    if (e.changedTouches.length !== 1) return;
    try { if (calDragInfo) return; } catch(err) {}
    if (hadMultiTouch) return; // ピンチ操作があったらフリックキャンセル
    if (SpanMode.dragging || SpanMode.resizing) return; // 期間枠D&D中はフリック無効
    if (_spanDragJustEnded) return; // 期間枠D&D完了直後はフリック無効
    if (_monthNavigating) return; // 月遷移アニメーション中はフリック無効
    if (_calDragJustEnded) return; // セルD&D完了直後はフリック無効
    if (_calGhostJustEnded) return; // クリップD&D完了直後はフリック無効

    const dx = e.changedTouches[0].clientX - startX;
    const dy = e.changedTouches[0].clientY - startY;
    const dt = Math.max(1, Date.now() - startT);

    if (Math.abs(dy) > Math.abs(dx)) return;
    if (Math.abs(dx) < 30) return;
    if (Math.abs(dx) / dt < 0.2) return;

    if (dx < 0) {
      navigateMonth('next');
    } else {
      navigateMonth('prev');
    }
  }, { passive: true });
})();

$id('btn-prev').addEventListener('click', e => {

  e.currentTarget.blur();
});
$id('btn-next').addEventListener('click', e => {

/* ════ SCREEN / ORIENTATION｜画面・向き検出 ════

function showScreen(name){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  const map={calendar:'cal-screen',day:'day-screen'};
  if(map[name]) $id(map[name]).classList.add('active');
  S.screen=name;
  const ver=$id('_ver');
  if(ver) ver.style.display = name==='calendar' ? '' : 'none';
}

function updateOrientation(){
  const ds=$id('day-screen');
  if (IS_PHONE) {
    ds.classList.remove('landscape');
    ds.classList.add('portrait');
    return;
  }
  let lnd;
  if (screen.orientation) {
    lnd = screen.orientation.type.startsWith('landscape');
  } else {
    lnd = screen.width > screen.height;
  }
  ds.classList.toggle('landscape',lnd);
  ds.classList.toggle('portrait',!lnd);
}

window.addEventListener('resize',()=>{
  // resizeはキーボード表示でも発火するのでsizeCanvasのみ（向き判定はしない）
  if(S.screen==='day') sizeCanvas();
  if(S.screen==='calendar') renderCalendar();
});

// 物理的な向き変更のみ検出（キーボード表示では発火しない）
const onOrientationChange = () => {
  setTimeout(() => {
    if(S.screen==='day'){updateOrientation();sizeCanvas();}
    if(S.screen==='calendar') renderCalendar();
  }, 100);
};
if (screen.orientation) {
  screen.orientation.addEventListener('change', onOrientationChange);
} else {
  window.addEventListener('orientationchange', onOrientationChange);
}

/* ════ SPAN MODE｜期間設定機能 ════
   責務: SpanMode 状態オブジェクトの定義・期間設定モードの起動・終了・
         カラーパレット・新規期間枠D&D・月遷移・initSpanVisible
   注意: const SpanMode はここで定義。SPAN EVENTS セクションの関数が
         実行時に参照するため動作上の問題はないが、定義順としては後方にある
   依存: SPAN EVENTS、CALENDAR NAV（navigateMonth）
════════════════════════════════════════════ */
const SpanMode = {
  active:         false,
  colorPicked:    true,
  color:          '#000000',
  dragging:       false,
  startKey:       null,
  currentKey:     null,
  selectedSpanId: null,
  ctxSpanId:      null,
  resizing:       false,
  resizeEnd:      null,
  resizeKey:      null,
};

/** 期間枠オブジェクト選択時にそのカラーをパレットに反映する */
function syncSpanPaletteToObj(ev) {
  const hex = ev.color;
  if (!hex) return;
  SpanMode.color = hex;
  addCustomColor(hex);
  buildSpanPalette();
}

// カラーパレットを生成
function buildSpanPalette() {
  const palette = $id('span-palette');
  palette.innerHTML = '';
  const customColors = loadCustomColors();
  const allColors = [
    ...PALETTE.map(c => ({hex: c.hex, fixed: true})),
    ...customColors.map(hex => ({hex, fixed: false})),
  ];

  allColors.forEach(({hex, fixed}) => {
    const sw = document.createElement('div');
    sw.className = 'swatch';
    sw.style.background = hex;
    sw.dataset.hex = hex;
    if (hex === SpanMode.color) sw.classList.add('on');
    sw.addEventListener('click', e => {
      e.stopPropagation();
      SpanMode.color = hex;
      palette.querySelectorAll('.swatch, .color-picker-btn').forEach(s => s.classList.remove('on'));
      sw.classList.add('on');
      $id('btn-span').style.setProperty('--span-color', hex);
    });
    if (!fixed) {
      // 長押し → コンテキストメニュー
      let timer = null;
      let startX = 0, startY = 0;
      sw.addEventListener('pointerdown', e => {
        startX = e.clientX; startY = e.clientY;
        timer = setTimeout(() => {
          const menu = $id('ctx-swatch-delete');
          menu.style.left = startX + 'px';
          menu.style.top  = startY + 'px';
          menu.classList.add('open');
          $id('sctx-swatch-delete').onclick = () => {
            const item = $id('sctx-swatch-delete');
            item.classList.add('ctx-blink');
            item.addEventListener('animationend', () => {
              item.classList.remove('ctx-blink');
              removeCustomColor(hex);
              if (SpanMode.color === hex) SpanMode.color = '#000000';
              closeContextMenus();
              buildSpanPalette();
            }, { once: true });
          };
        }, 500);
      });
      sw.addEventListener('pointerup',    () => clearTimeout(timer));
      sw.addEventListener('pointerleave', () => clearTimeout(timer));
    }
    palette.appendChild(sw);
  });

  // カラーピッカーボタン
  const pickerBtn = document.createElement('div');
  pickerBtn.className = 'color-picker-btn';
  pickerBtn.title = 'カラーピッカー';
  const pickerInput = document.createElement('input');
  pickerInput.type = 'color';
  pickerInput.value = SpanMode.color;
  pickerBtn.appendChild(pickerInput);
  pickerInput.addEventListener('change', e => {
    e.stopPropagation();
    const hex = e.target.value;
    addCustomColor(hex);
    SpanMode.color = hex;
    $id('btn-span').style.setProperty('--span-color', hex);
    buildSpanPalette();
  });
  pickerBtn.addEventListener('click', e => e.stopPropagation());
  palette.appendChild(pickerBtn);
}
(function() {
  buildSpanPalette();
})();

function hexToRgba(hex, a) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgba(${r}, ${g}, ${b}, ${a})`;
}

// 期間設定ボタン
/** 現在表示月のmonthKeyを返す */
function currentMonthKey() {
  return `${S.year}-${String(S.month + 1).padStart(2,'0')}`;
}

/** evのtabOffsetを現在月に設定 */
function setTabOffset(ev, px) {
  if (!ev.tabOffsets) ev.tabOffsets = {};
  ev.tabOffsets[currentMonthKey()] = px;
  ev.tabOffset = px; // 後方互換
}

/** evのtabOffsetを現在月でリセット */
function resetTabOffset(ev) {
  if (!ev.tabOffsets) ev.tabOffsets = {};
  ev.tabOffsets[currentMonthKey()] = 0;
  ev.tabOffset = 0;
}

/** 期間オブジェクト表示/非表示を切り替える */
function toggleSpanVisible() {
  S.spanVisible = !S.spanVisible;
  const bar      = $id('cal-span-bar');
  const wrap     = $id('cal-span-bar-wrap');
  const showBtn  = $id('btn-span-show');
  const overlay  = $id('span-overlay');
  const tabLayer = $id('span-tab-layer');

  if (!S.spanVisible) {
    // 非表示：バーをスライドアップ + 期間枠フェードアウト（同時）
    bar.classList.add('span-hidden');
    if (overlay)  { overlay.style.transition = 'opacity 0.4s ease'; overlay.style.opacity = '0'; }
    if (tabLayer) { tabLayer.style.transition = 'opacity 0.4s ease'; tabLayer.style.opacity = '0'; }
    setTimeout(() => {
      if (overlay)  { overlay.style.pointerEvents = 'none'; overlay.style.transition = ''; }
      if (tabLayer) { tabLayer.style.pointerEvents = 'none'; tabLayer.style.transition = ''; }
    }, 400);
    showBtn.classList.add('visible');
  } else {
    // 表示：バーをスライドダウン + 期間枠フェードイン（同時）
    bar.classList.remove('span-hidden');
    // renderSpanOverlay は S.spanVisible === false の場合に早期 return するため、
    // フラグを true に戻した後に呼び出して SVG を描画してからフェードインする
    renderSpanOverlay();
    if (overlay)  { overlay.style.transition = 'opacity 0.4s ease'; overlay.style.opacity = '1'; overlay.style.pointerEvents = ''; }
    if (tabLayer) { tabLayer.style.transition = 'opacity 0.4s ease'; tabLayer.style.opacity = '1'; tabLayer.style.pointerEvents = ''; }
    setTimeout(() => {
      if (overlay)  overlay.style.transition = '';
      if (tabLayer) tabLayer.style.transition = '';
    }, 400);
    showBtn.classList.remove('visible');
  }
}

// 初期化：wrapの高さをbarの高さに固定（スペーサーとして機能させる）
(function initSpanVisible() {
  const bar  = $id('cal-span-bar');
  const wrap = $id('cal-span-bar-wrap');
  // barはabsolute配置なのでwrapに高さを明示的にセット
  requestAnimationFrame(() => {
    wrap.style.height = bar.offsetHeight + 'px';
  });
  if (!S.spanVisible) {
    const overlay  = $id('span-overlay');
    const tabLayer = $id('span-tab-layer');
    bar.classList.add('span-hidden');
    if (overlay)  { overlay.style.opacity = '0'; overlay.style.pointerEvents = 'none'; }
    if (tabLayer) { tabLayer.style.opacity = '0'; tabLayer.style.pointerEvents = 'none'; }
    $id('btn-span-show').classList.add('visible');
  }
})();

$id('btn-span-toggle').addEventListener('click', () => toggleSpanVisible());
$id('btn-span-show').addEventListener('click',   () => toggleSpanVisible());

$id('btn-span').addEventListener('click', e => {
  e.stopPropagation();
  if (SpanMode.active) {
    // 既にアクティブ → 解除
    exitSpanMode();
  } else {
    // アクティブ化
    SpanMode.active      = true;
    // colorPickedは常にtrue（モード中は常にD&D可能）
    $id('btn-span').classList.add('active');
    $id('btn-span').style.setProperty('--span-color', SpanMode.color);
    $id('span-palette').classList.add('open');
    // 現在の選択色に .on を付ける（常に表示）
    document.querySelectorAll('#span-palette .swatch').forEach(s => {
      s.classList.toggle('on', s.dataset.hex === SpanMode.color);
    });
    $id('btn-settings').style.visibility  = 'hidden';
    $id('cal-nav-right').style.visibility = 'hidden';

    // 期間バーが非表示かつ期間オブジェクトが存在する場合 → 表示状態に戻す
    const toggleBtn = $id('btn-span-toggle');
    const isToggleBtnVisible = toggleBtn && toggleBtn.style.visibility !== 'hidden';
    if (!S.spanVisible && isToggleBtnVisible) {
      toggleSpanVisible();
    }

    setHeaderColor(SPAN_MODE_HEADER_COLOR);
    $id('cal-header-nav').style.boxShadow = '-2px -6px 6px rgba(0,0,0,.12), 2px -6px 6px rgba(0,0,0,.12)';
    $id('hdr-month').style.color = '#fff';
    $id('hdr-year').style.color  = '#fff';
    $id('btn-prev').style.color  = '#fff';
    $id('btn-next').style.color  = '#fff';
    document.querySelectorAll('.cal-tab').forEach(t => {
      t.style.color       = '#fff';
      t.style.borderColor = 'transparent';
      t.style.boxShadow   = '-2px -6px 6px rgba(0,0,0,.12), 2px -6px 6px rgba(0,0,0,.12)';
      t.style.clipPath    = 'inset(-20px -20px 0 -20px)';
    });
    document.querySelectorAll('.cal-tab:not(.active)').forEach(t => t.style.display = 'none');
    renderSpanOverlay();
  }
});

// 期間設定モード解除は btn-span タップのみ（btn-span の click ハンドラで処理）

// カレンダーヘッダー一体化グループの背景色を一括変更
// 対象：タブバー(border-bottom) / カレンダータブ(background・border-bottom) /
//        月ナビバー(background) / cal-tab-border-eraser(background)
// color='' で元の状態にリセット
// 期間設定モード中のヘッダー一体化グループの色定数
const SPAN_MODE_HEADER_COLOR = '#1a1a2e'; // 月ナビバー・カレンダータブ・eraserの背景色
const SPAN_MODE_TABBAR_BG    = '#ffffff'; // タブバー背景色（通常と同じ白）

function setHeaderColor(color) {
  const isReset = color === '';
  $id('cal-header-top').style.background        = isReset ? '' : SPAN_MODE_TABBAR_BG;
  $id('cal-header-top').style.borderBottomColor = color;
  $id('cal-header-nav').style.background        = color;
  const eraser = $id('cal-tab-border-eraser');
  if (eraser) eraser.style.background = color;
  document.querySelectorAll('.cal-tab').forEach(t => {
    t.style.background        = color;
    t.style.borderBottomColor = color;
  });
}

function exitSpanMode() {
  SpanMode.active         = false;
  SpanMode.colorPicked    = true;
  SpanMode.dragging       = false;
  SpanMode.selectedSpanId = null;
  SpanMode.startKey       = null;
  SpanMode.currentKey     = null;
  SpanMode.selectedSpanId = null;
  SpanMode.resizing       = false;
  SpanMode.resizeEnd      = null;
  SpanMode.resizeKey      = null;
  $id('btn-span').classList.remove('active');
  $id('btn-span').style.removeProperty('--span-color');
  $id('span-palette').classList.remove('open');
  $id('btn-settings').style.visibility  = '';
  $id('cal-nav-right').style.visibility = '';

  setHeaderColor('');
  $id('cal-header-nav').style.boxShadow = '';
  $id('hdr-month').style.color = '';
  $id('hdr-year').style.color  = '';
  $id('btn-prev').style.color  = '';
  $id('btn-next').style.color  = '';
  document.querySelectorAll('.cal-tab').forEach(t => {
    t.style.color       = '';
    t.style.borderColor = '';
    t.style.boxShadow   = '';
    t.style.clipPath    = '';
    t.style.display     = '';
  });
  $id('cal-tabs').style.visibility = '';
  $id('span-mode-overlay').classList.remove('active');
  renderSpanOverlay();
}

// 期間設定モード中のポインターイベント
(function() {
  const area = $id('cal-grid-area');

  area.addEventListener('pointerdown', e => {
    if (!SpanMode.active) return;
    if (e.button > 0) return;
    // リサイズボタン・タブは各自のハンドラに委ねる
    if ($id('span-tab-layer').contains(e.target)) return;
    if (e.target.closest && e.target.closest('.span-resize-btn')) return;

    e.preventDefault();
    e.stopImmediatePropagation();

    const key = getCellKeyAt(e.clientX, e.clientY);

    // キーなし（空白・枠線上など）
    if (!key) {
      // アクティブあり → 非アクティブ化
      if (SpanMode.selectedSpanId) {
        SpanMode.selectedSpanId = null;
        renderSpanOverlay();
      }
      return;
    }

    // 日付セル上にいる
    // アクティブな期間オブジェクトがある場合 → 非アクティブ化のみ
    if (SpanMode.selectedSpanId) {
      SpanMode.selectedSpanId = null;
      renderSpanOverlay();
      return;
    }

    // pointerdown 直後からプレビュー表示開始
    SpanMode.dragging   = true;
    SpanMode.startKey   = key;
    SpanMode.currentKey = key;
    renderSpanOverlay();

    const downX = e.clientX, downY = e.clientY;
    let moved = false;

    const startTime = Date.now();
    // ── 月遷移コンテキスト（checkSpanDragMonthTransition 共通関数に渡す） ──
    const newSpanCtx = {
      transitioning:  false,
      triggerArmed:   true,
      onKeyConfirmed: (dir, newDateKeys) => {
        // 新規D&D固有：両方向遷移可能
        // prev（前月）の場合、前月末日が startKey より前なら遷移しない
        if (dir === 'prev') {
          const candidateKey = newDateKeys[newDateKeys.length - 1]; // 前月末日
          if (candidateKey < SpanMode.startKey) return false;
          SpanMode.currentKey = candidateKey;
        } else {
          SpanMode.currentKey = newDateKeys[0]; // 翌月先頭日
        }
        moved = true;
      },
    };

    const onMove = mv => {
      if (!SpanMode.dragging) return;
      if (newSpanCtx.transitioning) return;
      checkSpanDragMonthTransition(mv, newSpanCtx);
      if (newSpanCtx.transitioning) return;
      const k = getCellKeyAt(mv.clientX, mv.clientY);
      if (k && k !== SpanMode.currentKey) {
        // 始点より前のキーには移動させない（左方向ドラッグ無効）
        if (k < SpanMode.startKey) return;
        moved = true;
        SpanMode.currentKey = k;
        renderSpanOverlay();
      }
    };

    const onUp = (upEvent) => {
      document.removeEventListener('pointermove', onMove);
      if (!SpanMode.dragging) return;
      SpanMode.dragging = false;
      // 期間枠D&D完了直後のフリック誤検知を防ぐ（touchend より先に onUp が走るため）
      _spanDragJustEnded = true;
      setTimeout(() => { _spanDragJustEnded = false; }, 300);

      // フリック判定：短時間で大きく横移動した場合はキャンセル（月遷移フリックと区別）
      // ただし moved=true（実際に期間を伸ばした）場合はフリックと区別してキャンセルしない
      const dt = Date.now() - startTime;
      const dx = upEvent ? Math.abs(upEvent.clientX - downX) : 0;
      const dy = upEvent ? Math.abs(upEvent.clientY - downY) : 0;
      if (!moved && dx > 30 && dy < dx && dt < 500) {
        SpanMode.startKey   = null;
        SpanMode.currentKey = null;
        renderSpanOverlay();
        return;
      }

      // タップのみ（移動なし）でも startKey == currentKey の1日期間枠として続行

      const startKey = SpanMode.startKey;
      const endKey   = SpanMode.currentKey;

      // 日付順に正規化（月またがりの場合 getKeysBetween は使えないので文字列比較）
      const realStart = startKey <= endKey ? startKey : endKey;
      const realEnd   = startKey <= endKey ? endKey   : startKey;
      if (!realStart || !realEnd) { renderSpanOverlay(); return; }

      // 予定名入力モーダル表示
      showSpanNameModal(name => {
        const newId = 'span-' + Date.now();
        const ev = {
          id:        newId,
          startKey:  realStart,
          endKey:    realEnd,
          color:     SpanMode.color,
          name:      name,
          tabOffset: 0,
        };
        const events = getSpanEvents();
        events.push(ev);
        setSpanEvents(events);
        saveToStorage();
        // 作成した期間をアクティブに
        SpanMode.selectedSpanId = newId;
        SpanMode.dragging   = false;
        SpanMode.startKey   = null;
        SpanMode.currentKey = null;
        renderSpanOverlay();
        // rAF×2後に再描画して firstVisit による重なり回避を確実に実行
        requestAnimationFrame(() => requestAnimationFrame(() => renderSpanOverlay()));

        // 新規タブと既存タブの重なり回避（rAF×2後にレイアウト確定してから実行）
        requestAnimationFrame(() => requestAnimationFrame(() => {
          const newTabEl = $id('span-tab-layer').querySelector(`[data-span-id="${newId}"]`);
          if (!newTabEl) return;
          const areaRect = $id('cal-grid-area').getBoundingClientRect();
          const toRel = r => ({
            left:   r.left   - areaRect.left,
            right:  r.right  - areaRect.left,
            top:    r.top    - areaRect.top,
            bottom: r.bottom - areaRect.top,
          });
          const PAD = 3.75;
          const firstRect = getCellRect(ev.startKey);
          if (!firstRect) return; // レイアウト未確定の場合はスキップ
          let firstRowLastKey = ev.startKey;
          const evKeys = getKeysBetween(ev.startKey, ev.endKey);
          for (const k of evKeys) {
            firstRowLastKey = k;
            if (new Date(k).getDay() === 6) break;
          }
          const firstRowLastRect = getCellRect(firstRowLastKey);
          const newX1 = firstRect.left + PAD;
          const newX2 = firstRowLastRect ? firstRowLastRect.right - PAD : newX1;
          const tabW  = newTabEl.offsetWidth;
          const newTabMaxPx = Math.max(0, (newX2 - newX1) - tabW);
          let myRel = toRel(newTabEl.getBoundingClientRect());
          let curLeft = parseFloat(newTabEl.style.left);
          $id('span-tab-layer').querySelectorAll('.span-tab').forEach(other => {
            if (other === newTabEl) return;
            const or = toRel(other.getBoundingClientRect());
            const overlapX = myRel.left < or.right  && myRel.right  > or.left;
            const overlapY = myRel.top  < or.bottom && myRel.bottom > or.top;
            if (!(overlapX && overlapY)) return;
            const gapRight = or.right  - myRel.left;
            const gapLeft  = myRel.right - or.left;
            let newLeft = curLeft;
            if (gapRight <= gapLeft) {
              newLeft = curLeft + gapRight + 4;
            } else {
              newLeft = curLeft - gapLeft  - 4;
            }
            newLeft = Math.max(newX1, Math.min(newX1 + newTabMaxPx, newLeft));
            setTabOffset(ev, newLeft - newX1);
            newTabEl.style.left   = newLeft + 'px';
            const tw = myRel.right - myRel.left;
            myRel.left  = newLeft;
            myRel.right = newLeft + tw;
            curLeft     = newLeft;
          });
          // tabOffset変更があれば保存
          const evList = getSpanEvents();
          const evObj  = evList.find(e => e.id === newId);
          if (evObj) { evObj.tabOffsets = ev.tabOffsets; evObj.tabOffset = ev.tabOffset; setSpanEvents(evList); saveToStorage(); }
        }));
      }, () => {
        // キャンセル → モード継続
        SpanMode.dragging   = false;
        SpanMode.startKey   = null;
        SpanMode.currentKey = null;
        renderSpanOverlay();
      });
    };

    // touchmove も登録（iOS Safariでpointermoveが発火しない場合の対策）
    const onTouchMove = mv => {
      if (mv.touches.length !== 1) return;
      onMove({ clientX: mv.touches[0].clientX, clientY: mv.touches[0].clientY });
    };
    const onTouchEnd = mv => {
      document.removeEventListener('touchmove', onTouchMove);
      document.removeEventListener('touchend', onTouchEnd);
      onUp();
    };
    document.addEventListener('pointermove', onMove);
    document.addEventListener('pointerup', onUp, { once: true });
    document.addEventListener('touchmove', onTouchMove, { passive: true });
    document.addEventListener('touchend', onTouchEnd, { once: true });
  }, { capture: true });

})();

// 予定名入力モーダル
function showRepeatEventModal(onOk) {
  const modal = $id('span-name-modal');
  const input = $id('span-name-input');
  const okBtn = $id('span-name-ok');
  const canBtn = $id('span-name-cancel');
  const title = $id('span-name-title');

  title.textContent = '繰り返し予定を追加';
  input.placeholder = '予定名（例：クロさんBD）';
  okBtn.textContent  = 'OK';
  canBtn.textContent = 'キャンセル';

  input.value = '';
  modal.classList.add('open');
  setTimeout(() => input.focus(), 50);

  const close = () => {
    modal.classList.remove('open');
    okBtn.removeEventListener('click', doOk);
    canBtn.removeEventListener('click', doCancel);
    input.removeEventListener('keydown', onKey);
  };
  const doOk = () => {
    const name = input.value.trim();
    if (!name) { input.focus(); return; }
    close();
    onOk(name);
  };
  const doCancel = () => close();
  const onKey = e => {
    if (e.key === 'Enter' && !e.isComposing) doOk();
    if (e.key === 'Escape') doCancel();
  };
  okBtn.addEventListener('click',  doOk);
  canBtn.addEventListener('click', doCancel);
  input.addEventListener('keydown', onKey);
}

function showSpanNameModal(onOk, onCancel, initialValue = '') {
  const l     = L();
  const modal = $id('span-name-modal');
  const input = $id('span-name-input');
  const okBtn = $id('span-name-ok');
  const canBtn = $id('span-name-cancel');
  const title = $id('span-name-title');

  title.textContent = l.lang === 'en' ? 'Enter event name' : '予定名を入力';
  input.placeholder = l.lang === 'en' ? 'Event name (required)' : '予定名（必須）';
  okBtn.textContent  = 'OK';
  canBtn.textContent = l.lang === 'en' ? 'Cancel' : 'キャンセル';

  input.value = initialValue;
  modal.classList.add('open');
  setTimeout(() => input.focus(), 50);

  const close = () => {
    modal.classList.remove('open');
    okBtn.removeEventListener('click', doOk);
    canBtn.removeEventListener('click', doCancel);
    input.removeEventListener('keydown', onKey);
  };

  const doOk = () => {
    const name = input.value.trim();
    if (!name) {
      // 空欄の場合は既存の名前を復元してダイアログ継続
      input.value = initialValue;
      input.select();
      input.focus();
      return;
    }
    close();
    onOk(name);
  };
  const doCancel = () => { close(); onCancel && onCancel(); };
  const onKey = e => {
    if (e.key === 'Enter' && !e.isComposing) doOk();
    if (e.key === 'Escape') doCancel();
  };

  okBtn.addEventListener('click', doOk);
  canBtn.addEventListener('click', doCancel);
  input.addEventListener('keydown', onKey);
}

/* ════ PC HOVER PREVIEW｜カレンダー画面オブジェクトホバープレビュー ════
   責務: PC でオブジェクトにホバーしたときのプレビューポップアップ
   依存: CALENDAR RENDERING（getCellRect）、RENDER（drawObj 系）
════════════════════════════════════════════ */
(function() {
  let _hoverTimer    = null;
  let _currentObjId  = null;
  const area = $id('cal-grid-area');

  area.addEventListener('mousemove', e => {
    const mc = e.target.closest('canvas[data-key]');
    if (!mc) { clearTimeout(_hoverTimer); window._hideObjPreview && _hideObjPreview(); _currentObjId = null; return; }

    const key  = mc.dataset.key;
    const r    = mc.getBoundingClientRect();
    const sc   = Math.min(mc.width / CANVAS_SRC, mc.height / CANVAS_SRC);
    const lx   = (e.clientX - r.left) / r.width  * (mc.width  / sc);
    const ly   = (e.clientY - r.top)  / r.height * (mc.height / sc);
    const objs = getCellObjs(key);
    // 全オブジェクトをヒットテスト（前面優先）
    const hit  = objs.slice().reverse().find(o => miniHitObj(o, lx, ly));

    if (!hit) { clearTimeout(_hoverTimer); window._hideObjPreview && _hideObjPreview(); _currentObjId = null; return; }
    if (hit.id === _currentObjId) return; // 同じオブジェクト上 → 何もしない

    clearTimeout(_hoverTimer);
    window._hideObjPreview && _hideObjPreview();
    _currentObjId = hit.id;
    _hoverTimer = setTimeout(() => {
      window._showObjPreview && _showObjPreview(hit, e.clientX, e.clientY, mc);
    }, 500);
  });

  area.addEventListener('mouseleave', () => {
    clearTimeout(_hoverTimer);
    window._hideObjPreview && _hideObjPreview();
    _currentObjId = null;
  });

  // 長押しコンテクストメニューと同時表示 → _showObjPreview に統一
  window._showClipTooltipForMenu = function(obj, x, y, mc) {
    if (!obj) return;
    window._showObjPreview && _showObjPreview(obj, x, y, mc);
  };
  window._hideClipTooltip = function() {
    window._hideObjPreview && _hideObjPreview();
  };
})();

/* ════ OBJECT PREVIEW POPUP｜カレンダー画面オブジェクト短タッププレビュー ════
   責務: カレンダー画面でオブジェクトを短タップしたときのプレビューポップアップ
   依存: CALENDAR RENDERING（getCellRect）、RENDER（drawObj 系）
════════════════════════════════════════════ */
(function() {
  const POPUP_SIZE = 240;
  const SHOW_MS    = 1500;
  const MARGIN     = 8;
  let _timer = null;

  function hidePreview() {
    clearTimeout(_timer);
    _timer = null;
    const popup = $id('obj-preview-popup');
    popup.style.display = 'none';
    popup.innerHTML = '';
  }

  function showPreview(obj, clientX, clientY, mc) {
    hidePreview();
    const popup = $id('obj-preview-popup');
    popup.innerHTML = '';

    if (obj.type === 'clip') {
      if (!obj.displayName) return;
      const span = document.createElement('span');
      span.style.cssText = 'font-size:14px;font-weight:600;color:var(--ink);white-space:pre-wrap;max-width:200px;display:block;';
      span.textContent = obj.displayName;
      popup.appendChild(span);
    } else if (obj.type === 'span') {
      if (!obj.name) return;
      const span = document.createElement('span');
      span.style.cssText = 'font-size:14px;font-weight:600;color:var(--ink);white-space:pre-wrap;max-width:200px;display:block;';
      span.textContent = obj.name;
      popup.appendChild(span);
    } else {
      const cvs = document.createElement('canvas');
      cvs.width  = POPUP_SIZE;
      cvs.height = POPUP_SIZE;
      cvs.style.cssText = `width:${POPUP_SIZE}px;height:${POPUP_SIZE}px;display:block;border-radius:6px;`;
      popup.appendChild(cvs);

      const c = cvs.getContext('2d');
      c.clearRect(0, 0, POPUP_SIZE, POPUP_SIZE);

      let bx0, by0, bx1, by1;
      if (obj.type === 'pen') {
        const pts = obj.paths.flatMap(p => p.points);
        if (pts.length === 0) return;
        bx0 = Math.min(...pts.map(p => p.x));
        by0 = Math.min(...pts.map(p => p.y));
        bx1 = Math.max(...pts.map(p => p.x));
        by1 = Math.max(...pts.map(p => p.y));
      } else if (obj.type === 'text') {
        const lines = (obj.text || '').split('\n');
        const fontSize = obj.size || 16;
        c.font = `${fontSize}px 'Noto Sans JP',sans-serif`;
        const tw = Math.max(...lines.map(l => c.measureText(l).width));
        const th = lines.length * fontSize * 1.35;
        bx0 = obj.x; by0 = obj.y;
        bx1 = obj.x + tw; by1 = obj.y + th;
      } else if (obj.type === 'sticker') {
        const sz = obj.size || 44;
        bx0 = obj.x - sz/2; by0 = obj.y - sz/2;
        bx1 = obj.x + sz/2; by1 = obj.y + sz/2;
      }
      const bw = Math.max(bx1 - bx0, 1), bh = Math.max(by1 - by0, 1);
      const pad = 8;
      const sc  = Math.min((POPUP_SIZE - pad*2) / bw, (POPUP_SIZE - pad*2) / bh);
      const ox  = pad + (POPUP_SIZE - pad*2 - bw*sc) / 2 - bx0*sc;
      const oy  = pad + (POPUP_SIZE - pad*2 - bh*sc) / 2 - by0*sc;

      c.save();
      c.translate(ox, oy);
      c.scale(sc, sc);
      drawObj(c, obj, 1);
      c.restore();
    }

    // ── ポップアップ位置計算（MARGIN1つで4方向クランプ統一）──
    const POPUP_W = POPUP_SIZE + 24;
    const POPUP_H = POPUP_SIZE + 44;
    const GAP     = 16;
    const vw = window.innerWidth;
    const vh = window.innerHeight;

    if (mc) {
      // オブジェクトのスクリーン座標を求める
      const r   = mc.getBoundingClientRect();
      const scX = r.width  / CANVAS_SRC;
      const scY = r.height / CANVAS_SRC;

      let objLeft = clientX, objTop = clientY, objRight = clientX, objBottom = clientY;
      if (obj.type === 'pen') {
        const pts = obj.paths.flatMap(p => p.points);
        if (pts.length > 0) {
          objLeft   = r.left + Math.min(...pts.map(p => p.x)) * scX;
          objTop    = r.top  + Math.min(...pts.map(p => p.y)) * scY;
          objRight  = r.left + Math.max(...pts.map(p => p.x)) * scX;
          objBottom = r.top  + Math.max(...pts.map(p => p.y)) * scY;
        }
      } else if (obj.x !== undefined) {
        const halfSz = (obj.size || 44) / 2;
        objLeft   = r.left + (obj.x - halfSz) * scX;
        objTop    = r.top  + (obj.y - halfSz) * scY;
        objRight  = r.left + (obj.x + halfSz) * scX;
        objBottom = r.top  + (obj.y + halfSz) * scY;
      }

      // X方向：左側優先、はみ出すなら右側
      let anchorX, onLeft;
      if (objLeft - POPUP_W - GAP >= MARGIN) {
        anchorX = objLeft;
        onLeft  = false;
      } else {
        anchorX = objRight + GAP;
        onLeft  = true;
      }

      // Y方向：上側優先、はみ出すなら下側
      let anchorY, flipY;
      if (objTop - GAP - POPUP_H >= MARGIN) {
        anchorY = objTop - GAP;
        flipY   = false;
      } else {
        anchorY = objBottom + GAP;
        flipY   = true;
      }

      // 4方向クランプ
      if (!onLeft) {
        const halfW = POPUP_W / 2;
        anchorX = Math.max(MARGIN + halfW, Math.min(vw - MARGIN - halfW, anchorX));
      } else {
        anchorX = Math.min(vw - MARGIN - POPUP_W, anchorX);
      }
      if (!flipY) {
        anchorY = Math.max(MARGIN + POPUP_H, anchorY);
      } else {
        anchorY = Math.min(vh - MARGIN - POPUP_H, anchorY);
      }

      if (onLeft) {
        popup.classList.add('tail-left');
        popup.style.transform = flipY ? 'translateY(0)' : 'translateY(-100%)';
      } else {
        popup.classList.remove('tail-left');
        popup.style.transform = flipY
          ? 'translateX(-50%) translateY(0)'
          : 'translateX(-50%) translateY(-100%)';
      }

      popup.style.left    = anchorX + 'px';
      popup.style.top     = anchorY + 'px';
      popup.style.display = 'block';
      _timer = setTimeout(hidePreview, SHOW_MS);

    } else {
      // mc なし（クリップ名のみ）：シンプルに上表示
      const POPUP_H_SIMPLE = 60;
      const rawTop = clientY - GAP;
      const flipY  = rawTop - POPUP_H_SIMPLE < MARGIN;
      popup.classList.remove('tail-left');
      popup.style.transform = flipY
        ? 'translateX(-50%) translateY(0)'
        : 'translateX(-50%) translateY(-100%)';
      popup.style.left    = clientX + 'px';
      popup.style.top     = flipY ? (clientY + GAP) + 'px' : rawTop + 'px';
      popup.style.display = 'block';
      _timer = setTimeout(hidePreview, SHOW_MS);
    }
  }

  // pointerdownで消す
  document.addEventListener('pointerdown', () => {
    if (_timer) hidePreview();
  }, { capture: true, passive: true });

  window._showObjPreview = showPreview;
  window._hideObjPreview = hidePreview;
})();
updateI18nDOM();

// 日付詳細画面でのピンチズームを無効化
$id('day-screen').addEventListener('touchstart', e => {
  if (e.touches.length >= 2) e.preventDefault();
}, { passive: false });

</script>
<div id="app-toast"></div>
</body>
