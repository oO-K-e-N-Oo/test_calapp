<style>
/* ════════════════════════════════════════════
   DESIGN TOKENS
════════════════════════════════════════════ */
:root{
  /* サイズ */
  --toolbar-h:   152px;   /* 縦長: ツールバー固定高さ */
  --sidebar-w:   310px;   /* 横長: サイドパネル幅 */

  /* カラー */
  --bg:          #f5f3ef;
  --surface:     #faf9f7;
  --ink:         #2c2a26;
  --ink-mid:     #6b6962;
  --ink-faint:   #a09d98;
  --border:      rgba(44,42,38,.18);
  --border-soft: rgba(44,42,38,.22);
  --inactive-bg: #ece9e3;
  --tool-hover:  rgba(44,42,38,.07);
  --tool-active: #2c2a26;
  --today-ring:  #c8a84b;
  --sun-bg:      rgba(180,40,40,.05);
  --sun-txt:     #b42828;
  --sat-bg:      rgba(40,80,180,.05);
  --sat-txt:     #2850b4;
  --hol-bg:      rgba(180,40,40,.05);
  --hol-txt:     #b42828;
  --shadow-md:   0 4px 20px rgba(0,0,0,.10);

  /* タイポグラフィ */
  --font-body: 'M PLUS Rounded 1c', 'Hiragino Sans', sans-serif;
  --font-disp: 'M PLUS Rounded 1c', 'Hiragino Sans', sans-serif;

  /* その他 */
  --r: 6px;
}

/* ════════════════════════════════════════════
   RESET & BASE
════════════════════════════════════════════ */
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}
html, body {
  height: 100%;
  overflow: hidden;
  background: var(--bg);
  font-family: var(--font-body);
  color: var(--ink);
  user-select: none;
  -webkit-user-select: none;
  -webkit-touch-callout: none;
}
button:focus,
button:active,
button:focus-visible { outline: none; background: transparent; }

/* ════════════════════════════════════════════
   SCREENS
════════════════════════════════════════════ */
.screen {
  display: none;
  position: absolute;
  inset: 0;
  flex-direction: column;
}
.screen.active { display: flex; }

/* ════════════════════════════════════════════
   CALENDAR SCREEN — ヘッダー
════════════════════════════════════════════ */
.cal-header {
  display: flex;
  flex-direction: column;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

/* 上段: タブ + カレンダー追加ボタン */
.cal-header-top {
  display: flex;
  align-items: flex-end;
  gap: 0;
  padding: 0 12px 0 8px;
  border-bottom: 1px solid var(--border-soft);
  background: var(--surface);
}
.cal-tabs {
  display: flex;
  align-items: flex-end;
  gap: 2px;
  flex: 1;
  overflow-x: auto;
  overflow-y: hidden;
  scrollbar-width: none;
  padding-top: 6px;
}
.cal-tabs::-webkit-scrollbar { display: none; }
.cal-tab {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 7px 14px 6px;
  background: none;
  border: 1px solid transparent;
  border-bottom: none;
  border-radius: var(--r) var(--r) 0 0;
  cursor: pointer;
  font-size: 13px;
  font-weight: 500;
  font-family: var(--font-body);
  color: var(--ink-faint);
  white-space: nowrap;
  position: relative;
  margin-bottom: -1px;
  transition: background .12s, color .12s, border-color .12s;
}
.cal-tab:hover  { background: var(--tool-hover); color: var(--ink); }
.cal-tab.active { background: var(--bg); color: var(--ink); border-color: var(--border-soft); font-weight: 600; }
.cal-tab-input {
  font-size: 13px;
  font-weight: 600;
  font-family: var(--font-body);
  border: none;
  outline: none;
  background: transparent;
  color: var(--ink);
  min-width: 40px;
  padding: 0;
}
.btn-add-group {
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 5px 10px;
  margin-left: 4px;
  margin-bottom: 6px;
  align-self: center;
  background: none;
  border: 1.5px solid var(--border);
  border-radius: var(--r);
  cursor: pointer;
  font-size: 12px;
  font-weight: 500;
  font-family: var(--font-body);
  color: var(--ink-mid);
  white-space: nowrap;
  flex-shrink: 0;
  transition: background .15s, border-color .15s, color .15s;
}
.btn-add-group:hover { background: var(--tool-hover); border-color: var(--ink-mid); color: var(--ink); }
.btn-add-group svg   { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; flex-shrink: 0; }

/* 下段: 月ナビゲーション */
.cal-header-nav {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 16px;
}
.cal-title {
  font-family: var(--font-disp);
  font-size: 22px;
  letter-spacing: .02em;
  flex: 1;
  text-align: center;
  display: flex;
  align-items: baseline;
  gap: 6px;
  justify-content: center;
}
.cal-title-year { font-size: 13px; color: var(--ink-mid); font-family: var(--font-body); font-weight: 300; }

/* ════════════════════════════════════════════
   CALENDAR SCREEN — グリッド
════════════════════════════════════════════ */
.cal-weekdays {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  background: var(--surface);
  border-bottom: 1px solid var(--border-soft);
  flex-shrink: 0;
}
.wd {
  text-align: center;
  padding: 5px 0;
  font-size: 14px;
  font-weight: 500;
  letter-spacing: .08em;
  color: var(--ink-faint);
}
.wd.sun { color: var(--sun-txt); }
.wd.sat { color: var(--sat-txt); }

.cal-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  overflow: hidden;
  border-left:   1px solid var(--border-soft);
  border-top:    1px solid var(--border-soft);
  border-bottom: 1px solid var(--border-soft);
  box-shadow: 0 2px 12px rgba(0,0,0,.10), 0 0 0 1px var(--border);
  align-content: start;
}
#cal-screen { overflow: hidden; position: relative; }
#cal-screen.landscape-grid .cal-grid { align-content: start; }

.cal-cell {
  border-right: 1px solid var(--border-soft);
  border-bottom: 1px solid var(--border-soft);
  background: var(--surface);
  cursor: pointer;
  position: relative;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  transition: filter .12s;
}
.cal-cell:active   { filter: brightness(.96); }
.cal-cell.inactive { background: var(--inactive-bg); pointer-events: none; }
.cal-cell.is-blank  { background: var(--inactive-bg); }
.cal-cell.today    { box-shadow: inset 0 0 0 2px var(--today-ring); }
.cal-cell.is-sun   { background: var(--sun-bg); }
.cal-cell.is-sat   { background: var(--sat-bg); }
.cal-cell.is-hol   { background: var(--hol-bg); }
.cal-cell.drag-over { background: rgba(58,111,168,.10) !important; box-shadow: inset 0 0 0 2px #3a6fa8; }

.cell-top {
  display: flex;
  align-items: center;
  flex-direction: row;
  gap: 3px;
  padding: 3px 5px 2px;
  flex-shrink: 0;
  height: var(--cell-date-h, 20px);
  overflow: hidden;
}
.cell-num {
  font-size: 14px;
  font-weight: 500;
  color: var(--ink-mid);
  line-height: 1;
  white-space: nowrap;
  flex-shrink: 0;
}
.cal-cell.today .cell-num { font-weight: 700; color: var(--ink); }
.cal-cell.is-sun .cell-num { color: var(--sun-txt); }
.cal-cell.is-sat .cell-num { color: var(--sat-txt); }
.cal-cell.is-hol .cell-num { color: var(--hol-txt); }
.cell-hol-name {
  font-size: 11px;
  color: var(--hol-txt);
  line-height: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.cell-preview {
  position: relative;
  overflow: hidden;
  flex-shrink: 0;
}
.cal-cell.landscape-cell {
  flex-direction: row;
}
.cal-cell.landscape-cell .cell-top {
  flex-direction: column;
  align-items: flex-start;
  justify-content: flex-start;
  padding: 4px 6px;
  overflow: hidden;
  height: auto;
}
.cal-cell.landscape-cell .cell-num {
  font-size: 9px;
  overflow: visible;
}
.cal-cell.landscape-cell .cell-hol-name {
  font-size: 9px;
  overflow: visible;
  white-space: nowrap;
}
.cell-remaining {
  flex: 1;
  background: var(--inactive-bg);
}
.cal-grid-area {
  flex: 1;
  overflow: hidden;
  overflow-x: auto;
  position: relative;
  background: var(--bg);
  display: flex;
  align-items: flex-start;
  justify-content: center;
}
@keyframes cal-fadein { from { opacity: 0; } to { opacity: 1; } }
.cal-grid-area.tab-switching { animation: cal-fadein 0.4s ease forwards; }

/* 月切り替えスライドアニメーション */
@keyframes slide-in-from-right { from { transform: translateX(100%); } to { transform: translateX(0); } }
@keyframes slide-in-from-left  { from { transform: translateX(-100%); } to { transform: translateX(0); } }
@keyframes slide-out-to-left   { from { transform: translateX(0); } to { transform: translateX(-100%); } }
@keyframes slide-out-to-right  { from { transform: translateX(0); } to { transform: translateX(100%); } }
.cal-grid.slide-in-right  { animation: slide-in-from-right 0.4s cubic-bezier(0.4,0,0.2,1) forwards; }
.cal-grid.slide-in-left   { animation: slide-in-from-left  0.4s cubic-bezier(0.4,0,0.2,1) forwards; }
.cal-grid.slide-out-left  { animation: slide-out-to-left   0.4s cubic-bezier(0.4,0,0.2,1) forwards; }
.cal-grid.slide-out-right { animation: slide-out-to-right  0.4s cubic-bezier(0.4,0,0.2,1) forwards; }

/* 日付セル画面スライドアニメーション */
.draw-slide-in-right  { animation: slide-in-from-right 0.4s cubic-bezier(0.4,0,0.2,1) forwards; }
.draw-slide-in-left   { animation: slide-in-from-left  0.4s cubic-bezier(0.4,0,0.2,1) forwards; }
.draw-slide-out-left  { animation: slide-out-to-left   0.4s cubic-bezier(0.4,0,0.2,1) forwards; }
.draw-slide-out-right { animation: slide-out-to-right  0.4s cubic-bezier(0.4,0,0.2,1) forwards; }

/* ════════════════════════════════════════════
   DAY CELL SCREEN — 共通
════════════════════════════════════════════ */
#day-screen { background: var(--bg); }
#day-screen.portrait  { flex-direction: column; }
#day-screen.landscape { flex-direction: row; }

/* 共通: アイコンボタン */
.icon-btn {
  width: 34px;
  height: 34px;
  border: none;
  background: transparent;
  cursor: pointer;
  border-radius: var(--r);
  color: var(--ink);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  outline: none;
  -webkit-appearance: none;
  -webkit-tap-highlight-color: transparent;
}
@media (hover: hover) {
  .icon-btn:hover { background: var(--tool-hover); }
}
.icon-btn:focus,
.icon-btn:active,
.icon-btn:focus-visible,
.icon-btn:focus:not(:focus-visible) { outline: none; background: transparent; }
.icon-btn svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }

/* ════════════════════════════════════════════
   DAY CELL SCREEN — 縦長（portrait）
════════════════════════════════════════════ */
.day-topbar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  height: var(--toolbar-h);
  overflow: hidden;
}
#day-screen.portrait  .day-topbar      { display: flex; }
#day-screen.portrait  .day-sidebar-land{ display: none; }
#day-screen.landscape .day-topbar      { display: none; }
#day-screen.landscape .day-sidebar-land{ display: flex; }

/* Row1: 戻る / 日付 / Undo */
.tb-row1 {
  display: flex;
  align-items: flex-end;
  gap: 0;
  padding: 10px 16px 8px;
  flex-shrink: 0;
}
.day-badge-inline {
  display: flex;
  flex-direction: column;
  gap: 1px;
  align-self: center;
}
.day-date-row { display: flex; align-items: baseline; gap: 8px; }
.day-num  { font-size: 26px; font-weight: 600; color: var(--ink-faint); line-height: 1; }
.day-dow  { font-size: 14px; color: var(--ink-faint); font-weight: 400; }
.day-sub  { font-size: 11px; color: var(--ink-faint); font-weight: 300; }
.spacer   { flex: 1; }
.ur-row {
  display: flex;
  gap: 2px;
  padding-right: 8px;
  align-self: flex-end;
  padding-bottom: 2px;
  margin-left: 16px;
}
.ur-btn {
  background: none;
  border: none;
  cursor: pointer;
  padding: 6px 8px;
  color: var(--ink);
  border-radius: var(--r);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background .12s, opacity .12s;
  -webkit-tap-highlight-color: transparent;
  -webkit-appearance: none;
  outline: none;
}
.ur-btn:hover                              { background: var(--tool-hover); }
.ur-btn:focus, .ur-btn:active,
.ur-btn:focus-visible                      { outline: none; background: transparent; }
.ur-btn:disabled                           { opacity: .28; cursor: default; }
.ur-btn svg { width: 24px; height: 24px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }

/* 縦長: 戻るボタン */
#btn-back {
  width: 60px;
  height: 60px;
  margin-left: -10px;
  align-self: center;
  background: transparent;
  -webkit-appearance: none;
  outline: none;
}
#btn-back:focus, #btn-back:active { background: transparent; outline: none; }
#btn-back svg { width: 40px; height: 40px; stroke-width: 2.4; }

/* Row2: ツールボタン */
.tb-row2 {
  display: flex;
  align-items: center;
  padding: 0 8px;
  gap: 0;
  flex-shrink: 0;
}
.tool-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 5px;
  flex: 1;
  padding: 8px 4px;
  background: none;
  border: none;
  cursor: pointer;
  font-size: 13px;
  font-weight: 500;
  color: var(--ink-mid);
  font-family: var(--font-body);
  white-space: nowrap;
  letter-spacing: .02em;
  border-radius: var(--r);
  transition: background .12s, color .12s;
}
.tool-btn svg    { width: 17px; height: 17px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; }
.tool-btn:hover  { background: var(--tool-hover); }
.tool-btn.active { background: var(--tool-active); color: #fff; }

/* Row3: オプション（JSで内容を差し替え）*/
.tb-row3 {
  display: flex;
  align-items: center;
  padding: 20px 16px;
  gap: 20px;
  flex-shrink: 0;
  min-height: 0;
  flex: 1;
  border-top: 1px solid var(--border-soft);
}

/* ════════════════════════════════════════════
   DAY CELL SCREEN — 横長（landscape）
════════════════════════════════════════════ */
.day-sidebar-land {
  background: var(--surface);
  border-right: 1px solid var(--border);
  width: var(--sidebar-w);
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  gap: 12px;
  padding: 14px 12px;
  overflow-y: auto;
}
.land-row1 {
  display: flex;
  align-items: flex-end;
  gap: 0;
  flex-wrap: nowrap;
  margin-left: -12px;
}
.land-badge {
  display: flex;
  flex-direction: column;
  gap: 2px;
  align-self: center;
}
.land-date-row { display: flex; align-items: baseline; gap: 6px; white-space: nowrap; }
.land-day-num  { font-size: 38px; color: var(--ink-faint); line-height: 1; white-space: nowrap; }
.land-day-dow  { font-size: 16px; color: var(--ink-faint); font-weight: 400; white-space: nowrap; }
.land-day-sub  { font-size: 10px; color: var(--ink-faint); font-weight: 300; white-space: nowrap; }

/* 横長: 戻るボタン */
#btn-back-land {
  width: 80px;
  height: 80px;
  align-self: center;
}
#btn-back-land svg { width: 56px; height: 56px; stroke-width: 2.4; }

.land-tool-group {
  display: flex;
  flex-direction: column;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--r);
  overflow: hidden;
}
.land-tool-btn {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 12px;
  width: 100%;
  background: none;
  border: none;
  cursor: pointer;
  font-size: 13px;
  font-weight: 500;
  color: var(--ink-mid);
  font-family: var(--font-body);
  border-radius: var(--r);
  transition: background .12s, color .12s;
}
.land-tool-btn svg    { width: 17px; height: 17px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
.land-tool-btn:hover  { background: var(--tool-hover); }
.land-tool-btn.active { background: var(--tool-active); color: #fff; }

.land-opts      { display: flex; flex-direction: column; gap: 10px; }
.land-opt-label { font-size: 9px; text-transform: uppercase; letter-spacing: .08em; color: var(--ink-faint); font-weight: 600; margin-bottom: 4px; }
.land-swatches  { display: flex; gap: 5px; flex-wrap: wrap; }

/* ════════════════════════════════════════════
   DAY CELL SCREEN — キャンバスエリア
════════════════════════════════════════════ */
.draw-wrap {
  flex: 1;
  display: flex;
  background: var(--bg);
  overflow: hidden;
}
.draw-wrap.portrait-wrap  { align-items: flex-start; justify-content: center; }
.draw-wrap.landscape-wrap { align-items: center;     justify-content: flex-start; }
#draw-canvas {
  background: #fff;
  box-shadow: 0 2px 12px rgba(0,0,0,.10), 0 0 0 1px var(--border);
  display: block;
  touch-action: none;
}

/* ════════════════════════════════════════════
   TOOL OPTIONS（ペン/消しゴム/テキスト）
════════════════════════════════════════════ */
.opt-block  { display: flex; align-items: center; gap: 10px; }
.opt-label  { font-size: 10px; text-transform: uppercase; letter-spacing: .08em; color: var(--ink-faint); font-weight: 600; white-space: nowrap; }
.swatches   { display: flex; gap: 10px; flex-wrap: wrap; }
.swatch {
  width: 22px;
  height: 22px;
  border-radius: 50%;
  border: 2.5px solid transparent;
  cursor: pointer;
  transition: transform .1s, border-color .1s, outline .1s;
}
.swatch.on {
  border-color: transparent;
  outline: 2px solid var(--ink);
  outline-offset: 2px;
  transform: scale(1.1);
}
.sz-row { display: flex; gap: 6px; }
.sz-btn {
  background: none;
  border: 1px solid var(--border);
  border-radius: 8px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  width: 26px;
  height: 26px;
  transition: background .12s, border-color .12s;
}
.sz-btn.on           { background: var(--ink); border-color: var(--ink); }
.dot                 { border-radius: 50%; background: var(--ink); display: block; pointer-events: none; }
.sz-btn.on .dot      { background: #fff; }
.sz-lbl              { font-size: 13px; font-family: var(--font-body); pointer-events: none; padding: 0 2px; }
.sz-btn.on .sz-lbl   { color: #fff; }

/* ════════════════════════════════════════════
   SETTINGS OVERLAY
════════════════════════════════════════════ */
.overlay { display: none; position: fixed; inset: 0; z-index: 80; }
.overlay.open { display: flex; }
.ovl-bd { position: absolute; inset: 0; background: rgba(0,0,0,.15); }
.settings-panel {
  position: absolute;
  right: 12px;
  top: 54px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 18px;
  box-shadow: var(--shadow-md);
  min-width: 210px;
  z-index: 1;
}
.settings-panel h3 { font-size: 11px; font-weight: 600; letter-spacing: .06em; text-transform: uppercase; color: var(--ink-mid); margin-bottom: 14px; }
.s-row             { margin-bottom: 12px; }
.s-row label       { display: block; font-size: 11px; color: var(--ink-mid); margin-bottom: 5px; }
.s-row select {
  width: 100%;
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 6px 8px;
  font-size: 13px;
  font-family: var(--font-body);
  background: var(--bg);
  cursor: pointer;
  outline: none;
  color: var(--ink);
}
.s-btn {
  width: 100%;
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 7px 10px;
  border: 1px solid var(--border);
  border-radius: var(--r);
  background: var(--bg);
  cursor: pointer;
  font-size: 13px;
  font-family: var(--font-body);
  color: var(--ink);
  text-align: left;
  transition: background .12s, border-color .12s;
}
.s-btn:hover { background: var(--tool-hover); border-color: var(--ink-mid); }

/* ════════════════════════════════════════════
   STICKER DROPDOWN
════════════════════════════════════════════ */
#stk-dropdown {
  display: none;
  position: fixed;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px;
  box-shadow: 0 6px 24px rgba(0,0,0,.14);
  z-index: 500;
  width: min(360px, 90vw);
}
#stk-dropdown.open { display: block; }
.stk-inline-grid   { display: flex; flex-wrap: wrap; gap: 6px; }
.stk-inline-item {
  width: 40px;
  height: 40px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: var(--r);
  cursor: pointer;
  border: 2px solid transparent;
  transition: transform .1s;
}
.stk-inline-item:hover      { background: var(--tool-hover); transform: scale(1.1); }
.stk-inline-item.stk-selected { border-color: var(--ink); background: var(--tool-hover); }
.stk-inline-item svg        { width: 26px; height: 26px; }

/* ════════════════════════════════════════════
   CONTEXT MENUS
════════════════════════════════════════════ */
.ctx-menu {
  display: none;
  position: fixed;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--r);
  box-shadow: var(--shadow-md);
  z-index: 600;
  min-width: 180px;
  padding: 4px 0;
  overflow: hidden;
}
.ctx-menu.open { display: block; }
.ctx-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 16px;
  font-size: 14px;
  font-family: var(--font-body);
  cursor: pointer;
  transition: background .1s;
  color: var(--ink);
}
.ctx-item:hover    { background: var(--tool-hover); }
.ctx-item.ctx-hover{ background: var(--tool-hover); }
@keyframes ctx-blink {
  0%, 100% { background: var(--tool-hover); }
  40%      { background: #c8e0f8; }
}
.ctx-item.ctx-blink { animation: ctx-blink 0.25s ease 2; }
.ctx-item.danger    { color: #b84040; }
.ctx-item svg       { width: 13px; height: 13px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
.ctx-sep            { height: 1px; background: var(--border-soft); margin: 3px 0; }

/* ════════════════════════════════════════════
   YEAR-MONTH PICKER
════════════════════════════════════════════ */
.ym-panel {
  background: var(--surface);
  border-radius: 16px;
  box-shadow: var(--shadow-md);
  padding: 20px 16px 16px;
  width: 300px;
  position: relative;
  z-index: 1;
}
.ym-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}
.ym-year-label {
  font-size: 18px;
  font-weight: 600;
  color: var(--ink);
}
.ym-months {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
}
.ym-month-btn {
  padding: 10px 4px;
  border-radius: 8px;
  border: none;
  background: none;
  font-size: 14px;
  font-family: var(--font-body);
  color: var(--ink-mid);
  cursor: pointer;
  transition: background .12s, color .12s;
  text-align: center;
}
.ym-month-btn:hover   { background: var(--tool-hover); }
.ym-month-btn.current { background: var(--ink); color: #fff; font-weight: 600; }

══════════════════════════════════════════════ */
// Returns "YYYY-MM-DD" → holiday name map for a given year
function getHolidays(year) {
  const hols = {};
  const add = (m, d, name) => { hols[`${year}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`] = name; };

  // Fixed holidays
  add(1,1,'元日');
  add(2,11,'建国記念の日');
  add(2,23,'天皇誕生日');
  add(4,29,'昭和の日');
  add(5,3,'憲法記念日');
  add(5,4,'みどりの日');
  add(5,5,'こどもの日');
  add(8,11,'山の日');
  add(11,3,'文化の日');
  add(11,23,'勤労感謝の日');

  // Happy Monday / nth-weekday rules
  // 成人の日: 1月第2月曜
  add(...nthWeekday(year,1,2,1), '成人の日');
  // 海の日: 7月第3月曜
  add(...nthWeekday(year,7,3,1), '海の日');
  // 敬老の日: 9月第3月曜
  add(...nthWeekday(year,9,3,1), '敬老の日');
  // スポーツの日: 10月第2月曜
  add(...nthWeekday(year,10,2,1), 'スポーツの日');

  // 春分の日 (approx)
  const shunbun = Math.floor(20.8431 + 0.242194*(year-1980) - Math.floor((year-1980)/4));
  add(3, shunbun, '春分の日');
  // 秋分の日 (approx)
  const shubun = Math.floor(23.2488 + 0.242194*(year-1980) - Math.floor((year-1980)/4));
  add(9, shubun, '秋分の日');

  // 振替休日: if holiday falls on Sunday, next Monday is substitute
  const keys = Object.keys(hols);
  keys.forEach(k => {
    const d = new Date(k);
    if (d.getDay() === 0) { // Sunday
      const next = new Date(d); next.setDate(next.getDate()+1);
      const nk = fmtDate(next);
      if (!hols[nk]) hols[nk] = '振替休日';
    }
  });

  return hols;
}

function nthWeekday(year, month, nth, dow) { // dow: 0=Sun,1=Mon...
  let count = 0;
  for (let d=1; d<=31; d++) {
    const dt = new Date(year, month-1, d);
    if (dt.getMonth() !== month-1) break;
    if (dt.getDay() === dow && ++count === nth) return [month, d];
  }
  return [month, 1];
}

function fmtDate(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

/* ════ CANVAS ════ */
const cvs = document.getElementById('draw-canvas');
const cx  = cvs.getContext('2d');

function sizeCanvas() {
  const wrap   = document.getElementById('draw-wrap');
  const aw     = wrap.clientWidth;
  const ah     = wrap.clientHeight;
  const isPort = ah >= aw;

  // 縦画面: 幅いっぱいの正方形（高さが足りなければ高さ基準）
  // 横画面: 高さいっぱいの正方形（幅が足りなければ幅基準）
  const cssSz = isPort ? Math.min(aw, ah) : Math.min(ah, aw);

  // 寄せ方をクラスで切り替え
  wrap.classList.toggle('portrait-wrap',  isPort);
  wrap.classList.toggle('landscape-wrap', !isPort);

  const dpr   = window.devicePixelRatio || 1;
  const phySz = Math.round(cssSz * dpr);

  cvs.width  = phySz;
  cvs.height = phySz;
  cvs.style.width  = cssSz + 'px';
  cvs.style.height = cssSz + 'px';

  CANVAS_PX = phySz;

  calcTextSizes();
  redraw();
}

/* 描画エリア幅(CANVAS_SRC=600の論理座標系)で
   「小」= 横15文字、「大」= 小×1.3 になるよう計算 */
function calcTextSizes() {
  // CANVAS_SRC=600 の論理空間で、15文字で横幅いっぱいになるサイズ
  // 日本語全角文字は「font-size ≒ 文字幅」なので:
  //   font-size_small = CANVAS_SRC / 15
  const small = Math.round(CANVAS_SRC / 15);  // = 40px (論理座標)
  const large = Math.round(small * 1.3);

  const prev = S.textSize;
  // 現在「小」が選ばれていたら小のまま、「大」が選ばれていたら大のまま維持
  if (!prev || prev === S._textSmall) {
    S.textSize = small;
  } else {
    S.textSize = large;
  }
  S._textSmall = small;
  S._textLarge = large;
}

/* ════ RENDER ════ */
function redraw() {
  cx.clearRect(0,0,CANVAS_PX,CANVAS_PX);
  cx.fillStyle = '#fff';
  cx.fillRect(0,0,CANVAS_PX,CANVAS_PX);

  const sc = CANVAS_PX / CANVAS_SRC;

  // 確定済みオブジェクト
  Draw.objects.forEach(o => drawObj(cx, o, sc));

  // ★ 描画中のライブストローク（最新の1本）
  if (Draw.activeStroke && Draw.activeStroke.points.length > 1) {
    drawStroke(cx, Draw.activeStroke, sc);
  }

  // selection bbox
  if (Draw.selId) {
    const o = Draw.objects.find(x=>x.id===Draw.selId);
    if (o) drawBBox(cx, o, sc);
  }
}

function drawObj(c, obj, sc) {
  if (obj.type==='pen')     drawPenObj(c, obj, sc);
  if (obj.type==='text')    drawTextObj(c, obj, sc);
  if (obj.type==='sticker') drawStickerObj(c, obj, sc);
}

function drawPenObj(c, obj, sc) {
  obj.paths.forEach(p => drawStroke(c, p, sc));
}

function drawStroke(c, path, sc) {
  if (!path.points || path.points.length < 2) return;
  c.save();
  c.beginPath();
  c.strokeStyle = path.color;
  c.lineWidth   = path.size * sc;
  if (path.alpha != null) {
    c.globalAlpha = path.alpha;
    c.lineCap  = 'square';
    c.lineJoin = 'miter';
  } else {
    c.lineCap  = 'round';
    c.lineJoin = 'round';
  }
  c.moveTo(path.points[0].x*sc, path.points[0].y*sc);
  for (let i=1;i<path.points.length;i++) c.lineTo(path.points[i].x*sc, path.points[i].y*sc);
  c.stroke();
  c.restore();
}

function drawTextObj(c, obj, sc) {
  c.save();
  c.font         = `${(obj.size||16)*sc}px 'Noto Sans JP',sans-serif`;
  c.fillStyle    = obj.color||'#1c1a18';
  c.textBaseline = 'top';
  (obj.text||'').split('\n').forEach((line,i)=>{
    c.fillText(line, obj.x*sc, (obj.y + i*(obj.size||16)*1.35)*sc);
  });
  c.restore();
}

/* sticker drawing — Canvas draw関数で直接描画（ロード待ち不要） */
// スタンプの描画サイズを縦横比を保持して計算（長辺 = size）
function stickerDrawSize(img, size) {
  const iw = img.naturalWidth  || img.width  || 1;
  const ih = img.naturalHeight || img.height || 1;
  if (iw >= ih) {
    return {w: size, h: size * ih / iw};
  } else {
    return {w: size * iw / ih, h: size};
  }
}

function drawStickerObj(c, obj, sc) {
  const img = imgCache[obj.stickerId];
  if (!img) return;
  const sz = (obj.size || 44) * sc;
  const {w, h} = stickerDrawSize(img, sz);
  c.save();
  c.drawImage(img, obj.x * sc - w/2, obj.y * sc - h/2, w, h);
  c.restore();
}

/* bounding box helpers */
function getObjBounds(obj) {
  const sc = CANVAS_PX/CANVAS_SRC;
  if (obj.type==='pen') {
    let x0=Infinity,y0=Infinity,x1=-Infinity,y1=-Infinity;
    obj.paths.forEach(p=>p.points.forEach(pt=>{
      x0=Math.min(x0,pt.x);y0=Math.min(y0,pt.y);
      x1=Math.max(x1,pt.x);y1=Math.max(y1,pt.y);
    }));
    return {x:x0*sc,y:y0*sc,w:(x1-x0)*sc,h:(y1-y0)*sc};
  }
  if (obj.type==='text') {
    cx.save();
    cx.font = `${(obj.size||16)*(CANVAS_PX/CANVAS_SRC)}px 'Noto Sans JP',sans-serif`;
    const lines = (obj.text||'').split('\n');
    const w = Math.max(...lines.map(l=>cx.measureText(l).width));
    cx.restore();
    const h = lines.length*(obj.size||16)*1.35*sc;
    return {x:obj.x*sc, y:obj.y*sc, w, h};
  }
  if (obj.type==='sticker') {
    const img = imgCache[obj.stickerId];
    const sz = (obj.size||44)*sc;
    if (img) {
      const {w, h} = stickerDrawSize(img, sz);
      return {x: obj.x*sc - w/2, y: obj.y*sc - h/2, w, h};
    }
    return {x:obj.x*sc-sz/2, y:obj.y*sc-sz/2, w:sz, h:sz};
  }
  return {x:0,y:0,w:20,h:20};
}

const PAD = 8;
function drawBBox(c, obj) {
  const b  = getObjBounds(obj);
  const bx = b.x+b.w+PAD+14;
  const by = b.y-PAD-14;
  c.save();
  c.strokeStyle='#3a6fa8';c.lineWidth=1.5;c.setLineDash([5,3]);
  c.strokeRect(b.x-PAD, b.y-PAD, b.w+PAD*2, b.h+PAD*2);
  c.setLineDash([]);
  c.fillStyle='#e03030';
  c.beginPath();c.arc(bx,by,14,0,Math.PI*2);c.fill();
  c.fillStyle='#fff';c.font='bold 16px sans-serif';
  c.textAlign='center';c.textBaseline='middle';
  c.fillText('×',bx,by);
  c.restore();
}

function hitDeleteBtn(obj, px, py) {
  const b=getObjBounds(obj);
  const bx=b.x+b.w+PAD+14, by=b.y-PAD-14;
  return Math.hypot(px-bx,py-by)<18;
}
function hitObj(obj, px, py) {
  const b=getObjBounds(obj);
  return px>=b.x-PAD&&px<=b.x+b.w+PAD&&py>=b.y-PAD&&py<=b.y+b.h+PAD;
}

/* screen coords → logical canvas coords */
function toLogical(clientX, clientY) {
  const r = cvs.getBoundingClientRect();
  return {
    x: ((clientX-r.left)/r.width)  * CANVAS_SRC,
    y: ((clientY-r.top) /r.height) * CANVAS_SRC,
  };
}
/* screen coords → physical pixel coords (for hit tests) */
function toPhysical(clientX, clientY) {
  const r = cvs.getBoundingClientRect();
  return {
    x: (clientX-r.left)*(CANVAS_PX/r.width),
    y: (clientY-r.top) *(CANVAS_PX/r.height),
  };
}

function evtCoords(e) {
  const src = e.touches ? e.touches[0] : e;
  return {clientX:src.clientX, clientY:src.clientY};
}

/* ════ PEN OBJECT MANAGEMENT ════
   仕様：同じ色・同じ太さで描かれたものはひとつのペンオブジェクトとする。
   ツール切り替えをはさんでも、色と太さが同じなら同一オブジェクトに統合する。

   実装：
   - Draw.objects 配列の中に色+太さごとの penObj を保持し続ける
   - ペン描画開始時: Draw.objects から同色同太さの penObj を探し、あればそこに追記
   - 「確定」は 戻るボタン / セル切り替え 時のみ（undo 登録）
   - ツール切り替えでは確定しない
═══════════════════════════════════════ */

// 現在アクティブな（描画中の）penObjへの参照
// Draw.objects 配列の中の要素を直接指す

// 色+太さ(+alpha)でペンオブジェクトを検索（objectsの中から）
function findPenObj(color, size, alpha) {
  return Draw.objects.find(o =>
    o.type==='pen' && o.color===color && o.size===size &&
    (alpha == null ? !o.paths.some(p=>p.alpha!=null) : o.paths.some(p=>p.alpha===alpha))
  ) || null;
}

// ペンオブジェクトの「確定」= undo履歴に登録する
// セル移動・戻るボタン時にのみ呼ぶ
function finalizePenObjs() {
  // 未登録（undo履歴にない）penObjをまとめてundo登録
  // ※ 描画中に随時 Draw.objects に入っているので、ここでは履歴のみ管理
  Draw.activePenObjRef = null;
  Draw.activeStroke    = null;
}

// ペンストローク開始
function startPenStroke(color, size, startPt, alpha) {
  // 同色同太さ（同alpha）のオブジェクトを探す
  let penObj = findPenObj(color, size, alpha);
  if (!penObj) {
    penObj = {id:uid(), type:'pen', color, size, paths:[]};
    Draw.objects.push(penObj);
  }
  Draw.activePenObjRef = penObj;
  Draw.activeStroke = {color, size, points:[startPt], ...(alpha != null ? {alpha} : {})};
}

// ストローク終了（pointerup）
function endPenStroke() {
  if (!Draw.activeStroke || !Draw.activePenObjRef) return;
  if (Draw.activeStroke.points.length >= 2) {
    // ストローク追加前のスナップショットを保存
    const before = clone(Draw.activePenObjRef);
    Draw.activePenObjRef.paths.push(Draw.activeStroke);
    const after  = clone(Draw.activePenObjRef);
    pushUndo({type:'stroke', objId:after.id, before, after});
    flushCell();
  }
  Draw.activeStroke = null;
  redraw();
}

// undo/redo で stroke タイプに対応
function applyUndo(a){
  if(a.type==='create') Draw.objects=Draw.objects.filter(o=>o.id!==a.obj.id);
  if(a.type==='delete') Draw.objects.push(clone(a.obj));
  if(a.type==='move'||a.type==='scale'){const o=Draw.objects.find(x=>x.id===a.objId);if(o)Object.assign(o,clone(a.from));}
  if(a.type==='edit'){const o=Draw.objects.find(x=>x.id===a.objId);if(o)Object.assign(o,clone(a.from));}
  if(a.type==='stroke'){
    const idx=Draw.objects.findIndex(x=>x.id===a.objId);
    if(a.before && a.before.paths.length > 0){
      // 前状態に戻す
      if(idx>=0) Draw.objects[idx]=clone(a.before);
      else Draw.objects.push(clone(a.before));
    } else {
      // 最初のストロークのUndo→オブジェクトごと削除
      if(idx>=0) Draw.objects.splice(idx,1);
    }
  }
}
function applyRedo(a){
  if(a.type==='create') Draw.objects.push(clone(a.obj));
  if(a.type==='delete') Draw.objects=Draw.objects.filter(o=>o.id!==a.obj.id);
  if(a.type==='move'||a.type==='scale'){const o=Draw.objects.find(x=>x.id===a.objId);if(o)Object.assign(o,clone(a.to));}
  if(a.type==='edit'){const o=Draw.objects.find(x=>x.id===a.objId);if(o)Object.assign(o,clone(a.to));}
  if(a.type==='stroke'){
    const idx=Draw.objects.findIndex(x=>x.id===a.objId);
    if(idx>=0) Draw.objects[idx]=clone(a.after);
    else Draw.objects.push(clone(a.after));
  }
}

// スタンプ専用キャンバスリスナー（onDownとは独立）
cvs.addEventListener('pointerdown', e => {
  if (S.tool !== 'sticker' || !Draw.pendingStickerId) return;
  e.stopImmediatePropagation();
  const lp = toLogical(e.clientX, e.clientY);
  placeSticker(lp);
}, {capture: false, passive: false});

/* ════ POINTER INPUT ════ */
cvs.addEventListener('pointerdown', e=>{
  e.preventDefault();
  Draw.isPointerDown=true;
  if (S.tool === 'eraser') window._moveEraserCursor && window._moveEraserCursor(e.clientX, e.clientY);
  if (S.tool === 'eraser') window._showEraserCursor && window._showEraserCursor(Math.max(8, Math.round(S.eraserSize * cvs.getBoundingClientRect().width / CANVAS_SRC)));
  onDown(e);
},{passive:false});
cvs.addEventListener('pointermove', e=>{
  e.preventDefault();
  if (S.tool === 'eraser' && Draw.isPointerDown) window._moveEraserCursor && window._moveEraserCursor(e.clientX, e.clientY);
  if(Draw.isPointerDown||Draw.dragInfo) onMove(e);
},{passive:false});
cvs.addEventListener('pointerup', e=>{
  e.preventDefault();
  Draw.isPointerDown=false;
  if (S.tool === 'eraser') window._hideEraserCursor && window._hideEraserCursor();
  cvs.style.cursor = S.tool === 'eraser' ? 'crosshair' : cvs.style.cursor;
  onUp(e);
},{passive:false});
cvs.addEventListener('pointercancel', e=>{
  Draw.isPointerDown=false;
  Draw.dragInfo=null;
  Draw.activeStroke=null;
  window._hideEraserCursor && window._hideEraserCursor();
});
cvs.addEventListener('pointerleave', e=>{

});
cvs.addEventListener('dblclick', e=>{
  if (S.tool!=='select'||!Draw.selId) return;
  const obj=Draw.objects.find(o=>o.id===Draw.selId);
  if (obj&&obj.type==='text') { const lxy=toLogical(e.clientX,e.clientY); showTextInput(obj.x,obj.y,obj); }
});

// prevent browser gestures
cvs.addEventListener('touchstart',e=>e.preventDefault(),{passive:false});

/* ════ PINCH SCALE（selectツール＋選択オブジェクト単体） ════ */
(function() {
  let pinching = false;
  let startDist = 0;
  let startSnapshot = null; // ピンチ開始時のオブジェクトのクローン

  function touchDist(t1, t2) {
    return Math.hypot(t2.clientX - t1.clientX, t2.clientY - t1.clientY);
  }
  function touchMidLogical(t1, t2) {
    return toLogical(
      (t1.clientX + t2.clientX) / 2,
      (t1.clientY + t2.clientY) / 2
    );
  }

  // snapshotを基準に、中心点(cx,cy)からscale倍にオブジェクトを変形
  function applyScale(obj, snap, scale, cx, cy) {
    if (obj.type === 'pen') {
      obj.paths = snap.paths.map(p => ({
        ...p,
        points: p.points.map(pt => ({
          x: cx + (pt.x - cx) * scale,
          y: cy + (pt.y - cy) * scale,
        }))
      }));
      obj.size = snap.size; // 線幅はそのまま
    } else if (obj.type === 'text' || obj.type === 'sticker') {
      obj.x = cx + (snap.x - cx) * scale;
      obj.y = cy + (snap.y - cy) * scale;
      const newSize = (snap.size || 1) * scale;
      if (obj.type === 'text') {
        obj.size = Math.max(10, Math.min(CANVAS_SRC, newSize));
      } else {
        obj.size = Math.max(20, Math.min(CANVAS_SRC, newSize));
      }
    }
  }

  cvs.addEventListener('touchstart', e => {
    if (e.touches.length !== 2) return;
    if (S.tool !== 'select' || !Draw.selId) return;
    const obj = Draw.objects.find(o => o.id === Draw.selId);
    if (!obj) return;
    e.preventDefault();
    pinching = true;
    Draw.isPointerDown = false;
    Draw.activeStroke = null;
    startDist     = touchDist(e.touches[0], e.touches[1]);
    startSnapshot = clone(obj);
  }, { passive: false });

  cvs.addEventListener('touchmove', e => {
    if (!pinching || e.touches.length !== 2) return;
    e.preventDefault();
    const obj = Draw.objects.find(o => o.id === Draw.selId);
    if (!obj || !startSnapshot) { pinching = false; return; }
    const d     = touchDist(e.touches[0], e.touches[1]);
    const scale = Math.max(0.1, d / startDist);
    const mid   = touchMidLogical(e.touches[0], e.touches[1]);
    applyScale(obj, startSnapshot, scale, mid.x, mid.y);
    redraw();
  }, { passive: false });

  cvs.addEventListener('touchend', e => {
    if (!pinching) return;
    if (e.touches.length < 2) {
      pinching = false;
      const obj = Draw.objects.find(o => o.id === Draw.selId);
      if (obj && startSnapshot) {
        pushUndo({ type: 'scale', objId: obj.id, from: startSnapshot, to: clone(obj) });
        flushCell();
      }
      startSnapshot = null;
    }
  }, { passive: false });
})();

function onDown(e) {
  if (document.getElementById('ctx-day-obj').classList.contains('open') ||
      document.getElementById('ctx-day-paste').classList.contains('open')) return;
  closeContextMenus();
  const {clientX,clientY} = evtCoords(e);
  const lp = toLogical(clientX,clientY);
  const pp = toPhysical(clientX,clientY);

  if (S.tool==='select') {
    // ×ボタンのヒットテスト
    if (Draw.selId) {
      const obj = Draw.objects.find(o=>o.id===Draw.selId);
      if (obj && hitDeleteBtn(obj,pp.x,pp.y)) {
        deleteObj(Draw.selId); Draw.selId=null; redraw(); return;
      }
    }

    // オブジェクトのヒットテスト（選択済み優先）
    let found = null;
    if (Draw.selId) {
      const selObj = Draw.objects.find(o=>o.id===Draw.selId);
      if (selObj && hitObj(selObj,pp.x,pp.y)) found = selObj;
    }
    if (!found) {
      for (let i=Draw.objects.length-1;i>=0;i--) {
        if (hitObj(Draw.objects[i],pp.x,pp.y)) { found=Draw.objects[i]; break; }
      }
    }

    if (found) {
      // オブジェクトにヒット → 即選択 ＋ ドラッグ待機
      Draw.selId = found.id;
      redraw();

      const origObj  = clone(found);
      let   didAction = false;

      // ドラッグ検出（6px以上動いたら開始）
      const onTryDrag = mv => {
        const {clientX:mx, clientY:my} = evtCoords(mv);
        if (Math.hypot(mx-clientX, my-clientY) > 6) {
          didAction = true;
          document.removeEventListener('pointermove', onTryDrag);
          document.removeEventListener('pointerup', onUpAfterHit);
          // ドラッグ開始（sx/sy は pointerdown 時の論理座標を起点に）
          Draw.dragInfo = {objId: found.id, sx: lp.x, sy: lp.y, origObj};
        }
      };

      const onUpAfterHit = () => {
        document.removeEventListener('pointermove', onTryDrag);
        // 動かずに離した → 選択確定（何もしない、selIdはそのまま）
      };

      document.addEventListener('pointermove', onTryDrag);
      document.addEventListener('pointerup', onUpAfterHit, {once:true});
      return;
    }

    // オブジェクト外 → 選択解除
    Draw.selId = null;
    redraw();
    return;
  }

  if (S.tool==='pen') {
    startPenStroke(S.penColor, S.penSize, lp);
    return;
  }
  if (S.tool==='marker') {
    startPenStroke(S.markerColor, S.markerSize, lp, 0.35);
    return;
  }
  if (S.tool==='eraser') {
    eraseAt(lp); return;
  }
  if (S.tool==='text') {
    showTextInput(lp.x,lp.y,null); return;
  }
  if (S.tool==='sticker') {
    if (Draw.pendingStickerId) {
      placeSticker(lp);
    }
    return;
  }
}

function onMove(e) {
  const {clientX,clientY} = evtCoords(e);
  const lp = toLogical(clientX,clientY);

  if (Draw.dragInfo) {
    const obj=Draw.objects.find(o=>o.id===Draw.dragInfo.objId);
    if (obj) { shiftObj(obj,lp.x-Draw.dragInfo.sx,lp.y-Draw.dragInfo.sy,Draw.dragInfo.origObj); redraw(); }
    return;
  }
  if (S.tool==='pen'&&Draw.activeStroke) { Draw.activeStroke.points.push(lp); redraw(); return; }
  if (S.tool==='marker'&&Draw.activeStroke) { Draw.activeStroke.points.push(lp); redraw(); return; }
  if (S.tool==='eraser') eraseAt(lp);
}

function onUp(e) {
  if (Draw.dragInfo) {
    const obj=Draw.objects.find(o=>o.id===Draw.dragInfo.objId);
    if (obj) { pushUndo({type:'move',objId:obj.id,from:Draw.dragInfo.origObj,to:clone(obj)}); flushCell(); }
    Draw.dragInfo=null; redraw(); return;
  }
  if ((S.tool==='pen'||S.tool==='marker')&&Draw.activeStroke) {
    endPenStroke();
    return;
  }
}

function shiftObj(obj,dx,dy,orig) {
  if (obj.type==='pen') {
    obj.paths=orig.paths.map(p=>({...p,points:p.points.map(pt=>({x:pt.x+dx,y:pt.y+dy}))}));
  } else { obj.x=orig.x+dx; obj.y=orig.y+dy; }
}

/* ════ ERASER ════ */
function eraseAt(lp) {
  const r=S.eraserSize/2; let dirty=false;
  Draw.objects=Draw.objects.filter(obj=>{
    if (obj.type!=='pen') return true;
    const newPaths=[];
    obj.paths.forEach(path=>{
      let cur=[];
      path.points.forEach(pt=>{
        if (Math.hypot(pt.x-lp.x,pt.y-lp.y)<r) {
          if (cur.length>=2) newPaths.push({...path,points:cur});
          cur=[]; dirty=true;
        } else cur.push(pt);
      });
      if (cur.length>=2) newPaths.push({...path,points:cur});
    });
    obj.paths=newPaths; return obj.paths.length>0;
  });
  if (dirty){redraw();flushCell();}
}

/* ════ TEXT ════ */
function showTextInput(x,y,editObj) {
  removeTextInput();
  const r  = cvs.getBoundingClientRect();
  const sc = r.width/CANVAS_SRC;
  const ta = document.createElement('textarea');
  ta.style.cssText=`position:fixed;left:${r.left+x*sc}px;top:${r.top+y*sc}px;
    font:${(editObj?.size||S.textSize)*sc}px 'Noto Sans JP',sans-serif;
    color:${editObj?.color||S.textColor};min-width:80px;min-height:28px;
    border:1.5px dashed #3a6fa8;background:rgba(255,255,255,.93);
    outline:none;resize:none;padding:2px 4px;line-height:1.35;
    border-radius:3px;z-index:600;`;
  if (editObj) ta.value=editObj.text||'';
  document.body.appendChild(ta); ta.focus();
  Draw.activeTextEl={el:ta,x,y,editObj};
  const fin=ev=>{if(ev.target!==ta){finalizeText();document.removeEventListener('pointerdown',fin,true);}};
  setTimeout(()=>document.addEventListener('pointerdown',fin,true),80);
}

function finalizeText() {
  if (!Draw.activeTextEl) return;
  const {el,x,y,editObj}=Draw.activeTextEl;
  const txt=el.value;
  if (txt.trim()) {
    if (editObj) {
      const prev=clone(editObj); editObj.text=txt;
      pushUndo({type:'edit',objId:editObj.id,from:prev,to:clone(editObj)});
    } else {
      const obj={id:uid(),type:'text',x,y,text:txt,color:S.textColor,size:S.textSize};
      pushUndo({type:'create',obj:clone(obj)}); Draw.objects.push(obj);
    }
    flushCell(); redraw();
  }
  el.remove(); Draw.activeTextEl=null;
}
function removeTextInput(){if(Draw.activeTextEl){activeTextEl.el.remove();Draw.activeTextEl=null;}}

/* ════ STICKER ════ */
(function(){
  const dropdown = document.getElementById('stk-dropdown');
  const grid     = document.getElementById('stk-grid');

  // 起動時に全スタンプをプリロード
  preloadStickerImages();

  // グリッドを一度だけ構築
  STICKERS.forEach(s => {
    const el = document.createElement('div');
    el.className = 'stk-inline-item';
    el.dataset.sid = s.id;
    el.title = s.label || s.id;

    const pc = document.createElement('canvas');
    pc.width = 40; pc.height = 40;
    el.appendChild(pc);

    // ロード完了時にグリッドのサムネを更新するリフレッシュ関数
    el._refresh = () => {
      const img = imgCache[s.id];
      const c2  = pc.getContext('2d');
      c2.clearRect(0, 0, 40, 40);
      if (img) {
        const {w, h} = stickerDrawSize(img, 36); // 縦横比を保持してサイズ計算
        const x = (40 - w) / 2;
        const y = (40 - h) / 2;
        c2.drawImage(img, x, y, w, h);
      }
    };
    el._refresh();

    el.addEventListener('pointerdown', e => {
      e.stopPropagation();
      e.preventDefault();
      Draw.pendingStickerId = s.id;
      cvs.style.cursor = 'copy';
      grid.querySelectorAll('.stk-inline-item').forEach(x =>
        x.classList.toggle('stk-selected', x.dataset.sid === s.id));
      dropdown.classList.remove('open');
      renderOpts();
    });
    // pointerupもキャプチャして伝播を止める（カレンダー遷移リスナーへの到達を防ぐ）
    el.addEventListener('pointerup', e => {
      e.stopPropagation();
      e.preventDefault();
    }, { capture: true });
    grid.appendChild(el);
  });

  // imgCache に画像が追加されたときグリッドを再描画（preloadStickerImages の onload から呼ばれる）
  window._stickerGridRefresh = () => {
    grid.querySelectorAll('.stk-inline-item').forEach(el => {
      if (el._refresh) el._refresh();
    });
  };

  window.openStickerDropdown = function() {
    preloadStickerImages();
    // offsetParentで実際に表示されているサイドバーを判定
    const sidebarLand = document.getElementById('day-sidebar-land');
    const isLandMode = sidebarLand && sidebarLand.offsetParent !== null;
    const btn = isLandMode
      ? document.querySelector('.land-tool-btn[data-tool="sticker"]')
      : document.querySelector('.tool-btn[data-tool="sticker"]');
    if (btn) {
      const r = btn.getBoundingClientRect();
      const dropW = Math.min(360, window.innerWidth * 0.9);
      if (isLandMode) {
        // 横長: サイドバー(310px)の右端にドロップダウンを表示
        const dropH = 280;
        const top = Math.min(r.top, window.innerHeight - dropH - 6);
        dropdown.style.top  = Math.max(0, top) + 'px';
        dropdown.style.left = (310 + 8) + 'px';
      } else {
        // 縦長: ボタンの下、右端が画面外に出ないよう調整
        dropdown.style.top  = (r.bottom + 6) + 'px';
        dropdown.style.left = Math.min(r.left, window.innerWidth - dropW - 8) + 'px';
      }
    }
    dropdown.classList.add('open');
  };

  window.closeStickerDropdown = function() {
    dropdown.classList.remove('open');
  };

  // ドロップダウン外 pointerdown（キャプチャフェーズ）で閉じる
  // キャプチャフェーズを使うことで stopPropagation の影響を受けずに確実に検出
  document.addEventListener('pointerdown', e => {
    if (dropdown.classList.contains('open') && !dropdown.contains(e.target)) {
      dropdown.classList.remove('open');
    }
  }, false);
})();

function placeSticker(lp) {
  if (!Draw.pendingStickerId) return;
  const img = imgCache[Draw.pendingStickerId];
  const sid = Draw.pendingStickerId;

  // 配置後すぐにリセット（続けてタップしても配置されないよう）
  Draw.pendingStickerId = null;
  cvs.style.cursor = 'crosshair';
  renderOpts();

  const doPlace = () => {
    const obj = {id:uid(), type:'sticker', stickerId:sid, x:lp.x, y:lp.y, size:132};
    pushUndo({type:'create', obj:clone(obj)});
    Draw.objects.push(obj);
    flushCell();
    redraw();
  };

  if (img instanceof Image) {
    doPlace();
  } else {
    let waited = 0;
    const timer = setInterval(() => {
      waited += 50;
      if (imgCache[sid] instanceof Image) {
        clearInterval(timer);
        doPlace();
      } else if (waited >= 2000) {
        clearInterval(timer);
      }
    }, 50);
  }
}

/* ════ DELETE / FLUSH ════ */
function deleteObj(id){
  const obj=Draw.objects.find(o=>o.id===id); if(!obj) return;
  pushUndo({type:'delete',obj:clone(obj)});
  Draw.objects=Draw.objects.filter(o=>o.id!==id); flushCell(); redraw();
}

function flushCell(){
  if (!S.currentKey) return;
  getActiveCalendar().cellData[S.currentKey] = clone(Draw.objects);
  saveToStorage();
  renderMiniCanvases();
}

/* ════ UNDO/REDO ════ */

// 現在開いているセルのキー（goBackで戻る先のミニキャンバスを特定するため）

function openDayCell(key, label) {
  Cal.selObjId=null; Cal.selCellKey=null;
  S.clipboard=null;
  finalizePenObjs(); removeTextInput();
  S.currentKey=key;
  Cal.currentCellKey=key;
  Draw.objects=clone(getCellObjs(key));
  Draw.undoStk=[]; Draw.redoStk=[]; Draw.selId=null;
  Draw.activePenObjRef=null; Draw.activeStroke=null;
  syncUR();

  const l = L();
  const isEn = S.lang === 'en';
  const isBlank = key.includes('-pre-') || key.includes('-post-');
  const memoLabel = isEn ? 'Memo' : 'メモ';
  const labelStr = isBlank ? memoLabel
    : (typeof label === 'number') ? (isEn ? String(label) : label + '日')
    : (label || memoLabel);
  document.getElementById('day-num-p').textContent = labelStr;
  document.getElementById('day-num-l').textContent = labelStr;

  const subStr = isEn
    ? `${l.months[S.month]} ${S.year}`
    : `${S.year}年 ${S.month+1}月`;
  document.getElementById('day-sub-p').textContent = subStr;
  document.getElementById('day-sub-l').textContent = subStr;

  const DOW_JA = ['日','月','火','水','木','金','土'];
  const DOW_EN = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const dowArr = isEn ? DOW_EN : DOW_JA;
  const dowStr = (!isBlank && typeof label === 'number')
    ? dowArr[new Date(S.year, S.month, label).getDay()]
    : '';
  document.getElementById('day-dow-p').textContent = dowStr;
  document.getElementById('day-dow-l').textContent = dowStr;

  // ── ミニキャンバスの rect を取得（アニメーション開始位置） ──
  const miniMc = document.querySelector(`.cell-preview canvas[data-key="${key}"]`);
  const fromRect = miniMc ? miniMc.getBoundingClientRect() : null;

  // 日付セル画面を不可視で先に表示してキャンバスを確定
  showScreen('day');
  updateOrientation();
  sizeCanvas();
  switchTool('pen');

  if (!fromRect || fromRect.width < 2) return; // アニメーション不可なら即表示

  // ── アニメーション開始位置・終了位置 ──
  const toRect = cvs.getBoundingClientRect();

  // トランジションキャンバスにミニキャンバスの内容を描画
  const tc  = document.getElementById('transition-canvas');
  const ctx2 = tc.getContext('2d');
  const dpr = window.devicePixelRatio || 1;

  // 終了サイズで解像度を確保
  tc.width  = toRect.width  * dpr;
  tc.height = toRect.height * dpr;
  ctx2.scale(dpr, dpr);

  // セルのオブジェクトを描画（論理座標 CANVAS_SRC → toRect.width に変換）
  const sc = toRect.width / CANVAS_SRC;
  ctx2.fillStyle = '#fff';
  ctx2.fillRect(0, 0, toRect.width, toRect.height);
  Draw.objects.forEach(o => drawObj(ctx2, o, sc));

  // 初期位置・サイズをfromRectに合わせて配置
  Object.assign(tc.style, {
    display:    'block',
    left:       fromRect.left + 'px',
    top:        fromRect.top  + 'px',
    width:      fromRect.width  + 'px',
    height:     fromRect.height + 'px',
    transform:  'none',
    transition: 'none',
    opacity:    '1',
  });

  // 日付セル画面本体は一時的に透明に
  document.getElementById('day-screen').style.opacity = '0';

  // 1フレーム待ってからアニメーション開始
  requestAnimationFrame(() => requestAnimationFrame(() => {
    const dx = toRect.left - fromRect.left;
    const dy = toRect.top  - fromRect.top;
    const sx = toRect.width  / fromRect.width;
    const sy = toRect.height / fromRect.height;

    tc.style.transition = 'transform 0.4s cubic-bezier(0.4,0,0.2,1), opacity 0.4s';
    tc.style.transformOrigin = '0 0';
    tc.style.transform = `translate(${dx}px, ${dy}px) scale(${sx}, ${sy})`;

    // アニメーション完了後の後処理
    const fallback = setTimeout(() => {
      tc.style.display = 'none';
      tc.style.transform = 'none';
      document.getElementById('day-screen').style.opacity = '1';
    }, 600);
    tc.addEventListener('transitionend', () => {
      clearTimeout(fallback);
      tc.style.display = 'none';
      tc.style.transform = 'none';
      document.getElementById('day-screen').style.opacity = '1';
    }, {once: true});
  }));
}

function goBack(){
  finalizePenObjs(); finalizeText();
  Draw.undoStk=[]; Draw.redoStk=[];
  S.clipboard=null;

  // 消しゴムカーソルを非表示に
  window._hideEraserCursor && window._hideEraserCursor();

  // データ保存
  if (S.currentKey) {
    getActiveCalendar().cellData[S.currentKey] = clone(Draw.objects);
  }

  // currentKeyをクリア（以降のflushCell呼び出しで上書きされないよう）
  S.currentKey = null;

  // fromRect を showScreen 前に取得
  const fromRect = cvs.getBoundingClientRect();

  // カレンダー画面に切り替え
  document.getElementById('cal-screen').style.opacity = '1';
  showScreen('calendar');
  renderCalendar();

  // transition-canvasが残っていたらリセット
  const tc = document.getElementById('transition-canvas');
  if (tc) { tc.style.display = 'none'; tc.style.transform = 'none'; }

  const doAnim = () => {
    const miniMc = Cal.currentCellKey
      ? document.querySelector(`.cell-preview canvas[data-key="${Cal.currentCellKey}"]`)
      : null;
    const toRect = miniMc ? miniMc.getBoundingClientRect() : null;

    if (!fromRect || fromRect.width < 2 || !toRect || toRect.width < 2) {
      renderMiniCanvases(); return;
    }

    const ctx2 = tc.getContext('2d');
    const dpr  = window.devicePixelRatio || 1;
    tc.width   = fromRect.width  * dpr;
    tc.height  = fromRect.height * dpr;
    ctx2.scale(dpr, dpr);
    ctx2.fillStyle = '#fff';
    ctx2.fillRect(0, 0, fromRect.width, fromRect.height);
    const sc = fromRect.width / CANVAS_SRC;
    getCellObjs(Cal.currentCellKey).forEach(o => drawObj(ctx2, o, sc));

    Object.assign(tc.style, {
      display:         'block',
      left:            fromRect.left   + 'px',
      top:             fromRect.top    + 'px',
      width:           fromRect.width  + 'px',
      height:          fromRect.height + 'px',
      transform:       'none',
      transition:      'none',
      opacity:         '1',
    });

    document.getElementById('cal-screen').style.opacity = '0';

    requestAnimationFrame(() => requestAnimationFrame(() => {
      const sx = toRect.width  / fromRect.width;
      const sy = toRect.height / fromRect.height;
      const dx = toRect.left - fromRect.left;
      const dy = toRect.top  - fromRect.top;

      tc.style.transition      = 'transform 0.4s cubic-bezier(0.4,0,0.2,1), opacity 0.4s';
      tc.style.transformOrigin = '0 0';
      tc.style.transform       = `translate(${dx}px, ${dy}px) scale(${sx}, ${sy})`;

      const finish = () => {
        tc.style.display   = 'none';
        tc.style.transform = 'none';
        document.getElementById('cal-screen').style.opacity = '1';
        renderMiniCanvases();
      };
      const fallback = setTimeout(finish, 600);
      tc.addEventListener('transitionend', () => {
        clearTimeout(fallback); finish();
      }, { once: true });
    }));
  };

  setTimeout(doAnim, 80);
}
document.getElementById('btn-back').addEventListener('click', goBack);
document.getElementById('btn-back-land').addEventListener('click', goBack);

// 当月のセル記述子を使って前後のkeyを取得（blankはスキップして隣の有効セルへ）
function getAdjacentCellKey(currentKey, dir) {
  const descs = buildCellDescs(); // 現在のS.year/S.monthで生成
  // blank・dateセルだけ対象（inactiveは除く）
  const cells = descs.filter(d => d.type === 'date' || d.type === 'blank');
  const idx = cells.findIndex(d => d.key === currentKey);
  if (idx < 0) return null;
  const next = idx + dir;
  if (next < 0 || next >= cells.length) return null;
  return cells[next].key;
}

function navigateDayCell(dir) {
  // 現在のセルを保存
  finalizePenObjs(); finalizeText();
  if (S.currentKey) {
    getActiveCalendar().cellData[S.currentKey] = clone(Draw.objects);
    saveToStorage();
  }
  const nextKey = getAdjacentCellKey(S.currentKey, dir);
  if (!nextKey) return;

  const descs = buildCellDescs();
  const desc = descs.find(d => d.key === nextKey);
  const label = desc && desc.type === 'date' ? desc.d : undefined;

  const dayScreen = document.getElementById('day-screen');
  const inClass  = dir > 0 ? 'draw-slide-in-right' : 'draw-slide-in-left';
  const outClass = dir > 0 ? 'draw-slide-out-left'  : 'draw-slide-out-right';

  // 旧画面をクローンして絶対配置で重ねる
  const oldClone = dayScreen.cloneNode(true);
  oldClone.id = 'day-screen-old';
  // id衝突防止・activeクラス除去
  oldClone.querySelectorAll('[id]').forEach(el => el.removeAttribute('id'));
  oldClone.querySelectorAll('.active').forEach(el => el.classList.remove('active'));
  oldClone.style.cssText += ';pointer-events:none;z-index:10;';
  dayScreen.parentNode.appendChild(oldClone);

  // 新しいセルを開く
  openDayCell(nextKey, label);

  // アニメーション
  requestAnimationFrame(() => requestAnimationFrame(() => {
    oldClone.classList.add(outClass);
    dayScreen.classList.add(inClass);

    const cleanup = () => {
      oldClone.remove();
      dayScreen.classList.remove(inClass);
    };
    dayScreen.addEventListener('animationend', cleanup, { once: true });
    setTimeout(cleanup, 500);
  }));
}

// topbar（縦長）フリック検出
;(function() {
  const topbar = document.getElementById('day-topbar');
  let sx = 0, sy = 0, st = 0;
  topbar.addEventListener('touchstart', e => {
    if (e.touches.length !== 1) return;
    sx = e.touches[0].clientX;
    sy = e.touches[0].clientY;
    st = Date.now();
  }, { passive: true });
  topbar.addEventListener('touchend', e => {
    if (e.changedTouches.length !== 1) return;
    const dx = e.changedTouches[0].clientX - sx;
    const dy = e.changedTouches[0].clientY - sy;
    const dt = Math.max(1, Date.now() - st);
    if (Math.abs(dy) > Math.abs(dx)) return;
    if (Math.abs(dx) < 30 || Math.abs(dx) / dt < 0.2) return;
    navigateDayCell(dx < 0 ? 1 : -1);
  }, { passive: true });
})();

// パレットのスウォッチHTMLを生成するヘルパー
function buildSwatchesHTML(id, dataAttr, currentColor) {
  const items = PALETTE.map(c => {
    const on = c.hex === currentColor ? ' on' : '';
    return `<div class="swatch${on}" ${dataAttr}="${c.hex}" style="background:${c.hex}" title="${c.label}"></div>`;
  }).join('');
  return `<div class="swatches" id="${id}">${items}</div>`;
}

function buildOptsHTML(tool) {
  if (tool === 'pen') {
    return `
      <div class="opt-block">
        ${buildSwatchesHTML('po-colors', 'data-color', S.penColor)}
      </div>
      <div class="opt-block">
        <div class="sz-row">
          <button class="sz-btn${S.penSize===3?' on':''}" data-size="3">
            <span class="dot" style="width:8px;height:8px"></span>

/* ── カスタムカーソル ──
   消しゴムは「消せる範囲」を示す円をカーソルとして表示する。
   CANVAS_SRC(600)の論理サイズ → 実際の画面ピクセルに換算して円のサイズを決める。
*/
function applyCanvasCursor(tool) {
  if (tool === 'eraser') {
    setEraserCursor();
  } else {
    window._hideEraserCursor && window._hideEraserCursor();
    if (tool === 'select') {
      cvs.style.cursor = 'default';
    } else if (tool === 'sticker') {
      cvs.style.cursor = Draw.pendingStickerId ? 'copy' : 'default';
    } else {
      cvs.style.cursor = 'crosshair';
    }
  }
}

/* ── 消しゴムカーソル（DOM要素追従方式・Safari対応） ── */
(function() {
  let eraserEl = null;

  function getOrCreateEraserEl() {
    if (!eraserEl) {
      eraserEl = document.createElement('div');
      eraserEl.id = '_eraser-cursor';
      eraserEl.style.cssText = `
        position: fixed; pointer-events: none; z-index: 9998;
        border-radius: 50%;
        border: 1.5px solid rgba(0,0,0,0.6);
        box-shadow: 0 0 0 1px rgba(255,255,255,0.8);
        transform: translate(-50%, -50%);
        display: none;
      `;
      document.body.appendChild(eraserEl);
    }
    return eraserEl;
  }

  window._showEraserCursor = function(size) {
    const el = getOrCreateEraserEl();
    el.style.width  = size + 'px';
    el.style.height = size + 'px';
    el.style.display = 'block';
    cvs.style.cursor = 'none';
  };

  window._hideEraserCursor = function() {
    if (eraserEl) eraserEl.style.display = 'none';
    cvs.style.cursor = 'crosshair';
  };

  window._moveEraserCursor = function(x, y) {
    if (eraserEl && eraserEl.style.display !== 'none') {
      eraserEl.style.left = x + 'px';
      eraserEl.style.top  = y + 'px';
    }
  };
})();

function setEraserCursor() {
  // タッチ中のみ表示するためここでは非表示のまま（pointerdownで表示）
  window._hideEraserCursor && window._hideEraserCursor();
  cvs.style.cursor = 'crosshair';
}

function isLandscapeCalendar() {

// ── 曜日ヘッダーを描画 ──
function renderWeekdayHeader(headers) {
