<title>Calapp</title>

<style>
/* ════════════════════════════════════════════
   DESIGN TOKENS
════════════════════════════════════════════ */
:root {
  /* Layout */
  --toolbar-h: 152px;
  --sidebar-w: 310px;
  --r:         6px;

  /* Colors — surface */
  --bg:          #f5f3ef;
  --surface:     #ffffff;
  --inactive-bg: #faf9f7;

  /* Colors — ink */
  --ink:       #2c2a26;
  --ink-mid:   #6b6962;
  --ink-faint: #a09d98;

  /* Colors — border */
  --border:      rgba(44,42,38,.18);
  --border-soft: rgba(44,42,38,.30);
  --border-bold: rgba(44,42,38,.35);

  /* Colors — interaction */
  --tool-hover:  rgba(44,42,38,.07);
  --tool-active: #2c2a26;

  /* Colors — semantic */
  --today-ring: #c8a84b;
  --sun-bg:     transparent;
  --sun-txt:    #b42828;
  --sat-bg:     transparent;
  --sat-txt:    #2850b4;
  --hol-bg:     transparent;
  --hol-txt:    #b42828;

  /* Shadow */
  --shadow-md:  0 4px 20px rgba(0,0,0,.10);
  --shadow-sm:  0 2px 12px rgba(0,0,0,.10);

  /* 期間ドット */
  --dot-size:       12px;  /* 見た目のサイズ */
  --dot-hit-extra:  6px;   /* ヒットエリア拡張（padding） */

  /* Typography */
  --font-body: 'M PLUS Rounded 1c', 'Hiragino Sans', sans-serif;
  --font-disp: 'M PLUS Rounded 1c', 'Hiragino Sans', sans-serif;
}

/* ════════════════════════════════════════════
   RESET & BASE
════════════════════════════════════════════ */
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}
html, body {
  height: 100%;
  overflow: hidden;
  background: var(--bg);
  font-family: var(--font-body);
  color: var(--ink);
  user-select: none;
  -webkit-user-select: none;
  -webkit-touch-callout: none;
}
button:focus,
button:active,
button:focus-visible { outline: none; background: transparent; }

/* ════════════════════════════════════════════
   SCREENS
════════════════════════════════════════════ */
.screen         { display: none; position: absolute; inset: 0; flex-direction: column; }
.screen.active  { display: flex; }

/* ════════════════════════════════════════════
   SHARED — アイコンボタン
════════════════════════════════════════════ */
.icon-btn {
  width: 34px;
  height: 34px;
  border: none;
  background: transparent;
  cursor: pointer;
  border-radius: var(--r);
  color: var(--ink);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  outline: none;
  -webkit-appearance: none;
  transition: color 0.2s ease;
}
@media (hover: hover) { .icon-btn:hover { background: var(--tool-hover); } }
.icon-btn:focus,
.icon-btn:active,
.icon-btn:focus-visible,
.icon-btn:focus:not(:focus-visible) { outline: none; background: transparent; }
.icon-btn svg         { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
.icon-btn svg.filled  { fill: currentColor; stroke: none; }
#btn-prev, #btn-next  { width: 68px; height: 51px; }
#btn-prev svg, #btn-next svg { width: 36px; height: 27px; }

/* ════════════════════════════════════════════
   SHARED — Undo/Redoボタン
════════════════════════════════════════════ */
.ur-btn {
  background: none;
  border: none;
  cursor: pointer;
  padding: 6px 8px;
  color: var(--ink);
  border-radius: var(--r);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background .12s, opacity .12s;
  -webkit-tap-highlight-color: transparent;
  -webkit-appearance: none;
  outline: none;
}
.ur-btn:hover                        { background: var(--tool-hover); }
.ur-btn:focus,
.ur-btn:active,
.ur-btn:focus-visible                { outline: none; background: transparent; }
.ur-btn:disabled                     { opacity: .28; cursor: default; }
.ur-btn svg { width: 24px; height: 24px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }

/* ════════════════════════════════════════════
   CALENDAR SCREEN — ヘッダー
════════════════════════════════════════════ */
.cal-header {
  display: flex;
  flex-direction: column;
  background: var(--surface);
  flex-shrink: 0;
  position: relative;
}

/* タブ行 */
.cal-header-top {
  display: flex;
  align-items: flex-end;
  padding: 14px 12px 0 8px;
  border-bottom: 2px solid rgba(44,42,38,.35);
  position: relative;
  transition: background 0.2s ease, border-bottom-color 0.2s ease;
}
.cal-header-top-right {
  display: flex;
  align-items: center;
  gap: 0;
  flex-shrink: 0;
  position: absolute;
  right: 12px;
  top: 0;
  bottom: 0;
}
.cal-tabs {
  display: flex;
  align-items: flex-end;
  gap: 2px;
  flex: 1;
  overflow-x: auto;
  overflow-y: hidden;
  scrollbar-width: none;
  padding-top: 6px;
}
.cal-tabs::-webkit-scrollbar { display: none; }
.cal-tab {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 7px 14px 6px;
  background: none;
  border: 2px solid transparent;
  border-bottom: none;
  border-radius: var(--r) var(--r) 0 0;
  cursor: pointer;
  font-size: 13px;
  font-weight: 500;
  font-family: var(--font-body);
  color: var(--ink-faint);
  white-space: nowrap;
  position: relative;
  z-index: 0;
  transition: background 0.2s ease, color 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
  user-select: none;
  -webkit-user-select: none;
  -webkit-touch-callout: none;
}
.cal-tab:hover  { background: var(--tool-hover); color: var(--ink); }
.cal-tab.active {
  background: var(--surface);
  color: var(--ink);
  border-color: rgba(44,42,38,.35);
  font-weight: 600;
  z-index: 2;
  box-shadow: -2px -6px 6px rgba(0,0,0,.08), 2px -6px 6px rgba(0,0,0,.08);
  clip-path: inset(-20px -20px -2px -20px);
}
/* アクティブタブ直下の罫線消し（JS制御） */
#cal-tab-border-eraser {
  position: absolute;
  height: 2px;
  background: var(--surface);
  z-index: 10;
  pointer-events: none;
  transition: background 0.2s ease;
}
.cal-tab-input {
  font-size: 13px;
  font-weight: 600;
  font-family: var(--font-body);
  border: none;
  outline: none;
  background: transparent;
  color: var(--ink);
  min-width: 40px;
  padding: 0;
}

/* 月ナビ行 */
.cal-header-nav {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 16px 16px;
  position: relative;
  transition: background 0.2s ease;
  z-index: 20;
}
.cal-nav-left, .cal-nav-right {
  display: flex;
  align-items: center;
  gap: 4px;
  flex: 1;
}
.cal-nav-right    { justify-content: flex-end; }
.today-pill-btn {
  font-family: var(--font-body);
  font-size: 12px;
  font-weight: 600;
  color: var(--ink);
  background: var(--surface);
  border: 1.5px solid rgba(44,42,38,.25);
  border-radius: 999px;
  padding: 4px 12px;
  cursor: pointer;
  white-space: nowrap;
  transition: opacity .2s, background .12s;
  box-shadow: 0 1px 4px rgba(0,0,0,.08);
}
.today-pill-btn:hover { background: var(--tool-hover); }
/* カレンダー画面：▶の右にフロー配置（中央グループの外） */
.cal-today-btn { margin-left: 4px; }
/* 横長：戻るボタンと Today を同一行に */
.land-back-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  width: 100%;
}
.cal-title {
  font-family: var(--font-disp);
  font-size: 36px;
  font-weight: 700;
  letter-spacing: .02em;
  text-align: center;
  display: flex;
  align-items: center;
  gap: 6px;
  justify-content: center;
  white-space: nowrap;
  transition: color 0.2s ease;
}
.cal-title-year { font-size: 18px; color: inherit; font-family: var(--font-body); font-weight: 700; }

/* ════════════════════════════════════════════
   CALENDAR SCREEN — 曜日ヘッダー & グリッド
════════════════════════════════════════════ */
.cal-weekdays {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  background: var(--surface);
  border-bottom: 1px solid var(--border-soft);
  flex-shrink: 0;
  position: relative;
  z-index: 20;
}
.wd {
  text-align: center;
  padding: 5px 0;
  font-size: 14px;
  font-weight: 500;
  letter-spacing: .08em;
  color: var(--ink-faint);
}
.wd.sun { color: var(--sun-txt); }
.wd.sat { color: var(--sat-txt); }

.cal-grid-area {
  display: flex;
  flex-direction: column;
  flex: 1;
  min-height: 0;
  overflow: visible;
  position: relative;
  background: var(--bg);
}
.cal-wd-grid-wrap {
  display: flex;
  flex-direction: column;
  flex: 1;
  min-height: 0;
  position: relative;
  overflow: hidden;
}
/* 期間枠バー */
.cal-span-bar {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 14px;
  background: var(--surface);
  border: none;
  flex-shrink: 0;
  min-height: 36px;
  padding: 4px 12px;
  position: absolute;
  left: 0; right: 0; top: 0;
  transition: transform 0.4s ease;
  z-index: 10;
}
/* 期間バー非表示状態：上にスライドアップ */
.cal-span-bar.span-hidden {
  transform: translateY(-100%);
  pointer-events: none;
}
/* cal-span-bar のラッパー：スペーサーとして高さを保持 */
#cal-span-bar-wrap {
  flex-shrink: 0;
  position: relative;
  overflow: hidden;
  z-index: 5;
  background: var(--surface); /* 月ナビバー下辺を覆うため必須 */
  /* 高さはcal-span-barと同じ（JSで初期設定） */
}
/* ▲ボタン（期間バー内・左端） */
.span-toggle-btn {
  position: absolute;
  left: 4px;
  top: 50%;
  transform: translateY(-50%);
  background: none;
  border: none;
  cursor: pointer;
  color: var(--ink);
  padding: 10px 12px;
  line-height: 1;
  z-index: 1;
  display: flex;
  align-items: center;
  justify-content: center;
}
/* ▼ボタン（期間バー非表示時・▲ボタンと同じ位置から下スライドイン） */
.span-show-btn {
  position: absolute;
  left: 4px;
  bottom: 0;
  transform: translateY(100%);
  z-index: 5;
  background: none;
  border: none;
  cursor: pointer;
  color: var(--ink);
  padding: 10px 12px;
  line-height: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: transform 0.4s ease;
  pointer-events: none;
  visibility: hidden;
}
.span-show-btn.visible {
  transform: translateY(0);
  pointer-events: auto;
  visibility: visible;
}
.span-bar-dot {
  width: var(--dot-size);
  height: var(--dot-size);
  border-radius: 50%;
  cursor: pointer;
  flex-shrink: 0;
  transition: transform 0.15s ease;
  padding: var(--dot-hit-extra);
  box-sizing: content-box;
  background-clip: content-box;
  user-select: none;
  -webkit-user-select: none;
  -webkit-touch-callout: none;
}
.span-bar-dot:active { transform: scale(1.25); }
#cal-screen { overflow: visible; position: relative; }
/* 期間ドット押下時のセル黒塗りオーバーレイ */
#span-cell-blackout {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 5;
}

.cal-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  overflow: visible;
  border-left: 1px solid var(--border-soft);
  align-content: start;
}

/* セル */
.cal-cell {
  border-right: 1px solid var(--border-soft);
  border-bottom: 1px solid var(--border-soft);
  background: var(--surface);
  cursor: pointer;
  position: relative;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  transition: filter .12s;
  user-select: none;
  -webkit-user-select: none;
  -webkit-touch-callout: none;
}
.cal-cell:active             { filter: brightness(.96); }
.cal-cell.inactive           { background: var(--inactive-bg); pointer-events: none; }
.cal-cell.is-blank           { background: var(--inactive-bg); }
.cal-cell.is-blank .cell-top { background: none; }
.cal-cell.today              { background: #fff8f0; }
.cal-cell.is-sun             { background: #ffffff; }
.cal-cell.is-sat             { background: #ffffff; }
.cal-cell.is-hol             { background: #ffffff; }
.cal-cell.today.is-sun,
.cal-cell.today.is-sat,
.cal-cell.today.is-hol       { background: #fff8f0; }
.cal-cell.drag-over          { background: rgba(58,111,168,.10) !important; box-shadow: inset 0 0 0 2px #3a6fa8; }
.cal-cell.last-row,
.cal-cell.last-row.is-sun,
.cal-cell.last-row.is-sat,
.cal-cell.last-row.is-hol,
.cal-cell.last-row.is-blank  { border-bottom: 2px solid rgba(44,42,38,.35); }

/* セル内レイアウト */
.cell-top {
  display: flex;
  align-items: center;
  gap: 3px;
  padding: 3px 5px 2px;
  flex-shrink: 0;
  height: var(--cell-date-h, 20px);
  overflow: visible;
  background: transparent;
}
.cell-num {
  font-size: 22px;
  font-weight: 700;
  color: var(--ink-mid);
  line-height: 1;
  white-space: nowrap;
  flex-shrink: 0;
}
.cell-hol-name {
  font-size: 11px;
  color: var(--hol-txt);
  line-height: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.cell-preview {
  position: relative;
  overflow: hidden;
  flex-shrink: 0;
}
.cell-remaining { flex: 1; background: transparent; }
.cal-cell.inactive .cell-remaining,
.cal-cell.is-blank .cell-remaining { background: var(--inactive-bg); }

/* セル — 数字カラー */
.cal-cell.today .cell-num  { font-weight: 700; color: var(--ink); }
.cal-cell.is-sun .cell-num { color: var(--sun-txt); }
.cal-cell.is-sat .cell-num { color: var(--sat-txt); }
.cal-cell.is-hol .cell-num { color: var(--hol-txt); }

/* 横長グリッド */
.cal-cell.landscape-cell               { flex-direction: row; }
.cal-cell.landscape-cell .cell-top     { flex-direction: column; align-items: flex-start; justify-content: flex-start; padding: 4px 6px; overflow: visible; height: auto; background: transparent; }
.cal-cell.landscape-cell .cell-num     { font-size: 22px; font-weight: 700; overflow: visible; }
.cal-cell.landscape-cell .cell-hol-name{ font-size: 11px; white-space: nowrap; }
.cal-cell.landscape-cell.is-blank .cell-top { background: none; }

/* ════════════════════════════════════════════
   CALENDAR SCREEN — アニメーション
════════════════════════════════════════════ */
@keyframes cal-fadein          { from { opacity: 0; }          to { opacity: 1; } }
@keyframes slide-in-from-right { from { transform: translateX( 100%); } to { transform: translateX(0); } }
@keyframes slide-in-from-left  { from { transform: translateX(-100%); } to { transform: translateX(0); } }
@keyframes slide-out-to-left   { from { transform: translateX(0); } to { transform: translateX(-100%); } }
@keyframes slide-out-to-right  { from { transform: translateX(0); } to { transform: translateX( 100%); } }

.cal-grid-area.tab-switching { animation: cal-fadein 0.2s ease forwards; }

.cal-grid.slide-in-right,
.draw-slide-in-right  { animation: slide-in-from-right 0.4s cubic-bezier(.4,0,.2,1) forwards; }
.cal-grid.slide-in-left,
.draw-slide-in-left   { animation: slide-in-from-left  0.4s cubic-bezier(.4,0,.2,1) forwards; }
.cal-grid.slide-out-left,
.draw-slide-out-left  { animation: slide-out-to-left   0.4s cubic-bezier(.4,0,.2,1) forwards; }
.cal-grid.slide-out-right,
.draw-slide-out-right { animation: slide-out-to-right  0.4s cubic-bezier(.4,0,.2,1) forwards; }

/* ════════════════════════════════════════════
   DAY CELL SCREEN — 共通
════════════════════════════════════════════ */
#day-screen           { background: var(--bg); }
#day-screen.portrait  { flex-direction: column; }
#day-screen.landscape { flex-direction: row; }

#day-screen.portrait  .day-topbar       { display: flex; }
#day-screen.portrait  .day-sidebar-land { display: none; }
#day-screen.landscape .day-topbar       { display: none; }
#day-screen.landscape .day-sidebar-land { display: flex; }

/* ════════════════════════════════════════════
   DAY CELL SCREEN — 縦長（portrait）
════════════════════════════════════════════ */
.day-topbar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  height: var(--toolbar-h);
  overflow: hidden;
}

/* Row1: 戻る / 日付(中央固定) / Undo */
.tb-row1 {
  display: flex;
  align-items: center;
  padding: 10px 16px 8px;
  flex-shrink: 0;
  position: relative;
}
.day-badge-inline { display: none; }
.day-date-row     { display: none; }

/* 日付グループ — absolute で画面中央固定 */
.day-num-center {
  display: flex;
  align-items: center;
  gap: 0;
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  white-space: nowrap;
  pointer-events: none;
}
.day-nav-btn        { pointer-events: auto; margin: 0 12px; }
.day-num-text-group { display: flex; align-items: center; gap: 8px; pointer-events: auto; cursor: pointer; }
.day-sub-left       { font-size: 14px; font-weight: 700; color: var(--ink); white-space: nowrap; }
.day-num-inner      { font-size: 26px; font-weight: 700; color: var(--ink); line-height: 1; }
.day-dow-right      { font-size: 14px; font-weight: 700; color: var(--ink); white-space: nowrap; }
.ur-row             { display: flex; gap: 2px; padding-right: 8px; align-self: center; margin-left: auto; }

/* 縦長: 戻るボタン */
#btn-back {
  width: 60px;
  height: 60px;
  margin-left: -10px;
  align-self: center;
  background: transparent;
  -webkit-appearance: none;
  outline: none;
}
#btn-back:hover, #btn-back:focus, #btn-back:active { background: transparent !important; outline: none; }
#btn-back svg { width: 43px; height: 30px; }

/* Row2: ツールボタン */
.tb-row2 {
  display: flex;
  align-items: center;
  padding: 0 8px;
  flex-shrink: 0;
}
.tool-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 5px;
  flex: 1;
  padding: 8px 4px;
  background: none;
  border: none;
  cursor: pointer;
  font-size: 13px;
  font-weight: 500;
  color: var(--ink-mid);
  font-family: var(--font-body);
  white-space: nowrap;
  letter-spacing: .02em;
  border-radius: var(--r);
}
.tool-btn svg    { width: 17px; height: 17px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; }
.tool-btn:hover  { background: var(--tool-hover); }
.tool-btn.active { background: var(--tool-active); color: #fff; }

/* Row3: オプション */
.tb-row3 {
  display: flex;
  align-items: center;
  padding: 0 16px;
  gap: 20px;
  flex-shrink: 0;
  min-height: 0;
  flex: 1;
  overflow-x: auto;
  overflow-y: hidden;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
  -webkit-mask-image: linear-gradient(to right, black calc(100% - 32px), transparent 100%);
  mask-image: linear-gradient(to right, black calc(100% - 32px), transparent 100%);
}
.tb-row3::-webkit-scrollbar { display: none; }
.tb-row3 .swatches { flex-wrap: nowrap; }
.tb-row3 .opt-block { flex-shrink: 0; }

/* ════════════════════════════════════════════
   DAY CELL SCREEN — 横長（landscape）
════════════════════════════════════════════ */
.day-sidebar-land {
  background: var(--surface);
  border-right: 1px solid var(--border);
  width: var(--sidebar-w);
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: relative;
  z-index: 1;
}

/* ── 日付エリア（上部固定） ── */
.land-date-area {
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  overflow: hidden;
  position: relative;
  z-index: 0;
  background: var(--surface);
}

/* 戻るボタン: land-back-row 内 */
#btn-back-land {
  width: 66px;
  height: 54px;
}
#btn-back-land:hover, #btn-back-land:focus, #btn-back-land:active { background: transparent !important; outline: none; }
#btn-back-land svg { width: 46px; height: 33px; }

/* 日付テキストエリア（スライドアニメーション対象） */
.land-date-inner {
  display: flex;
  flex-direction: column;
  align-items: center;
  width: 100%;
  padding: 14px 12px 10px;
  background: var(--surface);
}
.land-day-sub {
  font-size: 18px; color: var(--ink); font-weight: 600;
  white-space: nowrap; text-align: center; margin-bottom: 2px;
}

/* 日付行: ナビボタン + 日数字(下揃え) + 曜日 */
.land-date-row      { display: flex; align-items: center; gap: 0; white-space: nowrap; }
.land-num-dow-group { display: flex; align-items: center; gap: 0; }
.land-day-nav-btn   { margin: 0 12px; }
.land-day-nav-btn svg { width: 22px; height: 22px; }
.land-day-num { font-size: 48px; color: var(--ink); font-weight: 700; line-height: 1; white-space: nowrap; }
.land-day-dow { font-size: 18px; color: var(--ink); font-weight: 700; white-space: nowrap; margin-left: 8px; }
/* ── ツールエリア（スクロール可能） ── */
.land-scroll-area {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  scrollbar-width: none;
  padding: 12px 12px 16px;
  display: flex;
  flex-direction: column;
  gap: 0;
  position: relative;
  z-index: 1;
  background: var(--surface);
}
.land-scroll-area::-webkit-scrollbar { display: none; }

/* ツールグリッド: flexboxで4行制御 */
.land-tool-group {
  display: flex;
  flex-direction: column;
  gap: 5px;
}
.land-tool-row {
  display: flex;
  gap: 5px;
}
/* 全ボタン：flex伸縮させず固定幅（行1の1ボタン幅 = サイドバー幅の1/3 - gap相当） */
.land-tool-row .land-tool-btn {
  flex: 0 0 calc((100% - 10px) / 3);
}
/* 不要になったクラス */
.land-tool-btn-wrap-solo { }

.land-tool-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 10px 6px;
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border);
  cursor: pointer;
  border-radius: var(--r);
  color: var(--ink-mid);
  font-family: var(--font-body);
}
.land-tool-btn svg    { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
.land-tool-btn:hover  { background: var(--tool-hover); }
.land-tool-btn.active { background: var(--tool-active); color: #fff; border-color: var(--tool-active); }

/* ツールオプション */
.land-opts {
  display: flex;
  flex-direction: column;
  gap: 6px;
  margin-top: 32px; /* ツールグリッドとオプションの間の余白 */
}
.land-opt-label { font-size: 9px; text-transform: uppercase; letter-spacing: .08em; color: var(--ink-faint); font-weight: 600; margin-bottom: 4px; }

/* スウォッチと太さボタンの間の余白 */
.land-opts .opt-block + .opt-block { margin-top: 18px; }

/* Undo/Redo — 日付エリアとツールエリアの間・右寄せ・固定高さ */
.land-ur-area {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: flex-end;
  gap: 2px;
  padding: 0 8px 6px;
  overflow: hidden;
  position: relative;
  z-index: 0;
  background: var(--surface);
}

.land-opts .opt-block { flex-direction: column; align-items: flex-start; }
.land-opts .swatches  { gap: 8px; }

/* ════════════════════════════════════════════
   DAY CELL SCREEN — キャンバスエリア
════════════════════════════════════════════ */
.draw-wrap               { flex: 1; display: flex; background: var(--bg); overflow: hidden; }
.draw-wrap.portrait-wrap { align-items: flex-start; justify-content: center; }
.draw-wrap.landscape-wrap{ align-items: center;     justify-content: flex-start; }
#draw-canvas {
  background: #fff;
  box-shadow: var(--shadow-sm), 0 0 0 1px var(--border);
  display: block;
  touch-action: none;
  user-select: none;
  -webkit-user-select: none;
  -webkit-touch-callout: none;
}

/* ════════════════════════════════════════════
   TOOL OPTIONS（ペン / マーカー / テキスト）
════════════════════════════════════════════ */
.opt-block { display: flex; align-items: center; gap: 10px; }
.opt-label { font-size: 10px; text-transform: uppercase; letter-spacing: .08em; color: var(--ink-faint); font-weight: 600; white-space: nowrap; }
.swatches  { display: flex; gap: 10px; flex-wrap: wrap; }
.swatch {
  width: 22px;
  height: 22px;
  border-radius: 50%;
  border: 2.5px solid transparent;
  cursor: pointer;
}
.swatch.on {
  outline: 2px solid var(--ink);
  outline-offset: 2px;
  transform: scale(1.1);
}
/* 繰り返し予定テキスト */
.cell-repeat-name {
  font-size: 12px;
  font-weight: 700;
  color: var(--ink);
  opacity: 0.7;
  overflow: hidden;
  white-space: nowrap;
  flex-shrink: 1;
  min-width: 0;
  align-self: flex-end;
  padding-bottom: 2px;
}
/* 横長レイアウト：縦書き */
.cal-cell.landscape-cell .cell-repeat-name {
  writing-mode: vertical-rl;
  text-orientation: mixed;
  white-space: nowrap;
  font-size: 12px;
  padding-bottom: 0;
  padding-top: 2px;
  align-self: auto;
}
.color-picker-btn {
  width: 22px;
  height: 22px;
  border-radius: 50%;
  border: 2.5px solid var(--border);
  cursor: pointer;
  background: conic-gradient(red, yellow, lime, cyan, blue, magenta, red);
  position: relative;
  flex-shrink: 0;
}
.color-picker-btn.on {
  outline: 2px solid var(--ink);
  outline-offset: 2px;
  transform: scale(1.1);
}
.color-picker-btn input[type=color] {
  position: absolute;
  inset: 0;
  opacity: 0;
  width: 100%;
  height: 100%;
  cursor: pointer;
  border: none;
  padding: 0;
}
.sz-row { display: flex; gap: 6px; }
.sz-btn {
  background: none;
  border: 1px solid var(--border);
  border-radius: 8px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  width: 26px;
  height: 26px;
}
.sz-btn.on         { background: var(--ink); border-color: var(--ink); }
.dot               { border-radius: 50%; background: var(--ink); display: block; pointer-events: none; }
.sz-btn.on .dot    { background: #fff; }
.sz-lbl            { font-size: 13px; font-family: var(--font-body); pointer-events: none; padding: 0 2px; }
.sz-btn.on .sz-lbl { color: #fff; }

/* ════════════════════════════════════════════
   TOAST
════════════════════════════════════════════ */
#app-toast {
  position: fixed;
  top: 60px;
  left: 50%;
  transform: translateX(-50%) translateY(-12px);
  background: rgba(44,42,38,.88);
  color: #fff;
  font-size: 13px;
  font-family: var(--font-body);
  font-weight: 500;
  padding: 9px 18px;
  border-radius: 20px;
  pointer-events: none;
  z-index: 9999;
  white-space: nowrap;
  opacity: 0;
  transition: opacity .18s, transform .18s;
}
#app-toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* ════════════════════════════════════════════
   SETTINGS OVERLAY
════════════════════════════════════════════ */
.overlay      { display: none; position: fixed; inset: 0; z-index: 500; }
.overlay.open { display: flex; }
.ovl-bd       { position: absolute; inset: 0; background: rgba(0,0,0,.15); }

.settings-panel {
  position: absolute;
  right: 12px;
  top: 54px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 18px;
  box-shadow: var(--shadow-md);
  min-width: 210px;
  z-index: 1;
}
.settings-panel h3   { font-size: 11px; font-weight: 600; letter-spacing: .06em; text-transform: uppercase; color: var(--ink-mid); margin-bottom: 14px; }
.s-row               { margin-bottom: 12px; }
.s-row label         { display: block; font-size: 11px; color: var(--ink-mid); margin-bottom: 5px; }
.s-row select {
  width: 100%;
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 6px 8px;
  font-size: 13px;
  font-family: var(--font-body);
  background: var(--bg);
  cursor: pointer;
  outline: none;
  color: var(--ink);
}
.s-btn {
  width: 100%;
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 7px 10px;
  border: 1px solid var(--border);
  border-radius: var(--r);
  background: var(--bg);
  cursor: pointer;
  font-size: 13px;
  font-family: var(--font-body);
  color: var(--ink);
  text-align: left;
  transition: background .12s, border-color .12s;
}
.s-btn:hover { background: var(--tool-hover); border-color: var(--ink-mid); }

/* ════════════════════════════════════════════
   STICKER DROPDOWN
════════════════════════════════════════════ */
#stk-dropdown {
  display: none;
  position: fixed;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px;
  box-shadow: 0 6px 24px rgba(0,0,0,.14);
  z-index: 500;
  width: min(360px, 90vw);
}
#stk-dropdown.open     { display: block; }
.stk-inline-grid       { display: flex; flex-wrap: wrap; gap: 6px; }
.stk-inline-item {
  width: 40px;
  height: 40px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: var(--r);
  cursor: pointer;
  border: 2px solid transparent;
  transition: transform .1s;
}
.stk-inline-item:hover        { background: var(--tool-hover); transform: scale(1.1); }
.stk-inline-item.stk-selected { border-color: var(--ink); background: var(--tool-hover); }
.stk-inline-item svg          { width: 26px; height: 26px; }

/* ════════════════════════════════════════════
   CONTEXT MENUS
════════════════════════════════════════════ */
.ctx-menu {
  display: none;
  position: fixed;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--r);
  box-shadow: var(--shadow-md);
  z-index: 600;
  min-width: 180px;
  padding: 4px 0;
  overflow: hidden;
  pointer-events: all;
  touch-action: auto;
}
.ctx-menu.open { display: block; }
.ctx-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 16px;
  font-size: 14px;
  font-family: var(--font-body);
  cursor: pointer;
  transition: background .1s;
  color: var(--ink);
}
.ctx-item:hover     { background: var(--tool-hover); }
.ctx-item.ctx-hover { background: var(--tool-hover); }
.ctx-item.danger    { color: #b84040; }

.ctx-sep            { height: 1px; background: var(--border-soft); margin: 3px 0; }
@keyframes ctx-blink {
  0%, 100% { background: var(--tool-hover); }
  40%      { background: #c8e0f8; }
}
.ctx-item.ctx-blink { animation: ctx-blink 0.25s ease 2; }

/* ════ SPAN MODE｜期間設定 ════ */
#btn-span { position: relative; align-self: center; background: #fff; border-color: rgba(44,42,38,.5); color: var(--ink); border-width: 2.5px; transition: box-shadow .1s ease; }

#span-palette {
  display: none;
  position: absolute;
  left: 50%;
  top: 0;
  bottom: 0;
  transform: translateX(-50%);
  align-items: center;
  justify-content: center;
  gap: 10px;
  flex-wrap: nowrap;
  padding: 0 64px;
  overflow: visible;
  z-index: 420;
  pointer-events: none;
  background: none;
}
#span-palette.open { display: flex; pointer-events: auto; }
#span-palette .swatch { width: 16px; height: 16px; cursor: pointer; border-radius: 50%; border: 4px solid transparent; flex-shrink: 0; box-sizing: content-box; background-clip: padding-box; }
#span-palette .swatch.on { outline: 2.5px solid var(--ink); outline-offset: 2px; }

/* SVGオーバーレイ */
#span-overlay {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 10;
  overflow: visible;
  touch-action: none;
}
/* 期間枠 */
.span-rect { fill: none; stroke-width: 7.5; stroke-linecap: butt; stroke-linejoin: round; opacity: 0.45; }
/* タブ */
.span-tab {
  position: absolute;
  z-index: 15;
  border-radius: 6px 6px 0 0;
  padding: 3px 10px;
  font-size: 14px;
  font-weight: 700;
  color: #fff;
  white-space: nowrap;
  max-width: 120px;
  overflow: hidden;
  text-overflow: ellipsis;
  cursor: grab;
  user-select: none;
  -webkit-user-select: none;
  -webkit-touch-callout: none;
  opacity: 0.45;
  transition: opacity 0.15s ease;
  touch-action: none;

#btn-span            { z-index: 420; }

#span-overlay        { z-index: 415 !important; }

/* ════ OBJECT PREVIEW POPUP ════ */
.obj-preview {

  display: none;

  padding: 10px;
  pointer-events: none;
  transform: translateX(-50%) translateY(-100%);

/* 右上表示時：足を左下に */

  left: 20px;
  transform: none;
}
.obj-preview.tail-left::before {
  left: 21px;
  transform: none;
}

════════════════════════════════════════════ */
#ym-backdrop {

  inset: 0;
  z-index: 1100;
}
#ym-picker {
  display: none;
  position: fixed;
  z-index: 1101;

.ym-drum-wrap {
  display: flex;
  height: 180px;
  position: relative;
}
.ym-drum-col {
  flex: 1;
  overflow-y: scroll;
  scroll-snap-type: y mandatory;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
  padding: 72px 0;
  touch-action: pan-y;
}
.ym-drum-col::-webkit-scrollbar { display: none; }
.ym-drum-item {
  height: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  font-family: var(--font-body);
  color: var(--ink-mid);
  scroll-snap-align: center;
  cursor: pointer;
  transition: color .15s;
  user-select: none;
}
.ym-drum-item.selected { color: var(--ink); font-weight: 600; }
.ym-select-bar {
  position: absolute;
  top: 50%;
  left: 8px;
  right: 8px;
  height: 36px;
  transform: translateY(-50%);
  background: var(--tool-hover);
  border-radius: 8px;
  pointer-events: none;
  z-index: 1;
}
.ym-fade-top, .ym-fade-bot {
  position: absolute;
  left: 0; right: 0;
  height: 72px;
  pointer-events: none;
  z-index: 2;
}
.ym-fade-top { top: 0;    background: linear-gradient(to bottom, var(--surface) 20%, transparent); }
.ym-fade-bot { bottom: 0; background: linear-gradient(to top,   var(--surface) 20%, transparent); }

#clip-viewer-content {

const imgCache = {};

function preloadStickerImages() {
  STICKERS.forEach(s => {
    if (imgCache[s.id] !== undefined) return;
    imgCache[s.id] = null; // ロード中フラグ
    const img = new Image();
    img.onload  = () => {
      imgCache[s.id] = img;
      redraw();
      renderMiniCanvases();
      if (window._stickerGridRefresh) window._stickerGridRefresh();
    };
    img.onerror = () => { imgCache[s.id] = null; };
    img.src = s.url;
  });
}

/* ════ JAPANESE PUBLIC HOLIDAYS｜祝日定義 ════
   責務: 年ごとの祝日マップを生成（固定祝日 + 振替休日 + ルールベース）
   依存: なし（純粋関数）
════════════════════════════════════════════ */
// 引数 year の "YYYY-MM-DD" → 祝日名 のマップを返す
function getHolidays(year) {
  const hols = {};
  const add = (m, d, name) => { hols[`${year}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`] = name; };

  // Fixed holidays
  add(1,1,'元日');
  add(2,11,'建国記念の日');
  add(2,23,'天皇誕生日');
  add(4,29,'昭和の日');
  add(5,3,'憲法記念日');
  add(5,4,'みどりの日');
  add(5,5,'こどもの日');
  add(8,11,'山の日');
  add(11,3,'文化の日');
  add(11,23,'勤労感謝の日');

  // Happy Monday / nth-weekday rules
  // 成人の日: 1月第2月曜
  add(...nthWeekday(year,1,2,1), '成人の日');
  // 海の日: 7月第3月曜
  add(...nthWeekday(year,7,3,1), '海の日');
  // 敬老の日: 9月第3月曜
  add(...nthWeekday(year,9,3,1), '敬老の日');
  // スポーツの日: 10月第2月曜
  add(...nthWeekday(year,10,2,1), 'スポーツの日');

  // 春分の日 (approx)
  const shunbun = Math.floor(20.8431 + 0.242194*(year-1980) - Math.floor((year-1980)/4));
  add(3, shunbun, '春分の日');
  // 秋分の日 (approx)
  const shubun = Math.floor(23.2488 + 0.242194*(year-1980) - Math.floor((year-1980)/4));
  add(9, shubun, '秋分の日');

  // 振替休日: if holiday falls on Sunday, next Monday is substitute
  const keys = Object.keys(hols);
  keys.forEach(k => {
    const d = new Date(k);
    if (d.getDay() === 0) { // Sunday
      const next = new Date(d); next.setDate(next.getDate()+1);
      const nk = fmtDate(next);
      if (!hols[nk]) hols[nk] = '振替休日';
    }
  });

  return hols;
}

function nthWeekday(year, month, nth, dow) { // dow: 0=Sun,1=Mon...
  let count = 0;
  for (let d=1; d<=31; d++) {
    const dt = new Date(year, month-1, d);
    if (dt.getMonth() !== month-1) break;
    if (dt.getDay() === dow && ++count === nth) return [month, d];
  }
  return [month, 1];
}

function fmtDate(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

/* ════ COLOR PALETTE｜カラーパレット定義 ════
   責務: 14色のパレットを定義。ペン・マーカー・テキスト・期間枠で共用
   依存: なし（定数定義のみ）
════════════════════════════════════════════ */
// 黒・赤・青・オレンジの4色（固定・削除不可）
const PALETTE = [
  {hex:'#000000', label:'黒'},
  {hex:'#ff0000', label:'赤'},
  {hex:'#0000ff', label:'青'},
  {hex:'#ff8000', label:'オレンジ'},
];

// カスタムカラー管理（最大8色・localStorageに保存）
const CUSTOM_COLOR_KEY = 'calapp_custom_colors';
const CUSTOM_COLOR_MAX = 8;

function loadCustomColors() {
  try {
    const raw = localStorage.getItem(CUSTOM_COLOR_KEY);
    return raw ? JSON.parse(raw) : [];
  } catch(e) { return []; }
}
function saveCustomColors(arr) {
  try { localStorage.setItem(CUSTOM_COLOR_KEY, JSON.stringify(arr)); } catch(e) {}
}
function addCustomColor(hex) {
  // PALETTE固定色と一致 → 追加不要、そのhexを返す
  if (PALETTE.some(c => c.hex === hex)) return hex;
  let colors = loadCustomColors();
  // カスタムカラーに既存一致 → 追加不要、そのhexを返す
  if (colors.includes(hex)) return hex;
  // 追加余地なし（上限8色）→ 最古のカスタムカラー（先頭）を削除
  if (colors.length >= CUSTOM_COLOR_MAX) colors = colors.slice(1);
  colors.push(hex);
  saveCustomColors(colors);
  return hex;
}
function removeCustomColor(hex) {
  let colors = loadCustomColors();
  colors = colors.filter(c => c !== hex);
  saveCustomColors(colors);
}
