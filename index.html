/** 現在の言語の翻訳オブジェクトを返す */
function L() { return I18N[S.lang] || I18N.ja; }
const STORAGE_KEY = 'calapp_v1';

/** アプリ状態をlocalStorageに保存 */
function saveToStorage() {
  try {
    const data = calendars.map(c => ({ id: c.id, name: c.name, cellData: c.cellData, spanEvents: c.spanEvents || [] }));
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  } catch(e) { /* quota超過等は無視 */ }
}

const REPEAT_KEY = 'calapp_repeat_events';
function saveRepeatEvents() {
  try { localStorage.setItem(REPEAT_KEY, JSON.stringify(S.repeatEvents)); } catch(e) {}
}
function loadRepeatEvents() {
  try {
    const raw = localStorage.getItem(REPEAT_KEY);
    if (raw) S.repeatEvents = JSON.parse(raw);
  } catch(e) {}
}

/** localStorageからアプリ状態を復元 */
function loadFromStorage() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    const data = JSON.parse(raw);
    data.forEach(saved => {
      const cal = calendars.find(c => c.id === saved.id);
      if (cal) {
        cal.name       = saved.name;
        cal.cellData   = saved.cellData || {};
        cal.spanEvents = saved.spanEvents || [];
      }
    });
  } catch(e) { /* 破損データは無視 */ }
}

// 起動時に復元
loadFromStorage();
loadRepeatEvents();
function getCellObjs(key)      { return getActiveCalendar().cellData[key] || []; }
function setCellObjs(key, arr) { getActiveCalendar().cellData[key] = arr; }
function cellKey(y,m1,d)       { return `${y}-${String(m1).padStart(2,'0')}-${String(d).padStart(2,'0')}`; }

/** setCellObjs + saveToStorage + renderMiniCanvases をまとめて実行 */
function commitCellObjs(key, arr, redrawMini = true) {
  setCellObjs(key, arr);
  saveToStorage();
  if (redrawMini) renderMiniCanvases();
}

/* ════ CANVAS｜キャンバス初期化 ════
   責務: draw-canvas の取得・サイズ調整・テキストサイズ計算
   依存: APP STATE（S.textSize）
════════════════════════════════════════════ */
const cvs = $id('draw-canvas');
const cx  = cvs.getContext('2d');

/** キャンバスサイズを画面に合わせてリサイズ */
function sizeCanvas() {
  const wrap   = $id('draw-wrap');
  const aw     = wrap.clientWidth;
  const ah     = wrap.clientHeight;
  const isPort = ah >= aw;

  // 縦画面: 幅いっぱいの正方形（高さが足りなければ高さ基準）
  // 横画面: 高さいっぱいの正方形（幅が足りなければ幅基準）
  const cssSz = isPort ? Math.min(aw, ah) : Math.min(ah, aw);

  // 寄せ方をクラスで切り替え
  wrap.classList.toggle('portrait-wrap',  isPort);
  wrap.classList.toggle('landscape-wrap', !isPort);

  const dpr   = window.devicePixelRatio || 1;
  const phySz = Math.round(cssSz * dpr);

  cvs.width  = phySz;
  cvs.height = phySz;
  cvs.style.width  = cssSz + 'px';
  cvs.style.height = cssSz + 'px';

  CANVAS_PX = phySz;

  calcTextSizes();
  redraw();
}

/* 描画エリア幅(CANVAS_SRC=600の論理座標系)で
   「小」= 横15文字、「大」= 小×1.3 になるよう計算 */
function calcTextSizes() {
  const small = Math.round(CANVAS_SRC / 15); // = 40px (論理座標)
  if (!S.textSize) S.textSize = small;
  S._textSmall = small;
}

/* ════ RENDER｜描画処理 ════
   責務: キャンバスへの全オブジェクト再描画（差分なし・毎回全描画）
   依存: APP STATE（Draw.objects）、CANVAS
════════════════════════════════════════════ */
/** 日付詳細画面のキャンバスを再描画 */
function redraw() {
  cx.clearRect(0,0,CANVAS_PX,CANVAS_PX);
  cx.fillStyle = '#fff';
  cx.fillRect(0,0,CANVAS_PX,CANVAS_PX);

  const sc = CANVAS_PX / CANVAS_SRC;
  const now = performance.now();

  // 確定済みオブジェクト
  Draw.objects.forEach(o => {
    const fadeIn  = Draw._fadeIn  && Draw._fadeIn.id  === o.id;
    const fadeOut = Draw._fadeOut && Draw._fadeOut.id === o.id;
    if (fadeIn) {
      const alpha = Math.min(1, (now - Draw._fadeIn.start) / 200);
      cx.globalAlpha = alpha;
      drawObj(cx, o, sc);
      cx.globalAlpha = 1;
      if (alpha < 1) requestAnimationFrame(() => redraw());
      else Draw._fadeIn = null;
    } else if (fadeOut) {
      const alpha = Math.max(0, 1 - (now - Draw._fadeOut.start) / 200);
      cx.globalAlpha = alpha;
      drawObj(cx, o, sc);
      cx.globalAlpha = 1;
    } else {
      drawObj(cx, o, sc);
    }
  });

  // ★ 描画中のライブストローク（最新の1本）
  if (Draw.activeStroke && Draw.activeStroke.points.length > 1) {
    drawStroke(cx, Draw.activeStroke, sc);
  }

  // selection bbox
  if (Draw.selId && !Draw._pinching) {
    const o = Draw.objects.find(x=>x.id===Draw.selId);
    if (o) drawBBox(cx, o, sc);
  }
}

/** オブジェクト種別に応じて描画を振り分け */
function drawObj(c, obj, sc) {
  if (obj._hidden) return;
  if (obj.type==='pen')     drawPenObj(c, obj, sc);
  if (obj.type==='text')    drawTextObj(c, obj, sc);
  if (obj.type==='sticker') drawStickerObj(c, obj, sc);
  if (obj.type==='clip')    drawClipObj(c, obj, sc);
}

function drawPenObj(c, obj, sc) {
  obj.paths.forEach(p => drawStroke(c, p, sc));
}

function drawStroke(c, path, sc) {
  if (!path.points || path.points.length < 2) return;
  c.save();
  c.beginPath();
  c.strokeStyle = path.color;
  c.lineWidth   = path.size * sc;
  if (path.alpha != null) {
    c.globalAlpha = path.alpha;
    c.lineCap  = 'square';
    c.lineJoin = 'miter';
  } else {
    c.lineCap  = 'round';
    c.lineJoin = 'round';
  }
  c.moveTo(path.points[0].x*sc, path.points[0].y*sc);
  for (let i=1;i<path.points.length;i++) c.lineTo(path.points[i].x*sc, path.points[i].y*sc);
  c.stroke();
  c.restore();
}

function drawTextObj(c, obj, sc) {
  c.save();
  const weight = obj.bold ? '700' : '400';
  c.font         = `${weight} ${(obj.size||16)*sc}px 'Noto Sans JP',sans-serif`;
  c.fillStyle    = obj.color||'#000000';
  c.textBaseline = 'top';
  (obj.text||'').split('\n').forEach((line,i)=>{
    c.fillText(line, obj.x*sc, (obj.y + i*(obj.size||16)*1.35)*sc);
  });
  c.restore();
}

/* sticker drawing — Canvas draw関数で直接描画（ロード待ち不要） */
// スタンプの描画サイズを縦横比を保持して計算（長辺 = size）
function stickerDrawSize(img, size) {
  const iw = img.naturalWidth  || img.width  || 1;
  const ih = img.naturalHeight || img.height || 1;
  if (iw >= ih) {
    return {w: size, h: size * ih / iw};
  } else {
    return {w: size * iw / ih, h: size};
  }
}

function drawStickerObj(c, obj, sc) {
  const img = imgCache[obj.stickerId];
  if (!img) return;
  const sz = (obj.size || 44) * sc;
  const {w, h} = stickerDrawSize(img, sz);
  c.save();
  c.drawImage(img, obj.x * sc - w/2, obj.y * sc - h/2, w, h);
  c.restore();
}

// クリップアイコン内テキスト描画（改行対応・5行上限・縦横中央）
function drawClipLabel(c, displayName, cx, cy, w, h, fontSize) {
  if (!displayName) return;
  const MAX_LINES = 5;
  const lineH = fontSize * 1.3;
  c.font = `600 ${fontSize}px 'Noto Sans JP', sans-serif`;

  // 折り返し処理
  const chars = displayName.split('');
  const lines = [];
  let current = '';
  let truncated = false;
  for (let ci = 0; ci < chars.length; ci++) {
    const ch = chars[ci];
    if (ch === '\n') {
      lines.push(current); current = '';
    } else if (c.measureText(current + ch).width > w * 0.82) {
      lines.push(current); current = ch;
    } else {
      current += ch;
    }
    if (lines.length >= MAX_LINES) { truncated = true; break; }
  }
  if (!truncated && current) lines.push(current);
  else if (truncated && current) {
    // まだ未処理の文字が残っているか確認
    // lines が MAX_LINES に達した時点でループを抜けたので残りあり
    truncated = true;
  }
  const shown = lines.slice(0, MAX_LINES);

  // 5行で打ち切られた、またはまだ文字が残っている場合は最終行に…
  const hasMore = truncated || current.length > 0;
  if (hasMore && shown.length > 0) {
    // 最終行が幅を超える場合は収まるところまで表示（…なし）
    let trimmed = shown[shown.length - 1];
    while (trimmed.length > 1 && c.measureText(trimmed).width > w * 0.82) {
      trimmed = trimmed.slice(0, -1);
    }
    shown[shown.length - 1] = trimmed;
  }

  const totalH = shown.length * lineH;
  const startY = cy - totalH / 2 + lineH / 2;

  c.textAlign = 'center';
  c.textBaseline = 'middle';
  shown.forEach((line, i) => {
    c.fillText(line, cx, startY + i * lineH);
  });
}

function drawClipObj(c, obj, sc) {
  const sz   = (obj.size || 60) * sc;
  const w    = sz * 1.3;        // 横長
  const h    = sz * 1.3;
  const rx   = sz * 0.08;
  const fold = sz * 0.18;
  const cx2  = obj.x * sc;
  const cy2  = obj.y * sc;
  const x0   = cx2 - w/2;
  const y0   = cy2 - h/2;

  c.save();

  // シャドウ
  c.shadowColor   = 'rgba(0,0,0,0.28)';
  c.shadowBlur    = sz * 0.3;
  c.shadowOffsetX = sz * 0.05;
  c.shadowOffsetY = sz * 0.08;

  // 本体（右上に切り欠き）
  c.fillStyle = '#fff9c4';
  c.beginPath();
  c.moveTo(x0 + rx, y0);
  c.lineTo(x0 + w - fold, y0);
  c.lineTo(x0 + w, y0 + fold);
  c.lineTo(x0 + w, y0 + h - rx);
  c.quadraticCurveTo(x0+w, y0+h, x0+w-rx, y0+h);
  c.lineTo(x0 + rx, y0 + h);
  c.quadraticCurveTo(x0, y0+h, x0, y0+h-rx);
  c.lineTo(x0, y0 + rx);
  c.quadraticCurveTo(x0, y0, x0+rx, y0);
  c.closePath();
  c.fill();

  c.shadowColor = 'transparent';

  // 枠線
  c.strokeStyle = 'rgba(200,120,0,.9)';
  c.lineWidth   = Math.max(4.5, sz * 0.06);
  c.beginPath();
  c.moveTo(x0 + rx, y0);
  c.lineTo(x0 + w - fold, y0);
  c.lineTo(x0 + w, y0 + fold);
  c.lineTo(x0 + w, y0 + h - rx);
  c.quadraticCurveTo(x0+w, y0+h, x0+w-rx, y0+h);
  c.lineTo(x0 + rx, y0 + h);
  c.quadraticCurveTo(x0, y0+h, x0, y0+h-rx);
  c.lineTo(x0, y0 + rx);
  c.quadraticCurveTo(x0, y0, x0+rx, y0);
  c.closePath();
  c.stroke();

  // 折れ角
  c.fillStyle = '#f9e44a';
  c.beginPath();
  c.moveTo(x0 + w - fold, y0);
  c.lineTo(x0 + w, y0 + fold);
  c.lineTo(x0 + w - fold, y0 + fold);
  c.closePath();
  c.fill();

  // 表示名テキスト（中央・改行対応・5行上限）
  c.fillStyle = '#5d4e00';
  drawClipLabel(c, obj.displayName || '', cx2, cy2, w, h, sz * 0.16);

  // ページ数バッジ
  if (obj.pageCount && obj.pageCount > 1) {
    const br = sz * 0.16;
    const bx = x0 + w - br * 0.7;
    const by = y0 + h - br * 0.7;
    c.fillStyle = '#b8860b';
    c.beginPath(); c.arc(bx, by, br, 0, Math.PI*2); c.fill();
    c.fillStyle = '#fff';
    c.font = `bold ${br}px sans-serif`;
    c.textAlign = 'center';
    c.textBaseline = 'middle';
    c.fillText(String(obj.pageCount), bx, by);
  }

  c.restore();
}

/* bounding box helpers */
function getObjBounds(obj) {
  const sc = CANVAS_PX/CANVAS_SRC;
  if (obj.type==='pen') {
    let x0=Infinity,y0=Infinity,x1=-Infinity,y1=-Infinity;
    obj.paths.forEach(p=>p.points.forEach(pt=>{
      x0=Math.min(x0,pt.x);y0=Math.min(y0,pt.y);
      x1=Math.max(x1,pt.x);y1=Math.max(y1,pt.y);
    }));
    return {x:x0*sc,y:y0*sc,w:(x1-x0)*sc,h:(y1-y0)*sc};
  }
  if (obj.type==='text') {
    cx.save();
    cx.font = `${(obj.size||16)*(CANVAS_PX/CANVAS_SRC)}px 'Noto Sans JP',sans-serif`;
    const lines = (obj.text||'').split('\n');
    const w = Math.max(...lines.map(l=>cx.measureText(l).width));
    cx.restore();
    const lineH = (obj.size||16)*1.35*sc;
    const h = lines.length > 1
      ? (lines.length - 1) * lineH + (obj.size||16)*sc
      : (obj.size||16)*sc;
    return {x:obj.x*sc, y:obj.y*sc, w, h};
  }
  if (obj.type==='sticker') {
    const img = imgCache[obj.stickerId];
    const sz = (obj.size||44)*sc;
    if (img) {
      const {w, h} = stickerDrawSize(img, sz);
      return {x: obj.x*sc - w/2, y: obj.y*sc - h/2, w, h};
    }
    return {x:obj.x*sc-sz/2, y:obj.y*sc-sz/2, w:sz, h:sz};
  }
  if (obj.type==='clip') {
    const sz = (obj.size||60)*sc;
    const w  = sz * 1.3;
    const h  = sz * 1.3;
    return {x: obj.x*sc - w/2, y: obj.y*sc - h/2, w, h};
  }
  return {x:0,y:0,w:20,h:20};
}

const PAD = 8;
const BBOX_BTN_R = 21; // ボタン半径（削除ボタンと同じ）

function drawBBox(c, obj) {
  const b  = getObjBounds(obj);
  const R  = BBOX_BTN_R;

  // バウンディングボックス
  c.save();
  c.strokeStyle='#3a6fa8';c.lineWidth=1.5;c.setLineDash([5,3]);
  c.beginPath();c.roundRect(b.x-PAD, b.y-PAD, b.w+PAD*2, b.h+PAD*2, 10);c.stroke();
  c.setLineDash([]);

  // 削除ボタン（左上）
  const delX = b.x-PAD-R;
  const delY = b.y-PAD-R;
  c.fillStyle='rgba(224,48,48,0.75)';
  c.beginPath();c.arc(delX,delY,R,0,Math.PI*2);c.fill();
  c.strokeStyle='#fff';c.lineWidth=4;c.lineCap='round';
  const cr=10;
  c.beginPath();c.moveTo(delX-cr,delY-cr);c.lineTo(delX+cr,delY+cr);c.stroke();
  c.beginPath();c.moveTo(delX+cr,delY-cr);c.lineTo(delX-cr,delY+cr);c.stroke();

  // スライダーボタン（右上）：角丸四角＋方向矢印
  const slX = b.x + b.w + PAD + R;
  const slY = b.y - PAD - R;
  const slW = R * 2, slH = R * 2;

  // サイズ上限・下限チェック（矢印表示切り替え用）
  let atMin = false, atMax = false;
  if (obj.type === 'pen') {
    const allPts = obj.paths.flatMap(p => p.points);
    if (allPts.length > 0) {
      const xs = allPts.map(pt => pt.x), ys = allPts.map(pt => pt.y);
      const bw = Math.max(...xs) - Math.min(...xs);
      const bh = Math.max(...ys) - Math.min(...ys);
      const maxS = Math.min(bw > 0 ? CANVAS_SRC / bw : Infinity, bh > 0 ? CANVAS_SRC / bh : Infinity);
      const minS = Math.max(bw > 0 ? 20 / bw : 0, bh > 0 ? 20 / bh : 0);
      atMax = maxS <= 1.0;
      atMin = minS >= 1.0;
    }
  } else {
    const size = obj.size || 1;
    if (obj.type === 'text') {
      atMin = size <= 10; atMax = size >= 200;
    } else if (obj.type === 'clip') {
      atMin = size <= 60; atMax = size >= CANVAS_SRC;
    } else {
      atMin = size <= 20; atMax = size >= CANVAS_SRC;
    }
  }

  c.fillStyle = 'rgba(58,111,168,0.75)';
  c.beginPath();
  c.roundRect(slX - slW/2, slY - slH/2, slW, slH, 8);
  c.fill();
  c.strokeStyle = '#fff';
  c.lineWidth = 3.5;
  c.lineCap = 'round';
  c.lineJoin = 'round';
  const aw = 9; // 矢印の半長

  if (!atMax) {
    // 右上矢印（↗）：軸線＋矢印頭
    c.beginPath();
    c.moveTo(slX - aw, slY + aw);
    c.lineTo(slX + aw, slY - aw);
    c.stroke();
    c.beginPath();
    c.moveTo(slX + aw, slY - aw);
    c.lineTo(slX + aw - 8, slY - aw);
    c.moveTo(slX + aw, slY - aw);
    c.lineTo(slX + aw, slY - aw + 8);
    c.stroke();
  }
  if (!atMin) {
    // 左下矢印（↙）：軸線＋矢印頭
    if (atMax) {
      // 右上矢印なし→軸線を左下側だけ描く
      c.beginPath();
      c.moveTo(slX + aw, slY - aw);
      c.lineTo(slX - aw, slY + aw);
      c.stroke();
    }
    c.beginPath();
    c.moveTo(slX - aw, slY + aw);
    c.lineTo(slX - aw + 8, slY + aw);
    c.moveTo(slX - aw, slY + aw);
    c.lineTo(slX - aw, slY + aw - 8);
    c.stroke();
  }

  c.restore();
}

function hitDeleteBtn(obj, px, py) {
  const b=getObjBounds(obj);
  const R=BBOX_BTN_R;
  const bx=b.x-PAD-R, by=b.y-PAD-R;
  return Math.hypot(px-bx,py-by)<R+4;
}
function hitSliderBtn(obj, px, py) {
  const b = getObjBounds(obj);
  const R = BBOX_BTN_R;
  const slX = b.x + b.w + PAD + R;
  const slY = b.y - PAD - R;
  // 角丸四角のヒット判定（BBOX_BTN_R の正方形範囲 + 余白4）
  return Math.abs(px - slX) <= R + 4 && Math.abs(py - slY) <= R + 4;
}

// スライダードラッグによるスケール（中心点：オブジェクト中心）
function scaleFromCenter(obj, scale) {
  const b    = getObjBounds(obj);
  const sc   = CANVAS_PX / CANVAS_SRC;
  // オブジェクト中心（物理ピクセル→論理座標）
  const cx   = (b.x + b.w / 2) / sc;
  const cy   = (b.y + b.h / 2) / sc;
  const snap = clone(obj);

  if (obj.type === 'pen') {
    const allPts = snap.paths.flatMap(p => p.points);
    if (allPts.length > 0) {
      const xs = allPts.map(pt => pt.x), ys = allPts.map(pt => pt.y);
      const bw = Math.max(...xs) - Math.min(...xs);
      const bh = Math.max(...ys) - Math.min(...ys);
      const maxS = Math.min(bw > 0 ? CANVAS_SRC / bw : Infinity, bh > 0 ? CANVAS_SRC / bh : Infinity);
      const minS = Math.max(bw > 0 ? 20 / bw : 0, bh > 0 ? 20 / bh : 0);
      if (scale > 1 && maxS <= 1.0) return false;
      if (scale < 1 && minS >= 1.0) return false;
      scale = Math.min(scale, maxS);
      scale = Math.max(scale, minS);
    }
    obj.paths = snap.paths.map(p => ({
      ...p,
      points: p.points.map(pt => ({
        x: cx + (pt.x - cx) * scale,
        y: cy + (pt.y - cy) * scale,
      }))
    }));
    // B案：スケール後にパス全体をキャンバス内にクランプ
    const newPts = obj.paths.flatMap(p => p.points);
    if (newPts.length > 0) {
      const nx0 = Math.min(...newPts.map(pt => pt.x));
      const ny0 = Math.min(...newPts.map(pt => pt.y));
      const nx1 = Math.max(...newPts.map(pt => pt.x));
      const ny1 = Math.max(...newPts.map(pt => pt.y));
      const dx = nx0 < 0 ? -nx0 : (nx1 > CANVAS_SRC ? CANVAS_SRC - nx1 : 0);
      const dy = ny0 < 0 ? -ny0 : (ny1 > CANVAS_SRC ? CANVAS_SRC - ny1 : 0);
      if (dx !== 0 || dy !== 0) {
        obj.paths.forEach(p => p.points.forEach(pt => {
          pt.x += dx;
          pt.y += dy;
        }));
      }
    }
  } else {
    obj.x = cx + (snap.x - cx) * scale;
    obj.y = cy + (snap.y - cy) * scale;
    const newSize = (snap.size || 1) * scale;
    let clamped;
    if (obj.type === 'text') {
      clamped = Math.max(10, Math.min(200, newSize));
    } else if (obj.type === 'clip') {
      clamped = Math.max(60, Math.min(CANVAS_SRC, newSize));
    } else {
      clamped = Math.max(20, Math.min(CANVAS_SRC, newSize));
    }
    if (scale > 1 && clamped === snap.size) return false;
    if (scale < 1 && clamped === snap.size) return false;
    obj.size = clamped;
    // B案：スケール後に中心座標をキャンバス内にクランプ
    const margin = (obj.size || 20) / 2;
    obj.x = Math.max(margin, Math.min(CANVAS_SRC - margin, obj.x));
    obj.y = Math.max(margin, Math.min(CANVAS_SRC - margin, obj.y));
  }
  flushAndRedraw();
  return true;
}

/** 論理座標(px,py)がオブジェクトに当たるか判定 */
function hitObj(obj, px, py) {
  const b=getObjBounds(obj);
  return px>=b.x-PAD&&px<=b.x+b.w+PAD&&py>=b.y-PAD&&py<=b.y+b.h+PAD;
}

/* screen coords → logical canvas coords */
/** スクリーン座標 → キャンバス論理座標に変換 */
function toLogical(clientX, clientY) {
  const r = cvs.getBoundingClientRect();
  return {
    x: ((clientX-r.left)/r.width)  * CANVAS_SRC,
    y: ((clientY-r.top) /r.height) * CANVAS_SRC,
  };
}
/* screen coords → physical pixel coords (for hit tests) */
/** スクリーン座標 → 物理ピクセル座標に変換 */
function toPhysical(clientX, clientY) {
  const r = cvs.getBoundingClientRect();
  return {
    x: (clientX-r.left)*(CANVAS_PX/r.width),
    y: (clientY-r.top) *(CANVAS_PX/r.height),
  };
}

function evtCoords(e) {
  const src = e.touches ? e.touches[0] : e;
  return {clientX:src.clientX, clientY:src.clientY};
}

/* ════ PEN OBJECT MANAGEMENT｜ペンオブジェクト管理 ════
   責務: ペン・マーカーストロークの開始・追加・確定
   依存: RENDER（redraw）、APP STATE（Draw.activeStroke）
   仕様：同じ色・同じ太さで描かれたものはひとつのペンオブジェクトとする。
   ツール切り替えをはさんでも、色と太さが同じなら同一オブジェクトに統合する。

   実装：
   - Draw.objects 配列の中に色+太さごとの penObj を保持し続ける
   - ペン描画開始時: Draw.objects から同色同太さの penObj を探し、あればそこに追記
   - 「確定」は 戻るボタン / セル切り替え 時のみ（undo 登録）
   - ツール切り替えでは確定しない
═══════════════════════════════════════ */

// 現在アクティブな（描画中の）penObjへの参照
// Draw.objects 配列の中の要素を直接指す

// 色+太さ(+alpha)でペンオブジェクトを検索（objectsの中から）
function findPenObj(color, size, alpha) {
  return Draw.objects.find(o =>
    o.type==='pen' && o.color===color && o.size===size &&
    (alpha == null ? !o.paths.some(p=>p.alpha!=null) : o.paths.some(p=>p.alpha===alpha))
  ) || null;
}

// ペンオブジェクトの「確定」= undo履歴に登録する
// セル移動・戻るボタン時にのみ呼ぶ
function finalizePenObjs() {
  // 未登録（undo履歴にない）penObjをまとめてundo登録
  // ※ 描画中に随時 Draw.objects に入っているので、ここでは履歴のみ管理
  Draw.activePenObjRef = null;
  Draw.activeStroke    = null;
}

// ペンストローク開始
function startPenStroke(color, size, startPt, alpha) {
  // 同色同太さ（同alpha）のオブジェクトを探す
  let penObj = findPenObj(color, size, alpha);
  if (!penObj) {
    penObj = {id:uid(), type:'pen', color, size, paths:[]};
    Draw.objects.push(penObj);
  }
  Draw.activePenObjRef = penObj;
  Draw.activeStroke = {color, size, points:[startPt], ...(alpha != null ? {alpha} : {})};
}

// ストローク終了（pointerup）
function endPenStroke() {
  if (!Draw.activeStroke || !Draw.activePenObjRef) return;
  if (Draw.activeStroke.points.length >= 2) {
    // ストローク追加前のスナップショットを保存
    const before = clone(Draw.activePenObjRef);
    Draw.activePenObjRef.paths.push(Draw.activeStroke);
    const after  = clone(Draw.activePenObjRef);
    pushUndo({type:'stroke', objId:after.id, before, after});
    flushCell();
  }
  Draw.activeStroke = null;
  redraw();
}

// undo/redo で stroke タイプに対応
function applyUndo(a){
  if(a.type==='create') Draw.objects=Draw.objects.filter(o=>o.id!==a.obj.id);
  if(a.type==='delete') Draw.objects.push(clone(a.obj));
  if(a.type==='move'||a.type==='scale'){const o=Draw.objects.find(x=>x.id===a.objId);if(o)Object.assign(o,clone(a.from));}
  if(a.type==='edit'){const o=Draw.objects.find(x=>x.id===a.objId);if(o)Object.assign(o,clone(a.from));}
  if(a.type==='stroke'){
    const idx=Draw.objects.findIndex(x=>x.id===a.objId);
    if(a.before && a.before.paths.length > 0){
      // 前状態に戻す
      if(idx>=0) Draw.objects[idx]=clone(a.before);
      else Draw.objects.push(clone(a.before));
    } else {
      // 最初のストロークのUndo→オブジェクトごと削除
      if(idx>=0) Draw.objects.splice(idx,1);
    }
  }
}
function applyRedo(a){
  if(a.type==='create') Draw.objects.push(clone(a.obj));
  if(a.type==='delete') Draw.objects=Draw.objects.filter(o=>o.id!==a.obj.id);
  if(a.type==='move'||a.type==='scale'){const o=Draw.objects.find(x=>x.id===a.objId);if(o)Object.assign(o,clone(a.to));}
  if(a.type==='edit'){const o=Draw.objects.find(x=>x.id===a.objId);if(o)Object.assign(o,clone(a.to));}
  if(a.type==='stroke'){
    const idx=Draw.objects.findIndex(x=>x.id===a.objId);
    if(idx>=0) Draw.objects[idx]=clone(a.after);
    else Draw.objects.push(clone(a.after));
  }
}

// スタンプ専用キャンバスリスナー（onDownとは独立）
cvs.addEventListener('pointerdown', e => {
  if (S.tool !== 'sticker' || !Draw.pendingStickerId) return;
  e.stopImmediatePropagation();
  const lp = toLogical(e.clientX, e.clientY);
  placeSticker(lp);
}, {capture: false, passive: false});

/* ════ POINTER INPUT｜ポインター入力処理 ════
   責務: draw-canvas 上のポインターイベント処理（全ツール共通の入口）
   依存: PEN、ERASER、TEXT、CLIP、STICKER、UNDO/REDO
════════════════════════════════════════════ */
cvs.addEventListener('pointerdown', e=>{
  e.preventDefault();
  Draw.isPointerDown=true;
  Draw._lastPointerType = e.pointerType; // 'touch' | 'pen' | 'mouse'
  if (S.tool === 'eraser') window._moveEraserCursor && window._moveEraserCursor(e.clientX, e.clientY);
  if (S.tool === 'eraser') window._showEraserCursor && window._showEraserCursor(Math.max(8, Math.round(S.eraserSize * cvs.getBoundingClientRect().width / CANVAS_SRC)));
  onDown(e);
},{passive:false});
cvs.addEventListener('pointermove', e=>{
  e.preventDefault();
  if (S.tool === 'eraser' && Draw.isPointerDown) window._moveEraserCursor && window._moveEraserCursor(e.clientX, e.clientY);
  if(Draw.isPointerDown||Draw.dragInfo) onMove(e);
},{passive:false});
cvs.addEventListener('pointerup', e=>{
  e.preventDefault();
  Draw.isPointerDown=false;
  if (S.tool === 'eraser') window._hideEraserCursor && window._hideEraserCursor();
  cvs.style.cursor = S.tool === 'eraser' ? 'crosshair' : cvs.style.cursor;
  onUp(e);
},{passive:false});
cvs.addEventListener('pointercancel', e=>{
  Draw.isPointerDown=false;
  Draw.dragInfo=null;
  Draw.activeStroke=null;
  window._hideEraserCursor && window._hideEraserCursor();
});
cvs.addEventListener('pointerleave', e=>{
  if (S.tool === 'eraser') window._hideEraserCursor && window._hideEraserCursor();
});
cvs.addEventListener('dblclick', e=>{
  if (S.tool!=='select'||!Draw.selId) return;
  const obj=Draw.objects.find(o=>o.id===Draw.selId);
  if (obj&&obj.type==='text') { const lxy=toLogical(e.clientX,e.clientY); showTextInput(obj.x,obj.y,obj); }
});

// prevent browser gestures
cvs.addEventListener('touchstart',e=>e.preventDefault(),{passive:false});

// 右クリックで日付詳細オブジェクトのコンテクストメニュー
cvs.addEventListener('contextmenu', e => {
  e.preventDefault();
  if (S.tool !== 'select') return;
  const lp = toLogical(e.clientX, e.clientY);
  const found = [...Draw.objects].reverse().find(o => !o._hidden && hitObj(o, lp.x, lp.y));
  if (found) {
    Draw.selId = found.id;
    redraw();
    openDayObjCtx(e.clientX, e.clientY, found.id);
  }
});

Draw._pinching = false;

// オブジェクト選択＋ドラッグ待機（select/text/stickerツールで共用）
/** オブジェクトを選択し、長押し・ドラッグ待機を開始 */
/** オブジェクト選択時にそのカラーをパレットに反映する */
function syncPaletteToObj(obj) {
  const hex = obj.color;
  if (!hex) return;
  const type = obj.type;
  // ツール色を更新
  if (type === 'pen')    S.penColor    = hex;
  if (type === 'text')   S.textColor   = hex;
  // マーカーはalpha付きpenオブジェクト
  if (type === 'pen' && obj.paths && obj.paths.some(p => p.alpha != null)) S.markerColor = hex;
  // パレットに追加（既存色なら選択のみ、なければ追加）
  addCustomColor(hex);
  // オプションバー再描画
  renderOpts();
}

function startObjSelect(found, lp, clientX, clientY) {
  Draw.selId = found.id;
  syncPaletteToObj(found);
  redraw();
  const origObj = clone(found);

  const longPressTimer = setTimeout(() => {
    document.removeEventListener('pointermove', onTryDrag);
    document.removeEventListener('pointerup', onUpAfterHit);
    openDayObjCtx(clientX, clientY, found.id);
  }, LONG_PRESS_MS);

  const onTryDrag = mv => {
    const {clientX:mx, clientY:my} = evtCoords(mv);
    if (Math.hypot(mx-clientX, my-clientY) > 6) {
      clearTimeout(longPressTimer);
      document.removeEventListener('pointermove', onTryDrag);
      document.removeEventListener('pointerup', onUpAfterHit);
      Draw.dragInfo = {objId: found.id, sx: lp.x, sy: lp.y, origObj};
    }
  };
  const onUpAfterHit = () => {
    clearTimeout(longPressTimer);
    document.removeEventListener('pointermove', onTryDrag);
  };
  document.addEventListener('pointermove', onTryDrag);
  document.addEventListener('pointerup', onUpAfterHit, {once:true});
}

/** 日付詳細画面のオブジェクトコンテクストメニューを表示 */
function openDayObjCtx(clientX, clientY, objId) {
  const m  = $id('ctx-day-obj');
  const mw = 180, mh = 240;
  m.style.left = Math.min(clientX, window.innerWidth  - mw - 8) + 'px';
  m.style.top  = Math.min(clientY, window.innerHeight - mh - 8) + 'px';
  m._targetObjId = objId;

  const obj     = Draw.objects.find(o => o.id === objId);
  const type    = obj?.type; // 'pen'|'text'|'sticker'|'clip'
  const isClip  = type === 'clip';
  const isText  = type === 'text';
  const hasPaste = S.clipboard?.type === 'obj';

  // プレビュー：クリップのみ
  $id('dctx-preview').style.display = isClip ? '' : 'none';
  // 編集：テキスト・クリップのみ
  const editEl = $id('dctx-edit');
  editEl.style.display = (isText || isClip) ? '' : 'none';
  // 貼り付け：クリップボードにオブジェクトがある場合のみ
  $id('dctx-paste').style.display   = hasPaste ? '' : 'none';

  m.classList.add('open');
}

// ── BBoxボタン（全ツール共通）ヒットテストと処理 ──
function handleBBoxBtns(obj, pp, clientY) {
  if (hitDeleteBtn(obj, pp.x, pp.y)) {
    deleteObj(Draw.selId); Draw.selId = null; redraw(); return true;
  }
  if (hitSliderBtn(obj, pp.x, pp.y)) {
    const snapBefore = clone(obj);
    let lastY = clientY;
    let moved = false;

    const onMove = e => {
      const dy = lastY - e.clientY; // 上方向がプラス（拡大）
      lastY = e.clientY;
      // 1pxあたり0.5%スケール
      const scale = 1 + dy * 0.005;
      if (scale !== 1) {
        scaleFromCenter(obj, scale);
        moved = true;
      }
    };
    const onUp = () => {
      document.removeEventListener('pointermove', onMove);
      document.removeEventListener('pointerup',   onUp);
      document.removeEventListener('pointercancel', onUp);
      if (moved) {
        pushUndo({ type:'scale', objId: obj.id, from: snapBefore, to: clone(obj) });
      }
    };
    document.addEventListener('pointermove', onMove);
    document.addEventListener('pointerup',   onUp,   { once: true });
    document.addEventListener('pointercancel', onUp, { once: true });
    return true;
  }
  return false;
}

// ── selectツール ──
function onDownSelect(e, lp, pp, clientX, clientY) {
  let found = null;
  if (Draw.selId) {
    const sel = Draw.objects.find(o => o.id === Draw.selId);
    if (sel && hitObj(sel, pp.x, pp.y)) found = sel;
  }
  if (!found) {
    for (let i = Draw.objects.length-1; i >= 0; i--) {
      if (hitObj(Draw.objects[i], pp.x, pp.y)) { found = Draw.objects[i]; break; }
    }
  }
  if (found) { startObjSelect(found, lp, clientX, clientY); return; }
  Draw.selId = null; redraw();

  // オブジェクト外 + クリップボードあり → 長押しで貼り付けメニュー
  if (!S.clipboard?.type) return;
  let cancelled = false;
  const onMoveCancel = mv => {
    if (Math.hypot(mv.clientX - clientX, mv.clientY - clientY) > 8) {
      cancelled = true;
      clearTimeout(timer);
      document.removeEventListener('pointermove', onMoveCancel);
      document.removeEventListener('pointerup',   onUp);
    }
  };
  const onUp = () => {
    cancelled = true;
    clearTimeout(timer);
    document.removeEventListener('pointermove', onMoveCancel);
    document.removeEventListener('pointerup',   onUp);
  };
  const timer = setTimeout(() => {
    document.removeEventListener('pointermove', onMoveCancel);
    document.removeEventListener('pointerup',   onUp);
    if (cancelled) return;
    const m = $id('ctx-day-paste');
    m._pasteLp = lp;
    const mw = 180, mh = 60;
    m.style.left = Math.min(clientX, window.innerWidth  - mw - 8) + 'px';
    m.style.top  = Math.min(clientY, window.innerHeight - mh - 8) + 'px';
    m.classList.add('open');
  }, LONG_PRESS_MS);
  document.addEventListener('pointermove', onMoveCancel);
  document.addEventListener('pointerup',   onUp);
}

// ── textツール ──
function onDownText(e, lp, pp, clientX, clientY) {
  if (Draw.activeTextEl) { finalizeText(); return; }
  if (Draw.textJustFinished) return;

  const now     = Date.now();
  const hitText = [...Draw.objects].reverse().find(o => o.type==='text' && !o._hidden && hitObj(o, pp.x, pp.y));

  if (now - (Draw._lastTextTap||0) < TAP_INTERVAL) {
    clearTimeout(Draw._textTapTimer);
    Draw._lastTextTap = 0;
    showTextInput(hitText ? hitText.x : lp.x, hitText ? hitText.y : lp.y, hitText || null);
    return;
  }
  Draw._lastTextTap = now;

  if (hitText) {
    let fingerUp = false;
    const onUpEarly = () => { fingerUp = true; };
    document.addEventListener('pointerup', onUpEarly, { once:true });
    Draw._textTapTimer = setTimeout(() => {
      document.removeEventListener('pointerup', onUpEarly);
      if (fingerUp) { Draw.selId = hitText.id; syncPaletteToObj(hitText); redraw(); }
      else          { startObjSelect(hitText, lp, clientX, clientY); }
    }, TAP_INTERVAL);
  } else {
    if (Draw.selId) { Draw.selId = null; redraw(); Draw._lastTextTap = 0; return; }
    const dummy = document.createElement('input');
    dummy.id = '_text-dummy-input';
    dummy.setAttribute('type','text');
    dummy.style.cssText = 'position:fixed;left:-9999px;top:-9999px;width:1px;height:1px;opacity:0;font-size:16px;';
    document.body.appendChild(dummy);
    dummy.focus();
    Draw._textTapTimer = setTimeout(() => {
      if (Draw.activeTextEl || Draw.textJustFinished) { dummy.remove(); return; }
      showTextInput(lp.x, lp.y, null);
    }, TAP_INTERVAL);
  }
}

function onDown(e) {
  if ($id('ctx-day-obj').classList.contains('open') ||
      $id('ctx-day-paste').classList.contains('open')) return;
  if (Draw._pinching) { Draw._globalLastTap = 0; return; }

  closeContextMenus();
  const {clientX, clientY} = evtCoords(e);
  const lp = toLogical(clientX, clientY);
  const pp = toPhysical(clientX, clientY);

  // BBoxボタン（全ツール共通）
  if (Draw.selId) {
    const obj = Draw.objects.find(o => o.id === Draw.selId);
    if (obj && handleBBoxBtns(obj, pp, clientY)) return;
  }

  // グローバルダブルタップ：テキスト編集 / クリップ表示名編集（textツール以外）
  const nowDt = Date.now();
  if (S.tool !== 'text' && nowDt - (Draw._globalLastTap||0) < TAP_INTERVAL) {
    const hitText = [...Draw.objects].reverse().find(o => o.type==='text' && !o._hidden && hitObj(o, pp.x, pp.y));
    if (hitText) { showTextInput(hitText.x, hitText.y, hitText); Draw._globalLastTap = 0; return; }
    const hitClip = [...Draw.objects].reverse().find(o => o.type==='clip' && hitObj(o, pp.x, pp.y));
    if (hitClip) {
      Draw._globalLastTap = 0;
      const prev = clone(hitClip);
      showClipNameModal(name => {
        hitClip.displayName = name;
        pushUndo({type:'edit', objId: hitClip.id, from: prev, to: clone(hitClip)});
        flushAndRedraw();
      }, hitClip.displayName || '', () => { /* キャンセル：何もしない */ });
      return;
    }
  }
  Draw._globalLastTap = nowDt;

  // クリップオブジェクトへのヒット（select/text以外）
  if (S.tool !== 'select' && S.tool !== 'text' && !(S.tool === 'sticker' && Draw.pendingStickerId)) {
    const hitClip = [...Draw.objects].reverse().find(o => o.type==='clip' && hitObj(o, pp.x, pp.y));
    if (hitClip) { startObjSelect(hitClip, lp, clientX, clientY); return; }
  }

  // ツール別処理
  switch (S.tool) {
    case 'select':  onDownSelect(e, lp, pp, clientX, clientY); break;
    case 'pen':     startPenStroke(S.penColor,    S.penSize,    lp);       break;
    case 'marker':  startPenStroke(S.markerColor, S.markerSize, lp, 0.35); break;
    case 'eraser':  eraseAt(lp); break;
    case 'text':    onDownText(e, lp, pp, clientX, clientY); break;
    case 'sticker':
      if (Draw.pendingStickerId) { placeSticker(lp); break; }
      const hitSticker = [...Draw.objects].reverse().find(o => o.type==='sticker' && hitObj(o, pp.x, pp.y));
      if (hitSticker) startObjSelect(hitSticker, lp, clientX, clientY);
      else if (Draw.selId) { Draw.selId = null; redraw(); }
      break;
    case 'clip':
      if (Draw.pendingClipId) { handleClipPointerDown(lp); break; }
      if (Draw.selId && !hitObj(Draw.objects.find(o => o.id === Draw.selId), pp.x, pp.y)) {
        Draw.selId = null; redraw();
      }
      break;
  }
}

function onMove(e) {
  const {clientX,clientY} = evtCoords(e);
  const lp = toLogical(clientX,clientY);

  if (Draw.dragInfo) {
    const obj=Draw.objects.find(o=>o.id===Draw.dragInfo.objId);
    if (obj) { shiftObj(obj,lp.x-Draw.dragInfo.sx,lp.y-Draw.dragInfo.sy,Draw.dragInfo.origObj); redraw(); }
    return;
  }
  if (S.tool==='pen'&&Draw.activeStroke) { Draw.activeStroke.points.push(lp); redraw(); return; }
  if (S.tool==='marker'&&Draw.activeStroke) { Draw.activeStroke.points.push(lp); redraw(); return; }
  if (S.tool==='eraser') eraseAt(lp);
}

function onUp(e) {
  if (Draw.dragInfo) {
    const obj=Draw.objects.find(o=>o.id===Draw.dragInfo.objId);
    if (obj) { pushUndo({type:'move',objId:obj.id,from:Draw.dragInfo.origObj,to:clone(obj)}); flushCell(); }
    Draw.dragInfo=null; redraw(); return;
  }
  if ((S.tool==='pen'||S.tool==='marker')&&Draw.activeStroke) {
    endPenStroke();
    return;
  }
}

function shiftObj(obj,dx,dy,orig) {
  if (obj.type==='pen') {
    obj.paths=orig.paths.map(p=>({...p,points:p.points.map(pt=>({x:pt.x+dx,y:pt.y+dy}))}));
  } else { obj.x=orig.x+dx; obj.y=orig.y+dy; }
}

/* ════ ERASER｜消しゴム ════
   責務: ペン・マーカーストロークの消去処理
   依存: RENDER（redraw）、APP STATE（Draw.objects）
════════════════════════════════════════════ */
function eraseAt(lp) {
  const r=S.eraserSize/2; let dirty=false;
  Draw.objects=Draw.objects.filter(obj=>{
    if (obj.type!=='pen') return true;
    const newPaths=[];
    obj.paths.forEach(path=>{
      let cur=[];
      path.points.forEach(pt=>{
        if (Math.hypot(pt.x-lp.x,pt.y-lp.y)<r) {
          if (cur.length>=2) newPaths.push({...path,points:cur});
          cur=[]; dirty=true;
        } else cur.push(pt);
      });
      if (cur.length>=2) newPaths.push({...path,points:cur});
    });
    obj.paths=newPaths; return obj.paths.length>0;
  });
  if (dirty){flushAndRedraw();}
}

/* ════ TEXT｜テキストツール ════
   責務: テキストオブジェクトの配置・編集（contenteditable overlay）
   依存: RENDER、UNDO/REDO（pushUndo）
════════════════════════════════════════════ */
function showTextInput(x,y,editObj) {
  removeTextInput();
  const r  = cvs.getBoundingClientRect();
  const sc = r.width/CANVAS_SRC;
  const ta = document.createElement('textarea');
  const fontSize = (editObj?.size||S.textSize)*sc;
  const weight   = (editObj?.bold ?? S.textBold) ? '700' : '400';
  const lineH    = Math.ceil(fontSize * 1.35);
  ta.style.cssText=`position:fixed;left:${r.left+x*sc}px;top:${r.top+y*sc-14}px;
    font:${weight} ${fontSize}px 'Noto Sans JP',sans-serif;
    color:${editObj?.color||S.textColor};
    border:none;outline:1.5px dashed #3a6fa8;background:rgba(255,255,255,.93);
    resize:none;padding:0;margin:0;line-height:1.35;
    vertical-align:top;box-sizing:content-box;
    border-radius:3px;z-index:600;
    overflow:hidden;white-space:pre;
    field-sizing:content;
    min-width:${Math.ceil(fontSize * 0.6)}px;
    min-height:${lineH}px;
    height:${lineH}px;width:${Math.ceil(fontSize * 0.6)}px;`;

  // field-sizing非対応ブラウザ向けフォールバック
  const autoResize = () => {
    ta.style.height = '0';
    ta.style.height = Math.max(lineH, ta.scrollHeight) + 'px';
    // 幅は hidden span で計測
    if (!ta._mirror) {
      const m = document.createElement('span');
      m.style.cssText = `position:fixed;visibility:hidden;white-space:pre;pointer-events:none;
        font:${weight} ${fontSize}px 'Noto Sans JP',sans-serif;`;
      document.body.appendChild(m);
      ta._mirror = m;
    }
    const lines = ta.value.split('\n');
    const maxLine = lines.reduce((a,b) => a.length >= b.length ? a : b, '');
    ta._mirror.textContent = maxLine || ' ';
    const w = Math.max(Math.ceil(fontSize * 0.6), ta._mirror.offsetWidth + 4);
    ta.style.width = w + 'px';
  };

  ta.addEventListener('input', autoResize);

  if (editObj) {
    ta.value = editObj.text||'';
    editObj._hidden = true;
    redraw();
  }
  document.body.appendChild(ta);
  autoResize();

  const dummy = $id('_text-dummy-input');
  if (dummy && document.activeElement === dummy) {
    ta.focus();
    dummy.remove();
  } else {
    ta.focus();
  }

  Draw.activeTextEl={el:ta,x,y,editObj};
  Draw.textJustFinished=false;

  const onOutsideDown = ev => {
    if (ev.target !== ta) {
      finalizeText();
      document.removeEventListener('pointerdown', onOutsideDown, true);
    }
  };
  setTimeout(() => document.addEventListener('pointerdown', onOutsideDown, true), 80);
}

function finalizeText() {
  if (!Draw.activeTextEl) return;
  const {el,x,y,editObj}=Draw.activeTextEl;
  if (editObj) editObj._hidden = false;
  const txt=el.value;
  if(el._mirror) el._mirror.remove();

  if (txt.trim()) {
    if (editObj) {
      const prev=clone(editObj); editObj.text=txt;
      pushUndo({type:'edit',objId:editObj.id,from:prev,to:clone(editObj)});
    } else {
      const obj={id:uid(),type:'text',x,y,text:txt,color:S.textColor,size:S.textSize,bold:S.textBold};
      pushUndo({type:'create',obj:clone(obj)}); Draw.objects.push(obj);
    }
    flushAndRedraw();
  }
  el.remove();
  Draw.activeTextEl=null;
  Draw.textJustFinished=true;
  setTimeout(()=>{ Draw.textJustFinished=false; }, 320);
}

function removeTextInput(){
  if(Draw.activeTextEl){
    if(Draw.activeTextEl.editObj) Draw.activeTextEl.editObj._hidden = false;
    if(Draw.activeTextEl.el._mirror) Draw.activeTextEl.el._mirror.remove();
    Draw.activeTextEl.el.remove();
    Draw.activeTextEl=null;
    redraw();
  }
}

/* ════ CLIP｜クリップツール ════
   責務: 画像・PDF の貼り付け・表示・ビューワー起動
   依存: RENDER、UNDO/REDO（pushUndo）、STORAGE
════════════════════════════════════════════ */
;(function(){
  // LocalStorageキープレフィックス
  const CLIP_PREFIX = 'calapp_clip_';

  // ファイルデータをLocalStorageに保存してIDを返す
  function saveClipData(dataUrl, fileName, fileType, pageCount) {
    const id = 'clip_' + uid();
    try {
      localStorage.setItem(CLIP_PREFIX + id, JSON.stringify({dataUrl, fileName, fileType, pageCount}));
    } catch(e) {
      alert('ファイルが大きすぎて保存できません。より小さいファイルを使用してください。');
      return null;
    }
    return id;
  }

  // LocalStorageからファイルデータを取得
  window.getClipData = function(clipId) {
    try {
      const raw = localStorage.getItem(CLIP_PREFIX + clipId);
      return raw ? JSON.parse(raw) : null;
    } catch(e) { return null; }
  };

  // クリップオブジェクトを配置
  function placeClip(lp, clipId, pageCount, fileType, displayName) {
    const obj = {
      id: uid(), type:'clip',
      x: lp.x, y: lp.y,
      size: 60,
      clipId, pageCount, fileType,
      displayName: displayName || '',
    };
    pushUndo({type:'create', obj: clone(obj)});
    Draw.objects.push(obj);
    Draw.selId = obj.id;
    Draw._fadeIn = { id: obj.id, start: performance.now() };
    Draw.pendingClipId = null;
    flushAndRedraw();
  }

  // ファイル選択ハンドラ
  const fileInput = $id('clip-file-input');
  fileInput.addEventListener('change', async () => {
    const file = fileInput.files[0];
    if (!file) return;
    const changeTargetId = fileInput._changeTargetObjId;
    fileInput._changeTargetObjId = null;
    fileInput.value = '';

    const fileType = file.type;
    let dataUrl, pageCount = 1;

    if (fileType === 'application/pdf') {
      dataUrl = await readFileAsDataUrl(file);
      try {
        const pdfjsLib = window['pdfjs-dist/build/pdf'];
        if (pdfjsLib) {
          const pdf = await pdfjsLib.getDocument({url: dataUrl}).promise;
          pageCount = pdf.numPages;
        }
      } catch(e) {}
    } else {
      dataUrl = await readFileAsDataUrl(file);
    }

    const clipId = saveClipData(dataUrl, file.name, fileType, pageCount);
    if (!clipId) return;

    if (changeTargetId) {
      // 画像変更モード：画像を差し替え後、表示名も編集できるモーダルを表示
      const obj = Draw.objects.find(o => o.id === changeTargetId);
      if (obj) {
        const prev = clone(obj);
        obj.clipId    = clipId;
        obj.pageCount = pageCount;
        obj.fileType  = fileType;
        // 既存の表示名を初期値としてモーダル表示
        showClipNameModal(name => {
          obj.displayName = name;
          pushUndo({type:'edit', objId: obj.id, from: prev, to: clone(obj)});
          flushAndRedraw();
        }, obj.displayName || '');
      }
    } else {
      // 新規配置モード → 表示名入力モーダル
      showClipNameModal(name => {
        placeClip({ x: CANVAS_SRC/2, y: CANVAS_SRC/2 }, clipId, pageCount, fileType, name);
        applyCanvasCursor('clip');
      }, '', () => {
        // キャンセル → クリップを配置しない（クリップツールのまま）
      });
    }
  });

  // クリップツール用ファイル選択ハンドラ（新規配置専用）

  function readFileAsDataUrl(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = e => resolve(e.target.result);
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  // クリップツール選択時のポインターダウン処理
  window.handleClipPointerDown = function(lp) {
    if (Draw.pendingClipId) {
      placeClip(lp, Draw.pendingClipId.clipId, Draw.pendingClipId.pageCount, Draw.pendingClipId.fileType, Draw.pendingClipId.displayName);
    }
  };

  // ビューワー
  const viewer = $id('clip-viewer');
  const viewerPages = $id('clip-viewer-pages');
  const viewerPageInfo = $id('clip-viewer-page-info');
  const viewerTitle = $id('clip-viewer-title');

  // ビューワー表示中のピンチが背景に伝わらないよう防止 + コンテンツのピンチズーム
  const viewerContent = $id('clip-viewer-content');
  let _scale = 1, _startScale = 1, _startDist = 0;
  let _offsetY = 0, _startOffsetY = 0, _startMidY = 0;
  let _isPinching = false;

  function _touchDist(t) { return Math.hypot(t[0].clientX-t[1].clientX, t[0].clientY-t[1].clientY); }
  function _touchMidY(t) { return (t[0].clientY + t[1].clientY) / 2; }

  viewerContent.addEventListener('touchstart', e => {
    if (e.touches.length === 2) {
      e.preventDefault(); // ピンチのみブラウザズームを防止
      _isPinching = true;
      _startScale   = _scale;
      _startDist    = _touchDist(e.touches);
      _startOffsetY = _offsetY;
      _startMidY    = _touchMidY(e.touches);
    } else {
      _isPinching = false;
    }
  }, { passive: false });

  viewerContent.addEventListener('touchmove', e => {
    if (_isPinching && e.touches.length === 2) {
      e.preventDefault(); // ピンチ中のみスクロール防止
      const dist  = _touchDist(e.touches);
      const midY  = _touchMidY(e.touches);
      _scale = Math.max(0.5, Math.min(8, _startScale * (dist / _startDist)));
      _offsetY = _startOffsetY + (midY - _startMidY);
      _applyScale();
    }
  }, { passive: false });

  function _applyScale() {
    // transform-origin を top left にして左方向のクリップを防ぐ
    viewerPages.style.transform = `scale(${_scale})`;
    viewerPages.style.transformOrigin = 'top left';
    // スケール後の実サイズをマージンで補完してスクロール領域を確保
    const naturalH = viewerPages.scrollHeight / _scale;
    const naturalW = viewerPages.scrollWidth  / _scale;
    const expandW  = naturalW * (_scale - 1);
    viewerPages.style.marginBottom = `${naturalH * (_scale - 1)}px`;
    // 左右マージンを均等にしてコンテンツを中央に見せる
    viewerPages.style.marginRight  = `${expandW / 2}px`;
    viewerPages.style.marginLeft   = `${expandW / 2}px`;
    // スクロール位置を中央に合わせて左端クリップを解消
    const scrollableW = viewerContent.scrollWidth - viewerContent.clientWidth;
    viewerContent.scrollLeft = scrollableW / 2;
  }

  viewerContent.addEventListener('touchend', e => {
    if (e.touches.length < 2) {
      _isPinching = false;
      if (_scale < 1) {
        _scale = 1; _offsetY = 0;
        viewerPages.style.transform = '';
        viewerPages.style.marginBottom = '';
        viewerPages.style.marginRight  = '';
        viewerPages.style.marginLeft   = '';
      }
    }
  });

  window.openClipViewer = async function(clipId, displayName) {
    const data = getClipData(clipId);
    if (!data) return;

    viewer._currentData = data; // ダウンロード用に保持

    viewer.classList.add('open');
    viewerPages.innerHTML = '';
    viewerPageInfo.textContent = '';
    viewerTitle.textContent = displayName || '';

    if (data.fileType === 'application/pdf') {
      try {
        const pdfjsLib = window['pdfjs-dist/build/pdf'];
        pdfjsLib.GlobalWorkerOptions.workerSrc =
          'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        const pdf = await pdfjsLib.getDocument({url: data.dataUrl}).promise;
        viewerPageInfo.textContent = `${pdf.numPages}ページ`;
        for (let i = 1; i <= pdf.numPages; i++) {
          const page = await pdf.getPage(i);
          const viewport = page.getViewport({scale: window.innerWidth / page.getViewport({scale:1}).width * 0.92});
          const cvs2 = document.createElement('canvas');
          cvs2.width  = viewport.width;
          cvs2.height = viewport.height;
          cvs2.style.width  = '92vw';
          cvs2.style.maxWidth = '800px';
          viewerPages.appendChild(cvs2);
          await page.render({canvasContext: cvs2.getContext('2d'), viewport}).promise;
        }
      } catch(e) {
        viewerPages.innerHTML = `<p style="color:#fff;padding:24px">${L().pdfError}</p>`;
      }
    } else {
      // 画像
      const img = document.createElement('img');
      img.src = data.dataUrl;
      img.style.width = '92vw';
      img.style.maxWidth = '800px';
      viewerPages.appendChild(img);
    }
  };

  $id('clip-viewer-download').addEventListener('click', () => {
    const data = viewer._currentData;
    if (!data) return;
    const a = document.createElement('a');
    a.href     = data.dataUrl;
    a.download = data.fileName || 'download';
    a.click();
  });

  const _resetViewer = () => {
    viewer.classList.remove('open');
    viewerPages.innerHTML = '';
    viewerPages.style.transform = '';
    viewerPages.style.marginBottom = '';
    viewerPages.style.marginRight  = '';
    viewerPages.style.marginLeft   = '';
    _scale = 1; _offsetY = 0; _isPinching = false;
  };
  $id('clip-viewer-close').addEventListener('click', _resetViewer);
  $id('clip-viewer-bd').addEventListener('click', _resetViewer);
})();

/* ════ STICKER｜スティッカーツール ════
   責務: スティッカーオブジェクトの配置
   依存: RENDER、UNDO/REDO（pushUndo）、STICKER DEFS
════════════════════════════════════════════ */
(function(){
  const dropdown = $id('stk-dropdown');
  const grid     = $id('stk-grid');

  // 起動時に全スタンプをプリロード
  preloadStickerImages();

  // グリッドを一度だけ構築
  STICKERS.forEach(s => {
    const el = document.createElement('div');
    el.className = 'stk-inline-item';
    el.dataset.sid = s.id;
    el.title = s.label || s.id;

    const pc = document.createElement('canvas');
    pc.width = 40; pc.height = 40;
    el.appendChild(pc);

    // ロード完了時にグリッドのサムネを更新するリフレッシュ関数
    el._refresh = () => {
      const img = imgCache[s.id];
      const c2  = pc.getContext('2d');
      c2.clearRect(0, 0, 40, 40);
      if (img) {
        const {w, h} = stickerDrawSize(img, 36); // 縦横比を保持してサイズ計算
        const x = (40 - w) / 2;
        const y = (40 - h) / 2;
        c2.drawImage(img, x, y, w, h);
      }
    };
    el._refresh();

    el.addEventListener('pointerdown', e => {
      e.stopPropagation();
      e.preventDefault();
      Draw.pendingStickerId = s.id;
      cvs.style.cursor = 'copy';
      grid.querySelectorAll('.stk-inline-item').forEach(x =>
        x.classList.toggle('stk-selected', x.dataset.sid === s.id));
      dropdown.classList.remove('open');
      renderOpts();
      // キャンバス中央に即配置
      placeSticker({ x: CANVAS_SRC/2, y: CANVAS_SRC/2 });
    });
    // pointerupもキャプチャして伝播を止める（カレンダー遷移リスナーへの到達を防ぐ）
    el.addEventListener('pointerup', e => {
      e.stopPropagation();
      e.preventDefault();
    }, { capture: true });
    grid.appendChild(el);
  });

  // imgCache に画像が追加されたときグリッドを再描画（preloadStickerImages の onload から呼ばれる）
  window._stickerGridRefresh = () => {
    grid.querySelectorAll('.stk-inline-item').forEach(el => {
      if (el._refresh) el._refresh();
    });
  };

  window.openStickerDropdown = function() {
    preloadStickerImages();
    // offsetParentで実際に表示されているサイドバーを判定
    const sidebarLand = $id('day-sidebar-land');
    const isLandMode = sidebarLand && sidebarLand.offsetParent !== null;
    const btn = isLandMode
      ? document.querySelector('.land-tool-btn[data-tool="sticker"]')
      : document.querySelector('.tool-btn[data-tool="sticker"]');
    if (btn) {
      const r = btn.getBoundingClientRect();
      const dropW = Math.min(360, window.innerWidth * 0.9);
      if (isLandMode) {
        // 横長: サイドバー(310px)の右端にドロップダウンを表示
        const dropH = 280;
        const top = Math.min(r.top, window.innerHeight - dropH - 6);
        dropdown.style.top  = Math.max(0, top) + 'px';
        dropdown.style.left = (310 + 8) + 'px';
      } else {
        // 縦長: ボタンの下、右端が画面外に出ないよう調整
        dropdown.style.top  = (r.bottom + 6) + 'px';
        dropdown.style.left = Math.min(r.left, window.innerWidth - dropW - 8) + 'px';
      }
    }
    dropdown.classList.add('open');
  };

  window.closeStickerDropdown = function() {
    dropdown.classList.remove('open');
  };

  // ドロップダウン外 pointerdown（キャプチャフェーズ）で閉じる
  // キャプチャフェーズを使うことで stopPropagation の影響を受けずに確実に検出
  document.addEventListener('pointerdown', e => {
    if (dropdown.classList.contains('open') && !dropdown.contains(e.target)) {
      dropdown.classList.remove('open');
    }
  }, false);
})();

function placeSticker(lp) {
  if (!Draw.pendingStickerId) return;
  const img = imgCache[Draw.pendingStickerId];
  const sid = Draw.pendingStickerId;

  // 配置後すぐにリセット（続けてタップしても配置されないよう）
  Draw.pendingStickerId = null;
  cvs.style.cursor = 'crosshair';
  renderOpts();

  const doPlace = () => {
    const obj = {id:uid(), type:'sticker', stickerId:sid, x:lp.x, y:lp.y, size:132};
    pushUndo({type:'create', obj:clone(obj)});
    Draw.objects.push(obj);
    Draw.selId = obj.id;
    Draw._fadeIn = { id: obj.id, start: performance.now() };
    flushAndRedraw();
  };

  if (img instanceof Image) {
    doPlace();
  } else {
    let waited = 0;
    const timer = setInterval(() => {
      waited += 50;
      if (imgCache[sid] instanceof Image) {
        clearInterval(timer);
        doPlace();
      } else if (waited >= 2000) {
        clearInterval(timer);
      }
    }, 50);
  }
}

/* ════ DELETE / FLUSH｜削除・保存 ════
   責務: オブジェクト削除・セルデータの保存（flushCell）・カレンダーへの反映
   依存: STORAGE（saveToStorage）、CALENDAR RENDERING（renderMiniCanvases）
════════════════════════════════════════════ */
/** 指定IDのオブジェクトをフェードアウト後に削除 */
function deleteObj(id){
  const obj=Draw.objects.find(o=>o.id===id); if(!obj) return;
  pushUndo({type:'delete',obj:clone(obj)});
  // フェードアウト後に削除
  Draw._fadeOut = { id, start: performance.now() };
  const DURATION = 200;
  const animate = () => {
    const elapsed = performance.now() - Draw._fadeOut?.start;
    if (!Draw._fadeOut || Draw._fadeOut.id !== id) return;
    if (elapsed >= DURATION) {
      Draw._fadeOut = null;
      Draw.objects = Draw.objects.filter(o=>o.id!==id);
      flushAndRedraw();
    } else {
      redraw();
      requestAnimationFrame(animate);
    }
  };
  requestAnimationFrame(animate);
}

function flushCell(){
  if (!S.currentKey) return;
  getActiveCalendar().cellData[S.currentKey] = clone(Draw.objects);
  saveToStorage();
  renderMiniCanvases();
}

/** flushCell() + redraw() の組み合わせを一括実行するヘルパー */
function flushAndRedraw() { flushCell(); redraw(); }

/* ════ CALENDAR SCREEN UNDO/REDO｜カレンダー画面 Undo/Redo ════
   責務: カレンダー画面でのオブジェクト操作（D&D・削除など）の Undo/Redo
   注意: 「ユーザーに見えていない画面のUndoを残さない」方針により
         月遷移・カレンダータブ切り替え・日付詳細画面を開く際に clearCalUR() を呼ぶ
   依存: APP STATE（Cal.undoStk / Cal.redoStk）、STORAGE
════════════════════════════════════════════ */
/** カレンダー画面のUndoスタックにアクションを積む */
function calPushUndo(act) {
  Cal.undoStk.push(act);
  Cal.redoStk = [];
  syncCalUR();
}
function syncCalUR() {
  const uBtn = $id('cal-btn-undo');
  const rBtn = $id('cal-btn-redo');
  if (uBtn) uBtn.disabled = Cal.undoStk.length === 0;
  if (rBtn) rBtn.disabled = Cal.redoStk.length === 0;
}
function clearCalUR() {
  Cal.undoStk = [];
  Cal.redoStk = [];
  syncCalUR();
}

function applyCalUndo(act) {
  if (act.type === 'cal-delete') {
    const objs = clone(getCellObjs(act.key));
    objs.push(clone(act.obj));
    setCellObjs(act.key, objs);
  } else if (act.type === 'cal-create') {
    const objs = getCellObjs(act.key).filter(o => o.id !== act.obj.id);
    setCellObjs(act.key, objs);
  } else if (act.type === 'cal-move') {
    // 同一セル内移動のUndo
    const objs = getCellObjs(act.key);
    const obj  = objs.find(o => o.id === act.objId);
    if (obj) Object.assign(obj, act.from);
    setCellObjs(act.key, objs);
  } else if (act.type === 'cal-cross-move') {
    // 別セル移動のUndo: dstから削除 → srcに復元
    const dstObjs = getCellObjs(act.dstKey).filter(o => o.id !== act.newObj.id);
    setCellObjs(act.dstKey, dstObjs);
    const srcObjs = clone(getCellObjs(act.srcKey));
    srcObjs.push(clone(act.origObj));
    setCellObjs(act.srcKey, srcObjs);
  } else if (act.type === 'cal-cell-move') {
    // セル全体移動のUndo: dstを元に戻し、srcを復元
    setCellObjs(act.dstKey, clone(act.dstObjsBefore));
    setCellObjs(act.srcKey, clone(act.movedObjs));
  } else if (act.type === 'cal-cell-snapshot') {
    // セル単位操作のUndo: before状態に戻す
    setCellObjs(act.key, clone(act.before));
  }
  saveToStorage();
  renderMiniCanvases();
}

function applyCalRedo(act) {
  if (act.type === 'cal-delete') {
    const objs = getCellObjs(act.key).filter(o => o.id !== act.obj.id);
    setCellObjs(act.key, objs);
  } else if (act.type === 'cal-create') {
    const objs = clone(getCellObjs(act.key));
    objs.push(clone(act.obj));
    setCellObjs(act.key, objs);
  } else if (act.type === 'cal-move') {
    // 同一セル内移動のRedo
    const objs = getCellObjs(act.key);
    const obj  = objs.find(o => o.id === act.objId);
    if (obj) Object.assign(obj, act.to);
    setCellObjs(act.key, objs);
  } else if (act.type === 'cal-cross-move') {
    // 別セル移動のRedo: srcから削除 → dstに追加
    const srcObjs = getCellObjs(act.srcKey).filter(o => o.id !== act.origObj.id);
    setCellObjs(act.srcKey, srcObjs);
    const dstObjs = clone(getCellObjs(act.dstKey));
    dstObjs.push(clone(act.newObj));
    setCellObjs(act.dstKey, dstObjs);
  } else if (act.type === 'cal-cell-move') {
    // セル全体移動のRedo: srcをクリアしてdstに移動
    setCellObjs(act.dstKey, clone(act.movedObjs));
    setCellObjs(act.srcKey, []);
  } else if (act.type === 'cal-cell-snapshot') {
    // セル単位操作のRedo: after状態を適用
    setCellObjs(act.key, clone(act.after));
  }
  saveToStorage();
  renderMiniCanvases();
}

function doCalUndo() {
  if (Cal.undoStk.length === 0) return;
  const act = Cal.undoStk.pop();
  Cal.redoStk.push(act);
  applyCalUndo(act);
  syncCalUR();
}

function doCalRedo() {
  if (Cal.redoStk.length === 0) return;
  const act = Cal.redoStk.pop();
  Cal.undoStk.push(act);
  applyCalRedo(act);
  syncCalUR();
}

function positionDateLabels() {
  const numEl = $id('day-num-p');
  const subEl = $id('day-sub-p');
  const dowEl = $id('day-dow-p');
  if (!numEl || !subEl || !dowEl) return;
  const GAP = 8; // 日付との間隔(px)

  // day-topbar の中央Y座標を取得
  const topbar = $id('day-topbar');
  const tbr = topbar ? topbar.getBoundingClientRect() : null;
  const row1 = document.querySelector('.tb-row1');
  const row1r = row1 ? row1.getBoundingClientRect() : null;
  const midY = row1r ? row1r.top + row1r.height / 2 : (tbr ? tbr.top + tbr.height / 4 : 30);

  // day-num の縦位置を設定
  numEl.style.top = (midY - numEl.getBoundingClientRect().height / 2) + 'px';

  // 設定後に再取得
  const r = numEl.getBoundingClientRect();

  // 年月: 日付左端の左側
  const subW = subEl.getBoundingClientRect().width;
  subEl.style.left = (r.left - subW - GAP) + 'px';
  subEl.style.top  = (midY - subEl.getBoundingClientRect().height / 2) + 'px';

  // 曜日: 日付右端の右側
  dowEl.style.left = (r.right + GAP) + 'px';
  dowEl.style.top  = (midY - dowEl.getBoundingClientRect().height / 2) + 'px';
}

// セル→日付詳細画面へのズームアニメーション
function animateCellOpen(fromRect, objects) {
  const toRect  = cvs.getBoundingClientRect();
  const tc      = $id('transition-canvas');
  const ctx2    = tc.getContext('2d');
  const dpr     = window.devicePixelRatio || 1;
  const dayScr  = $id('day-screen');

  tc.width  = toRect.width  * dpr;
  tc.height = toRect.height * dpr;
  ctx2.scale(dpr, dpr);

  const sc = toRect.width / CANVAS_SRC;
  ctx2.fillStyle = '#fff';
  ctx2.fillRect(0, 0, toRect.width, toRect.height);
  objects.forEach(o => drawObj(ctx2, o, sc));

  Object.assign(tc.style, {
    display: 'block', opacity: '1', transform: 'none', transition: 'none',
    left: fromRect.left + 'px', top: fromRect.top + 'px',
    width: fromRect.width + 'px', height: fromRect.height + 'px',
  });
  dayScr.style.opacity = '0';

  requestAnimationFrame(() => requestAnimationFrame(() => {
    const dx = toRect.left - fromRect.left;
    const dy = toRect.top  - fromRect.top;
    const sx = toRect.width  / fromRect.width;
    const sy = toRect.height / fromRect.height;

    tc.style.transition    = 'transform 0.4s cubic-bezier(0.4,0,0.2,1), opacity 0.4s';
    tc.style.transformOrigin = '0 0';
    tc.style.transform     = `translate(${dx}px,${dy}px) scale(${sx},${sy})`;

    const done = () => { tc.style.display = 'none'; tc.style.transform = 'none'; dayScr.style.opacity = '1'; };
    const fallback = setTimeout(done, 600);
    tc.addEventListener('transitionend', () => { clearTimeout(fallback); done(); }, { once: true });
  }));
}

function openDayCell(key, label, keepTool = false) {
  Cal.selObjId=null; Cal.selCellKey=null;
  S.clipboard=null;
  finalizePenObjs(); removeTextInput();
  S.currentKey=key;
  Cal.currentCellKey=key;
  Draw.objects=clone(getCellObjs(key));
  Draw.undoStk=[]; Draw.redoStk=[]; Draw.selId=null;
  Draw.activePenObjRef=null; Draw.activeStroke=null;
  clearCalUR();
  syncUR();
  updateTodayBtns();

  const l = L();
  const isEn = S.lang === 'en';
  const isBlank = key.includes('-pre-') || key.includes('-post-');
  const memoLabel = isEn ? 'Memo' : 'メモ';
  const labelStr = isBlank ? memoLabel
    : (typeof label === 'number') ? (isEn ? String(label) : label + '日')
    : (label || memoLabel);
  $id('day-num-inner-p').textContent = labelStr;
  $id('day-num-l').textContent = labelStr;

  const subStr = isEn
    ? `${l.months[S.month]} ${S.year}`
    : `${S.year}年 ${S.month+1}月`;
  $id('day-sub-p').textContent = subStr;
  $id('day-sub-l').textContent = subStr;

  const DOW_JA = ['日','月','火','水','木','金','土'];
  const DOW_EN = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const dowArr = isEn ? DOW_EN : DOW_JA;
  const dowDate = (!isBlank && typeof label === 'number') ? new Date(S.year, S.month, label) : null;
  const dowStr  = dowDate ? dowArr[dowDate.getDay()] : '';
  $id('day-dow-p').textContent = dowStr;
  $id('day-dow-l').textContent = dowStr;

  // 曜日色（平日:黒 / 土:青 / 日・祝:赤）
  let dowColor = 'var(--ink)';
  if (dowDate) {
    const dow = dowDate.getDay();
    const holidays = getHolidays(S.year);
    const holKey   = `${S.year}-${String(S.month+1).padStart(2,'0')}-${String(label).padStart(2,'0')}`;
    const isHol    = holKey in holidays;
    if (dow === 0 || isHol) dowColor = 'var(--sun-txt)';
    else if (dow === 6)     dowColor = 'var(--sat-txt)';
  }
  $id('day-dow-p').style.color = dowColor;
  $id('day-dow-l').style.color = dowColor;

  // ── ミニキャンバスの rect を取得（アニメーション開始位置） ──
  const miniMc = document.querySelector(`.cell-preview canvas[data-key="${key}"]`);
  const fromRect = miniMc ? miniMc.getBoundingClientRect() : null;

  // 日付セル画面を不可視で先に表示してキャンバスを確定
  showScreen('day');
  updateOrientation();
  sizeCanvas();
  if (!keepTool) switchTool('pen');

  if (!fromRect || fromRect.width < 2) return;
  animateCellOpen(fromRect, Draw.objects);
}

    requestAnimationFrame(() => requestAnimationFrame(() => {
      const sx = toRect.width  / fromRect.width;
      const sy = toRect.height / fromRect.height;
      const dx = toRect.left - fromRect.left;
      const dy = toRect.top  - fromRect.top;

      const fallback = setTimeout(finish, 600);

/* ════ 日付セル｜前後移動 ════
   責務: 日付詳細画面での前日・翌日フリックナビゲーション
   依存: OPEN/CLOSE DAY CELL（navigateDayCell）
════════════════════════════════════════════ */

// 現在セルを保存して次の操作に備えるユーティリティ
function saveCurrentCell() {
  finalizePenObjs(); finalizeText();
  if (S.currentKey) {
    getActiveCalendar().cellData[S.currentKey] = clone(Draw.objects);
    saveToStorage();
  }
}

// 当月のセル記述子を使って前後のkeyを取得（blankはスキップして隣の有効セルへ）
function getAdjacentCellKey(currentKey, dir) {
  const descs = buildCellDescs(); // 現在のS.year/S.monthで生成
  const cells = descs.filter(d => d.type === 'date' || d.type === 'blank');
  const idx = cells.findIndex(d => d.key === currentKey);
  if (idx < 0) return null;
  const next = idx + dir;

  // 当月の範囲内
  if (next >= 0 && next < cells.length) {
    return { key: cells[next].key, yearDelta: 0, monthDelta: 0 };
  }

  // 月またぎ：前月末 or 翌月頭に移動
  if (dir < 0) {
    // 前月の最終dateセルを取得
    let y = S.year, m = S.month - 1;
    if (m < 0) { m = 11; y--; }
    const prevDescs = buildCellDescsFor(y, m);
    const prevCells = prevDescs.filter(d => d.type === 'date' || d.type === 'blank');
    if (prevCells.length === 0) return null;
    const lastCell = prevCells[prevCells.length - 1];
    return { key: lastCell.key, year: y, month: m };
  } else {
    // 翌月の最初のdateセルを取得
    let y = S.year, m = S.month + 1;
    if (m > 11) { m = 0; y++; }
    const nextDescs = buildCellDescsFor(y, m);
    const nextCells = nextDescs.filter(d => d.type === 'date' || d.type === 'blank');
    if (nextCells.length === 0) return null;
    const firstCell = nextCells[0];
    return { key: firstCell.key, year: y, month: m };
  }
}

/** 日付詳細画面で前後の日付に移動（dir: -1=前日, 1=翌日） */
let _dayNavigating = false; // 日付遷移アニメーション中フラグ

function navigateDayCell(dir) {
  if (_dayNavigating) return;
  _dayNavigating = true;
  saveCurrentCell();

  const nextKey = getAdjacentCellKey(S.currentKey, dir);
  if (!nextKey) { _dayNavigating = false; return; }

  if (nextKey.year !== undefined) {
    S.year  = nextKey.year;
    S.month = nextKey.month;
  }

  const descs = buildCellDescs();
  const desc  = descs.find(d => d.key === nextKey.key);
  const label = desc && desc.type === 'date' ? desc.d : undefined;
  const inClass = dir > 0 ? 'draw-slide-in-right' : 'draw-slide-in-left';

  const isLand = $id('day-sidebar-land').offsetParent !== null;
  const slideTargets = isLand
    ? [
        document.querySelector('.land-date-area'),
        document.querySelector('.land-ur-area'),
        $id('draw-wrap'),
      ]
    : [
        document.querySelector('.tb-row1'),
        $id('draw-wrap'),
      ];

  // チラつき防止: 内容更新前に非表示
  const targets = slideTargets.filter(Boolean);
  targets.forEach(el => { el.style.visibility = 'hidden'; });

  openDayCell(nextKey.key, label, true);

  requestAnimationFrame(() => requestAnimationFrame(() => {
    targets.forEach(el => { el.style.visibility = ''; });

    // 横長: スライド中の空白を背景色パネルで埋める
    const bgPanels = [];
    if (isLand) {
      targets.forEach(el => {
        if (el.id === 'draw-wrap') return;
        const panel = document.createElement('div');
        panel.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;background:var(--surface);pointer-events:none;z-index:-1;';
        el.style.position = 'relative';
        el.appendChild(panel);
        bgPanels.push({ el, panel });
      });
    }

    let doneCount = 0;
    targets.forEach(el => {
      el.classList.add(inClass);
      el.addEventListener('animationend', () => {
        el.classList.remove(inClass);
        bgPanels.forEach(({ el: pEl, panel }) => { if (pEl === el) panel.remove(); });
        doneCount++;
        if (doneCount >= targets.length) _dayNavigating = false;
      }, { once: true });
    });
    // フォールバック
    setTimeout(() => { _dayNavigating = false; }, 600);
  }));
}

// topbar（縦長）＋ sidebar（横長）＋ draw-wrap余白 フリック検出
;(function() {
  function attachFlick(el, skipIfCanvas = false) {
    let sx = 0, sy = 0, st = 0, skip = false;
    el.addEventListener('touchstart', e => {
      if (e.touches.length !== 1) return;
      // キャンバス上のタッチはスキップ
      skip = skipIfCanvas && e.target === $id('draw-canvas');
      if (skip) return;
      sx = e.touches[0].clientX;
      sy = e.touches[0].clientY;
      st = Date.now();
    }, { passive: true });
    el.addEventListener('touchend', e => {
      if (skip || e.changedTouches.length !== 1) return;
      // オブジェクトD&D中はフリック無効
      if (Draw.dragInfo || Cal.dragGhost) return;
      if (_calGhostJustEnded) return; // クリップD&D完了直後はフリック無効
      if (_dayNavigating) return; // 日付遷移アニメーション中はフリック無効
      const dx = e.changedTouches[0].clientX - sx;
      const dy = e.changedTouches[0].clientY - sy;
      const dt = Math.max(1, Date.now() - st);
      if (Math.abs(dy) > Math.abs(dx)) return;
      if (Math.abs(dx) < 30 || Math.abs(dx) / dt < 0.2) return;
      navigateDayCell(dx < 0 ? 1 : -1);
    }, { passive: true });
  }
  attachFlick($id('day-topbar'));
  attachFlick($id('day-sidebar-land'));
  attachFlick($id('draw-wrap'), true); // キャンバス上はスキップ

  // スウォッチ横スクロール中の誤フリック防止
  const row3 = $id('tb-opts-portrait');
  if (row3) {
    row3.addEventListener('touchstart', e => e.stopPropagation(), { passive: true });
    row3.addEventListener('touchend',   e => e.stopPropagation(), { passive: true });
    // スクロール末尾でフェードを消す
    const updateFade = () => {
      const atEnd = row3.scrollLeft + row3.clientWidth >= row3.scrollWidth - 4;
      const fade = atEnd
        ? 'none'
        : 'linear-gradient(to right, black calc(100% - 32px), transparent 100%)';
      row3.style.webkitMaskImage = fade;
      row3.style.maskImage = fade;
    };
    row3.addEventListener('scroll', updateFade, { passive: true });
    // renderOpts後に再評価
    window._updateRow3Fade = updateFade;
  }
})();

/* ════ TOOL SWITCHING｜ツール切り替え ════
   責務: ツールの切り替えとオプションバーの再描画
   注意: syncAllOpts() で縦長・横長の両コンテナを同時に更新する
         syncActive(container, ...) は片方のコンテナのみ更新するため直接使わない
   依存: APP STATE（S.tool）、CANVAS
════════════════════════════════════════════ */

// パレットのスウォッチHTMLを生成するヘルパー
function buildSwatchesHTML(id, dataAttr, currentColor) {
  const customColors = loadCustomColors();
  const allColors = [
    ...PALETTE.map(c => ({hex: c.hex, label: c.label, fixed: true})),
    ...customColors.map(hex => ({hex, label: hex, fixed: false})),
  ];
  const items = allColors.map(c => {
    const on = c.hex === currentColor ? ' on' : '';
    const del = c.fixed ? '' : ` data-deletable="true"`;
    return `<div class="swatch${on}" ${dataAttr}="${c.hex}" style="background:${c.hex}" title="${c.label}"${del}></div>`;
  }).join('');
  const picker = `<div class="color-picker-btn" title="カラーピッカー" data-picker="${dataAttr}"><input type="color" value="${currentColor}"></div>`;
  return `<div class="swatches" id="${id}">${items}${picker}</div>`;
}

function buildOptsHTML(tool) {
  if (tool === 'pen') {
    return `
      <div class="opt-block">
        ${buildSwatchesHTML('po-colors', 'data-color', S.penColor)}
      </div>
      <div class="opt-block">
        <div class="sz-row">
          <button class="sz-btn${S.penSize===3?' on':''}" data-size="3">
            <span class="dot" style="width:8px;height:8px"></span>
          </button>
          <button class="sz-btn${S.penSize===8?' on':''}" data-size="8">
            <span class="dot" style="width:16px;height:16px"></span>
          </button>
        </div>
      </div>`;
  }
  if (tool === 'marker') {
    return `
      <div class="opt-block">
        ${buildSwatchesHTML('mo-colors', 'data-mcolor', S.markerColor)}
      </div>`;
  }
  if (tool === 'eraser') {
    return `
      <div class="opt-block">
        <div class="sz-row">
          <button class="sz-btn${S.eraserSize===12?' on':''}" data-esize="12">
            <span class="dot" style="width:11px;height:11px;background:#aaa"></span>
          </button>
          <button class="sz-btn${S.eraserSize===28?' on':''}" data-esize="28">
            <span class="dot" style="width:20px;height:20px;background:#aaa"></span>
          </button>
        </div>
      </div>`;
  }
  if (tool === 'text') {
    return `
      <div class="opt-block">
        ${buildSwatchesHTML('to-colors', 'data-tcolor', S.textColor)}
      </div>
      <div class="opt-block">
        <div class="sz-row">
          <button class="sz-btn${!S.textBold?' on':''}" data-tbold="false">
            <span class="sz-lbl" style="font-weight:300;letter-spacing:0.02em;">A</span>
          </button>
          <button class="sz-btn${S.textBold?' on':''}" data-tbold="true">
            <span class="sz-lbl" style="font-weight:800;font-size:16px;">A</span>
          </button>
        </div>
      </div>`;
  }
  const l2 = L();
  const msg = tool === 'sticker'
    ? (Draw.pendingStickerId ? l2.stickerHint : '')
    : tool === 'select' ? l2.selectHint : '';
  return msg ? `<span style="font-size:12px;color:var(--ink-faint);">${msg}</span>` : '';
}

// 選択状態を更新するヘルパー
function syncActive(container, attr, currentVal) {
  container.querySelectorAll(`[${attr}]`).forEach(el => {
    el.classList.toggle('on', el.dataset[attr.replace('data-','')] == currentVal);
  });
}

function syncAllOpts(attr, currentVal) {
  // 縦長・横長の両コンテナを同時に更新する
  [$id('tb-opts-portrait'), $id('land-opts')].forEach(c => {
    if (c) syncActive(c, attr, currentVal);
  });
}

function bindOpts(container) {
  container.querySelectorAll('[data-color]').forEach(el => {
    el.addEventListener('click', () => {
      S.penColor = el.dataset.color;
      syncAllOpts('data-color', S.penColor);
    });
  });
  container.querySelectorAll('[data-size]').forEach(el => {
    el.addEventListener('click', () => {
      S.penSize = +el.dataset.size;
      syncAllOpts('data-size', S.penSize);
    });
  });
  container.querySelectorAll('[data-mcolor]').forEach(el => {
    el.addEventListener('click', () => {
      S.markerColor = el.dataset.mcolor;
      syncAllOpts('data-mcolor', S.markerColor);
    });
  });
  container.querySelectorAll('[data-msize]').forEach(el => {
    el.addEventListener('click', () => {
      S.markerSize = +el.dataset.msize;
      syncAllOpts('data-msize', S.markerSize);
    });
  });
  container.querySelectorAll('[data-esize]').forEach(el => {
    el.addEventListener('click', () => {
      S.eraserSize = +el.dataset.esize;
      syncAllOpts('data-esize', S.eraserSize);
      if (S.tool === 'eraser') setEraserCursor();
    });
  });
  container.querySelectorAll('[data-tcolor]').forEach(el => {
    el.addEventListener('click', () => {
      S.textColor = el.dataset.tcolor;
      syncAllOpts('data-tcolor', S.textColor);
    });
  });
  container.querySelectorAll('[data-tbold]').forEach(el => {
    el.addEventListener('click', () => {
      S.textBold = el.dataset.tbold === 'true';
      syncAllOpts('data-tbold', String(S.textBold));
    });
  });

  // カラーピッカー
  container.querySelectorAll('.color-picker-btn').forEach(btn => {
    const input = btn.querySelector('input[type=color]');
    if (!input) return;
    const dataAttr = btn.dataset.picker;
    input.addEventListener('change', e => {
      const hex = e.target.value;
      addCustomColor(hex); // 既存色でも新規色でも処理（重複は内部で制御）
      // ツール色に反映
      if (dataAttr === 'data-color')  { S.penColor    = hex; }
      if (dataAttr === 'data-mcolor') { S.markerColor = hex; }
      if (dataAttr === 'data-tcolor') { S.textColor   = hex; }
      // オプションバー再描画（パレット更新＋選択状態の反映）
      renderOpts();
    });
  });

  // カスタムカラー長押し → コンテキストメニュー
  container.querySelectorAll('.swatch[data-deletable]').forEach(el => {
    let timer = null;
    let startX = 0, startY = 0;
    el.addEventListener('pointerdown', e => {
      startX = e.clientX; startY = e.clientY;
      timer = setTimeout(() => {
        const hex = el.dataset.color || el.dataset.mcolor || el.dataset.tcolor;
        if (!hex) return;
        const menu = $id('ctx-swatch-delete');
        menu.style.left = startX + 'px';
        menu.style.top  = startY + 'px';
        menu.classList.add('open');
        $id('sctx-swatch-delete').onclick = () => {
          const item = $id('sctx-swatch-delete');
          item.classList.add('ctx-blink');
          item.addEventListener('animationend', () => {
            item.classList.remove('ctx-blink');
            removeCustomColor(hex);
            if (S.penColor    === hex) S.penColor    = '#000000';
            if (S.markerColor === hex) S.markerColor = '#000000';
            if (S.textColor   === hex) S.textColor   = '#000000';
            closeContextMenus();
            renderOpts();
          }, { once: true });
        };
      }, 500);
    });
    el.addEventListener('pointerup',    () => clearTimeout(timer));
    el.addEventListener('pointerleave', () => clearTimeout(timer));
  });

}

/** 現在のツールに応じてオプションバーを再描画 */
function renderOpts() {
  const html = buildOptsHTML(S.tool);

  function applyTo(container) {
    // 既存要素のアニメーションを即座に停止
    container.querySelectorAll('*').forEach(el => {
      el.style.transition = 'none';
      el.style.animation  = 'none';
    });
    // -webkit-mask-image のGPUレイヤーキャッシュをクリアするため
    // display:none で一瞬レイヤーを破棄してから再描画する
    container.style.display = 'none';
    container.innerHTML = html;
    // eslint-disable-next-line no-unused-expressions
    container.offsetHeight; // reflow を強制
    container.style.display = '';
    bindOpts(container);
    if (container.id === 'tb-opts-portrait') {
      container.scrollLeft = 0;
      window._updateRow3Fade && window._updateRow3Fade();
    }
  }

  applyTo($id('tb-opts-portrait'));
  applyTo($id('land-opts'));
}

/** ツールを切り替え、UIとカーソルを更新 */
function switchTool(tool) {
  if (S.tool==='text'&&tool!=='text') finalizeText();
  S.tool=tool; Draw.selId=null;

  // portrait tool btns
  document.querySelectorAll('.tool-btn').forEach(b=>b.classList.toggle('active',b.dataset.tool===tool));
  // landscape tool btns
  document.querySelectorAll('.land-tool-btn').forEach(b=>b.classList.toggle('active',b.dataset.tool===tool));

  // スタンプツール選択 → DOM更新が画面に反映された後にドロップダウンを開く
  if (tool==='sticker') {
    Draw.pendingStickerId = null;
    requestAnimationFrame(() => requestAnimationFrame(openStickerDropdown));
  } else {
    closeStickerDropdown();
  }

  // クリップツール選択 → ファイル選択ダイアログを開く
  if (tool==='clip') {
    Draw.pendingClipId = null;
    setTimeout(() => $id('clip-file-input').click(), 0);
  } else {
    Draw.pendingClipId = null;
  }

  applyCanvasCursor(tool);
  renderOpts();
  redraw();
}

/* ── カスタムカーソル ──
   消しゴムは「消せる範囲」を示す円をカーソルとして表示する。
   CANVAS_SRC(600)の論理サイズ → 実際の画面ピクセルに換算して円のサイズを決める。
*/
function applyCanvasCursor(tool) {
  if (tool === 'eraser') {
    setEraserCursor();
  } else {
    window._hideEraserCursor && window._hideEraserCursor();
    if (tool === 'select') {
      cvs.style.cursor = 'default';
    } else if (tool === 'sticker') {
      cvs.style.cursor = Draw.pendingStickerId ? 'copy' : 'default';
    } else {
      cvs.style.cursor = 'crosshair';
    }
  }
}

/* ── 消しゴムカーソル（DOM要素追従方式・Safari対応） ── */
(function() {
  let eraserEl = null;

  function getOrCreateEraserEl() {
    if (!eraserEl) {
      eraserEl = document.createElement('div');
      eraserEl.id = '_eraser-cursor';
      eraserEl.style.cssText = `
        position: fixed; pointer-events: none; z-index: 9998;
        border-radius: 50%;
        border: 1.5px solid rgba(0,0,0,0.6);
        box-shadow: 0 0 0 1px rgba(255,255,255,0.8);
        transform: translate(-50%, -50%);
        display: none;
      `;
      document.body.appendChild(eraserEl);
    }
    return eraserEl;
  }

  window._showEraserCursor = function(size) {
    const el = getOrCreateEraserEl();
    el.style.width  = size + 'px';
    el.style.height = size + 'px';
    el.style.display = 'block';
    cvs.style.cursor = 'none';
  };

  window._hideEraserCursor = function() {
    if (eraserEl) eraserEl.style.display = 'none';
    cvs.style.cursor = 'crosshair';
  };

  window._moveEraserCursor = function(x, y) {
    if (eraserEl && eraserEl.style.display !== 'none') {
      eraserEl.style.left = x + 'px';
      eraserEl.style.top  = y + 'px';
    }
  };
})();

function setEraserCursor() {
  // タッチ中のみ表示するためここでは非表示のまま（pointerdownで表示）
  window._hideEraserCursor && window._hideEraserCursor();
  cvs.style.cursor = 'crosshair';
}

let _toastTimer = null;
/** クリップ表示名入力モーダルを表示 */
function showClipNameModal(onOk, initialValue = '', onCancel = null) {
  const modal = $id('clip-name-modal');
  const input = $id('clip-name-input');
  const okBtn = $id('clip-name-ok');
  const cancelBtn = $id('clip-name-cancel');
  const l = L();

  // 言語切り替えに対応して毎回テキストを更新
  $id('clip-name-title').textContent = l.clipNameTitle;
  input.placeholder = l.clipNamePlaceholder;
  cancelBtn.textContent = l.cancel;

  input.value = initialValue;
  modal.style.display = 'flex';
  setTimeout(() => input.focus(), 50);

  const close = () => {
    modal.style.display = 'none';
    okBtn.removeEventListener('click', doOk);
    cancelBtn.removeEventListener('click', doCancel);
    input.removeEventListener('keydown', onKey);
  };
  const doOk     = () => { close(); onOk(input.value.trim()); };
  const doCancel = () => { close(); onCancel && onCancel(); };
  const onKey = e => { if (e.key === 'Enter' && !e.isComposing) doOk(); if (e.key === 'Escape') doCancel(); };

  okBtn.addEventListener('click', doOk);
  cancelBtn.addEventListener('click', doCancel);
  input.addEventListener('keydown', onKey);
}

function showToast(msg, duration) {
  duration = duration || 2500;
  const el = $id('app-toast');
  if (!el) return;
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.classList.remove('show'), duration);
}
