// ── セル記述子の配列を生成 ──
function buildCellDescs() {
  const holidays = getHolidays(S.year);
  const first    = new Date(S.year, S.month, 1);
  const last     = new Date(S.year, S.month + 1, 0);
  const descs    = [];

  // 1日前の空白セル → 特殊キー（例: 2026-03-pre-0, pre-1, ...）
  const preCount = colOf(first.getDay());
  for (let i = 0; i < preCount; i++) {
    descs.push({
      type: 'blank',
      key: `${S.year}-${String(S.month + 1).padStart(2,'0')}-pre-${i}`,
    });
  }

  // 当月の日付セル
  for (let d = 1; d <= last.getDate(); d++) {
    const dt  = new Date(S.year, S.month, d);
    const key = cellKey(S.year, S.month + 1, d);
    descs.push({
      type: 'date', d, dow: dt.getDay(), key,
      isToday: dt.toDateString() === today.toDateString(),
      holName: holidays[fmtDate(dt)] || null,
    });
  }

  // 最終日後の空白セル → 特殊キー（例: 2026-03-post-0, post-1, ...）
  const postCount = (7 - (descs.length % 7)) % 7;
  for (let i = 0; i < postCount; i++) {
    descs.push({
      type: 'blank',
      key: `${S.year}-${String(S.month + 1).padStart(2,'0')}-post-${i}`,
    });
  }

  return descs;
}

// ── セルDOMを構築してイベントを登録 ──
function renderCalendarDOM(descs, headers, isLand) {
  const grid = document.getElementById('cal-grid');
  grid.innerHTML = '';

  descs.forEach((desc, idx) => {
    const el = document.createElement('div');
    el.className = 'cal-cell';
    if (isLand) el.classList.add('landscape-cell');

    if (desc.type === 'inactive') {
      el.classList.add('inactive');
      grid.appendChild(el);
      return;
    }

    // blank: 前月・翌月のセル（書き込み可能、inactive-bg色）
    if (desc.type === 'blank') {
      el.classList.add('is-blank');
      const prev = document.createElement('div');
      prev.className = 'cell-preview';
      const mc = document.createElement('canvas');
      mc.dataset.key = desc.key;
      prev.appendChild(mc);
      el.appendChild(prev);
      el.addEventListener('pointerdown', e => onCellPointerDown(e, el, desc));
      el.addEventListener('contextmenu', e => { e.preventDefault(); openCellCtx(e, desc.key); });
      grid.appendChild(el);
      return;
    }

    if (desc.isToday) el.classList.add('today');
    const hd = headers[idx % 7];
    if (desc.type !== 'memo') {
      if      (hd === '日') el.classList.add('is-sun');
      else if (hd === '土') el.classList.add('is-sat');
      else if (desc.holName) el.classList.add('is-hol');
    }

    el.appendChild(buildCellTop(desc));

    const prev = document.createElement('div');
    prev.className = 'cell-preview';
    const mc = document.createElement('canvas');
    mc.dataset.key = desc.key;
    prev.appendChild(mc);
    el.appendChild(prev);

    el.addEventListener('pointerdown', e => onCellPointerDown(e, el, desc));
    el.addEventListener('contextmenu', e => { e.preventDefault(); openCellCtx(e, desc.key); });

    grid.appendChild(el);
  });
}

// ── セルの日付エリアを生成 ──
function buildCellTop(desc) {
  const top = document.createElement('div');
  top.className = 'cell-top';
  const num = document.createElement('div');
  num.className = 'cell-num';
  num.textContent = desc.type === 'date' ? desc.d : desc.label;
  top.appendChild(num);
  if (desc.holName && S.lang !== 'en') {
    const hn = document.createElement('div');
    hn.className = 'cell-hol-name';
    hn.textContent = desc.holName;
    top.appendChild(hn);
  }
  return top;
}

// ── セルのポインターイベントハンドラ ──
function onCellPointerDown(e, el, desc) {
  if (e.button !== 0) return;
  if (document.getElementById('ctx-obj').classList.contains('open') ||
      document.getElementById('ctx-cell').classList.contains('open')) return;

  const mc = el.querySelector('canvas');
  if (!mc) return;

  const r    = mc.getBoundingClientRect();
  const sc   = Math.min(mc.width / CANVAS_SRC, mc.height / CANVAS_SRC);
  const lx   = (e.clientX - r.left) / r.width  * (mc.width  / sc);
  const ly   = (e.clientY - r.top)  / r.height * (mc.height / sc);
  const objs = getCellObjs(desc.key);

  // ① 選択済み×ボタン
  if (miniHandleDeleteBtn(e, r, sc, desc.key, objs)) return;

  // ② オブジェクトヒット → 選択・ドラッグ・長押し
  const hitObj = findMiniHitObj(objs, lx, ly, desc.key);
  if (hitObj) { handleObjHit(e, desc.key, hitObj); return; }

  // ③ 空白タップ → 選択解除しつつセル遷移/ドラッグ/メニュー
  Cal.selObjId = null; Cal.selCellKey = null;
  renderMiniCanvases();
  handleEmptyCellTap(e, desc);
}

// 選択済みオブジェクトの×ボタンヒットテスト・削除
function miniHandleDeleteBtn(e, r, sc, key, objs) {
  if (Cal.selCellKey !== key || !Cal.selObjId) return false;
  const selObj = objs.find(o => o.id === Cal.selObjId);
  if (!selObj) return false;
  if (!miniHitDeleteBtn(selObj, sc, e.clientX - r.left, e.clientY - r.top)) return false;
  setCellObjs(key, objs.filter(o => o.id !== Cal.selObjId));
  Cal.selObjId = null; Cal.selCellKey = null;
  renderMiniCanvases();
  return true;
}

// ヒットするオブジェクトを返す（選択済み優先、なければ最前面）
function findMiniHitObj(objs, lx, ly, key) {
  if (Cal.selCellKey === key && Cal.selObjId) {
    const selObj = objs.find(o => o.id === Cal.selObjId);
    if (selObj && miniHitObj(selObj, lx, ly)) return selObj;
  }
  for (let i = objs.length - 1; i >= 0; i--) {
    if (miniHitObj(objs[i], lx, ly)) return objs[i];
  }
  return null;
}

// オブジェクトヒット時：即選択 → ドラッグ or 長押しメニュー待機
function handleObjHit(e, key, obj) {
  Cal.selCellKey = key;
  Cal.selObjId   = obj.id;
  renderMiniCanvases();

  let didAction = false;

  const longPressTimer = setTimeout(() => {
    didAction = true;
    document.removeEventListener('pointermove', onTryDrag);
    openObjCtx(e.clientX, e.clientY, key, obj.id);
  }, 500);

  const onTryDrag = mv => {
    if (Math.hypot(mv.clientX - e.clientX, mv.clientY - e.clientY) > 6) {
      clearTimeout(longPressTimer);
      didAction = true;
      document.removeEventListener('pointermove', onTryDrag);
      document.removeEventListener('pointerup', onUp);
      startCalDrag(e, key, obj);
    }
  };

  const onUp = () => {
    clearTimeout(longPressTimer);
    document.removeEventListener('pointermove', onTryDrag);
  };

  document.addEventListener('pointermove', onTryDrag);
  document.addEventListener('pointerup', onUp, { once: true });
}

// 空白タップ：短タップ→遷移、長押しドラッグ→セル移動、長押しリリース→メニュー
function handleEmptyCellTap(e, desc) {
  let cellDragStarted = false;
  let cellLongPressed = false;

  const longPressTimer = setTimeout(() => {
    cellLongPressed = true;
    startCellDrag(e, desc.key,
      () => { if (!cellDragStarted) openCellCtx({ clientX: e.clientX, clientY: e.clientY }, desc.key); },
      () => { cellDragStarted = true; }
    );
  }, 500);

  const onMoveCancel = mv => {
    if (Math.hypot(mv.clientX - e.clientX, mv.clientY - e.clientY) > 8) {
      clearTimeout(longPressTimer);
      document.removeEventListener('pointermove', onMoveCancel);
    }
  };
  document.addEventListener('pointermove', onMoveCancel);

  document.addEventListener('pointerup', up => {
    clearTimeout(longPressTimer);
    document.removeEventListener('pointermove', onMoveCancel);
    if (cellLongPressed || cellDragStarted) return;
    if (Math.hypot(up.clientX - e.clientX, up.clientY - e.clientY) < 5) {
      openDayCell(desc.key, desc.type === 'date' ? desc.d : desc.label);
    }
  }, { once: true });
}


function applyCellSizes(numRows, isLand) {
  const area = document.getElementById('cal-grid-area');
  const grid = document.getElementById('cal-grid');
  const areaW = area.clientWidth;
  const areaH = area.clientHeight;

  if (!areaW || !areaH) { setTimeout(renderMiniCanvases, 50); return; }

  if (!isLand) {
    /* ── 縦長モード ──
       セル幅 = areaW / 7
       描画エリア = 正方形(セル幅×セル幅)
       セル高さ = DATE_H + セル幅
    */
    const cellW = Math.floor(areaW / 7);
    const squareSz = cellW;
    const cellH = DATE_H + squareSz;

    // グリッド設定: 列幅均等、行高さ固定
    grid.style.gridTemplateColumns = `repeat(7, ${cellW}px)`;
    grid.style.gridTemplateRows    = `repeat(${numRows}, ${cellH}px)`;
    grid.style.width  = `${cellW*7}px`;
    grid.style.height = `${cellH*numRows}px`;

    // 各セル
    grid.querySelectorAll('.cal-cell').forEach(el=>{
      el.style.width  = `${cellW}px`;
      el.style.height = `${cellH}px`;
      const preview = el.querySelector('.cell-preview');
      if (preview){
        preview.style.width  = `${squareSz}px`;
        preview.style.height = `${squareSz}px`;
      }
      const top = el.querySelector('.cell-top');
      if (top) top.style.height = `${DATE_H}px`;
    });

  } else {
    /* ── 横長モード ──
       セル高さ = areaH / numRows、セル幅 = DATE_W + セル高さ
       ただし cellW*7 > areaW の場合は幅から逆算して収める
    */
    const cellHfromH = Math.floor(areaH / numRows);
    const cellWfromH = DATE_W + cellHfromH;

    // 幅が収まらない場合は幅から逆算
    const cellWfromW = Math.floor(areaW / 7);
    const cellHfromW = cellWfromW - DATE_W;

    // 両方収まる小さい方を採用
    const cellH = (cellWfromH * 7 <= areaW) ? cellHfromH : Math.max(cellHfromW, 1);
    const squareSz = cellH;
    const cellW = DATE_W + squareSz;

    grid.style.gridTemplateColumns = `repeat(7, ${cellW}px)`;
    grid.style.gridTemplateRows    = `repeat(${numRows}, ${cellH}px)`;
    grid.style.width  = `${cellW*7}px`;
    grid.style.height = `${cellH*numRows}px`;

    grid.querySelectorAll('.cal-cell').forEach(el=>{
      el.style.width  = `${cellW}px`;
      el.style.height = `${cellH}px`;
      const preview = el.querySelector('.cell-preview');
      if (preview){
        preview.style.width  = `${squareSz}px`;
        preview.style.height = `${squareSz}px`;
      }
      const top = el.querySelector('.cell-top');
      if (top){
        top.style.width  = `${DATE_W}px`;
        top.style.height = `${cellH}px`;
      }
    });
  }

  setTimeout(renderMiniCanvases, 20);
}

function colOf(dow){
  if(S.weekStart===0) return dow;
  return (dow+6)%7;
}

/* ════ MINI CANVAS PREVIEW ════ */

// カレンダー画面でのオブジェクト選択状態

// テキストオブジェクトの実際の描画幅・高さを計測（CANVAS_SRC論理座標）
const _measureCtx = document.createElement('canvas').getContext('2d');
function measureTextObj(obj) {
  const lines = (obj.text || '').split('\n');
  const fs    = obj.size || 16;
  _measureCtx.font = `${fs}px 'Noto Sans JP', sans-serif`;
  const w = Math.max(...lines.map(l => _measureCtx.measureText(l).width));
  const h = lines.length * fs * 1.35;
  return {w, h};
}

/**
 * ミニキャンバス上のオブジェクトの境界ボックスを返す（論理座標 CANVAS_SRC 空間）。
 * PAD は呼び出し側でなくここで一元管理する。
 * 戻り値: { x, y, w, h } — パディング込みの矩形
 * 取得不能な場合は null を返す。
 */
const MINI_PAD = 4; // バウンディングボックスのパディング（論理座標）

function getMiniObjBounds(obj) {
  if (obj.type === 'pen') {
    let x0=Infinity, y0=Infinity, x1=-Infinity, y1=-Infinity;
    obj.paths.forEach(p => p.points.forEach(pt => {
      x0=Math.min(x0,pt.x); y0=Math.min(y0,pt.y);
      x1=Math.max(x1,pt.x); y1=Math.max(y1,pt.y);
    }));
    if (!isFinite(x0)) return null;
    return { x: x0-MINI_PAD, y: y0-MINI_PAD, w: x1-x0+MINI_PAD*2, h: y1-y0+MINI_PAD*2 };
  }
  if (obj.type === 'text') {
    const { w, h } = measureTextObj(obj);
    return { x: obj.x-MINI_PAD, y: obj.y-MINI_PAD, w: w+MINI_PAD*2, h: h+MINI_PAD*2 };
  }
  if (obj.type === 'sticker') {
    const img = imgCache[obj.stickerId];
    const sz  = obj.size || 44;
    const { w, h } = img ? stickerDrawSize(img, sz) : { w: sz, h: sz };
    return { x: obj.x-w/2-MINI_PAD, y: obj.y-h/2-MINI_PAD, w: w+MINI_PAD*2, h: h+MINI_PAD*2 };
  }
  return null;
}

// ミニキャンバス上のオブジェクトヒットテスト（論理座標 CANVAS_SRC 空間）
function miniHitObj(obj, lx, ly) {
  const b = getMiniObjBounds(obj);
  if (!b) return false;
  // ヒット判定は PAD を少し広めに取る
  const extra = 2;
  return lx >= b.x-extra && lx <= b.x+b.w+extra &&
         ly >= b.y-extra && ly <= b.y+b.h+extra;
}

// ミニキャンバス上にバウンディングボックスと×ボタンを描画
function drawMiniBBox(c, obj, sc) {
  const b = getMiniObjBounds(obj);
  if (!b) return;

  // バウンディングボックス（スクリーン座標に変換）
  const bx=b.x*sc, by=b.y*sc, bw=b.w*sc, bh=b.h*sc;

  c.save();
  c.strokeStyle='#3a6fa8'; c.lineWidth=1.5; c.setLineDash([4,2]);
  c.strokeRect(bx, by, bw, bh);
  c.setLineDash([]);

  // ×ボタン（バウンディングボックスの右上）
  const btnX = bx+bw+4, btnY = by-4;
  c.fillStyle='#e03030';
  c.beginPath(); c.arc(btnX, btnY, 6, 0, Math.PI*2); c.fill();
  c.fillStyle='#fff'; c.font='bold 8px sans-serif';
  c.textAlign='center'; c.textBaseline='middle';
  c.fillText('×', btnX, btnY);
  c.restore();
}

// ×ボタンのヒットテスト（スクリーン座標）
function miniHitDeleteBtn(obj, sc, px, py) {
  const b = getMiniObjBounds(obj);
  if (!b) return false;
  const btnX = b.x*sc + b.w*sc + 4;
  const btnY = b.y*sc - 4;
  return Math.hypot(px-btnX, py-btnY) < 10;
}

/* ════ CALENDAR OBJECT DRAG ════ */

// ドラッグ中のゴースト要素（絶対位置でオブジェクト画像を追従させる）

function startCalDrag(e, srcKey, obj) {
  e.preventDefault();
  calDragInfo = {objId: obj.id, srcKey, origObj: clone(obj)};

  // ミニキャンバスの実サイズを取得してゴーストのサイズとする
  const miniMc = document.querySelector(`.cell-preview canvas[data-key="${srcKey}"]`);
  const miniRect = miniMc ? miniMc.getBoundingClientRect() : null;
  const ghostSize = miniRect ? Math.round(miniRect.width) : 80;

  const ghost = document.createElement('canvas');
  ghost.width  = ghostSize;
  ghost.height = ghostSize;
  ghost.style.cssText = `position:fixed;pointer-events:none;z-index:9999;
    width:${ghostSize}px;height:${ghostSize}px;
    opacity:0.75;transform:translate(-50%,-50%);transition:none;`;
  const gc = ghost.getContext('2d');
  const sc = ghostSize / CANVAS_SRC;

  // ゴーストにオブジェクトをミニキャンバスと同じスケールで描画
  gc.save();
  gc.scale(sc, sc);
  drawObjMini(gc, obj);
  gc.restore();

  ghost.style.left = e.clientX + 'px';
  ghost.style.top  = e.clientY + 'px';
  document.body.appendChild(ghost);
  Cal.dragGhost = ghost;

  // pointermove: ゴーストを追従
  const onMove = ev => {
    ghost.style.left = ev.clientX + 'px';
    ghost.style.top  = ev.clientY + 'px';
  };

  // pointerup: ドロップ先を判定してオブジェクト移動
  const onUp = ev => {
    document.removeEventListener('pointermove', onMove, true);
    document.removeEventListener('pointerup',   onUp,   true);
    ghost.remove(); Cal.dragGhost = null;

    const dstCell = findCalCellAt(ev.clientX, ev.clientY);
    if (!dstCell) { calDragInfo=null; return; }

    const {key: dstKey, mc: dstMc} = dstCell;
    const srcObjs = getCellObjs(calDragInfo.srcKey);
    const movingObj = srcObjs.find(o=>o.id===calDragInfo.objId);
    if (!movingObj) { calDragInfo=null; return; }

    // ドロップ先のミニキャンバス座標に変換
    const r  = dstMc.getBoundingClientRect();
    const sc2 = Math.min(dstMc.width/CANVAS_SRC, dstMc.height/CANVAS_SRC);
    const nx  = (ev.clientX - r.left) / r.width  * (dstMc.width  / sc2);
    const ny  = (ev.clientY - r.top)  / r.height * (dstMc.height / sc2);

    if (dstKey === calDragInfo.srcKey) {
      // 同一セル内移動
      moveObjInCell(calDragInfo.srcKey, movingObj, nx, ny);
    } else {
      // 別セルへ移動: srcから削除 → dstに追加
      const newSrc = srcObjs.filter(o=>o.id!==movingObj.id);
      setCellObjs(calDragInfo.srcKey, newSrc);

      const newObj = clone(movingObj);
      setObjPosition(newObj, nx, ny);
      const dstObjs = getCellObjs(dstKey);
      dstObjs.push(newObj);
      setCellObjs(dstKey, dstObjs);

      Cal.selCellKey = dstKey;
      Cal.selObjId   = newObj.id;
    }
    calDragInfo = null;
    renderMiniCanvases();
  };

  document.addEventListener('pointermove', onMove, true);
  document.addEventListener('pointerup',   onUp,   true);
}

// ドロップ先のセルとミニキャンバスを座標から探す
function findCalCellAt(cx, cy) {
  const mcs = document.querySelectorAll('.cell-preview canvas[data-key]');
  for (const mc of mcs) {
    const r = mc.getBoundingClientRect();
    if (cx>=r.left && cx<=r.right && cy>=r.top && cy<=r.bottom) {
      return {key: mc.dataset.key, mc};
    }
  }
  return null;
}

/**
 * セル全体のドラッグ&ドロップ
 * onDragStart: ドラッグが実際に開始されたときに呼ばれるコールバック
 * onNoMove: 動かずに離したときに呼ばれるコールバック（コンテキストメニュー表示用）
 */
function startCellDrag(e, srcKey, onNoMove, onDragStart) {
  const srcObjs = getCellObjs(srcKey);
  if (srcObjs.length === 0) {
    // オブジェクトがないセルは移動不要 → コンテキストメニューへ
    onNoMove();
    return;
  }

  // ゴースト: 元セルのミニキャンバスをそのままコピー
  const srcMc = document.querySelector(`.cell-preview canvas[data-key="${srcKey}"]`);

  // CSSサイズを取得（表示上のサイズ）
  const cssW = srcMc ? srcMc.offsetWidth  || srcMc.clientWidth  || 60 : 60;
  const cssH = srcMc ? srcMc.offsetHeight || srcMc.clientHeight || 60 : 60;

  const ghost = document.createElement('canvas');
  ghost.width  = cssW;
  ghost.height = cssH;
  ghost.style.cssText = `position:fixed;pointer-events:none;z-index:9999;
    width:${cssW}px;height:${cssH}px;
    opacity:0.85;transform:translate(-50%,-50%);transition:none;
    border-radius:4px;box-shadow:0 4px 16px rgba(0,0,0,.2);`;

  // ゴーストに元ミニキャンバスをそのままコピー
  const gc = ghost.getContext('2d');
  gc.fillStyle = '#fff';
  gc.fillRect(0, 0, cssW, cssH);
  if (srcMc) {
    // drawImageでCSSサイズに合わせて描画（DPR関係なく正しく表示される）
    gc.drawImage(srcMc, 0, 0, cssW, cssH);
  }

  ghost.style.left = e.clientX + 'px';
  ghost.style.top  = e.clientY + 'px';
  document.body.appendChild(ghost);

  let dragging = false;

  const onMove = ev => {
    ghost.style.left = ev.clientX + 'px';
    ghost.style.top  = ev.clientY + 'px';

    if (!dragging && Math.hypot(ev.clientX - e.clientX, ev.clientY - e.clientY) > 6) {
      dragging = true;
      onDragStart();
      // ドラッグ中のドロップ先ハイライト
    }

    // ドロップ先ハイライト更新
    document.querySelectorAll('.cal-cell.drag-over').forEach(c => c.classList.remove('drag-over'));
    if (dragging) {
      ghost.style.display = 'none';
      const target = document.elementFromPoint(ev.clientX, ev.clientY);
      ghost.style.display = '';
      const cellEl = target?.closest('.cal-cell:not(.inactive)');
      const mc = cellEl?.querySelector('canvas[data-key]');
      if (mc && mc.dataset.key !== srcKey) cellEl.classList.add('drag-over');
    }
  };

  const onUp = ev => {
    document.removeEventListener('pointermove', onMove, true);
    document.removeEventListener('pointerup',   onUp,   true);
    document.querySelectorAll('.cal-cell.drag-over').forEach(c => c.classList.remove('drag-over'));
    ghost.remove();

    if (!dragging) {
      // 動かず離した → コンテキストメニュー
      onNoMove();
      return;
    }

    // ドロップ先を特定
    ghost.style.display = 'none';
    const target = document.elementFromPoint(ev.clientX, ev.clientY);
    const cellEl = target?.closest('.cal-cell:not(.inactive)');
    const dstMc  = cellEl?.querySelector('canvas[data-key]');
    const dstKey = dstMc?.dataset.key;

    if (!dstKey || dstKey === srcKey) {
      renderMiniCanvases(); return;
    }

    // 全オブジェクトを src から dst に移動（元セルはクリア）
    setCellObjs(dstKey, clone(srcObjs));
    setCellObjs(srcKey, []);
    Cal.selCellKey = null; Cal.selObjId = null;
    renderMiniCanvases();
  };

  document.addEventListener('pointermove', onMove, true);
  document.addEventListener('pointerup',   onUp,   true);
}

// オブジェクトの中心座標を更新
function setObjPosition(obj, nx, ny) {
  if (obj.type === 'pen') {
    let cx=0, cy=0, n=0;
    obj.paths.forEach(p=>p.points.forEach(pt=>{cx+=pt.x;cy+=pt.y;n++;}));
    if(n>0){cx/=n;cy/=n;}
    const dx=nx-cx, dy=ny-cy;
    obj.paths = obj.paths.map(p=>({...p, points:p.points.map(pt=>({x:pt.x+dx,y:pt.y+dy}))}));
  } else {
    obj.x = nx;
    obj.y = ny;
  }
}

// 同一セル内でオブジェクトを移動
function moveObjInCell(key, obj, nx, ny) {
  setObjPosition(obj, nx, ny);
  setCellObjs(key, getCellObjs(key));
}

function renderMiniCanvases(){
  let needsRetry = false;
  document.querySelectorAll('.cell-preview canvas').forEach(mc=>{
    const key=mc.dataset.key;
    const par=mc.parentElement;
    // clientWidthが0の場合はstyle.widthから取得（横長モード対応）
    let w=par.clientWidth, h=par.clientHeight;
    if(!w && par.style.width)  w  = parseInt(par.style.width);
    if(!h && par.style.height) h  = parseInt(par.style.height);
    if(!w||!h){ needsRetry = true; return; }
    mc.width=w; mc.height=h;
    const c2=mc.getContext('2d');
    const sc=Math.min(w/CANVAS_SRC,h/CANVAS_SRC);
    c2.save(); c2.scale(sc,sc);
    getCellObjs(key).forEach(o=>drawObjMini(c2,o));
    c2.restore();
    // 選択中オブジェクトのバウンディングボックスを描画
    if (Cal.selCellKey===key && Cal.selObjId) {
      const obj=getCellObjs(key).find(o=>o.id===Cal.selObjId);
      if (obj) drawMiniBBox(c2,obj,sc);
    }
  });
  if (needsRetry) setTimeout(renderMiniCanvases, 80);
}

function drawObjMini(c,obj){
  if (obj.type==='pen'){
    obj.paths.forEach(path=>{
      if(!path.points||path.points.length<2) return;
      c.save(); c.beginPath();
      c.strokeStyle=path.color; c.lineWidth=path.size;
      if (path.alpha != null) {
        c.globalAlpha = path.alpha;
        c.lineCap='square'; c.lineJoin='miter';
      } else {
        c.lineCap='round'; c.lineJoin='round';
      }
      c.moveTo(path.points[0].x,path.points[0].y);
      path.points.slice(1).forEach(pt=>c.lineTo(pt.x,pt.y));
      c.stroke(); c.restore();
    });
  } else if (obj.type==='text'){
    c.save();
    c.font=`${obj.size||16}px 'Noto Sans JP',sans-serif`;
    c.fillStyle=obj.color||'#1c1a18'; c.textBaseline='top';
    (obj.text||'').split('\n').forEach((l,i)=>c.fillText(l,obj.x,obj.y+i*(obj.size||16)*1.35));
    c.restore();
  } else if (obj.type==='sticker'){
    const img = imgCache[obj.stickerId];
    if (!img) return;
    const sz = obj.size || 44;
    const {w, h} = stickerDrawSize(img, sz);
    c.drawImage(img, obj.x - w/2, obj.y - h/2, w, h);
  }
}

/**
 * 長押し発火後にポインターを追跡して、離した位置のメニュー項目を実行する。
 * 指を離してから普通にクリックする従来操作も引き続き動作する。
 */
function attachLongPressMenuTracking(menuEl) {
  let hoveredItem = null;

  const onMove = e => {
    // ポインター下の要素を取得
    const target = document.elementFromPoint(e.clientX, e.clientY);
    const item   = target?.closest('.ctx-item');

    if (item !== hoveredItem) {
      if (hoveredItem) hoveredItem.classList.remove('ctx-hover');
      hoveredItem = item && menuEl.contains(item) ? item : null;
      if (hoveredItem) hoveredItem.classList.add('ctx-hover');
    }
  };

  const onUp = e => {
    document.removeEventListener('pointermove', onMove, true);
    document.removeEventListener('pointerup',   onUp,   true);

    if (!hoveredItem) {
      // メニュー外で離した → 閉じる
      const target = document.elementFromPoint(e.clientX, e.clientY);
      if (!target?.closest('.ctx-menu')) closeContextMenus();
      return;
    }

    // メニュー項目上で離した → ブリンク後に click を発火
    const item = hoveredItem;
    item.classList.remove('ctx-hover');
    item.classList.add('ctx-blink');
    item.addEventListener('animationend', () => {
      item.classList.remove('ctx-blink');
      item.click(); // 既存の click ハンドラを呼ぶ
    }, { once: true });
  };

  document.addEventListener('pointermove', onMove, true);
  document.addEventListener('pointerup',   onUp,   true);
}

// カレンダー画面セルメニュー操作
function execCalCellAction(action) {
  const key = Cal.ctxCellKey;
  if (!key) { closeContextMenus(); return; }

  if (action === 'copy') {
    S.clipboard = {type:'cell', data: clone(getCellObjs(key))};
  } else if (action === 'cut') {
    S.clipboard = {type:'cell', data: clone(getCellObjs(key))};
    setCellObjs(key, []); renderMiniCanvases();
  } else if (action === 'paste-cell' && S.clipboard?.type === 'cell') {
    setCellObjs(key, clone(S.clipboard.data)); renderMiniCanvases();
  } else if (action === 'paste-obj' && S.clipboard?.type === 'obj') {
    const newObj = clone(S.clipboard.data);
    newObj.id = uid();
    if (newObj.type !== 'pen') { newObj.x += 20; newObj.y += 20; }
    const objs = getCellObjs(key);
    objs.push(newObj);
    setCellObjs(key, objs);
    Cal.selCellKey = key; Cal.selObjId = newObj.id;
    renderMiniCanvases();
  } else if (action === 'delete') {
    setCellObjs(key, []); renderMiniCanvases();
  }
  closeContextMenus();
}

// カレンダー画面オブジェクトメニュー操作
function execCalObjAction(action) {
  const key   = Cal.ctxObjKey;
  const objId = Cal.ctxObjId;

  if (action === 'copy' && key && objId) {
    const obj = getCellObjs(key).find(o => o.id === objId);
    if (obj) S.clipboard = {type:'obj', data: clone(obj)};
  } else if (action === 'cut' && key && objId) {
    const objs = getCellObjs(key);
    const obj  = objs.find(o => o.id === objId);
    if (obj) {
      S.clipboard = {type:'obj', data: clone(obj)};
      setCellObjs(key, objs.filter(o => o.id !== objId));
      Cal.selObjId = null; Cal.selCellKey = null;
      renderMiniCanvases();
    }
  } else if (action === 'paste-obj' && key && S.clipboard?.type === 'obj') {
    const newObj = clone(S.clipboard.data);
    newObj.id = uid();
    if (newObj.type !== 'pen') { newObj.x += 20; newObj.y += 20; }
    const objs = getCellObjs(key);
    objs.push(newObj);
    setCellObjs(key, objs);
    Cal.selCellKey = key; Cal.selObjId = newObj.id;
    renderMiniCanvases();
  } else if (action === 'paste-cell' && key && S.clipboard?.type === 'cell') {
    setCellObjs(key, clone(S.clipboard.data));
    Cal.selObjId = null; Cal.selCellKey = null;
    renderMiniCanvases();
  } else if (action === 'delete' && key && objId) {
    setCellObjs(key, getCellObjs(key).filter(o => o.id !== objId));
    Cal.selObjId = null; Cal.selCellKey = null;
    renderMiniCanvases();
  }
  closeContextMenus();
}

// タブ名ダブルクリックでインライン編集
// タブ長押しで名前編集
(function() {
  let longPressTimer = null;

  function startTabEdit(tab) {
    if (tab.querySelector('.cal-tab-input')) return;
    const cal = calendars.find(c => c.id === tab.dataset.calId);
    if (!cal) return;
    const currentName = cal.name;
    tab.textContent = '';

    const input = document.createElement('input');
    input.className = 'cal-tab-input';
    input.value = currentName;
    input.style.width = Math.max(currentName.length * 9, 60) + 'px';
    tab.appendChild(input);
    input.focus();
    input.select();

    const commit = () => {
      const newName = input.value.trim() || currentName;
      cal.name = newName;
      saveToStorage();
      renderTabs();
    };
    input.addEventListener('blur', commit, { once: true });
    input.addEventListener('keydown', ev => {
      if (ev.key === 'Enter')  { ev.preventDefault(); input.blur(); }
      if (ev.key === 'Escape') { input.value = currentName; input.blur(); }
      requestAnimationFrame(() => {
        input.style.width = Math.max(input.value.length * 9, 60) + 'px';
      });
    });
  }

  document.getElementById('cal-tabs').addEventListener('pointerdown', e => {
    const tab = e.target.closest('.cal-tab');
    if (!tab) return;
    longPressTimer = setTimeout(() => {
      longPressTimer = null;
      startTabEdit(tab);
    }, 500);
  });

  document.getElementById('cal-tabs').addEventListener('pointerup', () => {
    if (longPressTimer) { clearTimeout(longPressTimer); longPressTimer = null; }
  });

  document.getElementById('cal-tabs').addEventListener('pointermove', () => {
    if (longPressTimer) { clearTimeout(longPressTimer); longPressTimer = null; }
  });
})();

// 月切り替えスライドアニメーション
// dir: 'next'(翌月・右から入場) or 'prev'(前月・左から入場)
function navigateMonth(dir) {
  if (dir === 'next') {
    if(++S.month>11){S.month=0;S.year++;}
  } else {
    if(--S.month<0){S.month=11;S.year--;}
  }

  const area = document.getElementById('cal-grid-area');
  const oldGrid = document.getElementById('cal-grid');

  // 旧グリッドをクローンして絶対位置で重ねる
  const clone = oldGrid.cloneNode(true);
  clone.id = 'cal-grid-old';
  clone.style.cssText = `position:absolute;top:0;left:0;width:${oldGrid.offsetWidth}px;pointer-events:none;`;
  area.appendChild(clone);

  // アニメーション中はoverflow:visibleにして両グリッドを表示
  area.style.overflow = 'visible';

  // 新グリッドをレンダリング
  renderCalendar();

  // アニメーションクラスを付与
  const inClass  = dir === 'next' ? 'slide-in-right' : 'slide-in-left';
  const outClass = dir === 'next' ? 'slide-out-left' : 'slide-out-right';

  requestAnimationFrame(() => requestAnimationFrame(() => {
    clone.classList.add(outClass);
    const newGrid = document.getElementById('cal-grid');
    newGrid.classList.add(inClass);

    const cleanup = () => {
      clone.remove();
      newGrid.classList.remove(inClass);
      area.style.overflow = '';
    };
    newGrid.addEventListener('animationend', cleanup, { once: true });
    setTimeout(cleanup, 500); // フォールバック
  }));
}

// カレンダーグリッドのフリックで月切り替え（touch events使用）
(function() {
  let startX = 0, startY = 0, startT = 0;
  const area = document.getElementById('cal-grid-area');

  area.addEventListener('touchstart', e => {
    if (e.touches.length !== 1) return;
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
    startT = Date.now();
  }, { passive: true });

  area.addEventListener('touchend', e => {
    if (e.changedTouches.length !== 1) return;
    try { if (calDragInfo) return; } catch(err) {}

    const dx = e.changedTouches[0].clientX - startX;
    const dy = e.changedTouches[0].clientY - startY;
    const dt = Math.max(1, Date.now() - startT);

    if (Math.abs(dy) > Math.abs(dx)) return;
    if (Math.abs(dx) < 30) return;
    if (Math.abs(dx) / dt < 0.2) return;

    if (dx < 0) {
      navigateMonth('next');
    } else {
      navigateMonth('prev');
    }
  }, { passive: true });
})();

document.getElementById('btn-prev').addEventListener('click', e => {
  navigateMonth('prev');
  e.currentTarget.blur();
});
document.getElementById('btn-next').addEventListener('click', e => {
  navigateMonth('next');
  e.currentTarget.blur();
});

/* ════ SCREEN / ORIENTATION ════ */
function showScreen(name){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  const map={calendar:'cal-screen',day:'day-screen'};
  if(map[name]) document.getElementById(map[name]).classList.add('active');
  S.screen=name;
}

function updateOrientation(){
  const ds=document.getElementById('day-screen');
  // screen.orientationでデバイスの物理向きを取得（キーボード表示の影響を受けない）
  let lnd;
  if (screen.orientation) {
    lnd = screen.orientation.type.startsWith('landscape');
  } else {
    // fallback: screen.width/heightは物理画面サイズなのでキーボード影響なし
    lnd = screen.width > screen.height;
  }
  ds.classList.toggle('landscape',lnd);
  ds.classList.toggle('portrait',!lnd);
}

window.addEventListener('resize',()=>{
  // resizeはキーボード表示でも発火するのでsizeCanvasのみ（向き判定はしない）
  if(S.screen==='day') sizeCanvas();
  if(S.screen==='calendar') renderCalendar();
});

// 物理的な向き変更のみ検出（キーボード表示では発火しない）
const onOrientationChange = () => {
  setTimeout(() => {
    if(S.screen==='day'){updateOrientation();sizeCanvas();}
    if(S.screen==='calendar') renderCalendar();
  }, 100);
};
if (screen.orientation) {
  screen.orientation.addEventListener('change', onOrientationChange);
