<style>
/* ════════════════════════════════════════════
   DESIGN TOKENS
════════════════════════════════════════════ */
:root {
  /* Layout */
  --toolbar-h: 152px;
  --sidebar-w: 310px;
  --r:         6px;

  /* Colors — surface */
  --bg:          #f5f3ef;
  --surface:     #faf9f7;
  --inactive-bg: #ece9e3;

  /* Colors — ink */
  --ink:       #2c2a26;
  --ink-mid:   #6b6962;
  --ink-faint: #a09d98;

  /* Colors — border */
  --border:      rgba(44,42,38,.18);
  --border-soft: rgba(44,42,38,.30);
  --border-bold: rgba(44,42,38,.35);

  /* Colors — interaction */
  --tool-hover:  rgba(44,42,38,.07);
  --tool-active: #2c2a26;

  /* Colors — semantic */
  --today-ring: #c8a84b;
  --sun-bg:     rgba(180,40,40,.05);
  --sun-txt:    #b42828;
  --sat-bg:     rgba(40,80,180,.05);
  --sat-txt:    #2850b4;
  --hol-bg:     rgba(180,40,40,.05);
  --hol-txt:    #b42828;

  /* Shadow */
  --shadow-md:  0 4px 20px rgba(0,0,0,.10);
  --shadow-sm:  0 2px 12px rgba(0,0,0,.10);

  /* Typography */
  --font-body: 'M PLUS Rounded 1c', 'Hiragino Sans', sans-serif;
  --font-disp: 'M PLUS Rounded 1c', 'Hiragino Sans', sans-serif;
}

/* ════════════════════════════════════════════
   RESET & BASE
════════════════════════════════════════════ */
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}
html, body {
  height: 100%;
  overflow: hidden;
  background: var(--bg);
  font-family: var(--font-body);
  color: var(--ink);
  user-select: none;
  -webkit-user-select: none;
  -webkit-touch-callout: none;
}
button:focus,
button:active,
button:focus-visible { outline: none; background: transparent; }

/* ════════════════════════════════════════════
   SCREENS
════════════════════════════════════════════ */
.screen         { display: none; position: absolute; inset: 0; flex-direction: column; }
.screen.active  { display: flex; }

/* ════════════════════════════════════════════
   SHARED — アイコンボタン
════════════════════════════════════════════ */
.icon-btn {
  width: 34px;
  height: 34px;
  border: none;
  background: transparent;
  cursor: pointer;
  border-radius: var(--r);
  color: var(--ink);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  outline: none;
  -webkit-appearance: none;
}
@media (hover: hover) { .icon-btn:hover { background: var(--tool-hover); } }
.icon-btn:focus,
.icon-btn:active,
.icon-btn:focus-visible,
.icon-btn:focus:not(:focus-visible) { outline: none; background: transparent; }
.icon-btn svg         { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
.icon-btn svg.filled  { fill: currentColor; stroke: none; }

/* ════════════════════════════════════════════
   SHARED — Undo/Redoボタン
════════════════════════════════════════════ */
.ur-btn {
  background: none;
  border: none;
  cursor: pointer;
  padding: 6px 8px;
  color: var(--ink);
  border-radius: var(--r);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background .12s, opacity .12s;
  -webkit-tap-highlight-color: transparent;
  -webkit-appearance: none;
  outline: none;
}
.ur-btn:hover                        { background: var(--tool-hover); }
.ur-btn:focus,
.ur-btn:active,
.ur-btn:focus-visible                { outline: none; background: transparent; }
.ur-btn:disabled                     { opacity: .28; cursor: default; }
.ur-btn svg { width: 24px; height: 24px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }

/* ════════════════════════════════════════════
   CALENDAR SCREEN — ヘッダー
════════════════════════════════════════════ */
.cal-header {
  display: flex;
  flex-direction: column;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

/* タブ行 */
.cal-header-top {
  display: flex;
  align-items: flex-end;
  padding: 0 12px 0 8px;
  border-bottom: 1px solid var(--border-bold);
}
.cal-tabs {
  display: flex;
  align-items: flex-end;
  gap: 2px;
  flex: 1;
  overflow-x: auto;
  overflow-y: hidden;
  scrollbar-width: none;
  padding-top: 6px;
}
.cal-tabs::-webkit-scrollbar { display: none; }
.cal-tab {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 7px 14px 6px;
  background: none;
  border: 1px solid transparent;
  border-bottom: none;
  border-radius: var(--r) var(--r) 0 0;
  cursor: pointer;
  font-size: 13px;
  font-weight: 500;
  font-family: var(--font-body);
  color: var(--ink-faint);
  white-space: nowrap;
  position: relative;
  margin-bottom: -1px;
  transition: background .12s, color .12s, border-color .12s;
}
.cal-tab:hover  { background: var(--tool-hover); color: var(--ink); }
.cal-tab.active { background: var(--bg); color: var(--ink); border-color: var(--border-soft); font-weight: 600; }
.cal-tab-input {
  font-size: 13px;
  font-weight: 600;
  font-family: var(--font-body);
  border: none;
  outline: none;
  background: transparent;
  color: var(--ink);
  min-width: 40px;
  padding: 0;
}

/* 月ナビ行 */
.cal-header-nav {
  display: flex;
  align-items: center;
  padding: 8px 16px;
  position: relative;
}
.cal-nav-left, .cal-nav-right {
  display: flex;
  align-items: center;
  gap: 4px;
  flex: 1;
}
.cal-nav-right    { justify-content: flex-end; }
.cal-title {
  font-family: var(--font-disp);
  font-size: 22px;
  font-weight: 700;
  letter-spacing: .02em;
  text-align: center;
  display: flex;
  align-items: baseline;
  gap: 6px;
  justify-content: center;
  white-space: nowrap;
}
.cal-title-year { font-size: 13px; color: inherit; font-family: var(--font-body); font-weight: 700; }

/* ════════════════════════════════════════════
   CALENDAR SCREEN — 曜日ヘッダー & グリッド
════════════════════════════════════════════ */
.cal-weekdays {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  background: var(--surface);
  border-bottom: 1px solid var(--border-soft);
  flex-shrink: 0;
}
.wd {
  text-align: center;
  padding: 5px 0;
  font-size: 14px;
  font-weight: 500;
  letter-spacing: .08em;
  color: var(--ink-faint);
}
.wd.sun { color: var(--sun-txt); }
.wd.sat { color: var(--sat-txt); }

.cal-grid-area {
  flex: 1;
  overflow: hidden;
  overflow-x: auto;
  overflow-y: auto;
  position: relative;
  background: var(--bg);
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding-bottom: 16px;
}
.cal-wd-grid-wrap {
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
}
#cal-screen { overflow: hidden; position: relative; }

.cal-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  overflow: visible;
  border-left: 1px solid var(--border-soft);
  box-shadow: var(--shadow-sm);
  align-content: start;
}

/* セル */
.cal-cell {
  border-right: 1px solid var(--border-soft);
  border-bottom: 1px solid var(--border-soft);
  background: var(--surface);
  cursor: pointer;
  position: relative;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  transition: filter .12s;
}
.cal-cell:active             { filter: brightness(.96); }
.cal-cell.inactive           { background: var(--inactive-bg); pointer-events: none; }
.cal-cell.is-blank           { background: var(--inactive-bg); }
.cal-cell.today              { box-shadow: inset 0 0 0 2px var(--today-ring); }
.cal-cell.is-sun             { background: var(--sun-bg); }
.cal-cell.is-sat             { background: var(--sat-bg); }
.cal-cell.is-hol             { background: var(--hol-bg); }
.cal-cell.drag-over          { background: rgba(58,111,168,.10) !important; box-shadow: inset 0 0 0 2px #3a6fa8; }
.cal-cell.last-row,
.cal-cell.last-row.is-sun,
.cal-cell.last-row.is-sat,
.cal-cell.last-row.is-hol,
.cal-cell.last-row.is-blank  { border-bottom: 1px solid var(--border-bold); }

/* セル内レイアウト */
.cell-top {
  display: flex;
  align-items: center;
  gap: 3px;
  padding: 3px 5px 2px;
  flex-shrink: 0;
  height: var(--cell-date-h, 20px);
  overflow: hidden;
}
.cell-num {
  font-size: 14px;
  font-weight: 500;
  color: var(--ink-mid);
  line-height: 1;
  white-space: nowrap;
  flex-shrink: 0;
}
.cell-hol-name {
  font-size: 11px;
  color: var(--hol-txt);
  line-height: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.cell-preview {
  position: relative;
  overflow: hidden;
  flex-shrink: 0;
}
.cell-remaining { flex: 1; background: var(--inactive-bg); }

/* セル — 数字カラー */
.cal-cell.today .cell-num  { font-weight: 700; color: var(--ink); }
.cal-cell.is-sun .cell-num { color: var(--sun-txt); }
.cal-cell.is-sat .cell-num { color: var(--sat-txt); }
.cal-cell.is-hol .cell-num { color: var(--hol-txt); }

/* 横長グリッド */
.cal-cell.landscape-cell               { flex-direction: row; }
.cal-cell.landscape-cell .cell-top     { flex-direction: column; align-items: flex-start; justify-content: flex-start; padding: 4px 6px; overflow: hidden; height: auto; }
.cal-cell.landscape-cell .cell-num     { font-size: 14px; overflow: visible; }
.cal-cell.landscape-cell .cell-hol-name{ font-size: 11px; white-space: nowrap; }

/* ════════════════════════════════════════════
   CALENDAR SCREEN — アニメーション
════════════════════════════════════════════ */
@keyframes cal-fadein          { from { opacity: 0; }          to { opacity: 1; } }
@keyframes slide-in-from-right { from { transform: translateX( 100%); } to { transform: translateX(0); } }
@keyframes slide-in-from-left  { from { transform: translateX(-100%); } to { transform: translateX(0); } }
@keyframes slide-out-to-left   { from { transform: translateX(0); } to { transform: translateX(-100%); } }
@keyframes slide-out-to-right  { from { transform: translateX(0); } to { transform: translateX( 100%); } }

.cal-grid-area.tab-switching { animation: cal-fadein 0.4s ease forwards; }

.cal-grid.slide-in-right,
.draw-slide-in-right  { animation: slide-in-from-right 0.4s cubic-bezier(.4,0,.2,1) forwards; }
.cal-grid.slide-in-left,
.draw-slide-in-left   { animation: slide-in-from-left  0.4s cubic-bezier(.4,0,.2,1) forwards; }
.cal-grid.slide-out-left,
.draw-slide-out-left  { animation: slide-out-to-left   0.4s cubic-bezier(.4,0,.2,1) forwards; }
.cal-grid.slide-out-right,
.draw-slide-out-right { animation: slide-out-to-right  0.4s cubic-bezier(.4,0,.2,1) forwards; }

/* ════════════════════════════════════════════
   DAY CELL SCREEN — 共通
════════════════════════════════════════════ */
#day-screen           { background: var(--bg); }
#day-screen.portrait  { flex-direction: column; }
#day-screen.landscape { flex-direction: row; }

#day-screen.portrait  .day-topbar       { display: flex; }
#day-screen.portrait  .day-sidebar-land { display: none; }
#day-screen.landscape .day-topbar       { display: none; }
#day-screen.landscape .day-sidebar-land { display: flex; }

/* ════════════════════════════════════════════
   DAY CELL SCREEN — 縦長（portrait）
════════════════════════════════════════════ */
.day-topbar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  height: var(--toolbar-h);
  overflow: hidden;
}

/* Row1: 戻る / 日付(中央固定) / Undo */
.tb-row1 {
  display: flex;
  align-items: center;
  padding: 10px 16px 8px;
  flex-shrink: 0;
  position: relative;
}
.day-badge-inline { display: none; }
.day-date-row     { display: none; }

/* 日付グループ — absolute で画面中央固定 */
.day-num-center {
  display: flex;
  align-items: center;
  gap: 0;
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  white-space: nowrap;
  pointer-events: none;
}
.day-nav-btn        { pointer-events: auto; margin: 0 12px; }
.day-num-text-group { display: flex; align-items: baseline; gap: 8px; pointer-events: auto; cursor: pointer; }
.day-sub-left       { font-size: 14px; font-weight: 700; color: var(--ink); white-space: nowrap; }
.day-num-inner      { font-size: 26px; font-weight: 700; color: var(--ink); line-height: 1; }
.day-dow-right      { font-size: 14px; font-weight: 700; color: var(--ink); white-space: nowrap; }
.ur-row             { display: flex; gap: 2px; padding-right: 8px; align-self: center; margin-left: auto; }

/* 縦長: 戻るボタン */
#btn-back {
  width: 60px;
  height: 60px;
  margin-left: -10px;
  align-self: center;
  background: transparent;
  -webkit-appearance: none;
  outline: none;
}
#btn-back:hover, #btn-back:focus, #btn-back:active { background: transparent !important; outline: none; }
#btn-back svg { width: 43px; height: 30px; }

/* Row2: ツールボタン */
.tb-row2 {
  display: flex;
  align-items: center;
  padding: 0 8px;
  flex-shrink: 0;
}
.tool-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 5px;
  flex: 1;
  padding: 8px 4px;
  background: none;
  border: none;
  cursor: pointer;
  font-size: 13px;
  font-weight: 500;
  color: var(--ink-mid);
  font-family: var(--font-body);
  white-space: nowrap;
  letter-spacing: .02em;
  border-radius: var(--r);
  transition: background .12s, color .12s;
}
.tool-btn svg    { width: 17px; height: 17px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; }
.tool-btn:hover  { background: var(--tool-hover); }
.tool-btn.active { background: var(--tool-active); color: #fff; }

/* Row3: オプション */
.tb-row3 {
  display: flex;
  align-items: center;
  padding: 20px 16px;
  gap: 20px;
  flex-shrink: 0;
  min-height: 0;
  flex: 1;
  border-top: 1px solid var(--border-soft);
}

/* ════════════════════════════════════════════
   DAY CELL SCREEN — 横長（landscape）
════════════════════════════════════════════ */
.day-sidebar-land {
  background: var(--surface);
  border-right: 1px solid var(--border);
  width: var(--sidebar-w);
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: relative;
  z-index: 1;
}

/* ── 日付エリア（上部固定） ── */
.land-date-area {
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  overflow: hidden;
  position: relative;
  z-index: 0;
  background: var(--surface);
}

/* 戻るボタン: フロー配置（land-date-inner 先頭） */
#btn-back-land {
  width: 66px;
  height: 54px;
  align-self: flex-start;
}
#btn-back-land:hover, #btn-back-land:focus, #btn-back-land:active { background: transparent !important; outline: none; }
#btn-back-land svg { width: 46px; height: 33px; }

/* 日付テキストエリア（スライドアニメーション対象） */
.land-date-inner {
  display: flex;
  flex-direction: column;
  align-items: center;
  width: 100%;
  padding: 14px 12px 10px;
  background: var(--surface);
}
.land-day-sub {
  font-size: 18px; color: var(--ink); font-weight: 600;
  white-space: nowrap; text-align: center; margin-bottom: 2px;
}

/* 日付行: ナビボタン + 日数字(下揃え) + 曜日 */
.land-date-row      { display: flex; align-items: center; gap: 0; white-space: nowrap; }
.land-num-dow-group { display: flex; align-items: flex-end; gap: 0; }
.land-day-nav-btn   { margin: 0 12px; }
.land-day-nav-btn svg { width: 22px; height: 22px; }
.land-day-num { font-size: 48px; color: var(--ink); font-weight: 700; line-height: 1; white-space: nowrap; }
.land-day-dow { font-size: 18px; color: var(--ink); font-weight: 700; white-space: nowrap; margin-left: 8px; }
/* ── ツールエリア（スクロール可能） ── */
.land-scroll-area {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  scrollbar-width: none;
  padding: 12px 12px 16px;
  display: flex;
  flex-direction: column;
  gap: 0;
  position: relative;
  z-index: 1;
  background: var(--surface);
}
.land-scroll-area::-webkit-scrollbar { display: none; }

/* ツールグリッド: flexboxで4行制御 */
.land-tool-group {
  display: flex;
  flex-direction: column;
  gap: 5px;
}
.land-tool-row {
  display: flex;
  gap: 5px;
}
/* 全ボタン：flex伸縮させず固定幅（行1の1ボタン幅 = サイドバー幅の1/3 - gap相当） */
.land-tool-row .land-tool-btn {
  flex: 0 0 calc((100% - 10px) / 3);
}
/* 不要になったクラス */
.land-tool-btn-wrap-solo { }

.land-tool-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 10px 6px;
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border);
  cursor: pointer;
  border-radius: var(--r);
  transition: background .12s, color .12s, border-color .12s;
  color: var(--ink-mid);
  font-family: var(--font-body);
}
.land-tool-btn svg    { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
.land-tool-btn:hover  { background: var(--tool-hover); }
.land-tool-btn.active { background: var(--tool-active); color: #fff; border-color: var(--tool-active); }

/* ツールオプション */
.land-opts {
  display: flex;
  flex-direction: column;
  gap: 6px;
  margin-top: 32px; /* ツールグリッドとオプションの間の余白 */
}
.land-opt-label { font-size: 9px; text-transform: uppercase; letter-spacing: .08em; color: var(--ink-faint); font-weight: 600; margin-bottom: 4px; }

/* スウォッチと太さボタンの間の余白 */
.land-opts .opt-block + .opt-block { margin-top: 18px; }

/* Undo/Redo — 日付エリアとツールエリアの間・右寄せ・固定高さ */
.land-ur-area {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: flex-end;
  gap: 2px;
  padding: 0 8px 6px;
  overflow: hidden;
  position: relative;
  z-index: 0;
  background: var(--surface);
}

.land-opts .opt-block { flex-direction: column; align-items: flex-start; }
.land-opts .swatches  { gap: 8px; }

/* ════════════════════════════════════════════
   DAY CELL SCREEN — キャンバスエリア
════════════════════════════════════════════ */
.draw-wrap               { flex: 1; display: flex; background: var(--bg); overflow: hidden; }
.draw-wrap.portrait-wrap { align-items: flex-start; justify-content: center; }
.draw-wrap.landscape-wrap{ align-items: center;     justify-content: flex-start; }
#draw-canvas {
  background: #fff;
  box-shadow: var(--shadow-sm), 0 0 0 1px var(--border);
  display: block;
  touch-action: none;
}

/* ════════════════════════════════════════════
   TOOL OPTIONS（ペン / マーカー / テキスト）
════════════════════════════════════════════ */
.opt-block { display: flex; align-items: center; gap: 10px; }
.opt-label { font-size: 10px; text-transform: uppercase; letter-spacing: .08em; color: var(--ink-faint); font-weight: 600; white-space: nowrap; }
.swatches  { display: flex; gap: 10px; flex-wrap: wrap; }
.swatch {
  width: 22px;
  height: 22px;
  border-radius: 50%;
  border: 2.5px solid transparent;
  cursor: pointer;
  transition: transform .1s, outline .1s;
}
.swatch.on {
  outline: 2px solid var(--ink);
  outline-offset: 2px;
  transform: scale(1.1);
}
.sz-row { display: flex; gap: 6px; }
.sz-btn {
  background: none;
  border: 1px solid var(--border);
  border-radius: 8px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  width: 26px;
  height: 26px;
  transition: background .12s, border-color .12s;
}
.sz-btn.on         { background: var(--ink); border-color: var(--ink); }
.dot               { border-radius: 50%; background: var(--ink); display: block; pointer-events: none; }
.sz-btn.on .dot    { background: #fff; }
.sz-lbl            { font-size: 13px; font-family: var(--font-body); pointer-events: none; padding: 0 2px; }
.sz-btn.on .sz-lbl { color: #fff; }

/* ════════════════════════════════════════════
   TOAST
════════════════════════════════════════════ */
#app-toast {
  position: fixed;
  top: 60px;
  left: 50%;
  transform: translateX(-50%) translateY(-12px);
  background: rgba(44,42,38,.88);
  color: #fff;
  font-size: 13px;
  font-family: var(--font-body);
  font-weight: 500;
  padding: 9px 18px;
  border-radius: 20px;
  pointer-events: none;
  z-index: 9999;
  white-space: nowrap;
  opacity: 0;
  transition: opacity .18s, transform .18s;
}
#app-toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* ════════════════════════════════════════════
   SETTINGS OVERLAY
════════════════════════════════════════════ */
.overlay      { display: none; position: fixed; inset: 0; z-index: 80; }
.overlay.open { display: flex; }
.ovl-bd       { position: absolute; inset: 0; background: rgba(0,0,0,.15); }

.settings-panel {
  position: absolute;
  right: 12px;
  top: 54px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 18px;
  box-shadow: var(--shadow-md);
  min-width: 210px;
  z-index: 1;
}
.settings-panel h3   { font-size: 11px; font-weight: 600; letter-spacing: .06em; text-transform: uppercase; color: var(--ink-mid); margin-bottom: 14px; }
.s-row               { margin-bottom: 12px; }
.s-row label         { display: block; font-size: 11px; color: var(--ink-mid); margin-bottom: 5px; }
.s-row select {
  width: 100%;
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 6px 8px;
  font-size: 13px;
  font-family: var(--font-body);
  background: var(--bg);
  cursor: pointer;
  outline: none;
  color: var(--ink);
}
.s-btn {
  width: 100%;
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 7px 10px;
  border: 1px solid var(--border);
  border-radius: var(--r);
  background: var(--bg);
  cursor: pointer;
  font-size: 13px;
  font-family: var(--font-body);
  color: var(--ink);
  text-align: left;
  transition: background .12s, border-color .12s;
}
.s-btn:hover { background: var(--tool-hover); border-color: var(--ink-mid); }

/* ════════════════════════════════════════════
   STICKER DROPDOWN
════════════════════════════════════════════ */
#stk-dropdown {
  display: none;
  position: fixed;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px;
  box-shadow: 0 6px 24px rgba(0,0,0,.14);
  z-index: 500;
  width: min(360px, 90vw);
}
#stk-dropdown.open     { display: block; }
.stk-inline-grid       { display: flex; flex-wrap: wrap; gap: 6px; }
.stk-inline-item {
  width: 40px;
  height: 40px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: var(--r);
  cursor: pointer;
  border: 2px solid transparent;
  transition: transform .1s;
}
.stk-inline-item:hover        { background: var(--tool-hover); transform: scale(1.1); }
.stk-inline-item.stk-selected { border-color: var(--ink); background: var(--tool-hover); }
.stk-inline-item svg          { width: 26px; height: 26px; }

/* ════════════════════════════════════════════
   CONTEXT MENUS
════════════════════════════════════════════ */
.ctx-menu {
  display: none;
  position: fixed;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--r);
  box-shadow: var(--shadow-md);
  z-index: 600;
  min-width: 180px;
  padding: 4px 0;
  overflow: hidden;
  pointer-events: all;
  touch-action: auto;
}
.ctx-menu.open { display: block; }
.ctx-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 16px;
  font-size: 14px;
  font-family: var(--font-body);
  cursor: pointer;
  transition: background .1s;
  color: var(--ink);
}
.ctx-item:hover     { background: var(--tool-hover); }
.ctx-item.ctx-hover { background: var(--tool-hover); }
.ctx-item.danger    { color: #b84040; }
.ctx-item svg       { width: 13px; height: 13px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
.ctx-sep            { height: 1px; background: var(--border-soft); margin: 3px 0; }
@keyframes ctx-blink {
  0%, 100% { background: var(--tool-hover); }
  40%      { background: #c8e0f8; }
}
.ctx-item.ctx-blink { animation: ctx-blink 0.25s ease 2; }

/* ════════════════════════════════════════════
   YEAR-MONTH DRUM PICKER
════════════════════════════════════════════ */
#ym-backdrop {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 1100;
}
#ym-picker {
  display: none;
  position: fixed;
  z-index: 1101;
  background: var(--surface);
  border-radius: 14px;
  box-shadow: 0 4px 24px rgba(0,0,0,.18);
  overflow: hidden;
  width: 220px;
}
#ym-backdrop.open,
#ym-picker.open { display: block; }

.ym-drum-wrap {
  display: flex;
  height: 180px;
  position: relative;
}
.ym-drum-col {
  flex: 1;
  overflow-y: scroll;
  scroll-snap-type: y mandatory;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
  padding: 72px 0;
}
.ym-drum-col::-webkit-scrollbar { display: none; }
.ym-drum-item {
  height: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  font-family: var(--font-body);
  color: var(--ink-mid);
  scroll-snap-align: center;
  cursor: pointer;
  transition: color .15s;
  user-select: none;
}
.ym-drum-item.selected { color: var(--ink); font-weight: 600; }
.ym-select-bar {
  position: absolute;
  top: 50%;
  left: 8px;
  right: 8px;
  height: 36px;
  transform: translateY(-50%);
  background: var(--tool-hover);
  border-radius: 8px;
  pointer-events: none;
  z-index: 1;
}
.ym-fade-top, .ym-fade-bot {
  position: absolute;
  left: 0; right: 0;
  height: 72px;
  pointer-events: none;
  z-index: 2;
}
.ym-fade-top { top: 0;    background: linear-gradient(to bottom, var(--surface) 20%, transparent); }
.ym-fade-bot { bottom: 0; background: linear-gradient(to top,   var(--surface) 20%, transparent); }

/* ════════════════════════════════════════════
   CLIP VIEWER
════════════════════════════════════════════ */
#clip-viewer {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 2000;
}
#clip-viewer.open { display: block; }
#clip-viewer-bd {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,.85);
}
#clip-viewer-panel {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  pointer-events: none;
}
#clip-viewer-toolbar {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 16px;
  pointer-events: all;
}
#clip-viewer-toolbar .icon-btn { color: #fff; }
#clip-viewer-toolbar .icon-btn:hover { background: rgba(255,255,255,.15); }
#clip-viewer-page-info {
  font-size: 13px;
  color: rgba(255,255,255,.7);
  font-family: var(--font-body);
}
#clip-viewer-content {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  pointer-events: all;
}
#clip-viewer-pages {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
  padding: 8px 0 24px;
}
#clip-viewer-pages img {
  max-width: 100%;
  display: block;
  border-radius: 4px;
}
#clip-viewer-pages canvas {
  max-width: 100%;
  display: block;
  border-radius: 4px;
}

// Returns "YYYY-MM-DD" → holiday name map for a given year
function getHolidays(year) {
  const hols = {};
  const add = (m, d, name) => { hols[`${year}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`] = name; };

  // Fixed holidays
  add(1,1,'元日');
  add(2,11,'建国記念の日');
  add(2,23,'天皇誕生日');
  add(4,29,'昭和の日');
  add(5,3,'憲法記念日');
  add(5,4,'みどりの日');
  add(5,5,'こどもの日');
  add(8,11,'山の日');
  add(11,3,'文化の日');
  add(11,23,'勤労感謝の日');

  // Happy Monday / nth-weekday rules
  // 成人の日: 1月第2月曜
  add(...nthWeekday(year,1,2,1), '成人の日');
  // 海の日: 7月第3月曜
  add(...nthWeekday(year,7,3,1), '海の日');
  // 敬老の日: 9月第3月曜
  add(...nthWeekday(year,9,3,1), '敬老の日');
  // スポーツの日: 10月第2月曜
  add(...nthWeekday(year,10,2,1), 'スポーツの日');

  // 春分の日 (approx)
  const shunbun = Math.floor(20.8431 + 0.242194*(year-1980) - Math.floor((year-1980)/4));
  add(3, shunbun, '春分の日');
  // 秋分の日 (approx)
  const shubun = Math.floor(23.2488 + 0.242194*(year-1980) - Math.floor((year-1980)/4));
  add(9, shubun, '秋分の日');

  // 振替休日: if holiday falls on Sunday, next Monday is substitute
  const keys = Object.keys(hols);
  keys.forEach(k => {
    const d = new Date(k);
    if (d.getDay() === 0) { // Sunday
      const next = new Date(d); next.setDate(next.getDate()+1);
      const nk = fmtDate(next);
      if (!hols[nk]) hols[nk] = '振替休日';
    }
  });

  return hols;
}

function nthWeekday(year, month, nth, dow) { // dow: 0=Sun,1=Mon...
  let count = 0;
  for (let d=1; d<=31; d++) {
    const dt = new Date(year, month-1, d);
    if (dt.getMonth() !== month-1) break;
    if (dt.getDay() === dow && ++count === nth) return [month, d];
  }
  return [month, 1];
}

function fmtDate(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

const cvs = document.getElementById('draw-canvas');
const cx  = cvs.getContext('2d');

function sizeCanvas() {
  const wrap   = document.getElementById('draw-wrap');
  const aw     = wrap.clientWidth;
  const ah     = wrap.clientHeight;
  const isPort = ah >= aw;

  // 縦画面: 幅いっぱいの正方形（高さが足りなければ高さ基準）
  // 横画面: 高さいっぱいの正方形（幅が足りなければ幅基準）
  const cssSz = isPort ? Math.min(aw, ah) : Math.min(ah, aw);

  // 寄せ方をクラスで切り替え
  wrap.classList.toggle('portrait-wrap',  isPort);
  wrap.classList.toggle('landscape-wrap', !isPort);

  const dpr   = window.devicePixelRatio || 1;
  const phySz = Math.round(cssSz * dpr);

  cvs.width  = phySz;
  cvs.height = phySz;
  cvs.style.width  = cssSz + 'px';
  cvs.style.height = cssSz + 'px';

  CANVAS_PX = phySz;

  calcTextSizes();
  redraw();
}

/* 描画エリア幅(CANVAS_SRC=600の論理座標系)で
   「小」= 横15文字、「大」= 小×1.3 になるよう計算 */
function calcTextSizes() {
  const small = Math.round(CANVAS_SRC / 15); // = 40px (論理座標)
  if (!S.textSize) S.textSize = small;
  S._textSmall = small;
}

/* ════ RENDER ════ */
function redraw() {
  cx.clearRect(0,0,CANVAS_PX,CANVAS_PX);
  cx.fillStyle = '#fff';
  cx.fillRect(0,0,CANVAS_PX,CANVAS_PX);

  const sc = CANVAS_PX / CANVAS_SRC;

  // 確定済みオブジェクト
  Draw.objects.forEach(o => drawObj(cx, o, sc));

  // ★ 描画中のライブストローク（最新の1本）
  if (Draw.activeStroke && Draw.activeStroke.points.length > 1) {
    drawStroke(cx, Draw.activeStroke, sc);
  }

  // selection bbox
  if (Draw.selId) {
    const o = Draw.objects.find(x=>x.id===Draw.selId);
    if (o) drawBBox(cx, o, sc);
  }
}

function drawObj(c, obj, sc) {
  if (obj._hidden) return;
  if (obj.type==='pen')     drawPenObj(c, obj, sc);
  if (obj.type==='text')    drawTextObj(c, obj, sc);
  if (obj.type==='sticker') drawStickerObj(c, obj, sc);
  if (obj.type==='clip')    drawClipObj(c, obj, sc);
}

function drawPenObj(c, obj, sc) {
  obj.paths.forEach(p => drawStroke(c, p, sc));
}

function drawStroke(c, path, sc) {
  if (!path.points || path.points.length < 2) return;
  c.save();
  c.beginPath();
  c.strokeStyle = path.color;
  c.lineWidth   = path.size * sc;
  if (path.alpha != null) {
    c.globalAlpha = path.alpha;
    c.lineCap  = 'square';
    c.lineJoin = 'miter';
  } else {
    c.lineCap  = 'round';
    c.lineJoin = 'round';
  }
  c.moveTo(path.points[0].x*sc, path.points[0].y*sc);
  for (let i=1;i<path.points.length;i++) c.lineTo(path.points[i].x*sc, path.points[i].y*sc);
  c.stroke();
  c.restore();
}

function drawTextObj(c, obj, sc) {
  c.save();
  const weight = obj.bold ? '700' : '400';
  c.font         = `${weight} ${(obj.size||16)*sc}px 'Noto Sans JP',sans-serif`;
  c.fillStyle    = obj.color||'#1c1a18';
  c.textBaseline = 'top';
  (obj.text||'').split('\n').forEach((line,i)=>{
    c.fillText(line, obj.x*sc, (obj.y + i*(obj.size||16)*1.35)*sc);
  });
  c.restore();
}

/* sticker drawing — Canvas draw関数で直接描画（ロード待ち不要） */
// スタンプの描画サイズを縦横比を保持して計算（長辺 = size）
function stickerDrawSize(img, size) {
  const iw = img.naturalWidth  || img.width  || 1;
  const ih = img.naturalHeight || img.height || 1;
  if (iw >= ih) {
    return {w: size, h: size * ih / iw};
  } else {
    return {w: size * iw / ih, h: size};
  }
}

function drawStickerObj(c, obj, sc) {
  const img = imgCache[obj.stickerId];
  if (!img) return;
  const sz = (obj.size || 44) * sc;
  const {w, h} = stickerDrawSize(img, sz);
  c.save();
  c.drawImage(img, obj.x * sc - w/2, obj.y * sc - h/2, w, h);
  c.restore();
}

function drawClipObj(c, obj, sc) {
  const dpr  = window.devicePixelRatio || 1;
  const sz   = (obj.size || 60) * sc;
  const cx2  = obj.x * sc;
  const cy2  = obj.y * sc;
  const w    = sz;
  const h    = sz * 1.2;
  const rx   = sz * 0.12;
  const x0   = cx2 - w/2;
  const y0   = cy2 - h/2;

  c.save();

  // シャドウ（強め）
  c.shadowColor   = 'rgba(0,0,0,0.55)';
  c.shadowBlur    = sz * 0.5;
  c.shadowOffsetX = sz * 0.08;
  c.shadowOffsetY = sz * 0.12;

  // カード背景
  c.fillStyle   = '#fff';
  c.strokeStyle = '#3a6fa8';
  c.lineWidth   = 6 * dpr;
  c.beginPath();
  c.moveTo(x0+rx, y0);
  c.lineTo(x0+w-rx, y0);
  c.quadraticCurveTo(x0+w, y0, x0+w, y0+rx);
  c.lineTo(x0+w, y0+h-rx);
  c.quadraticCurveTo(x0+w, y0+h, x0+w-rx, y0+h);
  c.lineTo(x0+rx, y0+h);
  c.quadraticCurveTo(x0, y0+h, x0, y0+h-rx);
  c.lineTo(x0, y0+rx);
  c.quadraticCurveTo(x0, y0, x0+rx, y0);
  c.closePath();
  c.fill();

  // シャドウをオフにしてからストローク・以降の描画
  c.shadowColor = 'transparent';
  c.stroke();

  // ヘッダー帯（ファイルタイプの色）
  const isPdf = obj.fileType === 'application/pdf';
  c.fillStyle = isPdf ? '#e03030' : '#3a6fa8';
  c.beginPath();
  c.moveTo(x0+rx, y0);
  c.lineTo(x0+w-rx, y0);
  c.quadraticCurveTo(x0+w, y0, x0+w, y0+rx);
  c.lineTo(x0+w, y0+h*0.32);
  c.lineTo(x0, y0+h*0.32);
  c.lineTo(x0, y0+rx);
  c.quadraticCurveTo(x0, y0, x0+rx, y0);
  c.closePath();
  c.fill();

  // ファイルタイプラベル
  c.fillStyle = '#fff';
  c.font = `bold ${sz*0.22}px sans-serif`;
  c.textAlign = 'center';
  c.textBaseline = 'middle';
  c.fillText(isPdf ? 'PDF' : 'IMG', cx2, y0 + h*0.16);

  // 横線（コンテンツ表示のイメージ）
  c.strokeStyle = 'rgba(58,107,168,.3)';
  c.lineWidth   = 1 * dpr;
  const lx1 = x0 + w*0.15;
  const lx2 = x0 + w*0.85;
  [0.48, 0.62, 0.76].forEach(yRatio => {
    const ly = y0 + h * yRatio;
    c.beginPath(); c.moveTo(lx1, ly); c.lineTo(lx2, ly); c.stroke();
  });

  // ページ数バッジ
  if (obj.pageCount && obj.pageCount > 1) {
    const br = sz * 0.18;
    const bx = x0 + w - br*0.8;
    const by = y0 + h - br*0.8;
    c.fillStyle = isPdf ? '#e03030' : '#3a6fa8';
    c.beginPath(); c.arc(bx, by, br, 0, Math.PI*2); c.fill();
    c.fillStyle = '#fff';
    c.font = `bold ${br}px sans-serif`;
    c.textAlign = 'center';
    c.textBaseline = 'middle';
    c.fillText(String(obj.pageCount), bx, by);
  }

  c.restore();
}

/* bounding box helpers */
function getObjBounds(obj) {
  const sc = CANVAS_PX/CANVAS_SRC;
  if (obj.type==='pen') {
    let x0=Infinity,y0=Infinity,x1=-Infinity,y1=-Infinity;
    obj.paths.forEach(p=>p.points.forEach(pt=>{
      x0=Math.min(x0,pt.x);y0=Math.min(y0,pt.y);
      x1=Math.max(x1,pt.x);y1=Math.max(y1,pt.y);
    }));
    return {x:x0*sc,y:y0*sc,w:(x1-x0)*sc,h:(y1-y0)*sc};
  }
  if (obj.type==='text') {
    cx.save();
    cx.font = `${(obj.size||16)*(CANVAS_PX/CANVAS_SRC)}px 'Noto Sans JP',sans-serif`;
    const lines = (obj.text||'').split('\n');
    const w = Math.max(...lines.map(l=>cx.measureText(l).width));
    cx.restore();
    const h = lines.length*(obj.size||16)*1.35*sc;
    return {x:obj.x*sc, y:obj.y*sc, w, h};
  }
  if (obj.type==='sticker') {
    const img = imgCache[obj.stickerId];
    const sz = (obj.size||44)*sc;
    if (img) {
      const {w, h} = stickerDrawSize(img, sz);
      return {x: obj.x*sc - w/2, y: obj.y*sc - h/2, w, h};
    }
    return {x:obj.x*sc-sz/2, y:obj.y*sc-sz/2, w:sz, h:sz};
  }
  if (obj.type==='clip') {
    const sz = (obj.size||60)*sc;
    const w  = sz;
    const h  = sz * 1.2;
    return {x: obj.x*sc - w/2, y: obj.y*sc - h/2, w, h};
  }
  return {x:0,y:0,w:20,h:20};
}

const PAD = 8;
function drawBBox(c, obj) {
  const b  = getObjBounds(obj);
  const bx = b.x+b.w+PAD+14;
  const by = b.y-PAD-14;
  c.save();
  c.strokeStyle='#3a6fa8';c.lineWidth=1.5;c.setLineDash([5,3]);
  c.strokeRect(b.x-PAD, b.y-PAD, b.w+PAD*2, b.h+PAD*2);
  c.setLineDash([]);
  c.fillStyle='#e03030';
  c.beginPath();c.arc(bx,by,14,0,Math.PI*2);c.fill();
  c.fillStyle='#fff';c.font='bold 16px sans-serif';
  c.textAlign='center';c.textBaseline='middle';
  c.fillText('×',bx,by);
  c.restore();
}

function hitDeleteBtn(obj, px, py) {
  const b=getObjBounds(obj);
  const bx=b.x+b.w+PAD+14, by=b.y-PAD-14;
  return Math.hypot(px-bx,py-by)<18;
}
function hitObj(obj, px, py) {
  const b=getObjBounds(obj);
  return px>=b.x-PAD&&px<=b.x+b.w+PAD&&py>=b.y-PAD&&py<=b.y+b.h+PAD;
}

/* screen coords → logical canvas coords */
function toLogical(clientX, clientY) {
  const r = cvs.getBoundingClientRect();
  return {
    x: ((clientX-r.left)/r.width)  * CANVAS_SRC,
    y: ((clientY-r.top) /r.height) * CANVAS_SRC,
  };
}
/* screen coords → physical pixel coords (for hit tests) */
function toPhysical(clientX, clientY) {
  const r = cvs.getBoundingClientRect();
  return {
    x: (clientX-r.left)*(CANVAS_PX/r.width),
    y: (clientY-r.top) *(CANVAS_PX/r.height),
  };
}

function evtCoords(e) {
  const src = e.touches ? e.touches[0] : e;
  return {clientX:src.clientX, clientY:src.clientY};
}

/* ════ PEN OBJECT MANAGEMENT ════
   仕様：同じ色・同じ太さで描かれたものはひとつのペンオブジェクトとする。
   ツール切り替えをはさんでも、色と太さが同じなら同一オブジェクトに統合する。

   実装：
   - Draw.objects 配列の中に色+太さごとの penObj を保持し続ける
   - ペン描画開始時: Draw.objects から同色同太さの penObj を探し、あればそこに追記
   - 「確定」は 戻るボタン / セル切り替え 時のみ（undo 登録）
   - ツール切り替えでは確定しない
═══════════════════════════════════════ */

// 現在アクティブな（描画中の）penObjへの参照
// Draw.objects 配列の中の要素を直接指す

// 色+太さ(+alpha)でペンオブジェクトを検索（objectsの中から）
function findPenObj(color, size, alpha) {
  return Draw.objects.find(o =>
    o.type==='pen' && o.color===color && o.size===size &&
    (alpha == null ? !o.paths.some(p=>p.alpha!=null) : o.paths.some(p=>p.alpha===alpha))
  ) || null;
}

// ペンオブジェクトの「確定」= undo履歴に登録する
// セル移動・戻るボタン時にのみ呼ぶ
function finalizePenObjs() {
  // 未登録（undo履歴にない）penObjをまとめてundo登録
  // ※ 描画中に随時 Draw.objects に入っているので、ここでは履歴のみ管理
  Draw.activePenObjRef = null;
  Draw.activeStroke    = null;
}

// ペンストローク開始
function startPenStroke(color, size, startPt, alpha) {
  // 同色同太さ（同alpha）のオブジェクトを探す
  let penObj = findPenObj(color, size, alpha);
  if (!penObj) {
    penObj = {id:uid(), type:'pen', color, size, paths:[]};
    Draw.objects.push(penObj);
  }
  Draw.activePenObjRef = penObj;
  Draw.activeStroke = {color, size, points:[startPt], ...(alpha != null ? {alpha} : {})};
}

// ストローク終了（pointerup）
function endPenStroke() {
  if (!Draw.activeStroke || !Draw.activePenObjRef) return;
  if (Draw.activeStroke.points.length >= 2) {
    // ストローク追加前のスナップショットを保存
    const before = clone(Draw.activePenObjRef);
    Draw.activePenObjRef.paths.push(Draw.activeStroke);
    const after  = clone(Draw.activePenObjRef);
    pushUndo({type:'stroke', objId:after.id, before, after});
    flushCell();
  }
  Draw.activeStroke = null;
  redraw();
}

// undo/redo で stroke タイプに対応
function applyUndo(a){
  if(a.type==='create') Draw.objects=Draw.objects.filter(o=>o.id!==a.obj.id);
  if(a.type==='delete') Draw.objects.push(clone(a.obj));
  if(a.type==='move'||a.type==='scale'){const o=Draw.objects.find(x=>x.id===a.objId);if(o)Object.assign(o,clone(a.from));}
  if(a.type==='edit'){const o=Draw.objects.find(x=>x.id===a.objId);if(o)Object.assign(o,clone(a.from));}
  if(a.type==='stroke'){
    const idx=Draw.objects.findIndex(x=>x.id===a.objId);
    if(a.before && a.before.paths.length > 0){
      // 前状態に戻す
      if(idx>=0) Draw.objects[idx]=clone(a.before);
      else Draw.objects.push(clone(a.before));
    } else {
      // 最初のストロークのUndo→オブジェクトごと削除
      if(idx>=0) Draw.objects.splice(idx,1);
    }
  }
}
function applyRedo(a){
  if(a.type==='create') Draw.objects.push(clone(a.obj));
  if(a.type==='delete') Draw.objects=Draw.objects.filter(o=>o.id!==a.obj.id);
  if(a.type==='move'||a.type==='scale'){const o=Draw.objects.find(x=>x.id===a.objId);if(o)Object.assign(o,clone(a.to));}
  if(a.type==='edit'){const o=Draw.objects.find(x=>x.id===a.objId);if(o)Object.assign(o,clone(a.to));}
  if(a.type==='stroke'){
    const idx=Draw.objects.findIndex(x=>x.id===a.objId);
    if(idx>=0) Draw.objects[idx]=clone(a.after);
    else Draw.objects.push(clone(a.after));
  }
}

// スタンプ専用キャンバスリスナー（onDownとは独立）
cvs.addEventListener('pointerdown', e => {
  if (S.tool !== 'sticker' || !Draw.pendingStickerId) return;
  e.stopImmediatePropagation();
  const lp = toLogical(e.clientX, e.clientY);
  placeSticker(lp);
}, {capture: false, passive: false});

/* ════ POINTER INPUT ════ */
cvs.addEventListener('pointerdown', e=>{
  e.preventDefault();
  Draw.isPointerDown=true;
  if (S.tool === 'eraser') window._moveEraserCursor && window._moveEraserCursor(e.clientX, e.clientY);
  if (S.tool === 'eraser') window._showEraserCursor && window._showEraserCursor(Math.max(8, Math.round(S.eraserSize * cvs.getBoundingClientRect().width / CANVAS_SRC)));
  onDown(e);
},{passive:false});
cvs.addEventListener('pointermove', e=>{
  e.preventDefault();
  if (S.tool === 'eraser' && Draw.isPointerDown) window._moveEraserCursor && window._moveEraserCursor(e.clientX, e.clientY);
  if(Draw.isPointerDown||Draw.dragInfo) onMove(e);
},{passive:false});
cvs.addEventListener('pointerup', e=>{
  e.preventDefault();
  Draw.isPointerDown=false;
  if (S.tool === 'eraser') window._hideEraserCursor && window._hideEraserCursor();
  cvs.style.cursor = S.tool === 'eraser' ? 'crosshair' : cvs.style.cursor;
  onUp(e);
},{passive:false});
cvs.addEventListener('pointercancel', e=>{
  Draw.isPointerDown=false;
  Draw.dragInfo=null;
  Draw.activeStroke=null;
  window._hideEraserCursor && window._hideEraserCursor();
});
cvs.addEventListener('pointerleave', e=>{
  if (S.tool === 'eraser') window._hideEraserCursor && window._hideEraserCursor();
});
cvs.addEventListener('dblclick', e=>{
  if (S.tool!=='select'||!Draw.selId) return;
  const obj=Draw.objects.find(o=>o.id===Draw.selId);
  if (obj&&obj.type==='text') { const lxy=toLogical(e.clientX,e.clientY); showTextInput(obj.x,obj.y,obj); }
});

// prevent browser gestures
cvs.addEventListener('touchstart',e=>e.preventDefault(),{passive:false});

/* ════ PINCH SCALE（selectツール＋選択オブジェクト単体） ════ */
(function() {
  let pinching = false;
  let startDist = 0;
  let startSnapshot = null; // ピンチ開始時のオブジェクトのクローン

  function touchDist(t1, t2) {
    return Math.hypot(t2.clientX - t1.clientX, t2.clientY - t1.clientY);
  }
  function touchMidLogical(t1, t2) {
    return toLogical(
      (t1.clientX + t2.clientX) / 2,
      (t1.clientY + t2.clientY) / 2
    );
  }

  // snapshotを基準に、中心点(cx,cy)からscale倍にオブジェクトを変形
  function applyScale(obj, snap, scale, cx, cy) {
    if (obj.type === 'pen') {
      obj.paths = snap.paths.map(p => ({
        ...p,
        points: p.points.map(pt => ({
          x: cx + (pt.x - cx) * scale,
          y: cy + (pt.y - cy) * scale,
        }))
      }));
      obj.size = snap.size; // 線幅はそのまま
    } else if (obj.type === 'text' || obj.type === 'sticker' || obj.type === 'clip') {
      obj.x = cx + (snap.x - cx) * scale;
      obj.y = cy + (snap.y - cy) * scale;
      const newSize = (snap.size || 1) * scale;
      if (obj.type === 'text') {
        obj.size = Math.max(10, Math.min(CANVAS_SRC, newSize));
      } else if (obj.type === 'clip') {
        obj.size = Math.max(60, Math.min(CANVAS_SRC, newSize));
      } else {
        obj.size = Math.max(20, Math.min(CANVAS_SRC, newSize));
      }
    }
  }

  cvs.addEventListener('touchstart', e => {
    if (e.touches.length !== 2) return;
    if (S.tool !== 'select' || !Draw.selId) return;
    const obj = Draw.objects.find(o => o.id === Draw.selId);
    if (!obj) return;
    e.preventDefault();
    pinching = true;
    Draw.isPointerDown = false;
    Draw.activeStroke = null;
    startDist     = touchDist(e.touches[0], e.touches[1]);
    startSnapshot = clone(obj);
  }, { passive: false });

  cvs.addEventListener('touchmove', e => {
    if (!pinching || e.touches.length !== 2) return;
    e.preventDefault();
    const obj = Draw.objects.find(o => o.id === Draw.selId);
    if (!obj || !startSnapshot) { pinching = false; return; }
    const d     = touchDist(e.touches[0], e.touches[1]);
    const scale = Math.max(0.1, d / startDist);
    const mid   = touchMidLogical(e.touches[0], e.touches[1]);
    applyScale(obj, startSnapshot, scale, mid.x, mid.y);
    redraw();
  }, { passive: false });

  cvs.addEventListener('touchend', e => {
    if (!pinching) return;
    if (e.touches.length < 2) {
      pinching = false;
      const obj = Draw.objects.find(o => o.id === Draw.selId);
      if (obj && startSnapshot) {
        pushUndo({ type: 'scale', objId: obj.id, from: startSnapshot, to: clone(obj) });
        flushCell();
      }
      startSnapshot = null;
    }
  }, { passive: false });
})();

// オブジェクト選択＋ドラッグ待機（select/text/stickerツールで共用）
function startObjSelect(found, lp, clientX, clientY) {
  Draw.selId = found.id;
  redraw();
  const origObj = clone(found);

  const longPressTimer = setTimeout(() => {
    document.removeEventListener('pointermove', onTryDrag);
    document.removeEventListener('pointerup', onUpAfterHit);
    openDayObjCtx(clientX, clientY, found.id);
  }, 500);

  const onTryDrag = mv => {
    const {clientX:mx, clientY:my} = evtCoords(mv);
    if (Math.hypot(mx-clientX, my-clientY) > 6) {
      clearTimeout(longPressTimer);
      document.removeEventListener('pointermove', onTryDrag);
      document.removeEventListener('pointerup', onUpAfterHit);
      Draw.dragInfo = {objId: found.id, sx: lp.x, sy: lp.y, origObj};
    }
  };
  const onUpAfterHit = () => {
    clearTimeout(longPressTimer);
    document.removeEventListener('pointermove', onTryDrag);
  };
  document.addEventListener('pointermove', onTryDrag);
  document.addEventListener('pointerup', onUpAfterHit, {once:true});
}

function openDayObjCtx(clientX, clientY, objId) {
  const m  = document.getElementById('ctx-day-obj');
  const mw = 180, mh = 220;
  m.style.left = Math.min(clientX, window.innerWidth  - mw - 8) + 'px';
  m.style.top  = Math.min(clientY, window.innerHeight - mh - 8) + 'px';
  m._targetObjId = objId;

  const obj = Draw.objects.find(o => o.id === objId);
  const isClip = obj && obj.type === 'clip';

  // クリップの場合は「画像変更」のみ表示
  document.getElementById('dctx-change-image').style.display = isClip ? '' : 'none';
  document.getElementById('dctx-clip-sep').style.display     = isClip ? '' : 'none';
  document.getElementById('dctx-copy').style.display         = isClip ? 'none' : '';
  document.getElementById('dctx-cut').style.display          = isClip ? 'none' : '';
  document.getElementById('dctx-delete').style.display       = isClip ? 'none' : '';
  document.getElementById('dctx-paste').style.display = (!isClip && S.clipboard?.type === 'obj') ? '' : 'none';

  m.classList.add('open');
  attachLongPressMenuTracking(m, clientX, clientY);
}

function onDown(e) {
  if (document.getElementById('ctx-day-obj').classList.contains('open') ||
      document.getElementById('ctx-day-paste').classList.contains('open')) return;
  closeContextMenus();
  const {clientX,clientY} = evtCoords(e);
  const lp = toLogical(clientX,clientY);
  const pp = toPhysical(clientX,clientY);

  // ── グローバルダブルタップ：テキストオブジェクト上ならどのツールからでも編集 ──
  const nowDt = Date.now();
  if (S.tool !== 'text' && nowDt - (Draw._globalLastTap||0) < 350) {
    const hit = [...Draw.objects].reverse().find(o => o.type==='text' && !o._hidden && hitObj(o, pp.x, pp.y));
    if (hit) {
      showTextInput(hit.x, hit.y, hit);
      Draw._globalLastTap = 0;
      return;
    }
  }

  // ── クリップアイコンのダブルタップ → ビューワー起動（スタンプ選択済のstickerツール以外） ──
  const clipViewerBlocked = S.tool === 'sticker' && Draw.pendingStickerId;
  if (!clipViewerBlocked && nowDt - (Draw._globalLastTap||0) < 350) {
    const hitClip = [...Draw.objects].reverse().find(o => o.type==='clip' && hitObj(o, pp.x, pp.y));
    if (hitClip) {
      openClipViewer(hitClip.clipId);
      Draw._globalLastTap = 0;
      return;
    }
  }

  Draw._globalLastTap = nowDt;

  // ── クリップアイコンへのヒット（スタンプ選択済み以外）→ startObjSelectで長押し検出 ──
  const clipViewerBlocked2 = S.tool === 'sticker' && Draw.pendingStickerId;
  if (!clipViewerBlocked2 && S.tool !== 'select' && S.tool !== 'text') {
    const hitClipObj = [...Draw.objects].reverse().find(o => o.type==='clip' && hitObj(o, pp.x, pp.y));
    if (hitClipObj) {
      startObjSelect(hitClipObj, lp, clientX, clientY);
      return;
    }
  }

  if (S.tool==='select') {
    // ×ボタンのヒットテスト
    if (Draw.selId) {
      const obj = Draw.objects.find(o=>o.id===Draw.selId);
      if (obj && hitDeleteBtn(obj,pp.x,pp.y)) {
        deleteObj(Draw.selId); Draw.selId=null; redraw(); return;
      }
    }

    // オブジェクトのヒットテスト（選択済み優先）
    let found = null;
    if (Draw.selId) {
      const selObj = Draw.objects.find(o=>o.id===Draw.selId);
      if (selObj && hitObj(selObj,pp.x,pp.y)) found = selObj;
    }
    if (!found) {
      for (let i=Draw.objects.length-1;i>=0;i--) {
        if (hitObj(Draw.objects[i],pp.x,pp.y)) { found=Draw.objects[i]; break; }
      }
    }

    if (found) {
      startObjSelect(found, lp, clientX, clientY);
      return;
    }

    // オブジェクト外 → 選択解除
    Draw.selId = null;
    redraw();
    return;
  }

  if (S.tool==='pen') {
    startPenStroke(S.penColor, S.penSize, lp);
    return;
  }
  if (S.tool==='marker') {
    startPenStroke(S.markerColor, S.markerSize, lp, 0.35);
    return;
  }
  if (S.tool==='eraser') {
    eraseAt(lp); return;
  }
  if (S.tool==='text') {
    if (Draw.activeTextEl) {
      finalizeText();
      return;
    }
    if (Draw.textJustFinished) return;

    const now = Date.now();
    const {clientX: ecx, clientY: ecy} = evtCoords(e);
    const pp2 = toPhysical(ecx, ecy);
    const hitText = [...Draw.objects].reverse().find(o => o.type==='text' && !o._hidden && hitObj(o, pp2.x, pp2.y));

    if (now - (Draw._lastTextTap||0) < 350) {
      // ダブルタップ
      clearTimeout(Draw._textTapTimer);
      Draw._lastTextTap = 0;
      if (hitText) {
        showTextInput(hitText.x, hitText.y, hitText);
      } else {
        showTextInput(lp.x, lp.y, null);
      }
      return;
    }
    Draw._lastTextTap = now;

    if (hitText) {
      // シングルタップ：350ms待ってダブルタップでなければドラッグ開始
      Draw._textTapTimer = setTimeout(() => {
        startObjSelect(hitText, lp, clientX, clientY);
      }, 350);
    } else {
      // テキストオブジェクト外
      if (Draw.selId) {
        // 選択中なら解除のみ（新規入力しない）
        Draw.selId = null; redraw();
        Draw._lastTextTap = 0;
        return;
      }
      // 選択なし：ダミーinputを即座にfocusしてiOSキーボードを起動、350ms後にtextareaへ引き継ぐ
      const dummy = document.createElement('input');
      dummy.id = '_text-dummy-input';
      dummy.setAttribute('type', 'text');
      dummy.style.cssText = 'position:fixed;left:-9999px;top:-9999px;width:1px;height:1px;opacity:0;font-size:16px;';
      document.body.appendChild(dummy);
      dummy.focus();
      Draw._textTapTimer = setTimeout(() => {
        if (Draw.activeTextEl || Draw.textJustFinished) {
          dummy.remove();
          return;
        }
        showTextInput(lp.x, lp.y, null);
      }, 350);
    }
    return;
  }
  if (S.tool==='sticker') {
    if (Draw.pendingStickerId) {
      placeSticker(lp);
      return;
    }
    // スタンプ未選択時：スタンプオブジェクトにヒットしたらドラッグ
    const hitSticker = [...Draw.objects].reverse().find(o => o.type==='sticker' && hitObj(o, pp.x, pp.y));
    if (hitSticker) {
      startObjSelect(hitSticker, lp, clientX, clientY);
    }
    return;
  }
  if (S.tool==='clip') {
    if (Draw.pendingClipId) {
      handleClipPointerDown(lp);
    }
    return;
  }
}

function onMove(e) {
  const {clientX,clientY} = evtCoords(e);
  const lp = toLogical(clientX,clientY);

  if (Draw.dragInfo) {
    const obj=Draw.objects.find(o=>o.id===Draw.dragInfo.objId);
    if (obj) { shiftObj(obj,lp.x-Draw.dragInfo.sx,lp.y-Draw.dragInfo.sy,Draw.dragInfo.origObj); redraw(); }
    return;
  }
  if (S.tool==='pen'&&Draw.activeStroke) { Draw.activeStroke.points.push(lp); redraw(); return; }
  if (S.tool==='marker'&&Draw.activeStroke) { Draw.activeStroke.points.push(lp); redraw(); return; }
  if (S.tool==='eraser') eraseAt(lp);
}

function onUp(e) {
  if (Draw.dragInfo) {
    const obj=Draw.objects.find(o=>o.id===Draw.dragInfo.objId);
    if (obj) { pushUndo({type:'move',objId:obj.id,from:Draw.dragInfo.origObj,to:clone(obj)}); flushCell(); }
    Draw.dragInfo=null; redraw(); return;
  }
  if ((S.tool==='pen'||S.tool==='marker')&&Draw.activeStroke) {
    endPenStroke();
    return;
  }
}

function shiftObj(obj,dx,dy,orig) {
  if (obj.type==='pen') {
    obj.paths=orig.paths.map(p=>({...p,points:p.points.map(pt=>({x:pt.x+dx,y:pt.y+dy}))}));
  } else { obj.x=orig.x+dx; obj.y=orig.y+dy; }
}

/* ════ ERASER ════ */
function eraseAt(lp) {
  const r=S.eraserSize/2; let dirty=false;
  Draw.objects=Draw.objects.filter(obj=>{
    if (obj.type!=='pen') return true;
    const newPaths=[];
    obj.paths.forEach(path=>{
      let cur=[];
      path.points.forEach(pt=>{
        if (Math.hypot(pt.x-lp.x,pt.y-lp.y)<r) {
          if (cur.length>=2) newPaths.push({...path,points:cur});
          cur=[]; dirty=true;
        } else cur.push(pt);
      });
      if (cur.length>=2) newPaths.push({...path,points:cur});
    });
    obj.paths=newPaths; return obj.paths.length>0;
  });
  if (dirty){redraw();flushCell();}
}

/* ════ TEXT ════ */
function showTextInput(x,y,editObj) {
  removeTextInput();
  const r  = cvs.getBoundingClientRect();
  const sc = r.width/CANVAS_SRC;
  const ta = document.createElement('textarea');
  const fontSize = (editObj?.size||S.textSize)*sc;
  const weight   = (editObj?.bold ?? S.textBold) ? '700' : '400';
  ta.style.cssText=`position:fixed;left:${r.left+x*sc}px;top:${r.top+y*sc-14}px;
    font:${weight} ${fontSize}px 'Noto Sans JP',sans-serif;
    color:${editObj?.color||S.textColor};min-width:80px;min-height:28px;
    border:none;outline:1.5px dashed #3a6fa8;background:rgba(255,255,255,.93);
    resize:none;padding:0;margin:0;line-height:1.35;
    vertical-align:top;box-sizing:content-box;
    border-radius:3px;z-index:600;`;
  if (editObj) {
    ta.value = editObj.text||'';
    // 編集中は元オブジェクトをキャンバスから隠す
    editObj._hidden = true;
    redraw();
  }
  document.body.appendChild(ta);

  // ダミーinputがあればフォーカスを引き継ぐ（iOSキーボード維持）
  // なければ直接focus（ダブルタップ等、同期呼び出しの場合）
  const dummy = document.getElementById('_text-dummy-input');
  if (dummy && document.activeElement === dummy) {
    ta.focus();
    dummy.remove();
  } else {
    ta.focus();
  }

  Draw.activeTextEl={el:ta,x,y,editObj};
  Draw.textJustFinished=false;

  // textarea外のpointerdownで確定
  const onOutsideDown = ev => {
    if (ev.target !== ta) {
      finalizeText();
      document.removeEventListener('pointerdown', onOutsideDown, true);
    }
  };
  setTimeout(() => document.addEventListener('pointerdown', onOutsideDown, true), 80);
}

function finalizeText() {
  if (!Draw.activeTextEl) return;
  const {el,x,y,editObj}=Draw.activeTextEl;
  if (editObj) editObj._hidden = false;
  const txt=el.value;

  if (txt.trim()) {
    if (editObj) {
      const prev=clone(editObj); editObj.text=txt;
      pushUndo({type:'edit',objId:editObj.id,from:prev,to:clone(editObj)});
    } else {
      const obj={id:uid(),type:'text',x,y,text:txt,color:S.textColor,size:S.textSize,bold:S.textBold};
      pushUndo({type:'create',obj:clone(obj)}); Draw.objects.push(obj);
    }
    flushCell(); redraw();
  }
  el.remove();
  Draw.activeTextEl=null;
  Draw.textJustFinished=true;
  setTimeout(()=>{ Draw.textJustFinished=false; }, 320);
}

function removeTextInput(){
  if(Draw.activeTextEl){
    if(Draw.activeTextEl.editObj) Draw.activeTextEl.editObj._hidden = false;
    Draw.activeTextEl.el.remove();
    Draw.activeTextEl=null;
    redraw();
  }
}

/* ════ CLIP ════ */
;(function(){
  // LocalStorageキープレフィックス
  const CLIP_PREFIX = 'calapp_clip_';

  // ファイルデータをLocalStorageに保存してIDを返す
  function saveClipData(dataUrl, fileName, fileType, pageCount) {
    const id = 'clip_' + uid();
    try {
      localStorage.setItem(CLIP_PREFIX + id, JSON.stringify({dataUrl, fileName, fileType, pageCount}));
    } catch(e) {
      alert('ファイルが大きすぎて保存できません。より小さいファイルを使用してください。');
      return null;
    }
    return id;
  }

  // LocalStorageからファイルデータを取得
  window.getClipData = function(clipId) {
    try {
      const raw = localStorage.getItem(CLIP_PREFIX + clipId);
      return raw ? JSON.parse(raw) : null;
    } catch(e) { return null; }
  };

  // クリップオブジェクトを配置
  function placeClip(lp, clipId, pageCount, fileType) {
    const obj = {
      id: uid(), type:'clip',
      x: lp.x, y: lp.y,
      size: 60,
      clipId, pageCount, fileType,
    };
    pushUndo({type:'create', obj: clone(obj)});
    Draw.objects.push(obj);
    Draw.pendingClipId = null;
    flushCell(); redraw();
  }

  // ファイル選択ハンドラ
  const fileInput = document.getElementById('clip-file-input');
  fileInput.addEventListener('change', async () => {
    const file = fileInput.files[0];
    if (!file) return;
    const changeTargetId = fileInput._changeTargetObjId;
    fileInput._changeTargetObjId = null;
    fileInput.value = '';

    const fileType = file.type;
    let dataUrl, pageCount = 1;

    if (fileType === 'application/pdf') {
      dataUrl = await readFileAsDataUrl(file);
      try {
        const pdfjsLib = window['pdfjs-dist/build/pdf'];
        if (pdfjsLib) {
          const pdf = await pdfjsLib.getDocument({url: dataUrl}).promise;
          pageCount = pdf.numPages;
        }
      } catch(e) {}
    } else {
      dataUrl = await readFileAsDataUrl(file);
    }

    const clipId = saveClipData(dataUrl, file.name, fileType, pageCount);
    if (!clipId) return;

    if (changeTargetId) {
      // 画像変更モード：既存オブジェクトのclipIdを差し替え
      const obj = Draw.objects.find(o => o.id === changeTargetId);
      if (obj) {
        const prev = clone(obj);
        obj.clipId    = clipId;
        obj.pageCount = pageCount;
        obj.fileType  = fileType;
        pushUndo({type:'edit', objId: obj.id, from: prev, to: clone(obj)});
        flushCell(); redraw();
      }
    } else {
      // 新規配置モード
      Draw.pendingClipId = {clipId, pageCount, fileType};
      applyCanvasCursor('clip');
    }
  });

  function readFileAsDataUrl(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = e => resolve(e.target.result);
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  // クリップツール選択時のポインターダウン処理
  window.handleClipPointerDown = function(lp) {
    if (Draw.pendingClipId) {
      placeClip(lp, Draw.pendingClipId.clipId, Draw.pendingClipId.pageCount, Draw.pendingClipId.fileType);
    }
  };

  // ビューワー
  const viewer = document.getElementById('clip-viewer');
  const viewerPages = document.getElementById('clip-viewer-pages');
  const viewerPageInfo = document.getElementById('clip-viewer-page-info');

  window.openClipViewer = async function(clipId) {
    const data = getClipData(clipId);
    if (!data) return;

    viewer.classList.add('open');
    viewerPages.innerHTML = '';
    viewerPageInfo.textContent = '';

    if (data.fileType === 'application/pdf') {
      try {
        const pdfjsLib = window['pdfjs-dist/build/pdf'];
        pdfjsLib.GlobalWorkerOptions.workerSrc =
          'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        const pdf = await pdfjsLib.getDocument({url: data.dataUrl}).promise;
        viewerPageInfo.textContent = `${pdf.numPages}ページ`;
        for (let i = 1; i <= pdf.numPages; i++) {
          const page = await pdf.getPage(i);
          const viewport = page.getViewport({scale: window.innerWidth / page.getViewport({scale:1}).width * 0.92});
          const cvs2 = document.createElement('canvas');
          cvs2.width  = viewport.width;
          cvs2.height = viewport.height;
          cvs2.style.width  = '92vw';
          cvs2.style.maxWidth = '800px';
          viewerPages.appendChild(cvs2);
          await page.render({canvasContext: cvs2.getContext('2d'), viewport}).promise;
        }
      } catch(e) {
        viewerPages.innerHTML = `<p style="color:#fff;padding:24px">${L().pdfError}</p>`;
      }
    } else {
      // 画像
      const img = document.createElement('img');
      img.src = data.dataUrl;
      img.style.width = '92vw';
      img.style.maxWidth = '800px';
      viewerPages.appendChild(img);
    }
  };

  document.getElementById('clip-viewer-close').addEventListener('click', () => {
    viewer.classList.remove('open');
    viewerPages.innerHTML = '';
  });
  document.getElementById('clip-viewer-bd').addEventListener('click', () => {
    viewer.classList.remove('open');
    viewerPages.innerHTML = '';
  });
})();

(function(){
  const dropdown = document.getElementById('stk-dropdown');
  const grid     = document.getElementById('stk-grid');

  // 起動時に全スタンプをプリロード
  preloadStickerImages();

  // グリッドを一度だけ構築
  STICKERS.forEach(s => {
    const el = document.createElement('div');
    el.className = 'stk-inline-item';
    el.dataset.sid = s.id;
    el.title = s.label || s.id;

    const pc = document.createElement('canvas');
    pc.width = 40; pc.height = 40;
    el.appendChild(pc);

    // ロード完了時にグリッドのサムネを更新するリフレッシュ関数
    el._refresh = () => {
      const img = imgCache[s.id];
      const c2  = pc.getContext('2d');
      c2.clearRect(0, 0, 40, 40);
      if (img) {
        const {w, h} = stickerDrawSize(img, 36); // 縦横比を保持してサイズ計算
        const x = (40 - w) / 2;
        const y = (40 - h) / 2;
        c2.drawImage(img, x, y, w, h);
      }
    };
    el._refresh();

    el.addEventListener('pointerdown', e => {
      e.stopPropagation();
      e.preventDefault();
      Draw.pendingStickerId = s.id;
      cvs.style.cursor = 'copy';
      grid.querySelectorAll('.stk-inline-item').forEach(x =>
        x.classList.toggle('stk-selected', x.dataset.sid === s.id));
      dropdown.classList.remove('open');
      renderOpts();
    });
    // pointerupもキャプチャして伝播を止める（カレンダー遷移リスナーへの到達を防ぐ）
    el.addEventListener('pointerup', e => {
      e.stopPropagation();
      e.preventDefault();
    }, { capture: true });
    grid.appendChild(el);
  });

  // imgCache に画像が追加されたときグリッドを再描画（preloadStickerImages の onload から呼ばれる）
  window._stickerGridRefresh = () => {
    grid.querySelectorAll('.stk-inline-item').forEach(el => {
      if (el._refresh) el._refresh();
    });
  };

  window.openStickerDropdown = function() {
    preloadStickerImages();
    // offsetParentで実際に表示されているサイドバーを判定
    const sidebarLand = document.getElementById('day-sidebar-land');
    const isLandMode = sidebarLand && sidebarLand.offsetParent !== null;
    const btn = isLandMode
      ? document.querySelector('.land-tool-btn[data-tool="sticker"]')
      : document.querySelector('.tool-btn[data-tool="sticker"]');
    if (btn) {
      const r = btn.getBoundingClientRect();
      const dropW = Math.min(360, window.innerWidth * 0.9);
      if (isLandMode) {
        // 横長: サイドバー(310px)の右端にドロップダウンを表示
        const dropH = 280;
        const top = Math.min(r.top, window.innerHeight - dropH - 6);
        dropdown.style.top  = Math.max(0, top) + 'px';
        dropdown.style.left = (310 + 8) + 'px';
      } else {
        // 縦長: ボタンの下、右端が画面外に出ないよう調整
        dropdown.style.top  = (r.bottom + 6) + 'px';
        dropdown.style.left = Math.min(r.left, window.innerWidth - dropW - 8) + 'px';
      }
    }
    dropdown.classList.add('open');
  };

  window.closeStickerDropdown = function() {
    dropdown.classList.remove('open');
  };

  // ドロップダウン外 pointerdown（キャプチャフェーズ）で閉じる
  // キャプチャフェーズを使うことで stopPropagation の影響を受けずに確実に検出
  document.addEventListener('pointerdown', e => {
    if (dropdown.classList.contains('open') && !dropdown.contains(e.target)) {
      dropdown.classList.remove('open');
    }
  }, false);
})();

function placeSticker(lp) {
  if (!Draw.pendingStickerId) return;
  const img = imgCache[Draw.pendingStickerId];
  const sid = Draw.pendingStickerId;

  // 配置後すぐにリセット（続けてタップしても配置されないよう）
  Draw.pendingStickerId = null;
  cvs.style.cursor = 'crosshair';
  renderOpts();

  const doPlace = () => {
    const obj = {id:uid(), type:'sticker', stickerId:sid, x:lp.x, y:lp.y, size:132};
    pushUndo({type:'create', obj:clone(obj)});
    Draw.objects.push(obj);
    flushCell();
    redraw();
  };

  if (img instanceof Image) {
    doPlace();
  } else {
    let waited = 0;
    const timer = setInterval(() => {
      waited += 50;
      if (imgCache[sid] instanceof Image) {
        clearInterval(timer);
        doPlace();
      } else if (waited >= 2000) {
        clearInterval(timer);
      }
    }, 50);
  }
}

/* ════ CALENDAR SCREEN UNDO/REDO ════ */
function calPushUndo(act) {
  Cal.undoStk.push(act);
  Cal.redoStk = [];
  syncCalUR();
}
function syncCalUR() {
  const uBtn = document.getElementById('cal-btn-undo');
  const rBtn = document.getElementById('cal-btn-redo');
  if (uBtn) uBtn.disabled = Cal.undoStk.length === 0;
  if (rBtn) rBtn.disabled = Cal.redoStk.length === 0;
}
function clearCalUR() {
  Cal.undoStk = [];
  Cal.redoStk = [];
  syncCalUR();
}

function applyCalUndo(act) {
  if (act.type === 'cal-delete') {
    const objs = clone(getCellObjs(act.key));
    objs.push(clone(act.obj));
    setCellObjs(act.key, objs);
  } else if (act.type === 'cal-create') {
    const objs = getCellObjs(act.key).filter(o => o.id !== act.obj.id);
    setCellObjs(act.key, objs);
  } else if (act.type === 'cal-move') {
    // 同一セル内移動のUndo
    const objs = getCellObjs(act.key);
    const obj  = objs.find(o => o.id === act.objId);
    if (obj) Object.assign(obj, act.from);
    setCellObjs(act.key, objs);
  } else if (act.type === 'cal-cross-move') {
    // 別セル移動のUndo: dstから削除 → srcに復元
    const dstObjs = getCellObjs(act.dstKey).filter(o => o.id !== act.newObj.id);
    setCellObjs(act.dstKey, dstObjs);
    const srcObjs = clone(getCellObjs(act.srcKey));
    srcObjs.push(clone(act.origObj));
    setCellObjs(act.srcKey, srcObjs);
  } else if (act.type === 'cal-cell-move') {
    // セル全体移動のUndo: dstを元に戻し、srcを復元
    setCellObjs(act.dstKey, clone(act.dstObjsBefore));
    setCellObjs(act.srcKey, clone(act.movedObjs));
  }
  saveToStorage();
  renderMiniCanvases();
}

function applyCalRedo(act) {
  if (act.type === 'cal-delete') {
    const objs = getCellObjs(act.key).filter(o => o.id !== act.obj.id);
    setCellObjs(act.key, objs);
  } else if (act.type === 'cal-create') {
    const objs = clone(getCellObjs(act.key));
    objs.push(clone(act.obj));
    setCellObjs(act.key, objs);
  } else if (act.type === 'cal-move') {
    // 同一セル内移動のRedo
    const objs = getCellObjs(act.key);
    const obj  = objs.find(o => o.id === act.objId);
    if (obj) Object.assign(obj, act.to);
    setCellObjs(act.key, objs);
  } else if (act.type === 'cal-cross-move') {
    // 別セル移動のRedo: srcから削除 → dstに追加
    const srcObjs = getCellObjs(act.srcKey).filter(o => o.id !== act.origObj.id);
    setCellObjs(act.srcKey, srcObjs);
    const dstObjs = clone(getCellObjs(act.dstKey));
    dstObjs.push(clone(act.newObj));
    setCellObjs(act.dstKey, dstObjs);
  } else if (act.type === 'cal-cell-move') {
    // セル全体移動のRedo: srcをクリアしてdstに移動
    setCellObjs(act.dstKey, clone(act.movedObjs));
    setCellObjs(act.srcKey, []);
  }
  saveToStorage();
  renderMiniCanvases();
}

function doCalUndo() {
  if (Cal.undoStk.length === 0) return;
  const act = Cal.undoStk.pop();
  Cal.redoStk.push(act);
  applyCalUndo(act);
  syncCalUR();
}

function doCalRedo() {
  if (Cal.redoStk.length === 0) return;
  const act = Cal.redoStk.pop();
  Cal.undoStk.push(act);
  applyCalRedo(act);
  syncCalUR();
}

/* ════ OPEN / CLOSE DAY CELL ════ */

// 現在開いているセルのキー（goBackで戻る先のミニキャンバスを特定するため）

function positionDateLabels() {
  const numEl = document.getElementById('day-num-p');
  const subEl = document.getElementById('day-sub-p');
  const dowEl = document.getElementById('day-dow-p');
  if (!numEl || !subEl || !dowEl) return;
  const GAP = 8; // 日付との間隔(px)

  // day-topbar の中央Y座標を取得
  const topbar = document.getElementById('day-topbar');
  const tbr = topbar ? topbar.getBoundingClientRect() : null;
  const row1 = document.querySelector('.tb-row1');
  const row1r = row1 ? row1.getBoundingClientRect() : null;
  const midY = row1r ? row1r.top + row1r.height / 2 : (tbr ? tbr.top + tbr.height / 4 : 30);

  // day-num の縦位置を設定
  numEl.style.top = (midY - numEl.getBoundingClientRect().height / 2) + 'px';

  // 設定後に再取得
  const r = numEl.getBoundingClientRect();

  // 年月: 日付左端の左側
  const subW = subEl.getBoundingClientRect().width;
  subEl.style.left = (r.left - subW - GAP) + 'px';
  subEl.style.top  = (midY - subEl.getBoundingClientRect().height / 2) + 'px';

  // 曜日: 日付右端の右側
  dowEl.style.left = (r.right + GAP) + 'px';
  dowEl.style.top  = (midY - dowEl.getBoundingClientRect().height / 2) + 'px';
}

function openDayCell(key, label, keepTool = false) {
  Cal.selObjId=null; Cal.selCellKey=null;
  S.clipboard=null;
  finalizePenObjs(); removeTextInput();
  S.currentKey=key;
  Cal.currentCellKey=key;
  Draw.objects=clone(getCellObjs(key));
  Draw.undoStk=[]; Draw.redoStk=[]; Draw.selId=null;
  Draw.activePenObjRef=null; Draw.activeStroke=null;
  clearCalUR();
  syncUR();

  const l = L();
  const isEn = S.lang === 'en';
  const isBlank = key.includes('-pre-') || key.includes('-post-');
  const memoLabel = isEn ? 'Memo' : 'メモ';
  const labelStr = isBlank ? memoLabel
    : (typeof label === 'number') ? (isEn ? String(label) : label + '日')
    : (label || memoLabel);
  document.getElementById('day-num-inner-p').textContent = labelStr;
  document.getElementById('day-num-l').textContent = labelStr;

  const subStr = isEn
    ? `${l.months[S.month]} ${S.year}`
    : `${S.year}年 ${S.month+1}月`;
  document.getElementById('day-sub-p').textContent = subStr;
  document.getElementById('day-sub-l').textContent = subStr;

  const DOW_JA = ['日','月','火','水','木','金','土'];
  const DOW_EN = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const dowArr = isEn ? DOW_EN : DOW_JA;
  const dowStr = (!isBlank && typeof label === 'number')
    ? dowArr[new Date(S.year, S.month, label).getDay()]
    : '';
  document.getElementById('day-dow-p').textContent = dowStr;
  document.getElementById('day-dow-l').textContent = dowStr;

  // ── ミニキャンバスの rect を取得（アニメーション開始位置） ──
  const miniMc = document.querySelector(`.cell-preview canvas[data-key="${key}"]`);
  const fromRect = miniMc ? miniMc.getBoundingClientRect() : null;

  // 日付セル画面を不可視で先に表示してキャンバスを確定
  showScreen('day');
  updateOrientation();
  sizeCanvas();
  if (!keepTool) switchTool('pen');

  if (!fromRect || fromRect.width < 2) return; // アニメーション不可なら即表示

  // ── アニメーション開始位置・終了位置 ──
  const toRect = cvs.getBoundingClientRect();

  // トランジションキャンバスにミニキャンバスの内容を描画
  const tc  = document.getElementById('transition-canvas');
  const ctx2 = tc.getContext('2d');
  const dpr = window.devicePixelRatio || 1;

  // 終了サイズで解像度を確保
  tc.width  = toRect.width  * dpr;
  tc.height = toRect.height * dpr;
  ctx2.scale(dpr, dpr);

  // セルのオブジェクトを描画（論理座標 CANVAS_SRC → toRect.width に変換）
  const sc = toRect.width / CANVAS_SRC;
  ctx2.fillStyle = '#fff';
  ctx2.fillRect(0, 0, toRect.width, toRect.height);
  Draw.objects.forEach(o => drawObj(ctx2, o, sc));

  // 初期位置・サイズをfromRectに合わせて配置
  Object.assign(tc.style, {
    display:    'block',
    left:       fromRect.left + 'px',
    top:        fromRect.top  + 'px',
    width:      fromRect.width  + 'px',
    height:     fromRect.height + 'px',
    transform:  'none',
    transition: 'none',
    opacity:    '1',
  });

  // 日付セル画面本体は一時的に透明に
  document.getElementById('day-screen').style.opacity = '0';

  // 1フレーム待ってからアニメーション開始
  requestAnimationFrame(() => requestAnimationFrame(() => {
    const dx = toRect.left - fromRect.left;
    const dy = toRect.top  - fromRect.top;
    const sx = toRect.width  / fromRect.width;
    const sy = toRect.height / fromRect.height;

    tc.style.transition = 'transform 0.4s cubic-bezier(0.4,0,0.2,1), opacity 0.4s';
    tc.style.transformOrigin = '0 0';
    tc.style.transform = `translate(${dx}px, ${dy}px) scale(${sx}, ${sy})`;

    // アニメーション完了後の後処理
    const fallback = setTimeout(() => {
      tc.style.display = 'none';
      tc.style.transform = 'none';
      document.getElementById('day-screen').style.opacity = '1';
    }, 600);
    tc.addEventListener('transitionend', () => {
      clearTimeout(fallback);
      tc.style.display = 'none';
      tc.style.transform = 'none';
      document.getElementById('day-screen').style.opacity = '1';
    }, {once: true});
  }));
}

function goBack() {
  finalizePenObjs(); finalizeText();
  Draw.undoStk = []; Draw.redoStk = [];
  S.clipboard  = null;
  window._hideEraserCursor && window._hideEraserCursor();

  if (S.currentKey) {
    getActiveCalendar().cellData[S.currentKey] = clone(Draw.objects);
  }
  S.currentKey = null;

  // fromRect を showScreen 前に取得
  const fromRect = cvs.getBoundingClientRect();

  // カレンダー画面に切り替え
  document.getElementById('cal-screen').style.opacity = '1';
  showScreen('calendar');
  renderCalendar();

  // transition-canvasが残っていたらリセット
  const tc = document.getElementById('transition-canvas');
  if (tc) { tc.style.display = 'none'; tc.style.transform = 'none'; }

  const doAnim = () => {
    const miniMc = Cal.currentCellKey
      ? document.querySelector(`.cell-preview canvas[data-key="${Cal.currentCellKey}"]`)
      : null;
    const toRect = miniMc ? miniMc.getBoundingClientRect() : null;

    if (!fromRect || fromRect.width < 2 || !toRect || toRect.width < 2) {
      renderMiniCanvases(); return;
    }

    const ctx2 = tc.getContext('2d');
    const dpr  = window.devicePixelRatio || 1;
    tc.width   = fromRect.width  * dpr;
    tc.height  = fromRect.height * dpr;
    ctx2.scale(dpr, dpr);
    ctx2.fillStyle = '#fff';
    ctx2.fillRect(0, 0, fromRect.width, fromRect.height);
    const sc = fromRect.width / CANVAS_SRC;
    getCellObjs(Cal.currentCellKey).forEach(o => drawObj(ctx2, o, sc));

    Object.assign(tc.style, {
      display:         'block',
      left:            fromRect.left   + 'px',
      top:             fromRect.top    + 'px',
      width:           fromRect.width  + 'px',
      height:          fromRect.height + 'px',
      transform:       'none',
      transition:      'none',
      opacity:         '1',
    });

    document.getElementById('cal-screen').style.opacity = '0';

    requestAnimationFrame(() => requestAnimationFrame(() => {
      const sx = toRect.width  / fromRect.width;
      const sy = toRect.height / fromRect.height;
      const dx = toRect.left - fromRect.left;
      const dy = toRect.top  - fromRect.top;

      tc.style.transition      = 'transform 0.4s cubic-bezier(0.4,0,0.2,1), opacity 0.4s';
      tc.style.transformOrigin = '0 0';
      tc.style.transform       = `translate(${dx}px, ${dy}px) scale(${sx}, ${sy})`;

      const finish = () => {
        tc.style.display   = 'none';
        tc.style.transform = 'none';
        document.getElementById('cal-screen').style.opacity = '1';
        renderMiniCanvases();
      };
      const fallback = setTimeout(finish, 600);
      tc.addEventListener('transitionend', () => {
        clearTimeout(fallback); finish();
      }, { once: true });
    }));
  };

  setTimeout(doAnim, 80);
}
document.getElementById('btn-back').addEventListener('click', goBack);
document.getElementById('btn-back-land').addEventListener('click', goBack);

/* ════ 日付エリア ダブルタップ → 当日の詳細画面へ ════ */
function goToToday() {
  const todayKey = cellKey(today.getFullYear(), today.getMonth() + 1, today.getDate());
  if (S.currentKey === todayKey) return;

  saveCurrentCell();
  S.year  = today.getFullYear();
  S.month = today.getMonth();

  const dayScreen = document.getElementById('day-screen');
  dayScreen.style.cssText += ';opacity:0;transition:none;';
  openDayCell(todayKey, today.getDate(), true);

  requestAnimationFrame(() => requestAnimationFrame(() => {
    dayScreen.style.transition = 'opacity 0.6s ease';
    dayScreen.style.opacity    = '1';
    dayScreen.addEventListener('transitionend', () => {
      dayScreen.style.transition = '';
    }, { once: true });
  }));
}

// ダブルタップ検出（touchend 350ms以内 or dblclick）
function addDoubleTap(el, fn) {
  let last = 0;
  el.addEventListener('touchend', e => {
    const now = Date.now();
    if (now - last < 350) { e.preventDefault(); fn(); }
    last = now;
  });
  // マウス環境（開発用）
  el.addEventListener('dblclick', fn);
}

addDoubleTap(document.querySelector('.day-num-text-group'), goToToday); // 縦長
addDoubleTap(document.querySelector('.land-date-inner'),    goToToday); // 横長
